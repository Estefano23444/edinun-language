// ─────────────────────────────────────────────────────────────
// Sparkles — chispas animadas alrededor del personaje. Refuerzan
// la estética cósmica heredada del shell.
// ─────────────────────────────────────────────────────────────
function Sparkles({ color = "#fce9a8", count = 6, seed = 1 }) {
  const pts = Array.from({ length: count }, (_, i) => {
    const a = (i * 360) / count + seed * 37;
    const r = 70 + (i % 3) * 8;
    const x = 100 + Math.cos((a * Math.PI) / 180) * r;
    const y = 100 + Math.sin((a * Math.PI) / 180) * r;
    const s = 2 + (i % 3);
    return { x, y, s, delay: i * 0.35 };
  });
  return (
    <g>
      {pts.map((p, i) => (
        <g key={i} transform={`translate(${p.x} ${p.y})`}>
          <circle r={p.s} fill={color} opacity="0.9">
            <animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" begin={`${p.delay}s`} repeatCount="indefinite" />
          </circle>
        </g>
      ))}
    </g>
  );
}

  };
}

  // Cosmic (home / character / results)

// ─────────────────────────────────────────────────────────────
// Visitas (compartido con el resto del repo)
// ─────────────────────────────────────────────────────────────
function useVisitorCount() {
  const KEY = "edinun_visitors_v1";
  const [n, setN] = useState(() => {
    const raw = localStorage.getItem(KEY);
    const v = raw ? parseInt(raw, 10) : 0;
    return isNaN(v) ? 0 : v;
  });
  useEffect(() => {
    function onUpdate() {
      const raw = localStorage.getItem(KEY);
      const v = raw ? parseInt(raw, 10) : 0;
      if (!isNaN(v)) setN(v);
    }
    window.addEventListener("edinun:visitors-updated", onUpdate);
    return () => window.removeEventListener("edinun:visitors-updated", onUpdate);
  }, []);
  return n;
}

function markFirstAttempt() {
  const KEY = "edinun_visitors_v1";
  const SESSION_FLAG = "edinun_visit_counted_v1";
  if (sessionStorage.getItem(SESSION_FLAG) === "1") return;
  const raw = localStorage.getItem(KEY);
  const current = raw ? parseInt(raw, 10) : 0;
  const next = (isNaN(current) ? 0 : current) + 1;
  localStorage.setItem(KEY, String(next));
  sessionStorage.setItem(SESSION_FLAG, "1");
  window.dispatchEvent(new Event("edinun:visitors-updated"));
}

function incrementGamesCompleted() {
  const KEY = "edinun_games_completed_v1";
  const raw = localStorage.getItem(KEY);
  const next = (raw ? parseInt(raw, 10) : 0) + 1;
  localStorage.setItem(KEY, String(next));
  window.dispatchEvent(new Event("edinun:games-updated"));
  return next;
}

    if (!canStart) return;
    const cfg = LEVELS_CFG.find((l) => l.id === level) || LEVELS_CFG[0];

      ...s,
      studentName: name.trim(),
      level,
      sessionStart: Date.now(),
    }));
    go("character");
  }

    <div style={{ position: "absolute", inset: 0, overflow: "hidden" }}>

        </div>

      <div style={{
        position: "absolute", inset: 0,
        display: "grid", gridTemplateColumns: "1fr 1.15fr",
        alignItems: "center",
        padding: "40px 56px", gap: 40,
      }}>
        {/* Logo grande izq */}
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
          <EdinunLogo size={300} />
        </div>

        {/* Formulario der: saludo + 3 botones de nivel + descripción + nombre */}
        <div style={{ display: "flex", flexDirection: "column", gap: 18, maxWidth: 520 }}>
          <div>
            <div className="ed-label" style={{ color: "#4fd8ff", marginBottom: 8 }}>
              Palabras, noticias y blogs
            </div>
            <h1 className="ed-h1" style={{ fontSize: 40, lineHeight: 1.05 }}>
              ¡Bienvenido/a,{" "}
              <span style={{

                Estudiante!
              </span>
            </h1>
          </div>

          {/* 3 botones de tema — solo nombre del tema, sin BÁSICO/MEDIO/AVANZADO */}
          <div>
            <div className="ed-label" style={{ marginBottom: 10 }}>
              Selecciona un tema para jugar
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
              {LEVELS_CFG.map((lv) => {
                const active = level === lv.id;
                return (
                  <button
                    key={lv.id}
                    onClick={() => setLevel(lv.id)}
                    style={{
                      padding: "14px 6px",
                      borderRadius: 16,
                      background: lv.grad,
                      color: lv.ink,
                      fontFamily: "var(--ed-font-display)",
                      fontWeight: 700, fontSize: 15,
                      letterSpacing: "0.02em",
                      lineHeight: 1.1,
                      border: "none",

                        ? "inset 0 1px 0 rgba(255,255,255,0.55), inset 0 -3px 0 rgba(0,0,0,0.2), 0 0 0 3px rgba(255,255,255,0.85), 0 0 24px rgba(255,255,255,0.32)"
                        : "inset 0 1px 0 rgba(255,255,255,0.4), inset 0 -3px 0 rgba(0,0,0,0.18), 0 6px 14px -4px rgba(0,0,0,0.45)",
                      transform: active ? "translateY(-2px)" : "none",

    <div style={{ position: "absolute", inset: 0, overflow: "hidden" }}>

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const ss = s % 60;
  return `${String(m).padStart(2, "0")}:${String(ss).padStart(2, "0")}`;
}

// Anti-repetición persistente por nivel
const RECENT_KEYS = {
  letraR:  "edinun_juego2_letraR_recientes_v1",
  noticia: "edinun_juego2_noticia_recientes_v1",
  blog:    "edinun_juego2_blog_recientes_v1",
};
const RECENT_LIMIT = 6;

function getRecent(level) {
  try {
    const raw = localStorage.getItem(RECENT_KEYS[level]);
    if (!raw) return [];
    const arr = JSON.parse(raw);
    return Array.isArray(arr) ? arr : [];
  } catch { return []; }
}

function pushRecent(level, key) {
  const arr = getRecent(level).filter((k) => k !== key);
  arr.unshift(key);
  const trimmed = arr.slice(0, RECENT_LIMIT);
  try { localStorage.setItem(RECENT_KEYS[level], JSON.stringify(trimmed)); } catch {}
}

// Estrellas por tiempo (igual al shell): 0-2s → 10⭐, 27+s → 1⭐, fallo → 0.
function calcStars(isCorrect, exerciseSec) {
  return isCorrect ? Math.max(1, 10 - Math.floor(exerciseSec / 3)) : 0;
}

function GameScreen({ app, setApp, go }) {
  const cat = app.currentCategory || "letraR";
  const [restartTick, setRestartTick] = useStateG(0);
  const restart = () => setRestartTick((t) => t + 1);
  if (cat === "noticia") return <NoticiaGame key={`noticia-${restartTick}`} app={app} setApp={setApp} go={go} onRestart={restart} />;
  if (cat === "blog")    return <BlogGame    key={`blog-${restartTick}`}    app={app} setApp={setApp} go={go} onRestart={restart} />;
  return <LetraRGame key={`letraR-${restartTick}`} app={app} setApp={setApp} go={go} onRestart={restart} />;
}

function GameHUD({ elapsed, stars, attempted, solved, total = 3, app, setApp }) {

    setPendingLevel(lvId);

    if (!pendingLevel) return;
    const cfg = levels.find((l) => l.id === pendingLevel);
    if (!cfg) { setPendingLevel(null); return; }
    setApp((s) => ({
      ...s,

// ─────────────────────────────────────────────────────────────
// NIVEL 1 — La letra R (3 rondas idénticas)
// Hereda la mecánica de "Completa la palabra" pero ocultando la R
// con bandeja r/l/m/n/s y distractores.
// ─────────────────────────────────────────────────────────────
function makeRProblem(usedKeys) {
  const recent = new Set(getRecent("letraR"));
  const exclude = new Set([...usedKeys, ...recent]);
  let pool = LETRA_R_BANK.filter((w) => !exclude.has(w.word));
  if (pool.length < 3) pool = LETRA_R_BANK.filter((w) => !usedKeys.has(w.word));
  if (pool.length === 0) pool = LETRA_R_BANK;
  const pick = pool[Math.floor(Math.random() * pool.length)];
  const word = pick.word;
  const letters = word.split("");
  const hiddenIdx = [];
  for (let i = 0; i < letters.length; i++) {
    if (letters[i] === "r") hiddenIdx.push(i);
  }
  const correctLetters = hiddenIdx.map((i) => letters[i]);
  return {
    emoji: pick.emoji,
    word, letters, hiddenIdx, correctLetters,
    tray: R_TRAY,
  };
}

function LetraRGame({ app, setApp, go, onRestart }) {
  const char = CHARACTERS.find((c) => c.id === app.character) || CHARACTERS[0];
  const catLabel = app.currentCatLabel || "La letra del ronroneo: rrrrrr";

  const usedRef = useRefG(new Set());
  const [problem, setProblem] = useStateG(() => {
    const p = makeRProblem(usedRef.current);
    usedRef.current.add(p.word);
    pushRecent("letraR", p.word);
    return p;
  });
  const [filled, setFilled] = useStateG([]);
  const [elapsed, setElapsed] = useStateG(0);
  const [stars, setStars] = useStateG(0);
  const [solved, setSolved] = useStateG(0);
  const [attempted, setAttempted] = useStateG(0);
  const [starsSession, setStarsSession] = useStateG(0);
  const [feedback, setFeedback] = useStateG(null);
  const [feedbackMsg, setFeedbackMsg] = useStateG("");
  const [confirmingExit, setConfirmingExit] = useStateG(false);
  const [confirmingHome, setConfirmingHome] = useStateG(false);
  const [log, setLog] = useStateG([]);

  const started = useRefG(Date.now());
  const exerciseStart = useRefG(Date.now());

  useEffectG(() => {
    const id = setInterval(() => setElapsed(Math.floor((Date.now() - started.current) / 1000)), 500);
    return () => clearInterval(id);
  }, []);

  // Set glifos chalkboard del nivel 1
  useEffectG(() => {
    window.__currentChalkGlyphs = [
      { c: "R",  l: "6%",  t: "12%", r: "-8deg" },
      { c: "r",  l: "82%", t: "16%", r: "6deg",  s: "0.62em" },
      { c: "ra", l: "10%", t: "78%", r: "12deg", s: "0.5em" },
      { c: "re", l: "88%", t: "72%", r: "-10deg", s: "0.5em" },
      { c: "ri", l: "45%", t: "8%",  r: "4deg",  s: "0.5em" },
      { c: "ro", l: "3%",  t: "45%", r: "-4deg", s: "0.5em" },
      { c: "ru", l: "92%", t: "45%", r: "8deg",  s: "0.5em" },
      { c: "¡",  l: "30%", t: "55%", r: "-6deg", s: "0.55em" },
      { c: "¿",  l: "70%", t: "62%", r: "8deg",  s: "0.55em" },
      { c: "✏",  l: "55%", t: "30%", r: "-4deg", s: "0.46em" },
    ];
    return () => { window.__currentChalkGlyphs = null; };
  }, []);

  function pressLetter(letter) {
    setFilled((prev) => {
      const len = problem.hiddenIdx.length;
      const next = [...prev];
      while (next.length < len) next.push(undefined);
      for (let i = 0; i < len; i++) {
        if (next[i] === undefined) { next[i] = letter; return next; }
      }
      return prev;
    });
  }
  function eraseSlot(slotIdx) {
    setFilled((prev) => {
      const next = [...prev];
      while (next.length < problem.hiddenIdx.length) next.push(undefined);
      next[slotIdx] = undefined;
      return next;
    });
  }
  function erase() {
    for (let i = problem.hiddenIdx.length - 1; i >= 0; i--) {
      if (filled[i] !== undefined) { eraseSlot(i); return; }
    }
  }

  function verify() {
    const allFilled = problem.hiddenIdx.every((_, i) => filled[i] !== undefined);
    if (!allFilled) {
      setFeedback("err");
      setFeedbackMsg("Completa todas las letras");
      setTimeout(() => { setFeedback(null); setFeedbackMsg(""); }, 700);
      return;
    }
    if (typeof window.markFirstAttempt === "function") window.markFirstAttempt();

    const userLetters = problem.letters.slice();
    problem.hiddenIdx.forEach((wordPos, i) => { userLetters[wordPos] = filled[i]; });
    const userWord = userLetters.join("");
    const isCorrect = userWord === problem.word;
    const exerciseSec = Math.max(0, Math.floor((Date.now() - exerciseStart.current) / 1000));
    const earned = calcStars(isCorrect, exerciseSec);

    const newAttempted = attempted + 1;
    const newSolved = solved + (isCorrect ? 1 : 0);
    const newStarsTotal = stars + earned;
    const newStarsSession = starsSession + earned;

    const entry = {
      idx: newAttempted,
      a: problem.word,
      b: userWord,
      op: "🔤",
      correctAnswer: problem.word,
      userAnswer: userWord,
      isCorrect, time: exerciseSec, earned,
      emoji: problem.emoji,
    };
    const newLog = [...log, entry];

    setFeedback(isCorrect ? "ok" : "err");
    setFeedbackMsg(isCorrect ? `+${earned} ⭐` : ENCOURAGEMENTS[Math.floor(Math.random() * ENCOURAGEMENTS.length)]);
    setAttempted(newAttempted);
    setSolved(newSolved);
    setStars(newStarsTotal);
    setStarsSession(newStarsSession);
    setLog(newLog);

    const wait = isCorrect ? 950 : 1200;
    setTimeout(() => {
      setFeedback(null);
      setFeedbackMsg("");
      setFilled([]);
      if (newAttempted >= 3) {
        setApp((s) => ({
          ...s, stars: newStarsTotal,
          lastResult: { category: catLabel, solved: newSolved, total: 3, time: elapsed, starsEarned: newStarsSession, log: newLog },
        }));
        window.incrementGamesCompleted && window.incrementGamesCompleted();
        go("results");
      } else {
        const p = makeRProblem(usedRef.current);
        usedRef.current.add(p.word);
        pushRecent("letraR", p.word);
        setProblem(p);
        exerciseStart.current = Date.now();
      }
    }, wait);
  }

  const wordLen = problem.letters.length;
  const SLOT_W = wordLen <= 4 ? 64 : wordLen <= 6 ? 56 : wordLen <= 8 ? 46 : 40;
  const SLOT_H = wordLen <= 4 ? 72 : wordLen <= 6 ? 66 : 58;
  const SLOT_GAP = wordLen <= 6 ? 8 : 6;
  const slotOfHidden = (wordPos) => problem.hiddenIdx.indexOf(wordPos);

  return (
    <div style={{ position: "absolute", inset: 0, overflow: "hidden" }}>
      <GameHUD elapsed={elapsed} stars={stars} attempted={attempted} solved={solved} total={3} app={app} setApp={setApp} />

      {/* Enunciado */}
      <div style={{
        position: "absolute", top: 100, left: 250, right: 250,
        textAlign: "center",
        fontFamily: "var(--ed-font-display)", fontWeight: 700,
        fontSize: 20, lineHeight: 1.15,
        color: "#fff", textShadow: "0 2px 6px rgba(0,0,0,0.55)",
        pointerEvents: "none",
      }}>
        Completa la palabra con la letra R.
      </div>

      {/* Personaje + bocadillo (igual que en completa-palabras) */}
      <div data-qa="personaje" style={{
        position: "absolute", left: 8, bottom: 90, width: 220,
        pointerEvents: "none", textAlign: "center",
      }}>
        <div data-qa="bocadillo" style={{
          position: "absolute", left: 6, top: -80, width: 208,
          pointerEvents: "none",
        }}>
          <div style={{
            position: "relative",
            background: "linear-gradient(180deg, rgba(20,12,55,0.95), rgba(10,6,35,0.95))",
            border: "1.5px solid rgba(242,194,96,0.65)",
            borderRadius: 16, padding: "10px 14px",
            fontFamily: "var(--ed-font-display)",
            fontWeight: 700, fontSize: 14, lineHeight: 1.25,
            color: "#fce9a8", textAlign: "center",
            boxShadow: "0 10px 24px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.08)",
          }}>
            Selecciona la letra correcta.
            <div style={{
              position: "absolute", bottom: -10, left: 70,
              width: 0, height: 0,
              borderLeft: "9px solid transparent", borderRight: "9px solid transparent",
              borderTop: "10px solid rgba(20,12,55,0.95)",
              filter: "drop-shadow(0 1px 0 rgba(242,194,96,0.55))",
            }} />
          </div>
        </div>
        <div style={{ position: "relative", display: "flex", justifyContent: "center" }}>
          <div style={{
            position: "absolute", bottom: 14, left: "50%", transform: "translateX(-50%)",
            width: 140, height: 16, borderRadius: "50%",
            background: "radial-gradient(ellipse, rgba(242,194,96,0.45), transparent 70%)",
            filter: "blur(5px)",
          }} />
          <char.Component size={190} floating />
        </div>
        <div style={{
          marginTop: -2,
          fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 14,
          color: "#fce9a8", letterSpacing: "0.04em",
          textShadow: "0 2px 6px rgba(0,0,0,0.6)",
        }}>{char.name}</div>
      </div>

      {/* Zona central: cartel emoji + casillas */}
      <div data-qa="zona-central" style={{
        position: "absolute", top: 146, left: "50%", transform: "translateX(-50%)",
        width: 460, textAlign: "center",
        display: "flex", flexDirection: "column", alignItems: "center",
        gap: 26,
      }}>
        <div style={{
          width: 160, height: 150,
          borderRadius: 22,
          background: "linear-gradient(180deg, rgba(255,255,255,0.95), rgba(240,235,225,0.9))",
          border: "3px solid #f2c260",
          boxShadow: "0 12px 28px rgba(0,0,0,0.45), 0 0 0 1px rgba(242,194,96,0.35), inset 0 -4px 0 rgba(0,0,0,0.08)",
          display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: 108, lineHeight: 1,
        }}>
          {problem.emoji}
        </div>

        <div style={{
          display: "flex", justifyContent: "center", alignItems: "center",
          gap: SLOT_GAP, padding: "4px 6px",
        }}>
          {problem.letters.map((ch, wordPos) => {
            const hiddenSlot = slotOfHidden(wordPos);
            const isHidden = hiddenSlot >= 0;
            if (!isHidden) {
              return (
                <div key={wordPos} style={{
                  width: SLOT_W, height: SLOT_H,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontFamily: "var(--ed-font-display)", fontWeight: 700,
                  fontSize: SLOT_H * 0.55,
                  color: "#fff", textShadow: "0 2px 6px rgba(0,0,0,0.5)",
                  borderBottom: "3px solid rgba(255,255,255,0.35)",
                }}>{ch}</div>
              );
            }
            const f = filled[hiddenSlot];
            const isFilled = f !== undefined;
            let activeIdx = -1;
            for (let k = 0; k < problem.hiddenIdx.length; k++) {
              if (filled[k] === undefined) { activeIdx = k; break; }
            }
            const isActive = hiddenSlot === activeIdx;
            return (
              <button key={wordPos} onClick={() => { if (isFilled) eraseSlot(hiddenSlot); }}
                style={{
                  width: SLOT_W, height: SLOT_H, borderRadius: 12,
                  border: `2.5px solid ${feedback === "ok" ? "#2ecc8f" : feedback === "err" ? "#ff6b6b" : isActive ? "#fce9a8" : "rgba(242,194,96,0.55)"}`,
                  background: isFilled ? "linear-gradient(180deg, rgba(252,233,168,0.95), rgba(217,164,65,0.85))" : "rgba(10,6,35,0.55)",
                  color: isFilled ? "#3a2608" : "rgba(252,233,168,0.5)",
                  fontFamily: "var(--ed-font-display)", fontWeight: 800,
                  fontSize: SLOT_H * 0.55,
                  cursor: isFilled ? "pointer" : "default",
                  boxShadow: isActive ? "0 0 14px rgba(252,233,168,0.5)" : isFilled ? "0 4px 10px rgba(0,0,0,0.35)" : "inset 0 1px 0 rgba(255,255,255,0.08)",
                  transition: "all 0.15s ease",
                }}
                title={isFilled ? "Toca para borrar" : "Toca una letra de abajo"}
              >
                {isFilled ? f : "_"}
              </button>
            );
          })}
        </div>
      </div>

      {/* Bandeja: r l m n s */}
      <div data-qa="bandeja" style={{
        position: "absolute", bottom: 60, left: "50%", transform: "translateX(-50%)",
        display: "flex", gap: 12, justifyContent: "center",
      }}>
        {R_TRAY.map((letter, i) => {
          const color = ["#ef5a5a","#f5a623","#f5d84b","#4fa0ff","#2ecc8f"][i];
          return (
            <button key={i} className="ed-numpad-key" onClick={() => pressLetter(letter)}
              style={{
                width: 64, height: 68, fontSize: 30,
                borderColor: color, borderWidth: 2, borderStyle: "solid",
                cursor: "pointer",
              }}
              title="Toca para colocar (reutilizable)"
            >{letter}</button>
          );
        })}
      </div>

      {/* Acciones */}
      <div data-qa="acciones" style={{
        position: "absolute", right: 18, top: "50%", transform: "translateY(-50%)",
        display: "flex", flexDirection: "column", gap: 12, width: 150,
      }}>
        <button className="ed-btn ed-btn-verify" onClick={verify}
          style={{ fontSize: 15, padding: "0 10px", height: 56, fontWeight: 800, letterSpacing: "0.04em" }}>¡VERIFICAR!</button>
        <button className="ed-btn ed-btn-erase" onClick={erase}
          style={{ fontSize: 15, padding: "0 10px", height: 56, fontWeight: 800, letterSpacing: "0.04em" }}>BORRAR</button>
        <button className="ed-btn ed-btn-restart" onClick={() => setConfirmingExit(true)}
          style={{ fontSize: 15, padding: "0 10px", height: 56, fontWeight: 800, letterSpacing: "0.04em" }}>REINICIAR</button>
        <button className="ed-btn ed-btn-ghost" onClick={() => setConfirmingHome(true)}
          style={{ fontSize: 15, padding: "0 10px", height: 56, fontWeight: 800, letterSpacing: "0.04em" }}>SALIR</button>
      </div>

      <FeedbackOverlay feedback={feedback} feedbackMsg={feedbackMsg} charName={char.name} />
      <RestartModal confirmingExit={confirmingExit} setConfirmingExit={setConfirmingExit} attempted={attempted} total={3} onRestart={onRestart} />
      <ExitToHomeModal confirmingHome={confirmingHome} setConfirmingHome={setConfirmingHome} attempted={attempted} total={3} go={go} />
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// NIVEL 2 — La noticia (3 rondas con mecánicas distintas).
// Se elige UNA noticia al iniciar el nivel. Rondas 0-1 usan esa
// noticia. Ronda 2 es teórica (definición → concepto).
// ─────────────────────────────────────────────────────────────
function pickNoticia(usedKeys) {
  const recent = new Set(getRecent("noticia"));
  const exclude = new Set([...usedKeys, ...recent]);
  let pool = NOTICIAS.filter((n) => !exclude.has(n.id));
  if (pool.length === 0) pool = NOTICIAS.filter((n) => !usedKeys.has(n.id));
  if (pool.length === 0) pool = NOTICIAS;
  return pool[Math.floor(Math.random() * pool.length)];
}

function NoticiaGame({ app, setApp, go, onRestart }) {
  const char = CHARACTERS.find((c) => c.id === app.character) || CHARACTERS[0];
  const catLabel = app.currentCatLabel || "La noticia";

  const usedRef = useRefG(new Set());
  const [noticia] = useStateG(() => {
    const n = pickNoticia(usedRef.current);
    usedRef.current.add(n.id);
    pushRecent("noticia", n.id);
    return n;
  });

  // Ronda 0: parte resaltada. Ronda 1: elige resumen. Ronda 2: definición.
  const [ronda, setRonda] = useStateG(0);

  // Estado de la ronda 0
  const partes = ["TITULAR", "ENTRADA", "CUERPO", "CIERRE"];
  const [r0Highlight] = useStateG(() => partes[Math.floor(Math.random() * partes.length)]);

  // Estado de la ronda 2 (concepto): elegir un concepto y armar chips
  const [r2Pick] = useStateG(() => NOTICIA_CONCEPTOS[Math.floor(Math.random() * NOTICIA_CONCEPTOS.length)]);
  const [r2Chips] = useStateG(() => {
    const distractores = NOTICIA_CONCEPTOS.filter((c) => c.concepto !== r2Pick.concepto);
    const picked = shuffle(distractores).slice(0, 3);
    return shuffle([r2Pick, ...picked]);
  });

  const [elapsed, setElapsed] = useStateG(0);
  const [stars, setStars] = useStateG(0);
  const [solved, setSolved] = useStateG(0);
  const [attempted, setAttempted] = useStateG(0);
  const [starsSession, setStarsSession] = useStateG(0);
  const [feedback, setFeedback] = useStateG(null);
  const [feedbackMsg, setFeedbackMsg] = useStateG("");
  const [confirmingExit, setConfirmingExit] = useStateG(false);
  const [confirmingHome, setConfirmingHome] = useStateG(false);
  // Selección actual del estudiante (chip / opción) — se confirma con VERIFICAR.
  // String para rondas 0 y 2 (concepto), objeto {text,isCorrect} para ronda 1.
  const [selected, setSelected] = useStateG(null);
  const [log, setLog] = useStateG([]);
  const started = useRefG(Date.now());
  const exerciseStart = useRefG(Date.now());

  useEffectG(() => {
    const id = setInterval(() => setElapsed(Math.floor((Date.now() - started.current) / 1000)), 500);
    return () => clearInterval(id);
  }, []);

  // Limpia la selección al cambiar de ronda — cada ronda arranca sin chip elegido.
  useEffectG(() => { setSelected(null); }, [ronda]);

  // Glifos del fondo (chalkboard) para nivel 2
  useEffectG(() => {
    window.__currentChalkGlyphs = [
      { c: "📰", l: "6%",  t: "12%", r: "-8deg" },
      { c: "📝", l: "82%", t: "16%", r: "6deg",  s: "0.62em" },
      { c: "🗞", l: "10%", t: "78%", r: "12deg", s: "0.7em" },
      { c: "✏",  l: "88%", t: "72%", r: "-10deg", s: "0.55em" },
      { c: "📌", l: "45%", t: "8%",  r: "4deg",  s: "0.5em" },
      { c: "¿",  l: "3%",  t: "45%", r: "-4deg", s: "0.6em" },
      { c: "?",  l: "92%", t: "45%", r: "8deg",  s: "0.58em" },
      { c: "¡",  l: "30%", t: "55%", r: "-6deg", s: "0.55em" },
      { c: "T",  l: "70%", t: "62%", r: "8deg",  s: "0.52em" },
      { c: "E",  l: "55%", t: "30%", r: "-4deg", s: "0.46em" },
    ];
    return () => { window.__currentChalkGlyphs = null; };
  }, []);

  // Resúmenes para ronda 1 (1 correcto + 2 distractores, mezclados al montaje)
  const [r1Options] = useStateG(() => {
    const correct = { text: noticia.resumen_correcto, isCorrect: true };
    const distractores = noticia.resumen_distractores.map((d) => ({ text: d, isCorrect: false }));
    return shuffle([correct, ...distractores]);
  });

  function answer(isCorrect, userText, correctText) {
    if (typeof window.markFirstAttempt === "function") window.markFirstAttempt();
    const exerciseSec = Math.max(0, Math.floor((Date.now() - exerciseStart.current) / 1000));
    const earned = calcStars(isCorrect, exerciseSec);
    const newAttempted = attempted + 1;
    const newSolved = solved + (isCorrect ? 1 : 0);
    const newStarsTotal = stars + earned;
    const newStarsSession = starsSession + earned;

    const entry = {
      idx: newAttempted,
      a: correctText, b: userText, op: ronda === 0 ? "📰" : ronda === 1 ? "📝" : "💡",
      correctAnswer: correctText, userAnswer: userText,
      isCorrect, time: exerciseSec, earned,
      emoji: noticia.emoji,
    };
    const newLog = [...log, entry];

    setFeedback(isCorrect ? "ok" : "err");
    setFeedbackMsg(isCorrect ? `+${earned} ⭐` : ENCOURAGEMENTS[Math.floor(Math.random() * ENCOURAGEMENTS.length)]);
    setAttempted(newAttempted);
    setSolved(newSolved);
    setStars(newStarsTotal);
    setStarsSession(newStarsSession);
    setLog(newLog);

    const wait = isCorrect ? 950 : 1200;
    setTimeout(() => {
      setFeedback(null);
      setFeedbackMsg("");
      if (newAttempted >= 3) {
        setApp((s) => ({
          ...s, stars: newStarsTotal,
          lastResult: { category: catLabel, solved: newSolved, total: 3, time: elapsed, starsEarned: newStarsSession, log: newLog },
        }));
        window.incrementGamesCompleted && window.incrementGamesCompleted();
        go("results");
      } else {
        setRonda((r) => r + 1);
        exerciseStart.current = Date.now();
      }
    }, wait);
  }

  // Confirma la selección actual. Cada ronda evalúa contra su respuesta correcta:
  //   ronda 0 → parte resaltada · ronda 1 → resumen correcto · ronda 2 → concepto.
  function verify() {
    if (selected === null || feedback !== null) return;
    if (ronda === 0) {
      answer(selected === r0Highlight, selected, r0Highlight);
    } else if (ronda === 1) {
      answer(selected.isCorrect, selected.text, noticia.resumen_correcto);
    } else {
      answer(selected === r2Pick.concepto, selected, r2Pick.concepto);
    }
  }

  const canVerify = selected !== null && feedback === null;

  return (
    <div style={{ position: "absolute", inset: 0, overflow: "hidden" }}>
      <GameHUD elapsed={elapsed} stars={stars} attempted={attempted} solved={solved} total={3} app={app} setApp={setApp} />

      {/* Enunciado dinámico según ronda. Se recorta a la derecha (right:178)
          para no invadir el rail de acciones (VERIFICAR/REINICIAR/SALIR). */}
      <div style={{
        position: "absolute", top: 100, left: 240, right: 178,
        textAlign: "center",
        fontFamily: "var(--ed-font-display)", fontWeight: 700,
        fontSize: 19, lineHeight: 1.15,
        color: "#fff", textShadow: "0 2px 6px rgba(0,0,0,0.55)",
        pointerEvents: "none",
      }}>
        {ronda === 0 && "Identifica la parte de la noticia."}
        {ronda === 1 && "Elige la frase que resume mejor la noticia."}
        {ronda === 2 && "¿A qué se refiere esta explicación?"}
      </div>

      {/* Personaje grande con bocadillo dinámico (igual tamaño que nivel 1) */}
      <div data-qa="personaje" style={{
        position: "absolute", left: 8, bottom: 90, width: 220,
        pointerEvents: "none", textAlign: "center",
      }}>
        <div data-qa="bocadillo" style={{
          position: "absolute", left: 6, top: -80, width: 208,
          pointerEvents: "none",
        }}>
          <div style={{
            position: "relative",
            background: "linear-gradient(180deg, rgba(20,12,55,0.95), rgba(10,6,35,0.95))",
            border: "1.5px solid rgba(242,194,96,0.65)",
            borderRadius: 16, padding: "10px 14px",
            fontFamily: "var(--ed-font-display)",
            fontWeight: 700, fontSize: 14, lineHeight: 1.25,
            color: "#fce9a8", textAlign: "center",
            boxShadow: "0 10px 24px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.08)",
          }}>
            {ronda === 0 && "¿Qué parte de la noticia está marcada?"}
            {ronda === 1 && "Selecciona el resumen correcto."}
            {ronda === 2 && "Selecciona el concepto correcto."}
            <div style={{
              position: "absolute", bottom: -10, left: 70,
              width: 0, height: 0,
              borderLeft: "9px solid transparent", borderRight: "9px solid transparent",
              borderTop: "10px solid rgba(20,12,55,0.95)",
              filter: "drop-shadow(0 1px 0 rgba(242,194,96,0.55))",
            }} />
          </div>
        </div>
        <div style={{ position: "relative", display: "flex", justifyContent: "center" }}>
          <div style={{
            position: "absolute", bottom: 14, left: "50%", transform: "translateX(-50%)",
            width: 140, height: 16, borderRadius: "50%",
            background: "radial-gradient(ellipse, rgba(242,194,96,0.45), transparent 70%)",
            filter: "blur(5px)",
          }} />
          <char.Component size={190} floating />
        </div>
        <div style={{
          marginTop: -2,
          fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 14,
          color: "#fce9a8", letterSpacing: "0.04em",
          textShadow: "0 2px 6px rgba(0,0,0,0.6)",
        }}>{char.name}</div>
      </div>

      {/* Zona central — varía por ronda. Se recorta a la derecha (right:178)
          para dejar 160px de hueco al rail de acciones. */}
      <div data-qa="zona-central" style={{
        position: "absolute", top: 132, left: 240, right: 178, bottom: 18,
      }}>
        {ronda === 0 && (
          <NoticiaCard noticia={noticia} highlight={r0Highlight}
            chips={partes}
            selected={selected} onSelect={setSelected}
            disabled={feedback !== null} />
        )}
        {ronda === 1 && (
          <NoticiaResumenCard noticia={noticia} options={r1Options}
            selected={selected} onSelect={setSelected}
            disabled={feedback !== null} />
        )}
        {ronda === 2 && (
          <ConceptoCard def={r2Pick.def} chips={r2Chips.map((c) => c.concepto)} correct={r2Pick.concepto}
            selected={selected} onSelect={setSelected}
            disabled={feedback !== null} />
        )}
      </div>

      {/* Rail derecho — mismo patrón que letraR: VERIFICAR · REINICIAR · SALIR.
          Centrado verticalmente respecto al canvas para alinearse con el centro
          de la tarjeta. */}
      <div data-qa="acciones" style={{
        position: "absolute", right: 18, top: "50%", transform: "translateY(-50%)",
        display: "flex", flexDirection: "column", gap: 12, width: 150,
      }}>
        <button className="ed-btn ed-btn-verify" onClick={verify} disabled={!canVerify}
          title={!canVerify ? "Selecciona una opción primero" : ""}
          style={{
            fontSize: 15, padding: "0 10px", height: 56, fontWeight: 800, letterSpacing: "0.04em",
            opacity: canVerify ? 1 : 0.5,
            cursor: canVerify ? "pointer" : "not-allowed",
          }}>¡VERIFICAR!</button>
        <button className="ed-btn ed-btn-restart" onClick={() => setConfirmingExit(true)}
          style={{ fontSize: 15, padding: "0 10px", height: 56, fontWeight: 800, letterSpacing: "0.04em" }}>REINICIAR</button>
        <button className="ed-btn ed-btn-ghost" onClick={() => setConfirmingHome(true)}
          style={{ fontSize: 15, padding: "0 10px", height: 56, fontWeight: 800, letterSpacing: "0.04em" }}>SALIR</button>
      </div>

      <FeedbackOverlay feedback={feedback} feedbackMsg={feedbackMsg} charName={char.name} />
      <RestartModal confirmingExit={confirmingExit} setConfirmingExit={setConfirmingExit} attempted={attempted} total={3} onRestart={onRestart} />
      <ExitToHomeModal confirmingHome={confirmingHome} setConfirmingHome={setConfirmingHome} attempted={attempted} total={3} go={go} />
    </div>
  );
}

// Tarjeta de noticia con una parte resaltada + chips de respuesta.
// `selected`/`onSelect` activan el flujo "elegir → VERIFICAR" (un solo chip
// queda elevado con anillo blanco hasta que el rail derecho lo confirme).

    <div style={{ display: "flex", flexDirection: "column", height: "100%", gap: 12 }}>

        flex: 1, minHeight: 0,
        background: "rgba(255,255,255,0.95)", color: "#1a1a1a",
        borderRadius: 14, padding: "18px 24px",
        border: "2px solid #f2c260",
        boxShadow: "0 8px 20px rgba(0,0,0,0.35)",

        display: "flex", flexDirection: "column", justifyContent: "space-between",

        <div>
          <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 10 }}>

            <div style={{
              background: highlight === "TITULAR" ? highlightBg : "transparent",
              borderRadius: 6, padding: highlight === "TITULAR" ? "8px 12px" : 0,

        <div style={{ display: "flex", flexDirection: "column", justifyContent: "space-around", flex: 1 }}>
          {[
            { kind: "ENTRADA", text: noticia.entrada },
            { kind: "CUERPO",  text: noticia.cuerpo },

          ].map((p) => (
            <p key={p.kind} style={{
              fontSize: 14, lineHeight: 1.5, margin: 0,
              background: highlight === p.kind ? highlightBg : "transparent",

              border: highlight === p.kind ? "1.5px dashed #d9a441" : "none",
              color: "#1a1a1a",
            }}>{p.text}</p>
          ))}

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 10 }}>
        {chips.map((c) => {
          const isSel = selected === c;
          return (
            <button key={c} onClick={() => !disabled && onSelect(c)} disabled={!!disabled}
              style={{
                padding: "14px 8px", borderRadius: 12,
                background: "linear-gradient(180deg, #ffe97a, #d7b12a)",
                color: "#3a2608",
                fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 13,
                border: "none",
                boxShadow: isSel
                  ? "inset 0 1px 0 rgba(255,255,255,0.55), inset 0 -3px 0 rgba(0,0,0,0.2), 0 0 0 3px rgba(255,255,255,0.9), 0 0 22px rgba(255,255,255,0.4)"
                  : "inset 0 1px 0 rgba(255,255,255,0.4), inset 0 -3px 0 rgba(0,0,0,0.18), 0 4px 10px -2px rgba(0,0,0,0.45)",
                transform: isSel ? "translateY(-2px)" : "none",
                transition: "all 0.16s ease",
                cursor: disabled ? "not-allowed" : "pointer",
                letterSpacing: "0.02em",
                opacity: disabled ? 0.85 : 1,
              }}>{c}</button>
          );
        })}
      </div>
    </div>
  );
}

// Tarjeta de concepto: definición + 4 chips.
// Acepta dos modos:
//   1. Modo "respuesta directa" (legacy, usado por El blog): `onAnswer(chip)`.
//   2. Modo "elegir → VERIFICAR" (usado por La noticia): `selected` + `onSelect`.
// Si se pasa onSelect, el chip clickeado se eleva con anillo blanco y NO confirma
// — el rail derecho dispara la verificación.
function ConceptoCard({ def, chips, correct, onAnswer, selected, onSelect, disabled }) {
  const useSelect = typeof onSelect === "function";
  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%", justifyContent: "space-evenly", gap: 0 }}>
      <div style={{
        background: "linear-gradient(180deg, rgba(255,255,255,0.95), rgba(240,235,225,0.9))",
        color: "#1a1a1a",
        borderRadius: 16, padding: "28px 32px",
        border: "3px solid #f2c260",
        boxShadow: "0 12px 28px rgba(0,0,0,0.45)",
        fontFamily: "var(--ed-font-display)", fontWeight: 600,
        fontSize: 20, lineHeight: 1.4,
        textAlign: "center",
      }}>
        "{def}"
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
        {chips.map((c, i) => {
          const isSel = useSelect && selected === c;
          return (
            <button key={i}
              onClick={() => {
                if (disabled) return;
                if (useSelect) onSelect(c);
                else if (typeof onAnswer === "function") onAnswer(c);
              }}
              disabled={!!disabled}
              style={{
                padding: "22px 12px", borderRadius: 14,
                background: "linear-gradient(180deg, #ffe97a, #d7b12a)",
                color: "#3a2608",
                fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 16,
                border: "none",
                boxShadow: isSel
                  ? "inset 0 1px 0 rgba(255,255,255,0.55), inset 0 -3px 0 rgba(0,0,0,0.2), 0 0 0 3px rgba(255,255,255,0.9), 0 0 22px rgba(255,255,255,0.4)"
                  : "inset 0 1px 0 rgba(255,255,255,0.4), inset 0 -3px 0 rgba(0,0,0,0.18), 0 4px 12px -2px rgba(0,0,0,0.45)",
                transform: isSel ? "translateY(-2px)" : "none",
                transition: "all 0.16s ease",
                cursor: disabled ? "not-allowed" : "pointer",
                letterSpacing: "0.02em",
                opacity: disabled ? 0.85 : 1,
              }}>{c}</button>
          );
        })}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// NIVEL 3 — El blog (3 rondas: elemento → shooter → concepto)
// ─────────────────────────────────────────────────────────────
function pickBlogMockup(usedKeys) {
  const recent = new Set(getRecent("blog"));
  const exclude = new Set([...usedKeys, ...recent]);
  let pool = BLOG_MOCKUPS.filter((m) => !exclude.has(m.id));
  if (pool.length === 0) pool = BLOG_MOCKUPS.filter((m) => !usedKeys.has(m.id));
  if (pool.length === 0) pool = BLOG_MOCKUPS;
  return pool[Math.floor(Math.random() * pool.length)];
}

function BlogGame({ app, setApp, go, onRestart }) {
  const char = CHARACTERS.find((c) => c.id === app.character) || CHARACTERS[0];
  const catLabel = app.currentCatLabel || "El blog";

  const usedRef = useRefG(new Set());
  const [mockup] = useStateG(() => {
    const m = pickBlogMockup(usedRef.current);
    usedRef.current.add(m.id);
    pushRecent("blog", m.id);
    return m;
  });
  const [r0Highlight] = useStateG(() => mockup.sections[Math.floor(Math.random() * mockup.sections.length)].kind);
  const [r0Chips] = useStateG(() => {
    const distractores = BLOG_ELEMENTOS.filter((e) => e !== r0Highlight);
    return shuffle([r0Highlight, ...shuffle(distractores).slice(0, 3)]);
  });

  const [r2Pick] = useStateG(() => BLOG_CONCEPTOS[Math.floor(Math.random() * BLOG_CONCEPTOS.length)]);
  const [r2Chips] = useStateG(() => {
    const distractores = BLOG_CONCEPTOS.filter((c) => c.concepto !== r2Pick.concepto);
    return shuffle([r2Pick, ...shuffle(distractores).slice(0, 3)]);
  });

  const [ronda, setRonda] = useStateG(0);
  const [elapsed, setElapsed] = useStateG(0);
  const [stars, setStars] = useStateG(0);
  const [solved, setSolved] = useStateG(0);
  const [attempted, setAttempted] = useStateG(0);
  const [starsSession, setStarsSession] = useStateG(0);
  const [feedback, setFeedback] = useStateG(null);
  const [feedbackMsg, setFeedbackMsg] = useStateG("");
  const [confirmingExit, setConfirmingExit] = useStateG(false);
  const [confirmingHome, setConfirmingHome] = useStateG(false);
  // Selección actual para rondas con chips (0 y 2). La ronda 1 es shooter
  // y se autoevalúa al terminar — no usa este estado.
  const [selected, setSelected] = useStateG(null);
  const [log, setLog] = useStateG([]);
  const started = useRefG(Date.now());
  const exerciseStart = useRefG(Date.now());

  useEffectG(() => {
    const id = setInterval(() => setElapsed(Math.floor((Date.now() - started.current) / 1000)), 500);
    return () => clearInterval(id);
  }, []);

  // Cada ronda arranca sin chip elegido.
  useEffectG(() => { setSelected(null); }, [ronda]);

  useEffectG(() => {
    window.__currentChalkGlyphs = [
      { c: "💻", l: "6%",  t: "12%", r: "-8deg" },
      { c: "🌐", l: "82%", t: "16%", r: "6deg",  s: "0.62em" },
      { c: "📱", l: "10%", t: "78%", r: "12deg", s: "0.7em" },
      { c: "✏",  l: "88%", t: "72%", r: "-10deg", s: "0.55em" },
      { c: "📌", l: "45%", t: "8%",  r: "4deg",  s: "0.5em" },
      { c: "#",  l: "3%",  t: "45%", r: "-4deg", s: "0.6em" },
      { c: "@",  l: "92%", t: "45%", r: "8deg",  s: "0.58em" },
      { c: "¿",  l: "30%", t: "55%", r: "-6deg", s: "0.55em" },
      { c: "?",  l: "70%", t: "62%", r: "8deg",  s: "0.55em" },
      { c: "💬", l: "55%", t: "30%", r: "-4deg", s: "0.46em" },
    ];
    return () => { window.__currentChalkGlyphs = null; };
  }, []);

  function recordRound(isCorrect, userText, correctText, op, emojiTag) {
    if (typeof window.markFirstAttempt === "function") window.markFirstAttempt();
    const exerciseSec = Math.max(0, Math.floor((Date.now() - exerciseStart.current) / 1000));
    const earned = calcStars(isCorrect, exerciseSec);
    const newAttempted = attempted + 1;
    const newSolved = solved + (isCorrect ? 1 : 0);
    const newStarsTotal = stars + earned;
    const newStarsSession = starsSession + earned;

    const entry = {
      idx: newAttempted, a: correctText, b: userText, op,
      correctAnswer: correctText, userAnswer: userText,
      isCorrect, time: exerciseSec, earned,
      emoji: emojiTag,
    };
    const newLog = [...log, entry];

    setFeedback(isCorrect ? "ok" : "err");
    setFeedbackMsg(isCorrect ? `+${earned} ⭐` : ENCOURAGEMENTS[Math.floor(Math.random() * ENCOURAGEMENTS.length)]);
    setAttempted(newAttempted);
    setSolved(newSolved);
    setStars(newStarsTotal);
    setStarsSession(newStarsSession);
    setLog(newLog);

    const wait = isCorrect ? 950 : 1200;
    setTimeout(() => {
      setFeedback(null);
      setFeedbackMsg("");
      if (newAttempted >= 3) {
        setApp((s) => ({
          ...s, stars: newStarsTotal,
          lastResult: { category: catLabel, solved: newSolved, total: 3, time: elapsed, starsEarned: newStarsSession, log: newLog },
        }));
        window.incrementGamesCompleted && window.incrementGamesCompleted();
        go("results");
      } else {
        setRonda((r) => r + 1);
        exerciseStart.current = Date.now();
      }
    }, wait);
  }

  // Confirma la selección actual en rondas 0 y 2 (la 1 es shooter autónomo).

// Shooter: burbujas que caen, el niño toca elementos del blog (correctas)
// y evita los distractores. 20 segundos.
function BlogShooterCard({ onFinish }) {
  const [bubbles, setBubbles] = useStateG([]);
  const [stats, setStats] = useStateG({ aciertos: 0, errores: 0, perdidas: 0 });
  const [timeLeft, setTimeLeft] = useStateG(20);
  const nextIdRef = useRefG(0);
  const finishedRef = useRefG(false);
  const containerRef = useRefG(null);

  // Estima el ancho del bubble a partir del texto: fontSize 15, uppercase
  // bold ~9.3 px/char + padding 18*2 + borde 2*2 + colchón.
  function estimateBubbleWidth(word) {
    return Math.ceil(word.length * 9.3) + 44;
  }

  useEffectG(() => {
    // Spawner cada ~900ms. La posición x se calcula al spawnear para
    // garantizar que el bubble completo entra en el ancho real del
    // contenedor — nada de palabras cortadas por el recuadro.
    const spawn = setInterval(() => {
      if (finishedRef.current) return;
      const useCorrect = Math.random() < 0.5;
      const pool = useCorrect ? BLOG_ELEMENTOS : BLOG_DISTRACTORES;
      const word = pool[Math.floor(Math.random() * pool.length)];
      const id = nextIdRef.current++;
      const containerW = (containerRef.current && containerRef.current.clientWidth) || 642;
      const margin = 12;
      const estW = estimateBubbleWidth(word);
      const maxX = Math.max(margin, containerW - estW - margin);
      const x = margin + Math.random() * (maxX - margin);
      setBubbles((bs) => [...bs, { id, word, isCorrect: useCorrect, x, y: -60, vy: 0.55 + Math.random() * 0.3 }]);
    }, 950);

    // Tick para mover burbujas (40ms ≈ 25fps, suficiente para una caída suave)
    const tick = setInterval(() => {
      if (finishedRef.current) return;
      setBubbles((bs) => {
        const next = [];
        let perdidasDelta = 0;
        for (const b of bs) {
          const newY = b.y + b.vy * 2.4;
          if (newY > 360) {
            if (b.isCorrect) perdidasDelta++;
          } else {
            next.push({ ...b, y: newY });
          }
        }
        if (perdidasDelta > 0) {
          setStats((s) => ({ ...s, perdidas: s.perdidas + perdidasDelta }));
        }
        return next;
      });
    }, 40);

    // Countdown
    const countdown = setInterval(() => {
      setTimeLeft((t) => {
        if (t <= 1) {
          clearInterval(countdown);
          clearInterval(spawn);
          clearInterval(tick);
          finishedRef.current = true;
          return 0;
        }
        return t - 1;
      });
    }, 1000);

    return () => {
      clearInterval(spawn);
      clearInterval(tick);
      clearInterval(countdown);
    };
  }, []);

  // Cuando termina el tiempo, llamar onFinish con stats finales
  useEffectG(() => {
    if (timeLeft === 0 && finishedRef.current) {
      // Esperar un momento para que el último estado de stats se asiente
      const t = setTimeout(() => onFinish(stats), 300);
      return () => clearTimeout(t);
    }
  }, [timeLeft, stats]);

  function handleTap(b) {
    setBubbles((bs) => bs.filter((x) => x.id !== b.id));
    if (b.isCorrect) setStats((s) => ({ ...s, aciertos: s.aciertos + 1 }));
    else setStats((s) => ({ ...s, errores: s.errores + 1 }));
  }

  return (
    <div ref={containerRef} style={{ position: "relative", width: "100%", height: "100%", overflow: "hidden", borderRadius: 14, background: "rgba(11,58,45,0.4)", border: "2px solid rgba(79,160,255,0.4)" }}>
      {/* HUD del shooter */}
      <div style={{
        position: "absolute", top: 8, left: 12, right: 12,
        display: "flex", alignItems: "center", justifyContent: "space-between",
        fontFamily: "var(--ed-font-display)", color: "#fce9a8", fontSize: 13, fontWeight: 700,
        zIndex: 10,
      }}>
        <div>✅ {stats.aciertos} &nbsp; ❌ {stats.errores} &nbsp; ⌛ {stats.perdidas}</div>
        <div>⏱ {timeLeft}s</div>
      </div>

      {bubbles.map((b) => (
        <button key={b.id} onClick={() => handleTap(b)}
          style={{
            position: "absolute", left: b.x, top: b.y,
            padding: "12px 18px", borderRadius: 999,
            background: "rgba(255,255,255,0.95)",
            border: "2px solid #4fa0ff",
            fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 15,
            color: "#1a1a1a", cursor: "pointer",
            boxShadow: "0 4px 10px rgba(0,0,0,0.45)",
            whiteSpace: "nowrap",
          }}>
          {b.word}
        </button>
      ))}

      {timeLeft === 0 && (
        <div style={{
          position: "absolute", inset: 0,
          display: "flex", alignItems: "center", justifyContent: "center",
          background: "rgba(0,0,0,0.55)", color: "#fce9a8",
          fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 22,
        }}>¡Tiempo!</div>
      )}
    </div>
  );
}

// app.jsx — Shell de producción EDINUN GAMES.
// Enrutador por estado y device stage adaptativo (desktop / tablet / mobile).
// Móvil portrait: el contenido NUNCA rota; un overlay BLOQUEANTE obliga
// al usuario a girar físicamente el teléfono antes de poder usar la app.

const { useState: useStateA, useEffect: useEffectA, useRef: useRefA } = React;

// ─────────────────────────────────────────────────────────────
// useViewportSize — devuelve el tamaño REAL visible del viewport.
//
// En iOS Safari (y otros mobile browsers), `window.innerHeight` y `100vh`
// reportan la altura de la ventana INCLUYENDO la URL bar, así que el
// contenido escalado a esa altura termina parcialmente fuera de pantalla
// (ej: el numpad del juego queda debajo del fondo visible). La Visual
// Viewport API reporta el área verdaderamente visible y se actualiza
// cuando la URL bar se muestra/oculta.
// ─────────────────────────────────────────────────────────────
// Detección de "resize REAL" vs "zoom del navegador".
//
// Idea: el tamaño FÍSICO de la zona visible en píxeles del display es
// invariante al ctrl+rueda. Cuando subes el zoom de 100 % a 500 %:
//   · innerWidth en CSS-px se divide entre 5
//   · devicePixelRatio se multiplica por 5
//   · innerWidth × devicePixelRatio queda igual ⇒ NO hubo resize real.
//
// Cuando arrastras la esquina de la ventana o rotas el dispositivo:
//   · innerWidth en CSS-px cambia
//   · devicePixelRatio NO cambia
//   · innerWidth × devicePixelRatio cambia ⇒ SÍ hubo resize real.
//
// Por eso comparamos contra `innerWidth × devicePixelRatio` y solo
// actualizamos el state cuando ese producto cambia. Así el lienzo se
// queda con su tamaño CSS previo durante el zoom y el navegador lo
// amplifica visualmente — junto con los glifos, que ya leen `glyphSize`
// del mismo state defendido (ver DeviceStage).
//
// La defensa anterior (tracker de _lastDPR) era frágil: se actualizaba
// en CADA evento, así que si el navegador disparaba dos resize seguidos
// para la misma acción de zoom, el segundo veía el dpr ya guardado y
// recalculaba el tamaño con el viewport pequeño. Esto causaba que los
// glifos quedaran enormes mientras el lienzo se recomprimía.
function physicalSize() {
  if (typeof window === "undefined") return { w: 0, h: 0 };
  const dpr = window.devicePixelRatio || 1;
  return { w: window.innerWidth * dpr, h: window.innerHeight * dpr };
}
let _lastPhysical = physicalSize();

function useViewportSize() {
  const [size, setSize] = useStateA(() => readSize());
  useEffectA(() => {
    function onChange() {
      const phys = physicalSize();
      // Tolerancia de 4 px reales para absorber redondeos del navegador.
      if (Math.abs(phys.w - _lastPhysical.w) < 4 && Math.abs(phys.h - _lastPhysical.h) < 4) {
        // Mismo display, distinto zoom — no actualizamos el state.
        return;
      }
      _lastPhysical = phys;
      setSize(readSize());
    }
    window.addEventListener("resize", onChange);
    window.addEventListener("orientationchange", onChange);
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", onChange);
    }
    return () => {
      window.removeEventListener("resize", onChange);
      window.removeEventListener("orientationchange", onChange);
      if (window.visualViewport) {
        window.visualViewport.removeEventListener("resize", onChange);
      }
    };
  }, []);
  return size;
}
function readSize() {
  if (typeof window === "undefined") return { vw: 0, vh: 0 };
  const vv = window.visualViewport;
  // Cuando el usuario hace pinch-zoom, vv.scale > 1 y vv.width/height
  // reflejan la región visible (más pequeña). Usar esos valores haría
  // que la escala del lienzo se reduzca al hacer zoom — exactamente lo
  // contrario de lo que el usuario quiere. Solo confiamos en vv cuando
  // scale ≈ 1 (sin zoom) — ahí da una lectura más fiel que innerWidth/
  // Height en iOS Safari (descuenta correctamente la URL bar visible).
  if (vv && Math.abs(vv.scale - 1) < 0.05) {
    return { vw: vv.width, vh: vv.height };
  }
  return { vw: window.innerWidth, vh: window.innerHeight };
}

// ─────────────────────────────────────────────────────────────
// DeviceStage — escala el lienzo lógico 900×540 (paisaje) al viewport.
//
// Reglas:
//   · Desktop / tablet: sin marco, sin notch, fondo cósmico edge-to-edge.
//   · Mobile portrait: lienzo letterboxed Y overlay BLOQUEANTE "Gira el
//     teléfono". El contenido del juego no es accesible hasta que rote.
//   · Mobile landscape: lienzo escalado al viewport visible (visualViewport,
//     no innerHeight, para no clippearse debajo de la URL bar de iOS).
// ─────────────────────────────────────────────────────────────
function DeviceStage({ children, variant = "cosmic" }) {
  const W = 900, H = 540;
  const { vw, vh } = useViewportSize();
  const minSide = Math.min(vw, vh);
  const maxSide = Math.max(vw, vh);
  let mode = "desktop";
  if (maxSide < 820) mode = "mobile";
  else if (minSide < 820) mode = "tablet";
  const portrait = vh > vw;
  const baseScale = Math.max(Math.min(vw / W, vh / H), 0.15);

  // Detección de teléfono independiente del modo: cualquier dispositivo con
  // lado menor ≤ 600 CSS-px es un teléfono. Cubre todos los teléfonos
  // actuales (iPhone SE 320 → S25 Ultra/Pro Max ~432) con margen para
  // modelos futuros más anchos. La menor tablet (iPad mini 744) queda
  // bien por encima, así que no se rompe el caso "tablet portrait usable
  // letterboxed". Solo bloqueamos cuando teléfono Y portrait — el lienzo
  // paisaje queda demasiado pequeño para jugar.
  const isPhone = minSide <= 600;
  const lockPortrait = isPhone && portrait;

  // Tamaño de los glifos del fondo: equivalente al `clamp(48px, 7vmin, 110px)`
  // que tenía el CSS, pero calculado a partir del vw/vh DEFENDIDO contra
  // cambios de DPR. Esto evita que con ctrl+rueda del mouse los glifos
  // crezcan más rápido que el lienzo (el lienzo se congela vía la defensa
  // del DPR; si CSS lee el vmin actual, los glifos no se congelan y desync).
  const glyphSize = Math.max(48, Math.min(minSide * 0.07, 110));

  const debug = typeof window !== "undefined" && /(?:^|[#&])debug(?:&|$)/.test(window.location.hash || "");

  // ─── Pinch-zoom y pan custom ─────────────────────────────────
  // Reemplaza el zoom nativo del browser. Razón: con el lienzo letterboxed
  // dentro de un wrapper viewport-sized, el visual viewport del browser
  // puede panear hasta dejar al usuario mirando solo el cosmos vacío de los
  // bordes — el "rebote" reportado en iPhone (ver .planning/ios-zoom.md).
  // Aquí los gestos operan sobre el transform del lienzo, así que el zoom
  // siempre gravita alrededor del contenido y no deriva a un borde
  // decorativo.
  const wrapperRef = useRefA(null);
  const gestureRef = useRefA(null);
  const stateRef = useRefA({ userZoom: 1, pan: { x: 0, y: 0 } });
  const [userZoom, setUserZoom] = useStateA(1);
  const [pan, setPan] = useStateA({ x: 0, y: 0 });
  const [duringGesture, setDuringGesture] = useStateA(false);

  useEffectA(() => {
    stateRef.current = { userZoom, pan };
  }, [userZoom, pan]);

  // Reset al cambiar viewport (rotación, resize). Si no, el pan queda
  // referenciado a un viewport que ya no existe.
  useEffectA(() => {
    setUserZoom(1);
    setPan({ x: 0, y: 0 });
    setDuringGesture(false);
  }, [vw, vh]);

  useEffectA(() => {
    if (lockPortrait) return;
    const el = wrapperRef.current;
    if (!el) return;

    const Z_MIN = 1;
    const Z_MAX = 4;

    const dist = (a, b) => Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
    const mid = (a, b) => ({ x: (a.clientX + b.clientX) / 2, y: (a.clientY + b.clientY) / 2 });

    function clampPan(zoom, px, py) {
      // Pan máximo: la mitad del exceso del lienzo escalado sobre el viewport.
      // En zoom=1 el max es 0 (lienzo cabe en viewport, no hay donde panear).
      // En zoom=N el lienzo mide N veces el lado contain, así que el usuario
      // puede mover ±(sw - vw)/2 antes de que la orilla del lienzo cruce la
      // orilla del viewport. Esto evita perder el contenido fuera de pantalla.
      const sw = baseScale * zoom * W;
      const sh = baseScale * zoom * H;
      const maxX = Math.max(0, (sw - vw) / 2);
      const maxY = Math.max(0, (sh - vh) / 2);
      return {
        x: Math.max(-maxX, Math.min(maxX, px)),
        y: Math.max(-maxY, Math.min(maxY, py)),
      };
    }

    function applyState(z, px, py) {
      stateRef.current = { userZoom: z, pan: { x: px, y: py } };
      setUserZoom(z);
      setPan({ x: px, y: py });
    }

    function onTouchStart(e) {
      const { userZoom: z0, pan: p0 } = stateRef.current;
      if (e.touches.length >= 2) {
        const [t0, t1] = e.touches;
        gestureRef.current = {
          mode: "pinch",
          d0: dist(t0, t1),
          m0: mid(t0, t1),
          z0, p0: { ...p0 },
        };
        setDuringGesture(true);
        e.preventDefault();
      } else if (e.touches.length === 1) {
        const t = e.touches[0];
        gestureRef.current = {
          mode: "pan-armed",
          startX: t.clientX,
          startY: t.clientY,
          z0, p0: { ...p0 },
        };
        // No preventDefault — un tap simple debe seguir generando click.
      }
    }

    function onTouchMove(e) {
      const g = gestureRef.current;
      if (!g) return;

      // Si en medio de un gesto entra un segundo dedo, transición a pinch
      // tomando el estado actual como punto de partida.
      if (e.touches.length >= 2 && g.mode !== "pinch") {
        const [t0, t1] = e.touches;
        const { userZoom: zNow, pan: pNow } = stateRef.current;
        gestureRef.current = {
          mode: "pinch",
          d0: dist(t0, t1),
          m0: mid(t0, t1),
          z0: zNow, p0: { ...pNow },
        };
        setDuringGesture(true);
        e.preventDefault();
        return;
      }

      if (e.touches.length >= 2 && g.mode === "pinch") {
        const [t0, t1] = e.touches;
        const d = dist(t0, t1);
        const m = mid(t0, t1);
        const ratio = d / g.d0;
        // Permitimos pasar transitoriamente bajo Z_MIN para sensación elástica
        // durante el gesto; en touchend hacemos snap-back al rango válido.
        const newZoom = Math.max(Z_MIN * 0.7, Math.min(Z_MAX * 1.05, g.z0 * ratio));
        const r = newZoom / g.z0;
        const ux = g.m0.x - vw / 2;
        const uy = g.m0.y - vh / 2;
        // Fórmula que mantiene el punto medio de la pinza anclado al mismo
        // píxel del lienzo durante todo el gesto. Derivación:
        //   panX_new = (mx0 - vw/2) + (newZoom/z0) * (panX0 - (mx0 - vw/2))
        //              + (mx_now - mx0)   ← desplazamiento del propio gesto
        const newPanX = ux + r * (g.p0.x - ux) + (m.x - g.m0.x);
        const newPanY = uy + r * (g.p0.y - uy) + (m.y - g.m0.y);
        applyState(newZoom, newPanX, newPanY);
        e.preventDefault();
      } else if (e.touches.length === 1 && g.mode === "pan-armed") {
        if (g.z0 <= 1.001) return; // sin zoom no panea — dejamos pasar el tap
        const t = e.touches[0];
        const dx = t.clientX - g.startX;
        const dy = t.clientY - g.startY;
        if (Math.hypot(dx, dy) > 8) {
          gestureRef.current = { ...g, mode: "pan" };
          setDuringGesture(true);
          e.preventDefault();
        }
      } else if (e.touches.length === 1 && g.mode === "pan") {
        const t = e.touches[0];
        const dx = t.clientX - g.startX;
        const dy = t.clientY - g.startY;
        applyState(g.z0, g.p0.x + dx, g.p0.y + dy);
        e.preventDefault();
      }
    }

    function onTouchEnd(e) {
      const g = gestureRef.current;
      if (!g) return;
      if (e.touches.length === 0) {
        const { userZoom: z, pan: p } = stateRef.current;
        const clampedZ = Math.max(Z_MIN, Math.min(Z_MAX, z));
        let cp;
        if (clampedZ <= 1.001) {
          cp = { x: 0, y: 0 };
        } else {
          cp = clampPan(clampedZ, p.x, p.y);
        }
        applyState(clampedZ, cp.x, cp.y);
        setDuringGesture(false);
        gestureRef.current = null;
      }
    }

    el.addEventListener("touchstart", onTouchStart, { passive: false });
    el.addEventListener("touchmove", onTouchMove, { passive: false });
    el.addEventListener("touchend", onTouchEnd, { passive: false });
    el.addEventListener("touchcancel", onTouchEnd, { passive: false });

    return () => {
      el.removeEventListener("touchstart", onTouchStart);
      el.removeEventListener("touchmove", onTouchMove);
      el.removeEventListener("touchend", onTouchEnd);
      el.removeEventListener("touchcancel", onTouchEnd);
    };
  }, [vw, vh, baseScale, lockPortrait]);

  const totalScale = baseScale * userZoom;

  return (
    <div ref={wrapperRef} style={{
      width: "100vw", height: "100dvh",
      minHeight: "-webkit-fill-available",
      overflow: "hidden",
      position: "relative",
      background: variant === "chalkboard" ? "#0b3a2d" : "#050214",
      // `touch-action: none` desactiva todos los gestos que el browser
      // interpretaría por su cuenta (pinch, pan, doble-tap-zoom). Los
      // implementamos en JS sobre el transform del lienzo para que el
      // zoom siempre quede anclado al contenido y nunca derive a los
      // bordes letterbox del wrapper. Los click/tap en botones siguen
      // funcionando — esto solo bloquea gestos del browser, no eventos.
      touchAction: "none",
    }}>
      <CosmosBg variant={variant} glyphSize={glyphSize} />

      {/* Lienzo lógico 900×540 centrado y escalado.
          El transform combina el escalado base (contain del viewport),
          el zoom del usuario y el pan acumulado. El orden CSS es
          right-to-left: scale → translate(pan) → translate(-50%,-50%). */}
      <div style={{
        width: W, height: H,
        position: "absolute",
        left: "50%", top: "50%",
        transform: `translate(-50%, -50%) translate(${pan.x}px, ${pan.y}px) scale(${totalScale})`,
        transformOrigin: "center center",
        overflow: "hidden",
        // Sin transición durante el gesto activo (el lienzo sigue la pinza
        // al instante); con transición elástica al soltar, para que el
        // snap-back de zoom/pan a los límites válidos no sea abrupto.
        transition: duringGesture ? "none" : "transform 0.22s cubic-bezier(0.2, 0.8, 0.2, 1)",
        willChange: "transform",
      }}>
        {children}
      </div>

      {lockPortrait && <RotateLockOverlay />}
      {debug && (
        <div style={{
          position: "fixed", top: 6, left: 6, zIndex: 999999,
          background: "rgba(0,0,0,0.85)", color: "#0f0",
          font: "11px ui-monospace,Menlo,monospace",
          padding: "6px 8px", borderRadius: 6,
          maxWidth: "90vw", whiteSpace: "pre",
          pointerEvents: "none",
        }}>
{`vw=${vw} vh=${vh}
min=${minSide} max=${maxSide}
mode=${mode} portrait=${portrait}
isPhone=${isPhone} LOCK=${lockPortrait}
zoom=${userZoom.toFixed(2)} pan=${pan.x.toFixed(0)},${pan.y.toFixed(0)}
vv=${typeof window!=="undefined" && window.visualViewport ? "yes" : "no"}
ua=${(typeof navigator!=="undefined" ? navigator.userAgent : "?").slice(0,60)}`}
        </div>
      )}
    </div>
  );
}

// Overlay bloqueante de rotación. En mobile portrait cubre toda la pantalla
// con un mensaje claro y un ícono animado. NO se puede descartar — el usuario
// DEBE girar el dispositivo para acceder al juego. Se desmonta solo cuando
// el viewport pasa a landscape.
function RotateLockOverlay() {
  return (
    <div
      role="dialog"
      aria-modal="true"
      aria-label="Gira tu teléfono para jugar"
      style={{
        position: "fixed", inset: 0, zIndex: 99999,
        background: "linear-gradient(180deg,#050214 0%,#0a0628 100%)",
        display: "flex", flexDirection: "column",
        alignItems: "center", justifyContent: "center",
        textAlign: "center", padding: "32px 24px",
        color: "#fce9a8",
        fontFamily: "var(--ed-font-display, system-ui)",
      }}
    >
      <div
        style={{
          width: 132, height: 132, marginBottom: 28,
          display: "flex", alignItems: "center", justifyContent: "center",
          animation: "ed-rotate-lock 2.4s ease-in-out infinite",
        }}
        aria-hidden="true"
      >
        {/* Ícono de teléfono que rota */}

                stroke="#f2c260" strokeWidth="3" fill="rgba(242,194,96,0.08)" />
          <rect x="42" y="22" width="16" height="48" rx="2" fill="rgba(242,194,96,0.18)" />
          <circle cx="50" cy="78" r="2.5" fill="#f2c260" />
        </svg>

      <div style={{
        fontWeight: 800,
        fontSize: "clamp(18px, 5.2vw, 26px)",
        lineHeight: 1.15,
        textTransform: "uppercase", letterSpacing: "0.02em",
        marginBottom: 12,
      }}>

      </div>
      <div style={{
        fontWeight: 500,
        fontSize: "clamp(13px, 4vw, 16px)",

          0%   { transform: rotate(0deg); }
          45%  { transform: rotate(0deg); }

}

// ─────────────────────────────────────────────────────────────
// App principal
// ─────────────────────────────────────────────────────────────
function App() {
  const [route, setRoute] = useStateA("home");
  const [app, setApp] = useStateA({
    studentName: "",
    character: "escritor",
    level: null,
    stars: 0,
    sessionStart: Date.now(),
    gameSeed: 0,
  });

  function go(r) {
    // Al (re)entrar al juego, regeneramos la seed para que GameScreen se remonte
    // y reinicie ronda, tiempo, racha, etc. También reseteamos las estrellas:
    // cada partida empieza desde 0, no acumula entre rondas.
    if (r === "game") {
      setApp((s) => ({ ...s, gameSeed: (s.gameSeed || 0) + 1, stars: 0 }));
    }
    setRoute(r);
  }

  const screenProps = { app, setApp, go };

  let Screen = window.HomeScreen;
  if (route === "character") Screen = window.CharacterScreen;
  else if (route === "game") Screen = window.GameScreen;
  else if (route === "results") Screen = window.ResultsScreen;

  const variant = route === "game" ? "chalkboard" : "cosmic";

  return (
    <DeviceStage variant={variant}>
      <Screen key={route === "game" ? `game-${app.gameSeed}` : route} {...screenProps} />
    </DeviceStage>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>
</body>
