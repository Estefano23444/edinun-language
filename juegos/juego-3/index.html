// ─────────────────────────────────────────────────────────────
// Sparkles — chispas animadas alrededor del personaje. Refuerzan
// la estética cósmica heredada del shell.
// ─────────────────────────────────────────────────────────────
function Sparkles({ color = "#fce9a8", count = 6, seed = 1 }) {
  const pts = Array.from({ length: count }, (_, i) => {
    const a = (i * 360) / count + seed * 37;
    const r = 70 + (i % 3) * 8;
    const x = 100 + Math.cos((a * Math.PI) / 180) * r;
    const y = 100 + Math.sin((a * Math.PI) / 180) * r;
    const s = 2 + (i % 3);
    return { x, y, s, delay: i * 0.35 };
  });
  return (
    <g>
      {pts.map((p, i) => (
        <g key={i} transform={`translate(${p.x} ${p.y})`}>
          <circle r={p.s} fill={color} opacity="0.9">
            <animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" begin={`${p.delay}s`} repeatCount="indefinite" />
          </circle>
        </g>
      ))}
    </g>
  );
}

    function onUpd() { forceTick((n) => n + 1); }

// ─────────────────────────────────────────────────────────────
// Contador de visitas — endpoint PHP del lado servidor con fallback localStorage.
// En servidores con PHP (Apache de edinun.com) muestra el conteo global real.
// En GitHub Pages / servidor estático sin PHP, el .php se sirve como texto
// plano → el fetch falla parseando JSON → caemos al contador localStorage
// (per-navegador, igual que la versión anterior). El localStorage también
// hace de caché del último valor servido por PHP para mostrar algo durante
// la primera carga / si el servidor está caído.
// ─────────────────────────────────────────────────────────────
const VISITOR_ENDPOINT = "counter.php"; // relativo a index.html del juego
const VISITOR_KEY = "edinun_visitors_v1";
const VISITOR_SESSION_FLAG = "edinun_visit_counted_v1";

async function fetchVisitorCount(opts) {
  const inc = opts && opts.increment;
  const url = inc ? VISITOR_ENDPOINT + "?inc=1" : VISITOR_ENDPOINT;
  const res = await fetch(url, { cache: "no-store" });
  if (!res.ok) throw new Error("counter http " + res.status);
  // Tolera dos contratos de servidor: JSON {"count": N} (counter.php de este
  // repo) o un numero plano "N" (contador.php legacy de otros juegos del mismo
  // server). Si el .php se sirve como texto ("<?php...") ambos parseos fallan
  // -> NaN -> throw -> el cliente cae a localStorage.
  const text = (await res.text()).trim();
  let count;
  try {
    const data = JSON.parse(text);
    count = data && typeof data.count === "number" ? data.count : Number(data);
  } catch (e) {
    count = Number(text);
  }
  if (!Number.isFinite(count)) throw new Error("counter invalid payload");
  return count;
}

function readLocalVisitorCount() {
  const raw = localStorage.getItem(VISITOR_KEY);
  const v = raw ? parseInt(raw, 10) : 0;
  return isNaN(v) ? 0 : v;
}

function writeLocalVisitorCount(n) {
  localStorage.setItem(VISITOR_KEY, String(n));
}

function useVisitorCount() {
  const [n, setN] = useState(() => readLocalVisitorCount());

  useEffect(() => {
    let cancelled = false;
    // Lee del servidor al montar. Si falla, queda el valor cacheado en local.
    fetchVisitorCount()
      .then((count) => {
        if (cancelled) return;
        setN(count);
        writeLocalVisitorCount(count);
      })
      .catch(() => { /* fallback localStorage ya cargado en el initializer */ });

    function onUpdate(ev) {
      const value = ev && ev.detail && ev.detail.count;
      if (typeof value === "number") setN(value);
      else setN(readLocalVisitorCount());
    }
    window.addEventListener("edinun:visitors-updated", onUpdate);
    return () => {
      cancelled = true;
      window.removeEventListener("edinun:visitors-updated", onUpdate);
    };
  }, []);

  return n;
}

function markFirstAttempt() {
  if (sessionStorage.getItem(VISITOR_SESSION_FLAG) === "1") return;
  sessionStorage.setItem(VISITOR_SESSION_FLAG, "1");

  fetchVisitorCount({ increment: true })
    .then((count) => {
      writeLocalVisitorCount(count);
      window.dispatchEvent(new CustomEvent("edinun:visitors-updated", { detail: { count } }));
    })
    .catch(() => {
      const next = readLocalVisitorCount() + 1;
      writeLocalVisitorCount(next);
      window.dispatchEvent(new CustomEvent("edinun:visitors-updated", { detail: { count: next } }));
    });
}

function incrementGamesCompleted() {
  const KEY = "edinun_games_completed_v1";
  const raw = localStorage.getItem(KEY);
  const next = (raw ? parseInt(raw, 10) : 0) + 1;
  localStorage.setItem(KEY, String(next));
  window.dispatchEvent(new Event("edinun:games-updated"));
  return next;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const ss = s % 60;
  return `${String(m).padStart(2, "0")}:${String(ss).padStart(2, "0")}`;
}

const RECENT_KEYS = {
  letraCQ_r0:        "edinun_juego3_letraCQ_r0_recientes_v1",
  letraCQ_r1:        "edinun_juego3_letraCQ_r1_recientes_v1",
  letraCQ_r2:        "edinun_juego3_letraCQ_r2_recientes_v1",
  elementos_r1:      "edinun_juego3_elementos_r1_recientes_v1",
  elementos_r2:      "edinun_juego3_elementos_r2_recientes_v1",
  elementos_r3:      "edinun_juego3_elementos_r3_recientes_v1",
};
const RECENT_LIMIT = 6;

function getRecent(key) {
  try {
    const raw = localStorage.getItem(RECENT_KEYS[key] || key);
    if (!raw) return [];
    const arr = JSON.parse(raw);
    return Array.isArray(arr) ? arr : [];
  } catch { return []; }
}

function pushRecent(key, item) {
  const arr = getRecent(key).filter((k) => k !== item);
  arr.unshift(item);
  const trimmed = arr.slice(0, RECENT_LIMIT);
  try { localStorage.setItem(RECENT_KEYS[key] || key, JSON.stringify(trimmed)); } catch {}
}

// Estrellas por tiempo (igual al shell): 0-2s → 10⭐, 27+s → 1⭐, fallo → 0.
function calcStars(isCorrect, exerciseSec) {
  return isCorrect ? Math.max(1, 10 - Math.floor(exerciseSec / 3)) : 0;
}

  const currentId = app && app.currentCategory ? app.currentCategory : "letraCQ";
  const [pendingLevel, setPendingLevel] = useStateG(null);

  function requestSwitch(lvId) {
    if (lvId === currentId) return;
    setPendingLevel(lvId);
  }

  function confirmSwitch() {
    if (!pendingLevel) return;
    const cfg = levels.find((l) => l.id === pendingLevel);
    if (!cfg) { setPendingLevel(null); return; }
    setApp((s) => ({
      ...s,
      level: cfg.id,
      currentCategory: cfg.id,
      currentCatLabel: cfg.catLabel,
    }));
    setPendingLevel(null);

// NIVEL 1 — La letra C y Q (3 rondas con palabras de R0/R1/R2)
// ─────────────────────────────────────────────────────────────
function pickWord(bank, recentKey, usedKeys) {
  // FIFO anti-repetición: bloquear solo los floor(N/2) más recientes de esta categoría
  // (N = tamaño del banco), nunca todos los recientes — así el pool no se vacía
  // mientras queden opciones frescas y el reload no repite la última escena.
  const windowN = Math.floor(bank.length / 2);
  const recentIds = getRecent(recentKey); // ya está acotado por categoría (more-recent first)
  const blocked = new Set(recentIds.slice(0, windowN));
  const exclude = new Set([...usedKeys, ...blocked]);
  let pool = bank.filter((w) => !exclude.has(w.word));
  if (pool.length === 0) pool = bank.filter((w) => !usedKeys.has(w.word));
  if (pool.length === 0) pool = bank;
  const pick = pool[Math.floor(Math.random() * pool.length)];
  return pick;
}

function buildProblem(ronda, usedSets) {
  let bank, recentKey, tray;
  if (ronda === 0) { bank = LETRA_CQ_R0; recentKey = "letraCQ_r0"; tray = TRAY_C; }
  else if (ronda === 1) { bank = LETRA_CQ_R1; recentKey = "letraCQ_r1"; tray = TRAY_C; }
  else { bank = LETRA_CQ_R2; recentKey = "letraCQ_r2"; tray = TRAY_Q; }
  const usedKeys = usedSets[ronda];
  const pick = pickWord(bank, recentKey, usedKeys);
  usedKeys.add(pick.word);
  pushRecent(recentKey, pick.word);
  // Lista de huecos en orden de aparición
  const hidden = [];
  pick.segments.forEach((seg, i) => {
    if (seg.h !== undefined) hidden.push({ segIdx: i, correct: seg.h });
  });
  return { ...pick, hidden, tray };
}

function LetraCQGame({ app, setApp, go, onRestart }) {
  const char = CHARACTERS.find((c) => c.id === app.character) || CHARACTERS[0];
  const catLabel = app.currentCatLabel || "La letra C y Q";

  const usedSetsRef = useRefG([new Set(), new Set(), new Set()]);
  const [ronda, setRonda] = useStateG(0);
  const [problem, setProblem] = useStateG(() => buildProblem(0, usedSetsRef.current));
  const [filled, setFilled] = useStateG([]);  // valores por hueco (índice según problem.hidden)
  const [elapsed, setElapsed] = useStateG(0);
  const [stars, setStars] = useStateG(0);
  const [solved, setSolved] = useStateG(0);
  const [attempted, setAttempted] = useStateG(0);
  const [starsSession, setStarsSession] = useStateG(0);
  const [feedback, setFeedback] = useStateG(null);
  const [feedbackMsg, setFeedbackMsg] = useStateG("");
  const [confirmingExit, setConfirmingExit] = useStateG(false);
  const [confirmingHomeExit, setConfirmingHomeExit] = useStateG(false);
  const [log, setLog] = useStateG([]);
  const [wrongSlots, setWrongSlots] = useStateG([]); // huecos con error tras verificar

  const started = useRefG(Date.now());
  const exerciseStart = useRefG(Date.now());
  const lockedRef = useRefG(false); // bloquea interacciones durante el feedback

  useEffectG(() => {
    const id = setInterval(() => setElapsed(Math.floor((Date.now() - started.current) / 1000)), 500);
    return () => clearInterval(id);
  }, []);

  // Set glifos chalkboard del nivel 1
  useEffectG(() => {
    window.__currentChalkGlyphs = [
      { c: "C",   l: "6%",  t: "12%", r: "-8deg" },
      { c: "Q",   l: "82%", t: "16%", r: "6deg",  s: "0.62em" },
      { c: "ca",  l: "10%", t: "78%", r: "12deg", s: "0.5em" },
      { c: "ce",  l: "88%", t: "72%", r: "-10deg", s: "0.5em" },
      { c: "ci",  l: "45%", t: "8%",  r: "4deg",  s: "0.5em" },
      { c: "co",  l: "3%",  t: "45%", r: "-4deg", s: "0.5em" },
      { c: "cu",  l: "92%", t: "45%", r: "8deg",  s: "0.5em" },
      { c: "que", l: "30%", t: "55%", r: "-6deg", s: "0.45em" },
      { c: "qui", l: "70%", t: "62%", r: "8deg",  s: "0.45em" },
      { c: "✏",   l: "55%", t: "30%", r: "-4deg", s: "0.46em" },
    ];
    window.dispatchEvent(new Event("ed-chalk-glyphs-updated"));
    return () => {
      window.__currentChalkGlyphs = null;
      window.dispatchEvent(new Event("ed-chalk-glyphs-updated"));
    };
  }, []);

  function pressSyllable(syl) {
    if (lockedRef.current) return;
    setFilled((prev) => {
      const len = problem.hidden.length;
      const next = [...prev];
      while (next.length < len) next.push(undefined);
      for (let i = 0; i < len; i++) {
        if (next[i] === undefined) {
          next[i] = syl;
          return next;
        }
      }
      return prev;
    });
  }

  // Habilitado solo cuando todos los huecos están llenos
  const allFilled = problem.hidden.length > 0 && problem.hidden.every((_, i) => filled[i] !== undefined);

  function eraseSlot(slotIdx) {
    if (lockedRef.current) return;
    setFilled((prev) => {
      const next = [...prev];
      while (next.length < problem.hidden.length) next.push(undefined);
      next[slotIdx] = undefined;
      return next;
    });
  }

  function verify(currentFilled) {
    const len = problem.hidden.length;
    if (currentFilled.some((v) => v === undefined)) return;
    lockedRef.current = true;
    if (typeof window.markFirstAttempt === "function") window.markFirstAttempt();

    const isCorrect = problem.hidden.every((h, i) => currentFilled[i] === h.correct);
    const wrongIdx = problem.hidden.map((h, i) => currentFilled[i] !== h.correct ? i : -1).filter((i) => i >= 0);
    setWrongSlots(wrongIdx);

    // Reconstruir palabra del usuario para el log
    let userWord = "";
    let segIdxFilled = 0;
    problem.segments.forEach((seg) => {
      if (seg.h !== undefined) { userWord += currentFilled[segIdxFilled]; segIdxFilled++; }
      else userWord += seg.v;
    });

    const exerciseSec = Math.max(0, Math.floor((Date.now() - exerciseStart.current) / 1000));
    const earned = calcStars(isCorrect, exerciseSec);

    const newAttempted = attempted + 1;
    const newSolved = solved + (isCorrect ? 1 : 0);
    const newStarsTotal = stars + earned;
    const newStarsSession = starsSession + earned;

    const entry = {
      idx: newAttempted,
      a: problem.word,
      b: userWord,
      op: "🔤",
      correctAnswer: problem.word,
      userAnswer: userWord,
      isCorrect, time: exerciseSec, earned,
      emoji: problem.emoji,
    };
    const newLog = [...log, entry];

    setFeedback(isCorrect ? "ok" : "err");
    setFeedbackMsg(isCorrect ? `+${earned} ⭐` : ENCOURAGEMENTS[Math.floor(Math.random() * ENCOURAGEMENTS.length)]);
    setAttempted(newAttempted);
    setSolved(newSolved);
    setStars(newStarsTotal);
    setStarsSession(newStarsSession);
    setLog(newLog);

    const wait = isCorrect ? 950 : 1500;
    setTimeout(() => {
      setFeedback(null);
      setFeedbackMsg("");
      setFilled([]);
      setWrongSlots([]);
      lockedRef.current = false;
      if (newAttempted >= 3) {
        setApp((s) => ({
          ...s, stars: newStarsTotal,
          lastResult: { category: catLabel, solved: newSolved, total: 3, time: elapsed, starsEarned: newStarsSession, log: newLog },
        }));
        window.incrementGamesCompleted && window.incrementGamesCompleted();
        go("results");
      } else {
        const nextRonda = ronda + 1;
        setRonda(nextRonda);
        setProblem(buildProblem(nextRonda, usedSetsRef.current));
        exerciseStart.current = Date.now();
      }
    }, wait);
  }

  // Cálculo de tamaños de slot — adapta al largo total de la palabra
  const totalLen = problem.segments.reduce((acc, s) => acc + (s.h !== undefined ? s.h.length : s.v.length), 0);
  const SLOT_H = totalLen <= 5 ? 70 : totalLen <= 7 ? 62 : totalLen <= 9 ? 56 : 50;
  const baseW = SLOT_H * 0.62;
  const TRAY_W = 80;
  const TRAY_H = 64;

  const activeIdx = filled.findIndex((v) => v === undefined);

  return (
    <div style={{ position: "absolute", inset: 0, overflow: "hidden" }}>
      <GameHUD elapsed={elapsed} stars={stars} attempted={attempted} solved={solved} total={3} app={app} setApp={setApp} />

      {/* Enunciado (QUÉ hacer) — centrado absoluto al lienzo, alineado con chips/ronda */}
      <div style={{
        position: "absolute", top: 100, left: "50%", transform: "translateX(-50%)",
        maxWidth: 420, textAlign: "center",
        fontFamily: "var(--ed-font-display)", fontWeight: 700,
        fontSize: 19, lineHeight: 1.15,
        color: "#fff", textShadow: "0 2px 6px rgba(0,0,0,0.55)",
        pointerEvents: "none",
      }}>
        Forma la palabra.
      </div>

      {/* Personaje grande con bocadillo */}
      <div data-qa="personaje" style={{
        position: "absolute", left: 8, bottom: 90, width: 220,
        pointerEvents: "none", textAlign: "center",
      }}>
        <div data-qa="bocadillo" className="ed-float-soft" style={{
          position: "absolute", left: 0, right: 0, bottom: "100%",
          pointerEvents: "none",
          display: "flex", justifyContent: "center",
        }}>
          <div style={{
            position: "relative",
            display: "inline-block",
            maxWidth: 208,
            background: "linear-gradient(180deg, rgba(20,12,55,0.95), rgba(10,6,35,0.95))",
            border: "1.5px solid rgba(242,194,96,0.65)",
            borderRadius: 16, padding: "10px 14px",
            fontFamily: "var(--ed-font-display)",
            fontWeight: 700, fontSize: 14, lineHeight: 1.25,
            color: "#fce9a8", textAlign: "center",
            boxShadow: "0 10px 24px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.08)",
          }}>
            Toca las sílabas que faltan.
            <div style={{
              position: "absolute", bottom: -10, left: "50%", transform: "translateX(-50%)",
              width: 0, height: 0,
              borderLeft: "9px solid transparent", borderRight: "9px solid transparent",
              borderTop: "10px solid rgba(20,12,55,0.95)",
              filter: "drop-shadow(0 1px 0 rgba(242,194,96,0.55))",
            }} />
          </div>
        </div>
        <div style={{ position: "relative", display: "flex", justifyContent: "center" }}>
          <div style={{
            position: "absolute", bottom: 14, left: "50%", transform: "translateX(-50%)",
            width: 140, height: 16, borderRadius: "50%",
            background: "radial-gradient(ellipse, rgba(242,194,96,0.45), transparent 70%)",
            filter: "blur(5px)",
          }} />
          <char.Component size={190} floating />
        </div>
        <div style={{
          marginTop: -2,
          fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 14,
          color: "#fce9a8", letterSpacing: "0.04em",
          textShadow: "0 2px 6px rgba(0,0,0,0.6)",
        }}>{char.name}</div>
      </div>

      {/* Zona central: emoji + palabra con huecos — centrada al lienzo (x=450) */}
      <div data-qa="zona-central" style={{
        position: "absolute", top: 132, left: 230, right: 230, bottom: 140,
        display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
        gap: 22,
      }}>
        <div style={{
          width: 150, height: 130,
          borderRadius: 22,
          background: "linear-gradient(180deg, rgba(255,255,255,0.95), rgba(240,235,225,0.9))",
          border: "3px solid #f2c260",
          boxShadow: "0 12px 28px rgba(0,0,0,0.45), 0 0 0 1px rgba(242,194,96,0.35), inset 0 -4px 0 rgba(0,0,0,0.08)",
          display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: 88, lineHeight: 1,
        }}>
          {problem.emoji}
        </div>

        <div style={{
          display: "flex", justifyContent: "center", alignItems: "center",
          gap: 8, padding: "4px 6px", flexWrap: "wrap",
        }}>
          {(() => {
            // Renderizar segmentos en orden
            let hiddenCursor = 0;
            return problem.segments.map((seg, sIdx) => {
              if (seg.v !== undefined) {
                // Letras visibles
                return seg.v.split("").map((ch, k) => (
                  <div key={`v-${sIdx}-${k}`} style={{
                    width: baseW, height: SLOT_H,
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontFamily: "var(--ed-font-display)", fontWeight: 700,
                    fontSize: SLOT_H * 0.55,
                    color: "#fff", textShadow: "0 2px 6px rgba(0,0,0,0.5)",
                    borderBottom: "3px solid rgba(255,255,255,0.35)",
                  }}>{ch}</div>
                ));
              }
              // Hueco oculto
              const hIdx = hiddenCursor++;
              const f = filled[hIdx];
              const isFilled = f !== undefined;
              const isActive = hIdx === activeIdx;
              const isWrong = wrongSlots.includes(hIdx);
              const SLOT_W = (seg.h.length) * (SLOT_H * 0.46) + 12;
              return (
                <button key={`h-${sIdx}`} onClick={() => { if (isFilled && !lockedRef.current) eraseSlot(hIdx); }}
                  style={{
                    width: SLOT_W, height: SLOT_H, borderRadius: 12,
                    border: `2.5px solid ${feedback === "ok" ? "#2ecc8f" : isWrong ? "#ff6b6b" : isActive ? "#fce9a8" : "rgba(242,194,96,0.55)"}`,
                    background: isFilled
                      ? (isWrong ? "linear-gradient(180deg, rgba(255,150,150,0.95), rgba(220,80,80,0.85))" : "linear-gradient(180deg, rgba(252,233,168,0.95), rgba(217,164,65,0.85))")
                      : "rgba(10,6,35,0.55)",
                    color: isFilled ? "#3a2608" : "rgba(252,233,168,0.5)",
                    fontFamily: "var(--ed-font-display)", fontWeight: 800,
                    fontSize: SLOT_H * 0.42,
                    cursor: isFilled && !lockedRef.current ? "pointer" : "default",
                    boxShadow: isWrong
                      ? "0 0 16px rgba(255,107,107,0.6)"
                      : isActive
                        ? "0 0 14px rgba(252,233,168,0.5)"
                        : isFilled ? "0 4px 10px rgba(0,0,0,0.35)" : "inset 0 1px 0 rgba(255,255,255,0.08)",
                    transition: "all 0.15s ease",
                    animation: isWrong ? "ed-shake 0.4s" : "none",
                  }}
                  title={isFilled ? "Toca para borrar" : "Toca una sílaba abajo"}
                >
                  {isFilled ? f : "_"}
                </button>
              );
            });
          })()}
        </div>
      </div>

      {/* Bandeja: sílabas — centrada al lienzo */}
      <div data-qa="bandeja" style={{
        position: "absolute", bottom: 28, left: 230, right: 230,
        display: "flex", gap: 12, justifyContent: "center",
      }}>
        {problem.tray.map((syl, i) => {
          const colors = ["#ef5a5a", "#f5a623", "#f5d84b", "#4fa0ff", "#2ecc8f", "#a78bfa", "#fce9a8"];
          const color = colors[i % colors.length];
          return (

          style={{ fontSize: 15, padding: "0 10px", height: 56, fontWeight: 800, letterSpacing: "0.04em" }}>SALIR</button>
      </div>

      <FeedbackOverlay feedback={feedback} feedbackMsg={feedbackMsg} charName={char.name} />
      <RestartModal confirmingExit={confirmingExit} setConfirmingExit={setConfirmingExit} attempted={attempted} total={3} onRestart={onRestart} />

      `}</style>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// R0 — SpeedQuizCard: 30s, varios textos seguidos, tap chip rápido
// ─────────────────────────────────────────────────────────────
function SpeedQuizCard({ pool, chips, onFinish, verifyRef, setVerifyReady }) {
  const SESSION_DURATION = 30;
  const [timeLeft, setTimeLeft] = useStateG(SESSION_DURATION);
  const [stats, setStats] = useStateG({ aciertos: 0, errores: 0 });
  const [selectedChip, setSelectedChip] = useStateG(null);
  const finishedRef = useRefG(false);

  // Cola de textos: pool barajado al inicio. Cuando se agota, rebarajamos.
  const queueRef = useRefG(shuffle(pool));
  const [current, setCurrent] = useStateG(() => queueRef.current.shift());
  const [shake, setShake] = useStateG(null);

  useEffectG(() => {
    const id = setInterval(() => {
      setTimeLeft((t) => {
        if (t <= 1) {
          clearInterval(id);
          finishedRef.current = true;
          if (setVerifyReady) setVerifyReady(false);
          return 0;
        }
        return t - 1;
      });
    }, 1000);
    return () => clearInterval(id);
  }, []);

  useEffectG(() => {
    if (timeLeft === 0 && finishedRef.current) {
      const t = setTimeout(() => onFinish(stats), 600);
      return () => clearTimeout(t);
    }
  }, [timeLeft, stats]);

  // Reportar al padre cuándo está listo (hay un chip seleccionado).
  useEffectG(() => {
    if (!setVerifyReady) return;
    setVerifyReady(!finishedRef.current && selectedChip !== null);
  }, [selectedChip]);

  // Exponer verify al padre.
  useEffectG(() => {
    if (!verifyRef) return;
    verifyRef.current = () => confirmSelection();
  }, [selectedChip, current]);

  function nextText() {
    if (queueRef.current.length === 0) queueRef.current = shuffle(pool);
    setCurrent(queueRef.current.shift());
  }

  function tap(chip) {
    if (finishedRef.current || !current) return;
    // Tap selecciona el chip (toggle si tap mismo). NO verifica.
    setSelectedChip((prev) => (prev === chip ? null : chip));
  }

  function confirmSelection() {
    if (finishedRef.current || !current || !selectedChip) return;
    if (selectedChip === current.correct) {
      setStats((s) => ({ ...s, aciertos: s.aciertos + 1 }));
      pushRecent("elementos_r1", current.id);
      setSelectedChip(null);
      nextText();
    } else {
      setStats((s) => ({ ...s, errores: s.errores + 1 }));
      setShake(selectedChip);
      pushRecent("elementos_r1", current.id);
      setTimeout(() => {
        setShake(null);
        setSelectedChip(null);
        nextText();
      }, 450);
    }
  }

  return (
    <div style={{
      position: "relative", width: "100%", height: "100%",
      display: "flex", flexDirection: "column", gap: 12,
    }}>
      {/* HUD del speed quiz */}
      <div style={{
        display: "flex", alignItems: "center", justifyContent: "space-between",
        fontFamily: "var(--ed-font-display)", color: "#fce9a8", fontSize: 13, fontWeight: 700,
        padding: "4px 8px",
      }}>
        <div>✅ {stats.aciertos} &nbsp; ❌ {stats.errores}</div>
        <div style={{
          background: timeLeft <= 10 ? "rgba(255,107,107,0.5)" : "rgba(0,0,0,0.4)",
          borderRadius: 999, padding: "4px 14px",
          border: "1px solid rgba(252,233,168,0.5)",
        }}>⏱ {timeLeft}s</div>
      </div>

      {/* Card del texto: ocupa todo el spacer central — sin huecos blancos */}
      <div
        key={current ? current.id : "tiempo"}
        style={{
          flex: 1, minHeight: 0,
          background: "rgba(255,255,255,0.95)", color: "#1a1a1a",
          borderRadius: 14, padding: "18px 24px",
          border: "2px solid #f2c260",
          boxShadow: "0 8px 20px rgba(0,0,0,0.35)",
          fontFamily: "var(--ed-font-ui)",
          fontSize: 18, lineHeight: 1.4, fontWeight: 500,
          textAlign: "center",
          display: "flex", alignItems: "center", justifyContent: "center",
          animation: "ed-pop-in 0.32s ease-out",
        }}>
        {timeLeft === 0 ? "¡Tiempo!" : (current ? current.text : "")}
      </div>

      {/* Chips en grid 2×2 para aprovechar mejor el espacio vertical */}
      <div style={{
        display: "grid",
        gridTemplateColumns: "1fr 1fr",
        gridTemplateRows: "1fr 1fr",
        gap: 8,
        minHeight: 110,
      }}>
        {chips.map((c) => {
          const isSelected = selectedChip === c;
          return (
            <button key={c} onClick={() => tap(c)} disabled={finishedRef.current}
              style={{
                padding: "10px 6px", borderRadius: 12,
                background: isSelected
                  ? "linear-gradient(180deg, #ffd84b, #c0850c)"
                  : "linear-gradient(180deg, #ffe97a, #d7b12a)",
                color: "#3a2608",
                fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 15,
                border: isSelected ? "2.5px solid #fce9a8" : "none",
                boxShadow: isSelected
                  ? "0 0 0 4px rgba(255,255,255,1), 0 0 0 8px rgba(252,233,168,0.65), 0 0 38px rgba(252,233,168,0.9), inset 0 1px 0 rgba(255,255,255,0.5), inset 0 -3px 0 rgba(0,0,0,0.2), 0 8px 22px -4px rgba(0,0,0,0.55)"
                  : "inset 0 1px 0 rgba(255,255,255,0.4), inset 0 -3px 0 rgba(0,0,0,0.18), 0 4px 10px -2px rgba(0,0,0,0.45)",
                cursor: finishedRef.current ? "default" : "pointer", letterSpacing: "0.02em",
                opacity: finishedRef.current ? 0.5 : 1,
                transform: isSelected ? "translateY(-4px) scale(1.04)" : "none",
                transition: "all 0.15s ease",
                animation: shake === c ? "ed-shake 0.35s" : "none",
              }}>{c}</button>
          );
        })}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// R1 — DragMatchCard: 3 textos + 3 chips, tap para conectar
// ─────────────────────────────────────────────────────────────
function DragMatchCard({ pool, chips, onFinish, verifyRef, setVerifyReady, clearRef, setClearReady }) {
  // Elegir 3 textos con 3 tonos DISTINTOS (uno por chip si se puede)
  const items = useMemoG(() => {
    // FIFO anti-repetición: bloquear solo los floor(N/2) más recientes (N = banco),
    // no todos los recientes; así cada chip conserva opciones frescas y el reload no repite.
    const windowN = Math.floor(pool.length / 2);
    const recentIds = getRecent("elementos_r2"); // ya acotado por categoría (more-recent first)
    const blocked = new Set(recentIds.slice(0, windowN));
    const byChip = {};
    chips.forEach((c) => { byChip[c] = pool.filter((p) => p.correct === c && !blocked.has(p.id)); });
    // Si algún chip se quedó sin pool, usar todos del chip
    chips.forEach((c) => { if (byChip[c].length === 0) byChip[c] = pool.filter((p) => p.correct === c); });
    // Elegir 3 chips al azar y para cada uno 1 texto
    const pickedChips = shuffle(chips).slice(0, 3);
    const picked = pickedChips.map((c) => {
      const arr = byChip[c];
      const p = arr[Math.floor(Math.random() * arr.length)];
      return p;
    }).filter(Boolean);
    picked.forEach((p) => pushRecent("elementos_r2", p.id));
    return shuffle(picked);
  }, []);
  const shownChips = useMemoG(() => shuffle(items.map((it) => it.correct)), [items]);

  // selectedText: id del texto seleccionado (esperando chip)
  const [selectedText, setSelectedText] = useStateG(null);
  // matches: { textId: chip }
  const [matches, setMatches] = useStateG({});
  const [verified, setVerified] = useStateG(false);
  const finishedRef = useRefG(false);

  // Exponer verify al padre vía ref. El padre decide cuándo se ejecuta
  // (cuando el usuario toca el botón VERIFICAR de la columna derecha).
  useEffectG(() => {
    if (!verifyRef) return;
    verifyRef.current = () => verifyNow(matches);
  }, [matches]);

  // Reportar al padre cuándo está listo para verificar (los 3 emparejados).
  useEffectG(() => {
    if (!setVerifyReady) return;
    setVerifyReady(!finishedRef.current && Object.keys(matches).length === items.length);
  }, [matches, items.length]);

  // Exponer clear (borrar todas las conexiones) al padre.
  useEffectG(() => {
    if (!clearRef) return;
    clearRef.current = () => {
      if (finishedRef.current) return;
      setMatches({});
      setSelectedText(null);
    };
  });

  // Reportar al padre cuándo hay algo que borrar.
  useEffectG(() => {
    if (!setClearReady) return;
    setClearReady(!finishedRef.current && Object.keys(matches).length > 0);
  }, [matches]);

  function tapText(itemId) {
    if (finishedRef.current) return;
    if (matches[itemId]) {
      // ya conectado: desconectar
      const next = { ...matches }; delete next[itemId]; setMatches(next); return;
    }
    setSelectedText(itemId === selectedText ? null : itemId);
  }
  function tapChip(chip) {
    if (finishedRef.current) return;
    if (!selectedText) return;
    // Si ese chip ya está usado por otro texto, no permitir (cada chip único)
    const usedBy = Object.entries(matches).find(([, c]) => c === chip);
    if (usedBy) return;
    const next = { ...matches, [selectedText]: chip };
    setMatches(next);
    setSelectedText(null);
    // Ya NO auto-verifica al completar — el padre dispara verify vía verifyRef.
  }
  function verifyNow(currentMatches) {
    if (finishedRef.current) return;
    if (Object.keys(currentMatches).length !== items.length) return;
    finishedRef.current = true;
    setVerified(true);
    if (setVerifyReady) setVerifyReady(false);
    let aciertos = 0;
    items.forEach((it) => { if (currentMatches[it.id] === it.correct) aciertos++; });
    setTimeout(() => onFinish({ aciertos, total: items.length }), 1000);
  }

  return (
    <div style={{
      position: "relative", width: "100%", height: "100%",
      display: "grid", gridTemplateColumns: "1.4fr 1fr", gap: 14,
    }}>
      {/* Columna textos */}
      <div style={{ display: "flex", flexDirection: "column", gap: 8, justifyContent: "space-evenly" }}>
        {items.map((it) => {
          const isSelected = selectedText === it.id;
          const matchedChip = matches[it.id];
          const isCorrect = verified && matchedChip === it.correct;
          const isWrong = verified && matchedChip && matchedChip !== it.correct;
          return (
            <button key={it.id} onClick={() => tapText(it.id)}
              style={{
                padding: "10px 12px", borderRadius: 12,
                background: matchedChip
                  ? (verified
                      ? (isCorrect ? "rgba(46,204,143,0.92)" : "rgba(255,107,107,0.92)")
                      : "rgba(252,233,168,0.95)")
                  : (isSelected ? "rgba(252,233,168,0.85)" : "rgba(255,255,255,0.92)"),
                color: matchedChip && verified ? "#fff" : "#1a1a1a",
                fontFamily: "var(--ed-font-ui)", fontWeight: 500, fontSize: 12,
                border: `2px solid ${isSelected ? "#fce9a8" : matchedChip ? "#d9a441" : "rgba(242,194,96,0.5)"}`,
                textAlign: "left", lineHeight: 1.35,
                cursor: finishedRef.current ? "default" : "pointer",
                boxShadow: isSelected ? "0 0 0 4px rgba(255,255,255,1), 0 0 0 8px rgba(252,233,168,0.65), 0 0 38px rgba(252,233,168,0.9), 0 8px 22px -4px rgba(0,0,0,0.55)" : "0 3px 8px rgba(0,0,0,0.25)",
                transition: "all 0.15s ease",
                position: "relative",
              }}>
              {it.text}
              {matchedChip && (
                <div style={{
                  position: "absolute", right: 8, top: 6,
                  fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 10,
                  color: verified ? "#fff" : "#3a2608",
                  background: verified ? "rgba(0,0,0,0.25)" : "rgba(217,164,65,0.7)",
                  padding: "2px 6px", borderRadius: 999,
                }}>→ {matchedChip}</div>
              )}
            </button>
          );
        })}
      </div>

      {/* Columna chips */}
      <div style={{ display: "flex", flexDirection: "column", gap: 10, justifyContent: "space-evenly" }}>
        {shownChips.map((chip) => {
          const usedByEntry = Object.entries(matches).find(([, c]) => c === chip);
          const used = !!usedByEntry;
          const itemForChip = used ? items.find((it) => it.id === usedByEntry[0]) : null;
          const isCorrect = verified && itemForChip && itemForChip.correct === chip;
          const isWrong = verified && itemForChip && itemForChip.correct !== chip;
          return (
            <button key={chip} onClick={() => tapChip(chip)} disabled={!selectedText && !verified}
              style={{
                padding: "16px 10px", borderRadius: 14,
                background: used
                  ? (verified
                      ? (isCorrect ? "linear-gradient(180deg, #5be0a3, #2ecc8f)" : "linear-gradient(180deg, #ff9b9b, #ef5a5a)")
                      : "linear-gradient(180deg, #ffe97a, #d7b12a)")
                  : (selectedText ? "linear-gradient(180deg, #ffe97a, #d7b12a)" : "rgba(0,0,0,0.45)"),
                color: used ? (verified ? "#fff" : "#3a2608") : selectedText ? "#3a2608" : "rgba(252,233,168,0.7)",
                fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 15,
                border: used ? "none" : "2px dashed rgba(252,233,168,0.45)",
                boxShadow: used
                  ? "inset 0 1px 0 rgba(255,255,255,0.4), inset 0 -3px 0 rgba(0,0,0,0.18), 0 4px 10px -2px rgba(0,0,0,0.45)"
                  : selectedText ? "0 0 14px rgba(252,233,168,0.3)" : "none",
                cursor: (!selectedText && !used) || verified ? "default" : "pointer",
                letterSpacing: "0.02em",
                transition: "all 0.15s ease",
                opacity: (!selectedText && !used) ? 0.6 : 1,
              }}>{chip}</button>
          );
        })}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// R2 — ElijeElFinalCard: historia + 4 finales
// ─────────────────────────────────────────────────────────────
function ElijeElFinalCard({ pool, onAnswer, verifyRef, setVerifyReady }) {
  const story = useMemoG(() => {
    // FIFO anti-repetición: bloquear solo los floor(N/2) más recientes (N = banco),
    // no todos los recientes; así el pool no se vacía y el reload no repite la última.
    const windowN = Math.floor(pool.length / 2);
    const recentIds = getRecent("elementos_r3"); // ya acotado por categoría (more-recent first)
    const blocked = new Set(recentIds.slice(0, windowN));
    let candidates = pool.filter((s) => !blocked.has(s.id));
    if (candidates.length < 1) candidates = pool;
    const pick = candidates[Math.floor(Math.random() * candidates.length)];
    pushRecent("elementos_r3", pick.id);
    return pick;
  }, []);
  const shuffledOptions = useMemoG(() => shuffle(story.options), [story]);
  const [selected, setSelected] = useStateG(null);   // opción seleccionada (aún no confirmada)
  const [answered, setAnswered] = useStateG(null);   // opción confirmada (verify ya disparado)
  const finishedRef = useRefG(false);

  function tap(opt) {
    if (finishedRef.current) return;
    // tap en la misma → deseleccionar; en otra → reemplaza la selección
    setSelected((prev) => (prev === opt ? null : opt));
  }

  // Reportar al padre cuándo está listo para verificar (hay una opción seleccionada).
  useEffectG(() => {
    if (!setVerifyReady) return;
    setVerifyReady(!finishedRef.current && selected !== null);
  }, [selected]);

  // Exponer verify al padre vía ref.
  useEffectG(() => {
    if (!verifyRef) return;
    verifyRef.current = () => {
      if (finishedRef.current || !selected) return;
      finishedRef.current = true;
      setAnswered(selected);
      if (setVerifyReady) setVerifyReady(false);
      setTimeout(() => onAnswer(selected, story), 1000);
    };
  }, [selected]);

  return (
    <div style={{
      position: "relative", width: "100%", height: "100%",
      display: "grid", gridTemplateRows: "auto 1fr", gap: 10,
    }}>
      {/* Texto narrativo */}
      <div style={{
        background: "rgba(255,255,255,0.95)", color: "#1a1a1a",
        borderRadius: 14, padding: "14px 20px",
        border: "2px solid #f2c260",
        boxShadow: "0 8px 20px rgba(0,0,0,0.35)",
        fontFamily: "var(--ed-font-ui)",
      }}>
        <div style={{
          fontSize: 14, lineHeight: 1.5, fontWeight: 500,
        }}>{story.story}</div>
        <div style={{
          marginTop: 8, padding: "6px 10px",
          background: "rgba(242,194,96,0.18)", borderRadius: 8,
          fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 13,
          color: "#7a4d10",
        }}>🔍 {story.question}</div>
      </div>

      {/* 4 finales */}
      <div style={{ display: "grid", gridTemplateRows: "1fr 1fr 1fr 1fr", gap: 6 }}>
        {shuffledOptions.map((opt, i) => {
          const isSelected = selected === opt && !answered;
          const isThisAnswered = answered === opt;
          const showCorrect = answered && opt.isCorrect;
          const showWrong = isThisAnswered && !opt.isCorrect;
          return (
            <button key={i} onClick={() => tap(opt)} disabled={!!answered}
              style={{
                padding: "10px 14px", borderRadius: 12,
                background: showCorrect ? "linear-gradient(180deg, #5be0a3, #2ecc8f)"
                  : showWrong ? "linear-gradient(180deg, #ff9b9b, #ef5a5a)"
                  : isSelected ? "linear-gradient(180deg, #ffe97a, #d7b12a)"
                  : "rgba(255,233,122,0.92)",
                color: showCorrect || showWrong ? "#fff" : "#1a1a1a",
                fontFamily: "var(--ed-font-ui)", fontWeight: 600, fontSize: 13,
                border: `2.5px solid ${showCorrect ? "#1a8f5e" : showWrong ? "#a13b3b" : isSelected ? "#fce9a8" : "rgba(242,194,96,0.7)"}`,
                textAlign: "left", lineHeight: 1.3,
                cursor: answered ? "default" : "pointer",
                boxShadow: isSelected ? "0 0 0 4px rgba(255,255,255,1), 0 0 0 8px rgba(252,233,168,0.65), 0 0 38px rgba(252,233,168,0.9), 0 8px 22px -4px rgba(0,0,0,0.55)" : "0 4px 10px rgba(0,0,0,0.3)",
                transform: isSelected ? "translateY(-4px) scale(1.04)" : "none",
                transition: "all 0.15s ease",
              }}>{opt.text}</button>
          );
        })}
      </div>
    </div>
  );
}

}

function SummaryCell({ label, value, tone = "var(--ed-ink)", emphasis = false }) {
  return (
    <div style={{
      padding: "8px 10px", borderRadius: 10,
      background: emphasis ? "rgba(242,194,96,0.12)" : "rgba(10,6,35,0.4)",
      border: `1px solid ${emphasis ? "rgba(242,194,96,0.5)" : "rgba(148,120,255,0.25)"}`,
      textAlign: "center",
    }}>
      <div className="ed-label" style={{ fontSize: 9, color: "var(--ed-ink-soft)", marginBottom: 2 }}>{label}</div>
      <div style={{ fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: emphasis ? 22 : 18, color: tone, lineHeight: 1 }}>{value}</div>

Object.assign(window, { GameScreen, ResultsScreen, LetraCQGame, ElementosTextoGame });

// app.jsx — Shell de producción EDINUN GAMES.
// Enrutador por estado y device stage adaptativo (desktop / tablet / mobile).
// Móvil portrait: el contenido NUNCA rota; un overlay BLOQUEANTE obliga
// al usuario a girar físicamente el teléfono antes de poder usar la app.

const { useState: useStateA, useEffect: useEffectA, useRef: useRefA } = React;

// ─────────────────────────────────────────────────────────────
// useViewportSize — devuelve el tamaño REAL visible del viewport.
//
// En iOS Safari (y otros mobile browsers), `window.innerHeight` y `100vh`
// reportan la altura de la ventana INCLUYENDO la URL bar, así que el
// contenido escalado a esa altura termina parcialmente fuera de pantalla
// (ej: el numpad del juego queda debajo del fondo visible). La Visual
// Viewport API reporta el área verdaderamente visible y se actualiza
// cuando la URL bar se muestra/oculta.
// ─────────────────────────────────────────────────────────────
// Detección de "resize REAL" vs "zoom del navegador".
//
// Idea: el tamaño FÍSICO de la zona visible en píxeles del display es
// invariante al ctrl+rueda. Cuando subes el zoom de 100 % a 500 %:
//   · innerWidth en CSS-px se divide entre 5
//   · devicePixelRatio se multiplica por 5
//   · innerWidth × devicePixelRatio queda igual ⇒ NO hubo resize real.
//
// Cuando arrastras la esquina de la ventana o rotas el dispositivo:
//   · innerWidth en CSS-px cambia
//   · devicePixelRatio NO cambia
//   · innerWidth × devicePixelRatio cambia ⇒ SÍ hubo resize real.
//
// Por eso comparamos contra `innerWidth × devicePixelRatio` y solo
// actualizamos el state cuando ese producto cambia. Así el lienzo se
// queda con su tamaño CSS previo durante el zoom y el navegador lo
// amplifica visualmente — junto con los glifos, que ya leen `glyphSize`
// del mismo state defendido (ver DeviceStage).
//
// La defensa anterior (tracker de _lastDPR) era frágil: se actualizaba
// en CADA evento, así que si el navegador disparaba dos resize seguidos
// para la misma acción de zoom, el segundo veía el dpr ya guardado y
// recalculaba el tamaño con el viewport pequeño. Esto causaba que los
// glifos quedaran enormes mientras el lienzo se recomprimía.
function physicalSize() {
  if (typeof window === "undefined") return { w: 0, h: 0 };
  const dpr = window.devicePixelRatio || 1;
  return { w: window.innerWidth * dpr, h: window.innerHeight * dpr };
}
let _lastPhysical = physicalSize();

function useViewportSize() {
  const [size, setSize] = useStateA(() => readSize());
  useEffectA(() => {
    function onChange() {
      const phys = physicalSize();
      // Tolerancia de 4 px reales para absorber redondeos del navegador.
      if (Math.abs(phys.w - _lastPhysical.w) < 4 && Math.abs(phys.h - _lastPhysical.h) < 4) {
        // Mismo display, distinto zoom — no actualizamos el state.
        return;
      }
      _lastPhysical = phys;
      setSize(readSize());
    }
    window.addEventListener("resize", onChange);
    window.addEventListener("orientationchange", onChange);
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", onChange);
    }
    return () => {
      window.removeEventListener("resize", onChange);
      window.removeEventListener("orientationchange", onChange);
      if (window.visualViewport) {
        window.visualViewport.removeEventListener("resize", onChange);
      }
    };
  }, []);
  return size;
}
function readSize() {
  if (typeof window === "undefined") return { vw: 0, vh: 0 };
  const vv = window.visualViewport;
  // Cuando el usuario hace pinch-zoom, vv.scale > 1 y vv.width/height
  // reflejan la región visible (más pequeña). Usar esos valores haría
  // que la escala del lienzo se reduzca al hacer zoom — exactamente lo
  // contrario de lo que el usuario quiere. Solo confiamos en vv cuando
  // scale ≈ 1 (sin zoom) — ahí da una lectura más fiel que innerWidth/
  // Height en iOS Safari (descuenta correctamente la URL bar visible).
  if (vv && Math.abs(vv.scale - 1) < 0.05) {
    return { vw: vv.width, vh: vv.height };
  }
  return { vw: window.innerWidth, vh: window.innerHeight };
}

// ─────────────────────────────────────────────────────────────
// DeviceStage — escala el lienzo lógico 900×540 (paisaje) al viewport.
//
// Reglas:
//   · Desktop / tablet: sin marco, sin notch, fondo cósmico edge-to-edge.
//   · Mobile portrait: lienzo letterboxed Y overlay BLOQUEANTE "Gira el
//     teléfono". El contenido del juego no es accesible hasta que rote.
//   · Mobile landscape: lienzo escalado al viewport visible (visualViewport,
//     no innerHeight, para no clippearse debajo de la URL bar de iOS).
// ─────────────────────────────────────────────────────────────
function DeviceStage({ children, variant = "cosmic" }) {
  const W = 900, H = 540;
  const { vw, vh } = useViewportSize();
  const minSide = Math.min(vw, vh);
  const maxSide = Math.max(vw, vh);
  let mode = "desktop";
  if (maxSide < 820) mode = "mobile";
  else if (minSide < 820) mode = "tablet";
  const portrait = vh > vw;
  const baseScale = Math.max(Math.min(vw / W, vh / H), 0.15);

  // Detección de teléfono independiente del modo: cualquier dispositivo con
  // lado menor ≤ 600 CSS-px es un teléfono. Cubre todos los teléfonos
  // actuales (iPhone SE 320 → S25 Ultra/Pro Max ~432) con margen para
  // modelos futuros más anchos. La menor tablet (iPad mini 744) queda
  // bien por encima, así que no se rompe el caso "tablet portrait usable
  // letterboxed". Solo bloqueamos cuando teléfono Y portrait — el lienzo
  // paisaje queda demasiado pequeño para jugar.
  const isPhone = minSide <= 600;
  const lockPortrait = isPhone && portrait;

  // Tamaño de los glifos del fondo: equivalente al `clamp(48px, 7vmin, 110px)`
  // que tenía el CSS, pero calculado a partir del vw/vh DEFENDIDO contra
  // cambios de DPR. Esto evita que con ctrl+rueda del mouse los glifos
  // crezcan más rápido que el lienzo (el lienzo se congela vía la defensa
  // del DPR; si CSS lee el vmin actual, los glifos no se congelan y desync).
  const glyphSize = Math.max(48, Math.min(minSide * 0.07, 110));

  const debug = typeof window !== "undefined" && /(?:^|[#&])debug(?:&|$)/.test(window.location.hash || "");

  // ─── Pinch-zoom y pan custom ─────────────────────────────────
  // Reemplaza el zoom nativo del browser. Razón: con el lienzo letterboxed
  // dentro de un wrapper viewport-sized, el visual viewport del browser
  // puede panear hasta dejar al usuario mirando solo el cosmos vacío de los
  // bordes — el "rebote" reportado en iPhone (ver .planning/ios-zoom.md).
  // Aquí los gestos operan sobre el transform del lienzo, así que el zoom
  // siempre gravita alrededor del contenido y no deriva a un borde
  // decorativo.
  const wrapperRef = useRefA(null);
  const gestureRef = useRefA(null);
  const stateRef = useRefA({ userZoom: 1, pan: { x: 0, y: 0 } });
  const [userZoom, setUserZoom] = useStateA(1);
  const [pan, setPan] = useStateA({ x: 0, y: 0 });
  const [duringGesture, setDuringGesture] = useStateA(false);

  useEffectA(() => {
    stateRef.current = { userZoom, pan };
  }, [userZoom, pan]);

  // Reset al cambiar viewport (rotación, resize). Si no, el pan queda
  // referenciado a un viewport que ya no existe.
  useEffectA(() => {
    setUserZoom(1);
    setPan({ x: 0, y: 0 });
    setDuringGesture(false);
  }, [vw, vh]);

  useEffectA(() => {
    if (lockPortrait) return;
    const el = wrapperRef.current;
    if (!el) return;

    const Z_MIN = 1;
    const Z_MAX = 4;

    const dist = (a, b) => Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
    const mid = (a, b) => ({ x: (a.clientX + b.clientX) / 2, y: (a.clientY + b.clientY) / 2 });

    function clampPan(zoom, px, py) {
      // Pan máximo: la mitad del exceso del lienzo escalado sobre el viewport.
      // En zoom=1 el max es 0 (lienzo cabe en viewport, no hay donde panear).
      // En zoom=N el lienzo mide N veces el lado contain, así que el usuario
      // puede mover ±(sw - vw)/2 antes de que la orilla del lienzo cruce la
      // orilla del viewport. Esto evita perder el contenido fuera de pantalla.
      const sw = baseScale * zoom * W;
      const sh = baseScale * zoom * H;
      const maxX = Math.max(0, (sw - vw) / 2);
      const maxY = Math.max(0, (sh - vh) / 2);
      return {
        x: Math.max(-maxX, Math.min(maxX, px)),
        y: Math.max(-maxY, Math.min(maxY, py)),
      };
    }

    function applyState(z, px, py) {
      stateRef.current = { userZoom: z, pan: { x: px, y: py } };
      setUserZoom(z);
      setPan({ x: px, y: py });
    }

    function onTouchStart(e) {
      const { userZoom: z0, pan: p0 } = stateRef.current;
      if (e.touches.length >= 2) {
        const [t0, t1] = e.touches;
        gestureRef.current = {
          mode: "pinch",
          d0: dist(t0, t1),
          m0: mid(t0, t1),
          z0, p0: { ...p0 },
        };
        setDuringGesture(true);
        e.preventDefault();
      } else if (e.touches.length === 1) {
        const t = e.touches[0];
        gestureRef.current = {
          mode: "pan-armed",
          startX: t.clientX,
          startY: t.clientY,
          z0, p0: { ...p0 },
        };
        // No preventDefault — un tap simple debe seguir generando click.
      }
    }

    function onTouchMove(e) {
      const g = gestureRef.current;
      if (!g) return;

      // Si en medio de un gesto entra un segundo dedo, transición a pinch
      // tomando el estado actual como punto de partida.
      if (e.touches.length >= 2 && g.mode !== "pinch") {
        const [t0, t1] = e.touches;
        const { userZoom: zNow, pan: pNow } = stateRef.current;
        gestureRef.current = {
          mode: "pinch",
          d0: dist(t0, t1),
          m0: mid(t0, t1),
          z0: zNow, p0: { ...pNow },
        };
        setDuringGesture(true);
        e.preventDefault();
        return;
      }

      if (e.touches.length >= 2 && g.mode === "pinch") {
        const [t0, t1] = e.touches;
        const d = dist(t0, t1);
        const m = mid(t0, t1);
        const ratio = d / g.d0;
        // Permitimos pasar transitoriamente bajo Z_MIN para sensación elástica
        // durante el gesto; en touchend hacemos snap-back al rango válido.
        const newZoom = Math.max(Z_MIN * 0.7, Math.min(Z_MAX * 1.05, g.z0 * ratio));
        const r = newZoom / g.z0;
        const ux = g.m0.x - vw / 2;
        const uy = g.m0.y - vh / 2;
        // Fórmula que mantiene el punto medio de la pinza anclado al mismo
        // píxel del lienzo durante todo el gesto. Derivación:
        //   panX_new = (mx0 - vw/2) + (newZoom/z0) * (panX0 - (mx0 - vw/2))
        //              + (mx_now - mx0)   ← desplazamiento del propio gesto
        const newPanX = ux + r * (g.p0.x - ux) + (m.x - g.m0.x);
        const newPanY = uy + r * (g.p0.y - uy) + (m.y - g.m0.y);
        applyState(newZoom, newPanX, newPanY);
        e.preventDefault();
      } else if (e.touches.length === 1 && g.mode === "pan-armed") {
        if (g.z0 <= 1.001) return; // sin zoom no panea — dejamos pasar el tap
        const t = e.touches[0];
        const dx = t.clientX - g.startX;
        const dy = t.clientY - g.startY;
        if (Math.hypot(dx, dy) > 8) {
          gestureRef.current = { ...g, mode: "pan" };
          setDuringGesture(true);
          e.preventDefault();
        }
      } else if (e.touches.length === 1 && g.mode === "pan") {
        const t = e.touches[0];
        const dx = t.clientX - g.startX;
        const dy = t.clientY - g.startY;
        applyState(g.z0, g.p0.x + dx, g.p0.y + dy);
        e.preventDefault();
      }
    }

    function onTouchEnd(e) {
      const g = gestureRef.current;
      if (!g) return;
      if (e.touches.length === 0) {
        const { userZoom: z, pan: p } = stateRef.current;
        const clampedZ = Math.max(Z_MIN, Math.min(Z_MAX, z));
        let cp;
        if (clampedZ <= 1.001) {
          cp = { x: 0, y: 0 };
        } else {
          cp = clampPan(clampedZ, p.x, p.y);
        }
        applyState(clampedZ, cp.x, cp.y);
        setDuringGesture(false);
        gestureRef.current = null;
      }
    }

    el.addEventListener("touchstart", onTouchStart, { passive: false });
    el.addEventListener("touchmove", onTouchMove, { passive: false });
    el.addEventListener("touchend", onTouchEnd, { passive: false });
    el.addEventListener("touchcancel", onTouchEnd, { passive: false });

    return () => {
      el.removeEventListener("touchstart", onTouchStart);
      el.removeEventListener("touchmove", onTouchMove);
      el.removeEventListener("touchend", onTouchEnd);
      el.removeEventListener("touchcancel", onTouchEnd);
    };
  }, [vw, vh, baseScale, lockPortrait]);

  const totalScale = baseScale * userZoom;

  return (
    <div ref={wrapperRef} style={{
      width: "100vw", height: "100dvh",
      minHeight: "-webkit-fill-available",
      overflow: "hidden",
      position: "relative",
      background: variant === "chalkboard" ? "#0b3a2d" : "#050214",
      // `touch-action: none` desactiva todos los gestos que el browser
      // interpretaría por su cuenta (pinch, pan, doble-tap-zoom). Los
      // implementamos en JS sobre el transform del lienzo para que el
      // zoom siempre quede anclado al contenido y nunca derive a los
      // bordes letterbox del wrapper. Los click/tap en botones siguen
      // funcionando — esto solo bloquea gestos del browser, no eventos.
      touchAction: "none",
    }}>
      <CosmosBg variant={variant} glyphSize={glyphSize} />

      {/* Lienzo lógico 900×540 centrado y escalado.
          El transform combina el escalado base (contain del viewport),
          el zoom del usuario y el pan acumulado. El orden CSS es
          right-to-left: scale → translate(pan) → translate(-50%,-50%). */}
      <div style={{
        width: W, height: H,
        position: "absolute",
        left: "50%", top: "50%",
        transform: `translate(-50%, -50%) translate(${pan.x}px, ${pan.y}px) scale(${totalScale})`,
        transformOrigin: "center center",
        overflow: "hidden",
        // Sin transición durante el gesto activo (el lienzo sigue la pinza
        // al instante); con transición elástica al soltar, para que el
        // snap-back de zoom/pan a los límites válidos no sea abrupto.
        transition: duringGesture ? "none" : "transform 0.22s cubic-bezier(0.2, 0.8, 0.2, 1)",
        willChange: "transform",
      }}>
        {children}
      </div>

      {lockPortrait && <RotateLockOverlay />}
      {debug && (
        <div style={{
          position: "fixed", top: 6, left: 6, zIndex: 999999,
          background: "rgba(0,0,0,0.85)", color: "#0f0",
          font: "11px ui-monospace,Menlo,monospace",
          padding: "6px 8px", borderRadius: 6,
          maxWidth: "90vw", whiteSpace: "pre",
          pointerEvents: "none",
        }}>
{`vw=${vw} vh=${vh}
min=${minSide} max=${maxSide}
mode=${mode} portrait=${portrait}
isPhone=${isPhone} LOCK=${lockPortrait}
zoom=${userZoom.toFixed(2)} pan=${pan.x.toFixed(0)},${pan.y.toFixed(0)}
vv=${typeof window!=="undefined" && window.visualViewport ? "yes" : "no"}
ua=${(typeof navigator!=="undefined" ? navigator.userAgent : "?").slice(0,60)}`}
        </div>
      )}
    </div>
  );
}

// Overlay bloqueante de rotación. En mobile portrait cubre toda la pantalla
// con un mensaje claro y un ícono animado. NO se puede descartar — el usuario
// DEBE girar el dispositivo para acceder al juego. Se desmonta solo cuando
// el viewport pasa a landscape.
function RotateLockOverlay() {
  return (
    <div
      role="dialog"
      aria-modal="true"
      aria-label="Gira tu teléfono para jugar"
      style={{
        position: "fixed", inset: 0, zIndex: 99999,
        background: "linear-gradient(180deg,#050214 0%,#0a0628 100%)",
        display: "flex", flexDirection: "column",
        alignItems: "center", justifyContent: "center",
        textAlign: "center", padding: "32px 24px",
        color: "#fce9a8",
        fontFamily: "var(--ed-font-display, system-ui)",
      }}
    >
      <div
        style={{
          width: 132, height: 132, marginBottom: 28,
          display: "flex", alignItems: "center", justifyContent: "center",
          animation: "ed-rotate-lock 2.4s ease-in-out infinite",
        }}
        aria-hidden="true"
      >
        {/* Ícono de teléfono que rota */}
        <svg viewBox="0 0 100 100" width="120" height="120" fill="none">
          <rect x="36" y="14" width="28" height="72" rx="6"
                stroke="#f2c260" strokeWidth="3" fill="rgba(242,194,96,0.08)" />
          <rect x="42" y="22" width="16" height="48" rx="2" fill="rgba(242,194,96,0.18)" />
          <circle cx="50" cy="78" r="2.5" fill="#f2c260" />
        </svg>
      </div>
      <div style={{
        fontWeight: 800,
        fontSize: "clamp(18px, 5.2vw, 26px)",
        lineHeight: 1.15,
        textTransform: "uppercase", letterSpacing: "0.02em",
        marginBottom: 12,
      }}>
        Gira tu teléfono
      </div>
      <div style={{
        fontWeight: 500,
        fontSize: "clamp(13px, 4vw, 16px)",
        lineHeight: 1.4,
        color: "rgba(252,233,168,0.78)",
        maxWidth: "min(320px, 80vw)",
      }}>
        Pon tu teléfono de lado para jugar.
      </div>
      <style>{`
        @keyframes ed-rotate-lock {
          0%   { transform: rotate(0deg); }
          45%  { transform: rotate(0deg); }
          70%  { transform: rotate(-90deg); }
          100% { transform: rotate(-90deg); }
        }
      `}</style>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// App principal
// ─────────────────────────────────────────────────────────────
function App() {
  const [route, setRoute] = useStateA("home");
  const [app, setApp] = useStateA({
    studentName: "",
    character: "escritor",
    level: null,
    stars: 0,
    sessionStart: Date.now(),
    gameSeed: 0,
  });

  function go(r) {
    // Al (re)entrar al juego, regeneramos la seed para que GameScreen se remonte
    // y reinicie ronda, tiempo, racha, etc. También reseteamos las estrellas:
    // cada partida empieza desde 0, no acumula entre rondas.
    if (r === "game") {
      setApp((s) => ({ ...s, gameSeed: (s.gameSeed || 0) + 1, stars: 0 }));
    }
    setRoute(r);
  }

  const screenProps = { app, setApp, go };

  let Screen = window.HomeScreen;
  if (route === "character") Screen = window.CharacterScreen;
  else if (route === "game") Screen = window.GameScreen;
  else if (route === "results") Screen = window.ResultsScreen;

  const variant = route === "game" ? "chalkboard" : "cosmic";

  return (
    <DeviceStage variant={variant}>
      <Screen key={route === "game" ? `game-${app.gameSeed}` : route} {...screenProps} />
    </DeviceStage>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>
