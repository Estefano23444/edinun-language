// ─────────────────────────────────────────────────────────────
// Sparkles — chispas animadas alrededor del personaje. Refuerzan
// la estética cósmica heredada del shell.
// ─────────────────────────────────────────────────────────────
function Sparkles({ color = "#fce9a8", count = 6, seed = 1 }) {
  const pts = Array.from({ length: count }, (_, i) => {
    const a = (i * 360) / count + seed * 37;
    const r = 70 + (i % 3) * 8;
    const x = 100 + Math.cos((a * Math.PI) / 180) * r;
    const y = 100 + Math.sin((a * Math.PI) / 180) * r;
    const s = 2 + (i % 3);
    return { x, y, s, delay: i * 0.35 };
  });
  return (
    <g>
      {pts.map((p, i) => (
        <g key={i} transform={`translate(${p.x} ${p.y})`}>
          <circle r={p.s} fill={color} opacity="0.9">
            <animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" begin={`${p.delay}s`} repeatCount="indefinite" />
          </circle>
        </g>
      ))}
    </g>
  );
}

        </svg>
      </div>
    );
  };
}

// ─────────────────────────────────────────────────────────────
// Contador de visitantes (compartido entre juegos del repo via
// localStorage).
// ─────────────────────────────────────────────────────────────
function useVisitorCount() {
  const KEY = "edinun_visitors_v1";
  const [n, setN] = useState(() => {
    const raw = localStorage.getItem(KEY);
    const v = raw ? parseInt(raw, 10) : 0;
    return isNaN(v) ? 0 : v;
  });
  useEffect(() => {
    function onUpdate() {
      const raw = localStorage.getItem(KEY);
      const v = raw ? parseInt(raw, 10) : 0;
      if (!isNaN(v)) setN(v);
    }
    window.addEventListener("edinun:visitors-updated", onUpdate);
    return () => window.removeEventListener("edinun:visitors-updated", onUpdate);
  }, []);
  return n;
}

function markFirstAttempt() {
  const KEY = "edinun_visitors_v1";
  const SESSION_FLAG = "edinun_visit_counted_v1";
  if (sessionStorage.getItem(SESSION_FLAG) === "1") return;
  const raw = localStorage.getItem(KEY);
  const current = raw ? parseInt(raw, 10) : 0;
  const next = (isNaN(current) ? 0 : current) + 1;
  localStorage.setItem(KEY, String(next));
  sessionStorage.setItem(SESSION_FLAG, "1");
  window.dispatchEvent(new Event("edinun:visitors-updated"));
}

function incrementGamesCompleted() {
  const KEY = "edinun_games_completed_v1";
  const raw = localStorage.getItem(KEY);
  const next = (raw ? parseInt(raw, 10) : 0) + 1;
  localStorage.setItem(KEY, String(next));
  window.dispatchEvent(new Event("edinun:games-updated"));
  return next;
}

// ─────────────────────────────────────────────────────────────
// Utilidades comunes
// ─────────────────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const ss = s % 60;
  return `${String(m).padStart(2, "0")}:${String(ss).padStart(2, "0")}`;
}

function calcStars(isCorrect, exerciseSec) {
  return isCorrect ? Math.max(1, 10 - Math.floor(exerciseSec / 3)) : 0;
}

// ─────────────────────────────────────────────────────────────
// FIFO anti-repetición por categoría (lab / acer / ruleta) en un solo
// key de localStorage. Cada sesión empuja varias entradas; límite alto
// para retener varias sesiones y no repetir consecutivo.
// ─────────────────────────────────────────────────────────────
const RECENT_KEY = "edinun_juego12_recientes_v1";
const RECENT_LIMIT = 24;

function getRecent() {
  try {
    const raw = localStorage.getItem(RECENT_KEY);
    if (!raw) return [];
    const arr = JSON.parse(raw);
    return Array.isArray(arr) ? arr : [];
  } catch { return []; }
}
function pushRecent(key) {
  const arr = getRecent().filter((k) => k !== key);
  arr.unshift(key);
  const trimmed = arr.slice(0, RECENT_LIMIT);
  try { localStorage.setItem(RECENT_KEY, JSON.stringify(trimmed)); } catch {}
}

function pickFresh(bank, prefix, idOf) {
  // FIFO anti-repetición POR CATEGORÍA (estándar 12): se bloquea solo la última
  // mitad del banco (los ~floor(N/2) ids más recientes de ESTE prefijo), no
  // todos los vistos. Así el pool nunca se vacía y siempre se garantiza variar
  // respecto a las últimas jugadas (antes: al acumularse los 6 ids en la lista
  // compartida, el pool quedaba vacío → fallback a random total → repetía).
  const pre = prefix + ":";
  const recentIds = getRecent()
    .filter((k) => k.startsWith(pre))
    .map((k) => k.slice(pre.length));
  const windowN = Math.floor(bank.length / 2);
  const blocked = new Set(recentIds.slice(0, windowN));
  let pool = bank.filter((b) => !blocked.has(idOf(b)));
  if (pool.length === 0) pool = bank;
  const p = pool[Math.floor(Math.random() * pool.length)];
  pushRecent(pre + idOf(p));
  return p;
}

function makeProblemR1() {
  // El shooter gestiona su propio flujo de aparición; solo necesita el pool.
  return { pool: shuffle(R1_SHOOTER) };
}

function makeProblemR2() {
  const pick = pickFresh(R2_BANK, "lec", (r) => r.id);
  const parts = pick.parts.map((p) =>
    typeof p === "string" ? p : { options: shuffle([...p.options]), answer: p.answer }
  );
  return { id: pick.id, parts };
}

function makeProblemR3() {
  const pickN = (bank, type, n) => {
    // Mismo FIFO por ventana que pickFresh: bloquea la última mitad del banco.
    const recentT = getRecent()
      .filter((k) => k.startsWith("ruleta:"))
      .map((k) => k.slice("ruleta:".length))
      .filter((t) => bank.includes(t));
    const blocked = new Set(recentT.slice(0, Math.floor(bank.length / 2)));
    let pool = bank.filter((t) => !blocked.has(t));
    if (pool.length < n) pool = bank;
    const ch = shuffle(pool).slice(0, n);
    for (const t of ch) pushRecent("ruleta:" + t);
    return ch.map((text) => ({ text, type }));
  };
  const phrases = shuffle([
    ...pickN(R3_FORMAL, "formal", 3),
    ...pickN(R3_COLOQUIAL, "coloquial", 3),
  ]);
  return { phrases };
}

// ═════════════════════════════════════════════════════════════
// GameScreen — wrapper que permite REINICIAR remontando el juego.
// ═════════════════════════════════════════════════════════════
function GameScreen({ app, setApp, go }) {
  const [restartTick, setRestartTick] = useStateG(0);
  const restart = () => setRestartTick((t) => t + 1);
  return (
    <>
      <style>{`
        @keyframes ed-shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-7px)} 40%,80%{transform:translateX(7px)} }
        @keyframes ed-fall { from { top: -14%; } to { top: 114%; } }
        @keyframes ed-pop { 0%{transform:scale(1)} 60%{transform:scale(1.25)} 100%{transform:scale(0.4);opacity:0} }
      `}</style>
      <FiestaGame key={`fiesta-${restartTick}`} app={app} setApp={setApp} go={go} onRestart={restart} />
    </>
  );
}

function FiestaGame({ app, setApp, go, onRestart }) {
  const char = CHARACTERS.find((c) => c.id === app.character) || CHARACTERS[0];
  const catLabel = app.currentCatLabel || "Te invito a mi fiesta";

  const [ronda, setRonda] = useStateG(0);

  // Picks por ronda (una sola vez por montaje).
  const [r1Pick] = useStateG(() => makeProblemR1());
  const [r2Pick] = useStateG(() => makeProblemR2());
  const [r3Pick] = useStateG(() => makeProblemR3());

  // R1 — shooter: el ShooterCard gestiona el flujo de caída/captura.
  // r1Locked evita doble cierre cuando se alcanza la meta.
  const [r1Locked, setR1Locked] = useStateG(false);

  // R2 — una elección por hueco de la lectura (array de palabras | null).
  const r2Gaps = r2Pick.parts.filter((p) => typeof p === "object").length;
  const [r2Choices, setR2Choices] = useStateG(() => Array(r2Gaps).fill(null));
  const [r2Locked, setR2Locked] = useStateG(false);

  // R3 — landed = frase que sorteó la ruleta | null; choice = formal|coloquial
  const [r3Landed, setR3Landed] = useStateG(null);
  const [r3Choice, setR3Choice] = useStateG(null);
  const [r3Locked, setR3Locked] = useStateG(false);

  // Shell state
  const [elapsed, setElapsed] = useStateG(0);
  const [stars, setStars] = useStateG(0);
  const [solved, setSolved] = useStateG(0);
  const [attempted, setAttempted] = useStateG(0);
  const [starsSession, setStarsSession] = useStateG(0);
  const [feedback, setFeedback] = useStateG(null);
  const [feedbackMsg, setFeedbackMsg] = useStateG("");
  const [confirmingRestart, setConfirmingRestart] = useStateG(false);
  const [confirmingExit, setConfirmingExit] = useStateG(false);
  const [log, setLog] = useStateG([]);
  const started = useRefG(Date.now());
  const exerciseStart = useRefG(Date.now());

  useEffectG(() => {
    const id = setInterval(() => setElapsed(Math.floor((Date.now() - started.current) / 1000)), 500);
    return () => clearInterval(id);
  }, []);

  // ── Completitud por ronda. R1 (shooter) se auto-resuelve al cazar la meta,
  // por eso NO tiene VERIFICAR manual (estándar de mecánicas tipo shooter).
  const r2AllChosen = r2Choices.length > 0 && r2Choices.every((c) => c !== null);
  // R3 (clasificar formal/coloquial, 1 toque) se AUTO-EVALÚA: tras girar la
  // ruleta, al tocar "formal" o "coloquial" se resalta y, tras una breve
  // ventana para recapacitar (~700 ms), se califica sola (estándar de
  // mecánicas de 1 toque, igual que el shooter de R1). Por eso su VERIFICAR
  // se oculta y su canVerify queda en false.
  const canVerify =
    ronda === 1 ? (r2AllChosen && !r2Locked) :
    false;

  const r3AutoRef = useRefG(null);
  useEffectG(() => () => clearTimeout(r3AutoRef.current), []);

  // Califica la R3 con la opción tocada (mismo flujo que tenía VERIFICAR).
  function gradeR3(choice) {
    if (r3Locked) return;
    setR3Locked(true);
    const correct = choice === r3Landed.type;
    const userText = TYPE_LABEL[choice];
    const correctText = `${TYPE_LABEL[r3Landed.type]} — "${r3Landed.text.slice(0, 26)}"`;
    setTimeout(() => answer(correct, userText, correctText, "🎡"), 380);
  }

  // R1 — el shooter avisa cuando el niño cazó las palabras correctas.
  function handleShooterDone(caught, misses) {
    if (r1Locked) return;
    setR1Locked(true);
    // Puntaje = palabras correctas atrapadas (menos medio punto por cada error).
    const earned = Math.max(0, Math.min(10, caught - Math.floor(misses / 2)));
    const correct = caught > 0 && caught >= misses;
    const userText = `${caught} cazadas · ${misses} ${misses === 1 ? "fallo" : "fallos"}`;
    setTimeout(() => answer(correct, userText, "atrapar las mp/mb en 20 s", "🎯", earned), 380);
  }

  function handleVerify() {
    if (!canVerify) return;
    if (ronda === 1) {
      setR2Locked(true);
      const gaps = r2Pick.parts.filter((p) => typeof p === "object");
      const correct = gaps.every((g, i) => r2Choices[i] === g.answer);
      const userText = r2Choices.join(", ");
      const correctText = gaps.map((g) => g.answer).join(", ");
      setTimeout(() => answer(correct, userText, correctText, "📖"), 380);
    }
  }

  function handleErase() {
    // Ninguna ronda de este juego usa BORRAR (shooter / acertijo / ruleta).
  }

  function answer(isCorrect, userText, correctText, opIcon, earnedOverride) {
    if (typeof window.markFirstAttempt === "function") window.markFirstAttempt();
    const exerciseSec = Math.max(0, Math.floor((Date.now() - exerciseStart.current) / 1000));
    const earned = (earnedOverride != null) ? earnedOverride : calcStars(isCorrect, exerciseSec);
    const newAttempted = attempted + 1;
    const newSolved = solved + (isCorrect ? 1 : 0);
    const newStarsTotal = stars + earned;
    const newStarsSession = starsSession + earned;

    const entry = {
      idx: newAttempted,
      a: correctText, b: userText, op: opIcon || "·",
      correctAnswer: correctText, userAnswer: userText,
      isCorrect, time: exerciseSec, earned,
    };
    const newLog = [...log, entry];

    setFeedback(isCorrect ? "ok" : "err");
    setFeedbackMsg(isCorrect ? `+${earned} ⭐` : ENCOURAGEMENTS[Math.floor(Math.random() * ENCOURAGEMENTS.length)]);
    setAttempted(newAttempted);
    setSolved(newSolved);
    setStars(newStarsTotal);
    setStarsSession(newStarsSession);
    setLog(newLog);

    const wait = isCorrect ? 1000 : 1450;
    setTimeout(() => {
      setFeedback(null);
      setFeedbackMsg("");
      if (newAttempted >= 3) {
        setApp((s) => ({
          ...s, stars: newStarsTotal,
          lastResult: { category: catLabel, solved: newSolved, total: 3, time: elapsed, starsEarned: newStarsSession, log: newLog },
        }));
        window.incrementGamesCompleted && window.incrementGamesCompleted();
        go("results");
      } else {
        setRonda((r) => r + 1);
        exerciseStart.current = Date.now();
      }
    }, wait);
  }

  // Enunciado = QUÉ hacer (la tarea). Bocadillo = CÓMO (la mecánica).
  const enunciado =
    ronda === 0 ? "Atrapa solo las palabras escritas correctamente." :
    ronda === 1 ? "Lee el texto y elige la palabra correcta en cada hueco." :
    "Descubre si la frase es formal o coloquial.";
  const bocadillo =
    ronda === 0 ? "Toca las palabras\ncon mp o mb." :
    ronda === 1 ? "Completa la lectura\ntocando la palabra\ncorrecta." :
    "Gira la ruleta y\nclasifica la frase.";

  return (
    <div style={{ position: "absolute", inset: 0, overflow: "hidden" }}>
      <GameHUD elapsed={elapsed} stars={stars} attempted={attempted} solved={solved} total={3} />
      <CharacterCorner char={char} message={bocadillo} />
      {/* En R2 (lectura) el enunciado baja para acercarse a la hojita y
          equilibrar el espacio (el hueco de ~84px arriba quedaba enorme).
          120 deja libre la lectura más alta (top ~160) con margen. */}
      <GameEnunciado text={enunciado} top={ronda === 1 ? 120 : 86} />

      {ronda === 0 && (
        <ShooterCard
          pick={r1Pick}
          locked={r1Locked}
          onComplete={handleShooterDone}
        />
      )}

      {ronda === 1 && (
        <LecturaCard
          pick={r2Pick}
          choices={r2Choices}
          locked={r2Locked}
          onChoose={(gi, opt) => {
            if (r2Locked) return;
            setR2Choices((cs) => { const n = [...cs]; n[gi] = n[gi] === opt ? null : opt; return n; });
          }}
        />
      )}

      {ronda === 2 && (
        <RuletaCard
          pick={r3Pick}
          landed={r3Landed}
          choice={r3Choice}
          locked={r3Locked}
          onLanded={(p) => setR3Landed(p)}
          onChoose={(t) => {
            if (r3Locked || !r3Landed) return;
            setR3Choice(t);
            // Resalta y, si no cambia de idea en ~700 ms, califica sola.
            clearTimeout(r3AutoRef.current);
            r3AutoRef.current = setTimeout(() => gradeR3(t), 700);
          }}
        />
      )}

      <ActionRail
        canVerify={canVerify}
        onVerify={handleVerify}
        showVerify={ronda !== 0}
        hideVerify={ronda === 2}
        showErase={false}
        onErase={handleErase}
        onRestart={() => setConfirmingRestart(true)}
        onExit={() => setConfirmingExit(true)}
      />

      <FeedbackOverlay feedback={feedback} feedbackMsg={feedbackMsg} charName={char.name} />
      <RestartModal confirmingExit={confirmingRestart} setConfirmingExit={setConfirmingRestart} attempted={attempted} total={3} onRestart={onRestart} />
      <ExitModal confirmingExit={confirmingExit} setConfirmingExit={setConfirmingExit} attempted={attempted} total={3} onExit={() => go("home")} />
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// R1 · Shooter "cazapalabras" — caen palabras desde arriba. El niño toca
// las BIEN escritas (m antes de p/b) y deja caer las trampas con n. Al
// cazar la meta (R1_GOAL) la ronda se auto-resuelve (sin VERIFICAR, según
// el estándar de mecánicas tipo shooter).
// ─────────────────────────────────────────────────────────────
const R1_COLS = [18, 50, 82];   // centros de columna (% del carril) → sin overlap
const R1_TIME = 20;             // segundos: atrapas cuantas puedas en este tiempo

function ShooterCard({ pick, locked, onComplete }) {
  const [words, setWords] = useStateG([]);
  const [caught, setCaught] = useStateG(0);
  const [timeLeft, setTimeLeft] = useStateG(R1_TIME);
  const caughtRef = useRefG(0);
  const missRef = useRefG(0);
  const idRef = useRefG(0);
  const cursorRef = useRefG(0);   // recorre el pool barajado SIN repetir
  const doneRef = useRefG(false);

  function finish() {
    if (doneRef.current) return;
    doneRef.current = true;
    onComplete && onComplete(caughtRef.current, missRef.current);
  }

  // Spawner: mantiene cada columna POBLADA de forma pareja (varias palabras
  // escalonadas por columna, nunca encimadas). Solo deja entrar una palabra
  // nueva a una columna cuando la palabra de más arriba de esa columna ya
  // descendió > 38% del carril → el carril queda lleno y bien distribuido de
  // arriba a abajo, sin huecos ni amontonamientos. Toma la siguiente del pool
  // barajado (sin repetir hasta agotarlo).
  useEffectG(() => {
    if (locked) return;
    function spawn() {
      if (doneRef.current) return;
      const now = Date.now();
      setWords((ws) => {
        // Fracción recorrida por la palabra MÁS NUEVA (la de más arriba) de
        // cada columna = la de menor fracción.
        const topFrac = {};
        for (const w of ws) {
          const frac = (now - w.born) / (w.dur * 1000);
          if (topFrac[w.col] === undefined || frac < topFrac[w.col]) topFrac[w.col] = frac;
        }
        const free = R1_COLS.map((_, i) => i).filter(
          (i) => topFrac[i] === undefined || topFrac[i] > 0.38
        );
        if (free.length === 0) return ws;
        const col = free[Math.floor(Math.random() * free.length)];
        const item = pick.pool[cursorRef.current % pick.pool.length];
        cursorRef.current += 1;
        const ok = Math.random() < 0.55;
        const id = ++idRef.current;
        return [...ws, {
          id, text: ok ? item.ok : item.bad, ok, col,
          dur: 5.6 + Math.random() * 0.8, born: now, flash: null,
        }];
      });
    }
    spawn();
    const iv = setInterval(spawn, 560);
    return () => clearInterval(iv);
  }, [locked]);

  // Temporizador de la ronda: al llegar a 0 se cierra con lo cazado.
  useEffectG(() => {
    if (locked) return;
    const iv = setInterval(() => {
      setTimeLeft((t) => {
        if (t <= 1) { clearInterval(iv); finish(); return 0; }
        return t - 1;
      });
    }, 1000);
    return () => clearInterval(iv);
  }, [locked]);

  function remove(id) { setWords((ws) => ws.filter((w) => w.id !== id)); }

  function tap(w) {
    if (locked || doneRef.current || w.flash) return;
    if (w.ok) {
      caughtRef.current += 1;
      setCaught(caughtRef.current);
      setWords((ws) => ws.map((x) => (x.id === w.id ? { ...x, flash: "ok" } : x)));
      setTimeout(() => remove(w.id), 200);
    } else {
      missRef.current += 1;
      setWords((ws) => ws.map((x) => (x.id === w.id ? { ...x, flash: "bad" } : x)));
      setTimeout(() => remove(w.id), 300);
    }
  }

  const lowTime = timeLeft <= 8;

  return (
    <div data-qa="zona-central" style={{
      position: "absolute", top: 110, left: "50%", transform: "translateX(-50%)",
      width: 436, display: "flex", flexDirection: "column", alignItems: "center", gap: 10,
    }}>
      {/* Contador de cazadas + temporizador */}
      <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
        <div style={{
          display: "inline-flex", alignItems: "center", gap: 8,
          background: "rgba(0,0,0,0.3)", border: "1px solid rgba(242,194,96,0.45)",
          borderRadius: 999, padding: "4px 14px",
          fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 14, color: "#fce9a8",
        }}>
          🎯 Cazadas: {caught}
        </div>
        <div style={{
          display: "inline-flex", alignItems: "center", gap: 6,
          background: lowTime ? "rgba(220,80,80,0.35)" : "rgba(0,0,0,0.3)",
          border: `1px solid ${lowTime ? "#ff6b6b" : "rgba(242,194,96,0.45)"}`,
          borderRadius: 999, padding: "4px 14px",
          fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 14,
          color: lowTime ? "#ffd2d2" : "#fce9a8",
        }}>
          ⏱ {timeLeft}s
        </div>
      </div>

      {/* Carril de caída (3 columnas pobladas de forma pareja) */}
      <div data-qa="bandeja" style={{
        position: "relative", width: 436, height: 348, overflow: "hidden",
        borderRadius: 16,
        background: "rgba(8,40,30,0.35)",
        border: "1.5px dashed rgba(242,194,96,0.25)",
      }}>
        {words.map((w) => {
          const flashOk = w.flash === "ok";
          const flashBad = w.flash === "bad";
          return (
            <button key={w.id}
              data-ok={w.ok ? "1" : "0"}
              onClick={() => tap(w)}
              onAnimationEnd={() => { if (!w.flash) remove(w.id); }}
              style={{
                position: "absolute", left: R1_COLS[w.col] + "%", top: "-14%",
                transform: "translateX(-50%)",
                animation: `ed-fall ${w.dur}s linear forwards`,
                padding: "7px 13px", borderRadius: 12,
                border: `2px solid ${flashBad ? "#ff6b6b" : flashOk ? "#2ecc8f" : "rgba(116,72,32,0.3)"}`,
                background: flashBad
                  ? "linear-gradient(180deg,#ff6b6b,#dc5050)"
                  : flashOk
                  ? "linear-gradient(180deg,#2ecc8f,#22a06c)"
                  : "linear-gradient(180deg, rgba(255,250,235,0.97), rgba(244,232,205,0.95))",
                color: (flashOk || flashBad) ? "#fff" : "#3a2608",
                fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 18,
                cursor: "pointer", whiteSpace: "nowrap",
                boxShadow: (flashOk || flashBad)
                  ? "0 0 16px currentColor"
                  : "0 4px 10px rgba(0,0,0,0.35)",
              }}>
              {w.text}
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// R2 · Lectura con homófona — una oración (lectura) donde, según el
// contexto, el niño elige la palabra correcta de un par de homófonas
// que aparece INLINE como selector segmentado (estándar 6). Al fallar,
// la correcta queda en verde con ✓.
// ─────────────────────────────────────────────────────────────
function InlineHomofona({ options, choice, answer, locked, onChoose }) {
  const half = (opt) => {
    const isChoice = choice === opt;
    const isAnswer = opt === answer;
    let bg = "transparent", color = "rgba(116,72,32,0.6)";
    if (locked) {
      if (isAnswer) { bg = "#2ecc8f"; color = "#fff"; }
      else if (isChoice) { bg = "#ff6b6b"; color = "#fff"; }
    } else if (isChoice) { bg = "#4fa0ff"; color = "#fff"; }
    return (
      <span data-opt={opt}
        onClick={() => { if (!locked) onChoose(opt); }}
        style={{
          padding: "3px 13px", cursor: locked ? "default" : "pointer",
          background: bg, color, fontWeight: 800,
          display: "inline-flex", alignItems: "center", gap: 4,
          transition: "all 0.12s ease",
        }}>
        {opt}{locked && isAnswer ? " ✓" : ""}
      </span>
    );
  };
  return (
    <span style={{
      display: "inline-flex", alignItems: "stretch", margin: "0 5px",
      background: "rgba(255,255,255,0.95)",
      border: "2px solid #f2c260", borderRadius: 10, overflow: "hidden",
      verticalAlign: "middle", lineHeight: 1.1,
      boxShadow: "0 2px 6px rgba(0,0,0,0.2)",
    }}>
      {half(options[0])}
      <span style={{ width: 2, background: "rgba(116,72,32,0.22)" }} />
      {half(options[1])}
    </span>
  );
}

function LecturaCard({ pick, choices, locked, onChoose }) {
  // La lectura se ve como una HOJITA de papel rayado (renglones azules + margen
  // rojo + pin), texto SIN negrita. Angosta y centrada en la zona segura para
  // no chocar con el personaje de la izquierda ni el rail de la derecha.
  let g = -1;
  const LINE = 34; // alto de renglón (px) = lineHeight, alineado con las rayas
  return (
    <div data-qa="zona-central" style={{
      position: "absolute", top: 322, left: "50%", transform: "translate(-50%, -50%)",
      width: 392, display: "flex", flexDirection: "column", alignItems: "center",
    }}>
      <div data-qa="bandeja" style={{
        position: "relative",
        width: 392, boxSizing: "border-box",
        padding: `26px 24px 24px 42px`,
        borderRadius: 6,
        background: "#fbf7ec",
        backgroundImage: `repeating-linear-gradient(to bottom, transparent 0, transparent ${LINE - 1}px, rgba(86,120,194,0.28) ${LINE - 1}px, rgba(86,120,194,0.28) ${LINE}px)`,
        backgroundPosition: "0 30px",
        border: "1px solid rgba(0,0,0,0.12)",
        boxShadow: "0 16px 32px rgba(0,0,0,0.45)",
        transform: "rotate(-1.2deg)",
        fontFamily: "var(--ed-font-display)", fontWeight: 400, fontSize: 18,
        color: "#3a3a4a", lineHeight: `${LINE}px`, textAlign: "left",
      }}>
        {/* Pin de la hojita */}
        <div style={{
          position: "absolute", top: -9, left: "50%", transform: "translateX(-50%)",
          width: 16, height: 16, borderRadius: "50%",
          background: "radial-gradient(circle at 35% 30%, #ff8f8f, #d6463f)",
          boxShadow: "0 3px 6px rgba(0,0,0,0.4)", border: "1px solid rgba(0,0,0,0.15)",
        }} />
        {/* Margen rojo */}
        <div style={{
          position: "absolute", top: 0, bottom: 0, left: 30,
          width: 2, background: "rgba(214,93,77,0.45)",
        }} />
        {pick.parts.map((part, i) => {
          if (typeof part === "string") return <span key={i}>{part}</span>;
          g += 1;
          const gi = g;
          return (
            <InlineHomofona key={i}
              options={part.options}
              choice={choices[gi]}
              answer={part.answer}
              locked={locked}
              onChoose={(opt) => onChoose(gi, opt)}
            />
          );
        })}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// R3 · Ruleta de la fiesta — la rueda gira y sortea una frase. El niño
// dice si la frase es de lenguaje FORMAL o COLOQUIAL. Al fallar, la
// opción correcta queda en verde con ✓.
// ─────────────────────────────────────────────────────────────
const SECTOR_COLORS = ["#ef5a5a", "#4fa0ff", "#2ecc8f", "#f2a73b", "#a78bfa", "#ff8a3a"];
const SECTOR_EMOJIS = ["🎈", "🎂", "🎉", "🎁", "📨", "🎺"];

function polarTop(cx, cy, r, deg) {
  const rad = (deg * Math.PI) / 180; // 0 = arriba, sentido horario
  return [cx + r * Math.sin(rad), cy - r * Math.cos(rad)];
}
function sectorPath(cx, cy, r, a0, a1) {
  const [x0, y0] = polarTop(cx, cy, r, a0);
  const [x1, y1] = polarTop(cx, cy, r, a1);
  return `M${cx},${cy} L${x0.toFixed(2)},${y0.toFixed(2)} A${r},${r} 0 0 1 ${x1.toFixed(2)},${y1.toFixed(2)} Z`;
}

function RuletaCard({ pick, landed, choice, locked, onLanded, onChoose }) {
  const [rotation, setRotation] = useStateG(0);
  const [spinning, setSpinning] = useStateG(false);
  const spunRef = useRefG(false);
  const N = pick.phrases.length; // 6
  const seg = 360 / N;
  const R = 86, C = 96;

  function spin() {
    if (spinning || spunRef.current) return;
    spunRef.current = true;
    setSpinning(true);
    const targetIdx = Math.floor(Math.random() * N);
    const jitter = Math.random() * (seg - 24) - (seg - 24) / 2; // dentro del sector
    const newRot = 360 * 5 - targetIdx * seg + jitter;
    setRotation(newRot);
    setTimeout(() => {
      setSpinning(false);
      onLanded(pick.phrases[targetIdx]);
    }, 2350);
  }

  const classifyBtn = (type) => {
    const isChoice = choice === type;
    const isAnswer = landed && landed.type === type;
    let bg = "rgba(255,255,255,0.92)", border = "rgba(116,72,32,0.3)", color = "#3a2608", badge = null;
    if (locked) {
      if (isAnswer) {
        bg = "linear-gradient(180deg, rgba(46,204,143,0.95), rgba(34,160,108,0.95))";
        border = "#2ecc8f"; color = "#fff";
        badge = (
          <div style={{
            position: "absolute", top: -10, right: -10, width: 26, height: 26, borderRadius: "50%",
            background: "#2ecc8f", border: "2px solid #fff", color: "#fff",
            display: "flex", alignItems: "center", justifyContent: "center",
            fontSize: 15, fontWeight: 900, boxShadow: "0 2px 6px rgba(0,0,0,0.35)",
          }}>✓</div>
        );
      } else if (isChoice) {
        bg = "linear-gradient(180deg, rgba(255,107,107,0.95), rgba(220,80,80,0.95))";
        border = "#ff6b6b"; color = "#fff";
      } else {
        bg = "rgba(255,255,255,0.5)"; color = "rgba(58,38,8,0.6)";
      }
    } else if (isChoice) {
      bg = "linear-gradient(180deg,#fce9a8,#e9c45a)"; border = "#4fd8ff";
    }
    return (
      <button key={type}
        onClick={() => onChoose(type)}
        disabled={locked}
        style={{
          position: "relative",
          minWidth: 150, padding: "13px 20px", borderRadius: 14,
          border: `2.5px solid ${border}`, background: bg, color,
          fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 20,
          letterSpacing: "0.03em",
          cursor: locked ? "default" : "pointer",
          boxShadow: isChoice && !locked ? "0 0 18px rgba(79,216,255,0.6)" : "0 4px 12px rgba(0,0,0,0.3)",
          transform: isChoice && !locked ? "translateY(-2px)" : "none",
          transition: "all 0.15s ease",
        }}>
        {TYPE_LABEL[type]}
        {badge}
      </button>
    );
  };

  return (
    <div data-qa="zona-central" style={{
      position: "absolute", top: 118, left: "50%", transform: "translateX(-50%)",
      width: 436, display: "flex", flexDirection: "column", alignItems: "center", gap: 12,
    }}>
      {/* Ruleta + puntero */}
      <div data-qa="bandeja" style={{ position: "relative", width: 192, height: 200 }}>
        {/* Puntero */}
        <div style={{
          position: "absolute", top: -2, left: "50%", transform: "translateX(-50%)",
          width: 0, height: 0,
          borderLeft: "12px solid transparent", borderRight: "12px solid transparent",
          borderTop: "20px solid #fce9a8",
          filter: "drop-shadow(0 2px 3px rgba(0,0,0,0.5))", zIndex: 3,
        }} />
        {/* Rueda */}
        <div style={{
          position: "absolute", top: 12, left: 0, width: 192, height: 192,
          transition: spinning ? "transform 2.3s cubic-bezier(0.17,0.67,0.21,1)" : "none",
          transform: `rotate(${rotation}deg)`,
        }}>
          <svg viewBox="0 0 192 192" width="192" height="192" style={{ display: "block" }}>
            <circle cx={C} cy={C} r={R + 4} fill="#0b3a2d" stroke="#fce9a8" strokeWidth="3" />
            {pick.phrases.map((_, i) => (
              <path key={i}
                d={sectorPath(C, C, R, i * seg - seg / 2, i * seg + seg / 2)}
                fill={SECTOR_COLORS[i % SECTOR_COLORS.length]}
                stroke="rgba(255,255,255,0.5)" strokeWidth="1.5" />
            ))}
            {pick.phrases.map((_, i) => {
              const [ex, ey] = polarTop(C, C, R * 0.6, i * seg);
              return (
                <text key={`e${i}`} x={ex} y={ey + 7} textAnchor="middle"
                  style={{ fontSize: 22 }}>{SECTOR_EMOJIS[i % SECTOR_EMOJIS.length]}</text>
              );
            })}
            <circle cx={C} cy={C} r="14" fill="#fce9a8" stroke="#d9a441" strokeWidth="2" />
          </svg>
        </div>
      </div>

      {/* Antes de girar: botón GIRAR. Después: frase + clasificación. */}
      {!landed ? (
        <button
          onClick={spin}
          disabled={spinning}
          style={{
            marginTop: 4, padding: "12px 34px", borderRadius: 14,
            border: "2.5px solid #f2c260",
            background: spinning ? "rgba(255,255,255,0.4)" : "linear-gradient(180deg,#ffe97a,#d7b12a)",
            color: "#3a2608", fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 20,
            letterSpacing: "0.06em", cursor: spinning ? "default" : "pointer",
            boxShadow: "0 6px 16px rgba(0,0,0,0.35)",
          }}>
          {spinning ? "GIRANDO…" : "🎡 GIRAR"}
        </button>
      ) : (
        <>
          {/* Frase sorteada */}
          <div style={{
            width: "fit-content", maxWidth: 430,
            padding: "10px 18px", borderRadius: 14,
            background: "linear-gradient(180deg, rgba(255,255,255,0.96), rgba(240,235,225,0.92))",
            border: "3px solid #f2c260",
            fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 17,
            color: "#3a2608", textAlign: "center", lineHeight: 1.25,
            boxShadow: "0 10px 24px rgba(0,0,0,0.4)",
          }}>
            {landed.text}
          </div>
          {/* Clasificación */}
          <div style={{ display: "flex", gap: 16, justifyContent: "center" }}>
            {classifyBtn("formal")}
            {classifyBtn("coloquial")}
          </div>
        </>
      )}
    </div>
  );
}

// Enrutador por estado y device stage adaptativo (desktop / tablet / mobile).
// Móvil portrait: el contenido NUNCA rota; un overlay BLOQUEANTE obliga
// al usuario a girar físicamente el teléfono antes de poder usar la app.

const { useState: useStateA, useEffect: useEffectA, useRef: useRefA } = React;

// ─────────────────────────────────────────────────────────────
// useViewportSize — devuelve el tamaño REAL visible del viewport.
//
// En iOS Safari (y otros mobile browsers), `window.innerHeight` y `100vh`
// reportan la altura de la ventana INCLUYENDO la URL bar, así que el
// contenido escalado a esa altura termina parcialmente fuera de pantalla
// (ej: el numpad del juego queda debajo del fondo visible). La Visual
// Viewport API reporta el área verdaderamente visible y se actualiza
// cuando la URL bar se muestra/oculta.
// ─────────────────────────────────────────────────────────────
// Detección de "resize REAL" vs "zoom del navegador".
//
// Idea: el tamaño FÍSICO de la zona visible en píxeles del display es
// invariante al ctrl+rueda. Cuando subes el zoom de 100 % a 500 %:
//   · innerWidth en CSS-px se divide entre 5
//   · devicePixelRatio se multiplica por 5
//   · innerWidth × devicePixelRatio queda igual ⇒ NO hubo resize real.
//
// Cuando arrastras la esquina de la ventana o rotas el dispositivo:
//   · innerWidth en CSS-px cambia
//   · devicePixelRatio NO cambia
//   · innerWidth × devicePixelRatio cambia ⇒ SÍ hubo resize real.
//
// Por eso comparamos contra `innerWidth × devicePixelRatio` y solo
// actualizamos el state cuando ese producto cambia. Así el lienzo se
// queda con su tamaño CSS previo durante el zoom y el navegador lo
// amplifica visualmente — junto con los glifos, que ya leen `glyphSize`
// del mismo state defendido (ver DeviceStage).
//
// La defensa anterior (tracker de _lastDPR) era frágil: se actualizaba
// en CADA evento, así que si el navegador disparaba dos resize seguidos
// para la misma acción de zoom, el segundo veía el dpr ya guardado y
// recalculaba el tamaño con el viewport pequeño. Esto causaba que los
// glifos quedaran enormes mientras el lienzo se recomprimía.
function physicalSize() {
  if (typeof window === "undefined") return { w: 0, h: 0 };
  const dpr = window.devicePixelRatio || 1;
  return { w: window.innerWidth * dpr, h: window.innerHeight * dpr };
}
let _lastPhysical = physicalSize();

function useViewportSize() {
  const [size, setSize] = useStateA(() => readSize());
  useEffectA(() => {
    function onChange() {
      const phys = physicalSize();
      // Tolerancia de 4 px reales para absorber redondeos del navegador.
      if (Math.abs(phys.w - _lastPhysical.w) < 4 && Math.abs(phys.h - _lastPhysical.h) < 4) {
        // Mismo display, distinto zoom — no actualizamos el state.
        return;
      }
      _lastPhysical = phys;
      setSize(readSize());
    }
    window.addEventListener("resize", onChange);
    window.addEventListener("orientationchange", onChange);
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", onChange);
    }
    return () => {
      window.removeEventListener("resize", onChange);
      window.removeEventListener("orientationchange", onChange);
      if (window.visualViewport) {
        window.visualViewport.removeEventListener("resize", onChange);
      }
    };
  }, []);
  return size;
}
function readSize() {
  if (typeof window === "undefined") return { vw: 0, vh: 0 };
  const vv = window.visualViewport;
  // Cuando el usuario hace pinch-zoom, vv.scale > 1 y vv.width/height
  // reflejan la región visible (más pequeña). Usar esos valores haría
  // que la escala del lienzo se reduzca al hacer zoom — exactamente lo
  // contrario de lo que el usuario quiere. Solo confiamos en vv cuando
  // scale ≈ 1 (sin zoom) — ahí da una lectura más fiel que innerWidth/
  // Height en iOS Safari (descuenta correctamente la URL bar visible).
  if (vv && Math.abs(vv.scale - 1) < 0.05) {
    return { vw: vv.width, vh: vv.height };
  }
  return { vw: window.innerWidth, vh: window.innerHeight };
}

// ─────────────────────────────────────────────────────────────
// DeviceStage — escala el lienzo lógico 900×540 (paisaje) al viewport.
//
// Reglas:
//   · Desktop / tablet: sin marco, sin notch, fondo cósmico edge-to-edge.
//   · Mobile portrait: lienzo letterboxed Y overlay BLOQUEANTE "Gira el
//     teléfono". El contenido del juego no es accesible hasta que rote.
//   · Mobile landscape: lienzo escalado al viewport visible (visualViewport,
//     no innerHeight, para no clippearse debajo de la URL bar de iOS).
// ─────────────────────────────────────────────────────────────
function DeviceStage({ children, variant = "cosmic" }) {
  const W = 900, H = 540;
  const { vw, vh } = useViewportSize();
  const minSide = Math.min(vw, vh);
  const maxSide = Math.max(vw, vh);
  let mode = "desktop";
  if (maxSide < 820) mode = "mobile";
  else if (minSide < 820) mode = "tablet";
  const portrait = vh > vw;
  const baseScale = Math.max(Math.min(vw / W, vh / H), 0.15);

  // Detección de teléfono independiente del modo: cualquier dispositivo con
  // lado menor ≤ 600 CSS-px es un teléfono. Cubre todos los teléfonos
  // actuales (iPhone SE 320 → S25 Ultra/Pro Max ~432) con margen para
  // modelos futuros más anchos. La menor tablet (iPad mini 744) queda
  // bien por encima, así que no se rompe el caso "tablet portrait usable
  // letterboxed". Solo bloqueamos cuando teléfono Y portrait — el lienzo
  // paisaje queda demasiado pequeño para jugar.
  const isPhone = minSide <= 600;
  const lockPortrait = isPhone && portrait;

  // Tamaño de los glifos del fondo: equivalente al `clamp(48px, 7vmin, 110px)`
  // que tenía el CSS, pero calculado a partir del vw/vh DEFENDIDO contra
  // cambios de DPR. Esto evita que con ctrl+rueda del mouse los glifos
  // crezcan más rápido que el lienzo (el lienzo se congela vía la defensa
  // del DPR; si CSS lee el vmin actual, los glifos no se congelan y desync).
  const glyphSize = Math.max(48, Math.min(minSide * 0.07, 110));

  const debug = typeof window !== "undefined" && /(?:^|[#&])debug(?:&|$)/.test(window.location.hash || "");

  // ─── Pinch-zoom y pan custom ─────────────────────────────────
  // Reemplaza el zoom nativo del browser. Razón: con el lienzo letterboxed
  // dentro de un wrapper viewport-sized, el visual viewport del browser
  // puede panear hasta dejar al usuario mirando solo el cosmos vacío de los
  // bordes — el "rebote" reportado en iPhone (ver .planning/ios-zoom.md).
  // Aquí los gestos operan sobre el transform del lienzo, así que el zoom
  // siempre gravita alrededor del contenido y no deriva a un borde
  // decorativo.
  const wrapperRef = useRefA(null);
  const gestureRef = useRefA(null);
  const stateRef = useRefA({ userZoom: 1, pan: { x: 0, y: 0 } });
  const [userZoom, setUserZoom] = useStateA(1);
  const [pan, setPan] = useStateA({ x: 0, y: 0 });
  const [duringGesture, setDuringGesture] = useStateA(false);

  useEffectA(() => {
    stateRef.current = { userZoom, pan };
  }, [userZoom, pan]);

  // Reset al cambiar viewport (rotación, resize). Si no, el pan queda
  // referenciado a un viewport que ya no existe.
  useEffectA(() => {
    setUserZoom(1);
    setPan({ x: 0, y: 0 });
    setDuringGesture(false);
  }, [vw, vh]);

  useEffectA(() => {
    if (lockPortrait) return;
    const el = wrapperRef.current;
    if (!el) return;

    const Z_MIN = 1;
    const Z_MAX = 4;

    const dist = (a, b) => Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
    const mid = (a, b) => ({ x: (a.clientX + b.clientX) / 2, y: (a.clientY + b.clientY) / 2 });

    function clampPan(zoom, px, py) {
      // Pan máximo: la mitad del exceso del lienzo escalado sobre el viewport.
      // En zoom=1 el max es 0 (lienzo cabe en viewport, no hay donde panear).
      // En zoom=N el lienzo mide N veces el lado contain, así que el usuario
      // puede mover ±(sw - vw)/2 antes de que la orilla del lienzo cruce la
      // orilla del viewport. Esto evita perder el contenido fuera de pantalla.
      const sw = baseScale * zoom * W;
      const sh = baseScale * zoom * H;
      const maxX = Math.max(0, (sw - vw) / 2);
      const maxY = Math.max(0, (sh - vh) / 2);
      return {
        x: Math.max(-maxX, Math.min(maxX, px)),
        y: Math.max(-maxY, Math.min(maxY, py)),
      };
    }

    function applyState(z, px, py) {
      stateRef.current = { userZoom: z, pan: { x: px, y: py } };
      setUserZoom(z);
      setPan({ x: px, y: py });
    }

    function onTouchStart(e) {
      const { userZoom: z0, pan: p0 } = stateRef.current;
      if (e.touches.length >= 2) {
        const [t0, t1] = e.touches;
        gestureRef.current = {
          mode: "pinch",
          d0: dist(t0, t1),
          m0: mid(t0, t1),
          z0, p0: { ...p0 },
        };
        setDuringGesture(true);
        e.preventDefault();
      } else if (e.touches.length === 1) {
        const t = e.touches[0];
        gestureRef.current = {
          mode: "pan-armed",
          startX: t.clientX,
          startY: t.clientY,
          z0, p0: { ...p0 },
        };
        // No preventDefault — un tap simple debe seguir generando click.
      }
    }

    function onTouchMove(e) {
      const g = gestureRef.current;
      if (!g) return;

      // Si en medio de un gesto entra un segundo dedo, transición a pinch
      // tomando el estado actual como punto de partida.
      if (e.touches.length >= 2 && g.mode !== "pinch") {
        const [t0, t1] = e.touches;
        const { userZoom: zNow, pan: pNow } = stateRef.current;
        gestureRef.current = {
          mode: "pinch",
          d0: dist(t0, t1),
          m0: mid(t0, t1),
          z0: zNow, p0: { ...pNow },
        };
        setDuringGesture(true);
        e.preventDefault();
        return;
      }

      if (e.touches.length >= 2 && g.mode === "pinch") {
        const [t0, t1] = e.touches;
        const d = dist(t0, t1);
        const m = mid(t0, t1);
        const ratio = d / g.d0;
        // Permitimos pasar transitoriamente bajo Z_MIN para sensación elástica
        // durante el gesto; en touchend hacemos snap-back al rango válido.
        const newZoom = Math.max(Z_MIN * 0.7, Math.min(Z_MAX * 1.05, g.z0 * ratio));
        const r = newZoom / g.z0;
        const ux = g.m0.x - vw / 2;
        const uy = g.m0.y - vh / 2;
        // Fórmula que mantiene el punto medio de la pinza anclado al mismo
        // píxel del lienzo durante todo el gesto. Derivación:
        //   panX_new = (mx0 - vw/2) + (newZoom/z0) * (panX0 - (mx0 - vw/2))
        //              + (mx_now - mx0)   ← desplazamiento del propio gesto
        const newPanX = ux + r * (g.p0.x - ux) + (m.x - g.m0.x);
        const newPanY = uy + r * (g.p0.y - uy) + (m.y - g.m0.y);
        applyState(newZoom, newPanX, newPanY);
        e.preventDefault();
      } else if (e.touches.length === 1 && g.mode === "pan-armed") {
        if (g.z0 <= 1.001) return; // sin zoom no panea — dejamos pasar el tap
        const t = e.touches[0];
        const dx = t.clientX - g.startX;
        const dy = t.clientY - g.startY;
        if (Math.hypot(dx, dy) > 8) {
          gestureRef.current = { ...g, mode: "pan" };
          setDuringGesture(true);
          e.preventDefault();
        }
      } else if (e.touches.length === 1 && g.mode === "pan") {
        const t = e.touches[0];
        const dx = t.clientX - g.startX;
        const dy = t.clientY - g.startY;
        applyState(g.z0, g.p0.x + dx, g.p0.y + dy);
        e.preventDefault();
      }
    }

    function onTouchEnd(e) {
      const g = gestureRef.current;
      if (!g) return;
      if (e.touches.length === 0) {
        const { userZoom: z, pan: p } = stateRef.current;
        const clampedZ = Math.max(Z_MIN, Math.min(Z_MAX, z));
        let cp;
        if (clampedZ <= 1.001) {
          cp = { x: 0, y: 0 };
        } else {
          cp = clampPan(clampedZ, p.x, p.y);
        }
        applyState(clampedZ, cp.x, cp.y);
        setDuringGesture(false);
        gestureRef.current = null;
      }
    }

    el.addEventListener("touchstart", onTouchStart, { passive: false });
    el.addEventListener("touchmove", onTouchMove, { passive: false });
    el.addEventListener("touchend", onTouchEnd, { passive: false });
    el.addEventListener("touchcancel", onTouchEnd, { passive: false });

    return () => {
      el.removeEventListener("touchstart", onTouchStart);
      el.removeEventListener("touchmove", onTouchMove);
      el.removeEventListener("touchend", onTouchEnd);
      el.removeEventListener("touchcancel", onTouchEnd);
    };
  }, [vw, vh, baseScale, lockPortrait]);

  const totalScale = baseScale * userZoom;

  return (
    <div ref={wrapperRef} style={{
      width: "100vw", height: "100dvh",
      minHeight: "-webkit-fill-available",
      overflow: "hidden",
      position: "relative",
      background: variant === "chalkboard" ? "#0b3a2d" : "#050214",
      // `touch-action: none` desactiva todos los gestos que el browser
      // interpretaría por su cuenta (pinch, pan, doble-tap-zoom). Los
      // implementamos en JS sobre el transform del lienzo para que el
      // zoom siempre quede anclado al contenido y nunca derive a los
      // bordes letterbox del wrapper. Los click/tap en botones siguen
      // funcionando — esto solo bloquea gestos del browser, no eventos.
      touchAction: "none",
    }}>
      <CosmosBg variant={variant} glyphSize={glyphSize} />

      {/* Lienzo lógico 900×540 centrado y escalado.
          El transform combina el escalado base (contain del viewport),
          el zoom del usuario y el pan acumulado. El orden CSS es
          right-to-left: scale → translate(pan) → translate(-50%,-50%). */}
      <div style={{
        width: W, height: H,
        position: "absolute",
        left: "50%", top: "50%",
        transform: `translate(-50%, -50%) translate(${pan.x}px, ${pan.y}px) scale(${totalScale})`,
        transformOrigin: "center center",
        overflow: "hidden",
        // Sin transición durante el gesto activo (el lienzo sigue la pinza
        // al instante); con transición elástica al soltar, para que el
        // snap-back de zoom/pan a los límites válidos no sea abrupto.
        transition: duringGesture ? "none" : "transform 0.22s cubic-bezier(0.2, 0.8, 0.2, 1)",
        willChange: "transform",
      }}>
        {children}
      </div>

      {lockPortrait && <RotateLockOverlay />}
      {debug && (
        <div style={{
          position: "fixed", top: 6, left: 6, zIndex: 999999,
          background: "rgba(0,0,0,0.85)", color: "#0f0",
          font: "11px ui-monospace,Menlo,monospace",
          padding: "6px 8px", borderRadius: 6,
          maxWidth: "90vw", whiteSpace: "pre",
          pointerEvents: "none",
        }}>
{`vw=${vw} vh=${vh}
min=${minSide} max=${maxSide}
mode=${mode} portrait=${portrait}
isPhone=${isPhone} LOCK=${lockPortrait}
zoom=${userZoom.toFixed(2)} pan=${pan.x.toFixed(0)},${pan.y.toFixed(0)}
vv=${typeof window!=="undefined" && window.visualViewport ? "yes" : "no"}
ua=${(typeof navigator!=="undefined" ? navigator.userAgent : "?").slice(0,60)}`}
        </div>
      )}
    </div>
  );
}

// Overlay bloqueante de rotación. En mobile portrait cubre toda la pantalla
// con un mensaje claro y un ícono animado. NO se puede descartar — el usuario
// DEBE girar el dispositivo para acceder al juego. Se desmonta solo cuando
// el viewport pasa a landscape.
function RotateLockOverlay() {
  return (
    <div
      role="dialog"
      aria-modal="true"
      aria-label="Gira tu teléfono para jugar"
      style={{
        position: "fixed", inset: 0, zIndex: 99999,
        background: "linear-gradient(180deg,#050214 0%,#0a0628 100%)",
        display: "flex", flexDirection: "column",
        alignItems: "center", justifyContent: "center",
        textAlign: "center", padding: "32px 24px",
        color: "#fce9a8",
        fontFamily: "var(--ed-font-display, system-ui)",
      }}
    >
      <div
        style={{
          width: 132, height: 132, marginBottom: 28,
          display: "flex", alignItems: "center", justifyContent: "center",
          animation: "ed-rotate-lock 2.4s ease-in-out infinite",
        }}
        aria-hidden="true"
      >
        {/* Ícono de teléfono que rota */}
        <svg viewBox="0 0 100 100" width="120" height="120" fill="none">
          <rect x="36" y="14" width="28" height="72" rx="6"
                stroke="#f2c260" strokeWidth="3" fill="rgba(242,194,96,0.08)" />
          <rect x="42" y="22" width="16" height="48" rx="2" fill="rgba(242,194,96,0.18)" />
          <circle cx="50" cy="78" r="2.5" fill="#f2c260" />
        </svg>
      </div>
      <div style={{
        fontWeight: 800,
        fontSize: "clamp(18px, 5.2vw, 26px)",
        lineHeight: 1.15,
        textTransform: "uppercase", letterSpacing: "0.02em",
        marginBottom: 12,
      }}>
        Gira tu teléfono
      </div>
      <div style={{
        fontWeight: 500,
        fontSize: "clamp(13px, 4vw, 16px)",
        lineHeight: 1.4,
        color: "rgba(252,233,168,0.78)",
        maxWidth: "min(320px, 80vw)",
      }}>
        Pon tu teléfono de lado para jugar.
      </div>
      <style>{`
        @keyframes ed-rotate-lock {
          0%   { transform: rotate(0deg); }
          45%  { transform: rotate(0deg); }
          70%  { transform: rotate(-90deg); }
          100% { transform: rotate(-90deg); }
        }
      `}</style>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// App principal
// ─────────────────────────────────────────────────────────────
function App() {
  const [route, setRoute] = useStateA("home");
  const [app, setApp] = useStateA({
    studentName: "",
    character: "narrador",
    level: "chistes",
    stars: 0,
    sessionStart: Date.now(),
    gameSeed: 0,
  });

  function go(r) {
    // Al (re)entrar al juego, regeneramos la seed para que GameScreen se remonte
    // y reinicie ronda, tiempo, racha, etc. También reseteamos las estrellas:
    // cada partida empieza desde 0, no acumula entre rondas.
    if (r === "game") {
      setApp((s) => ({ ...s, gameSeed: (s.gameSeed || 0) + 1, stars: 0 }));
    }
    setRoute(r);
  }

  const screenProps = { app, setApp, go };

  let Screen = window.HomeScreen;
  if (route === "character") Screen = window.CharacterScreen;
  else if (route === "game") Screen = window.GameScreen;
  else if (route === "results") Screen = window.ResultsScreen;

  const variant = route === "game" ? "chalkboard" : "cosmic";

  return (
    <DeviceStage variant={variant}>
      <Screen key={route === "game" ? `game-${app.gameSeed}` : route} {...screenProps} />
    </DeviceStage>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>
</body>
</html>
