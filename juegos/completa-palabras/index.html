// ─────────────────────────────────────────────────────────────
// Sparkles — chispas animadas alrededor del personaje. Refuerzan
// la estética cósmica heredada del shell.
// ─────────────────────────────────────────────────────────────
function Sparkles({ color = "#fce9a8", count = 6, seed = 1 }) {
  const pts = Array.from({ length: count }, (_, i) => {
    const a = (i * 360) / count + seed * 37;
    const r = 70 + (i % 3) * 8;
    const x = 100 + Math.cos((a * Math.PI) / 180) * r;
    const y = 100 + Math.sin((a * Math.PI) / 180) * r;
    const s = 2 + (i % 3);
    return { x, y, s, delay: i * 0.35 };
  });
  return (
    <g>
      {pts.map((p, i) => (
        <g key={i} transform={`translate(${p.x} ${p.y})`}>
          <circle r={p.s} fill={color} opacity="0.9">
            <animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" begin={`${p.delay}s`} repeatCount="indefinite" />
          </circle>
        </g>
      ))}
    </g>
  );
}

// ─────────────────────────────────────────────────────────────

function makeCharacter(id, sparkleColor, sparkleSeed) {

            display: "block",

            overflow: "visible",
          }}
        >
          <Sparkles color={sparkleColor} count={6} seed={sparkleSeed} />
        </svg>
      </div>
    );
  };
}

function CosmosBg({ variant = "cosmic", glyphSize }) {
  const glyphsStyle = glyphSize ? { fontSize: glyphSize + "px" } : undefined;
  if (variant === "chalkboard") {
    // Pantalla de juego (pizarra verde). 10 glifos mezclados.
    return (
      <div
        style={{
          position: "absolute",
          inset: 0,
          background:
            "radial-gradient(ellipse at center, #3a9b7a 0%, #1d6b53 55%, #0b3a2d 100%)",
          overflow: "hidden",
        }}
      >
        <div className="ed-glyphs" style={{ color: "rgba(255,255,255,0.10)", ...glyphsStyle }}>
          {CHALK_GLYPHS.map((g, i) => (
            <span key={i} style={{
              left: g.l, top: g.t, "--rot": g.r,
              ...(g.s ? { fontSize: g.s } : {}),
            }}>{g.c}</span>
          ))}
        </div>
      </div>
    );
  }
  // Pantallas de marco cósmico (home/character/results). 15 glifos mezclados.
  return (
    <>
      <div className="ed-cosmos" />
      <div className="ed-glyphs" style={glyphsStyle}>
        {COSMIC_GLYPHS.map((g, i) => (
          <span key={i} style={{
            left: g.l, top: g.t, "--rot": g.r,
            ...(g.s ? { fontSize: g.s } : {}),
          }}>{g.c}</span>
        ))}
      </div>
    </>
  );
}

// ─────────────────────────────────────────────────────────────
// Contador de visitantes (compartido entre juegos del repo via
// localStorage). Mismo contrato que el shell matemático.
// ─────────────────────────────────────────────────────────────
function useVisitorCount() {
  const KEY = "edinun_visitors_v1";
  const [n, setN] = useState(() => {
    const raw = localStorage.getItem(KEY);
    const v = raw ? parseInt(raw, 10) : 0;
    return isNaN(v) ? 0 : v;
  });
  useEffect(() => {
    function onUpdate() {
      const raw = localStorage.getItem(KEY);
      const v = raw ? parseInt(raw, 10) : 0;
      if (!isNaN(v)) setN(v);
    }
    window.addEventListener("edinun:visitors-updated", onUpdate);
    return () => window.removeEventListener("edinun:visitors-updated", onUpdate);
  }, []);
  return n;
}

function markFirstAttempt() {
  const KEY = "edinun_visitors_v1";
  const SESSION_FLAG = "edinun_visit_counted_v1";
  if (sessionStorage.getItem(SESSION_FLAG) === "1") return;
  const raw = localStorage.getItem(KEY);
  const current = raw ? parseInt(raw, 10) : 0;
  const next = (isNaN(current) ? 0 : current) + 1;
  localStorage.setItem(KEY, String(next));
  sessionStorage.setItem(SESSION_FLAG, "1");
  window.dispatchEvent(new Event("edinun:visitors-updated"));
}

function incrementGamesCompleted() {
  const KEY = "edinun_games_completed_v1";
  const raw = localStorage.getItem(KEY);
  const next = (raw ? parseInt(raw, 10) : 0) + 1;
  localStorage.setItem(KEY, String(next));
  window.dispatchEvent(new Event("edinun:games-updated"));
  return next;
}

// ─────────────────────────────────────────────────────────────
// 1. HOME — selección de tema + nombre + ENTRAR.
// El usuario debe elegir uno de los 2 niveles ANTES de poder ingresar.
// Conserva el layout 2 columnas (logo izq, formulario der) del shell.
// ─────────────────────────────────────────────────────────────
function HomeScreen({ app, setApp, go }) {
  const visitors = useVisitorCount();
  const [name, setName] = useState(app.studentName || "");
  // El tema arranca sin selección — se exige clic explícito.
  const [level, setLevel] = useState(
    app.level && LEVELS_CFG.some((l) => l.id === app.level) ? app.level : null
  );

  const canStart = !!name.trim() && !!level;
  const currentCfg = LEVELS_CFG.find((l) => l.id === level) || null;

  function start() {
    if (!canStart) return;
    setApp((s) => ({
      ...s,
      studentName: name.trim(),
      level,
      sessionStart: Date.now(),
    }));
    go("character");
  }

  return (
    <div style={{ position: "absolute", inset: 0, overflow: "hidden" }}>
      {/* Contador de visitantes (abajo derecha) */}
      <div style={{
        position: "absolute", bottom: 18, right: 22,
        display: "flex", alignItems: "center", gap: 8,
        background: "rgba(10,6,35,0.55)",
        border: "1px solid rgba(242,194,96,0.3)",
        borderRadius: 999, padding: "6px 12px",
        backdropFilter: "blur(8px)",
      }}>
        <PeopleIcon size={16} color="#fce9a8" />
        <div style={{ fontFamily: "var(--ed-font-mono)", fontSize: 11, color: "#f2c260", letterSpacing: "0.06em" }}>
          {visitors.toLocaleString("es-CO")}
          <span style={{ color: "rgba(246,241,255,0.55)", marginLeft: 6 }}>visitas</span>
        </div>
      </div>

      {/* Contenido principal — 2 columnas */}
      <div style={{
        position: "absolute", inset: 0,
        display: "grid",
        gridTemplateColumns: "1fr 1.15fr",
        alignItems: "center",
        padding: "32px 48px",
        gap: 32,
      }}>
        {/* Izquierda — logo protagonista */}
        <div style={{ position: "relative", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
          <EdinunLogo size={280} />
        </div>

        {/* Derecha — saludo + chips de tema + descripción + nombre + ENTRAR */}
        <div style={{ display: "flex", flexDirection: "column", gap: 16, maxWidth: 520 }}>
          <div>
            <div className="ed-label" style={{ color: "#4fd8ff", marginBottom: 6 }}>
              El taller de las letras
            </div>
            <h1 className="ed-h1" style={{ fontSize: 36, lineHeight: 1.05 }}>
              ¡Bienvenido/a,{" "}
              <span style={{
                background: "linear-gradient(180deg,#fce9a8,#d9a441)",
                WebkitBackgroundClip: "text",
                WebkitTextFillColor: "transparent",
                fontWeight: 600,
              }}>
                Estudiante!
              </span>
            </h1>
          </div>

          {/* Chips de tema — 2 columnas. Cada chip muestra el glifo de letras
              grande arriba (estilo "tarjeta de letra" del libro escolar) y la
              etiqueta abajo. Selección visible con borde blanco y elevación. */}
          <div>
            <div className="ed-label" style={{ marginBottom: 8 }}>
              Selecciona un tema para jugar
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              {LEVELS_CFG.map((lv) => {
                const active = level === lv.id;
                return (
                  <button
                    key={lv.id}
                    onClick={() => setLevel(lv.id)}
                    style={{
                      padding: "20px 12px",
                      borderRadius: 16,
                      background: lv.grad,
                      color: lv.ink,
                      fontFamily: "var(--ed-font-display)", fontWeight: 800,
                      fontSize: 22, letterSpacing: "0.02em",
                      lineHeight: 1.1,
                      textShadow: "0 1px 0 rgba(255,255,255,0.35)",
                      border: "none",
                      boxShadow: active
                        ? "inset 0 1px 0 rgba(255,255,255,0.55), inset 0 -3px 0 rgba(0,0,0,0.2), 0 0 0 3px rgba(255,255,255,0.85), 0 0 26px rgba(255,255,255,0.35)"
                        : "inset 0 1px 0 rgba(255,255,255,0.4), inset 0 -3px 0 rgba(0,0,0,0.18), 0 6px 14px -4px rgba(0,0,0,0.45)",
                      transform: active ? "translateY(-2px)" : "none",
                      transition: "all 0.18s ease",
                      cursor: "pointer",
                    }}
                  >
                    {lv.label}
                  </button>
                );
              })}
            </div>
            {/* Descripción del tema seleccionado (placeholder si no hay) */}
            <div style={{
              marginTop: 10,
              padding: "10px 14px",
              borderRadius: 12,
              background: "rgba(10,6,35,0.55)",
              border: `1px solid ${currentCfg ? "rgba(148,120,255,0.3)" : "rgba(148,120,255,0.18)"}`,

                ENTRAR →

            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// 2. SELECCIÓN DE PERSONAJE — idéntico al shell, default Rolli.
// Mapea el nivel elegido en Home al catId/catLabel que GameScreen
// usa para seleccionar banco de palabras, bandeja y copy.
// ─────────────────────────────────────────────────────────────
function CharacterScreen({ app, setApp, go }) {
  const [sel, setSel] = useState(app.character || "escritor");
  const current = CHARACTERS.find((c) => c.id === sel) || CHARACTERS[0];

  function choose() {
    const lvCfg = LEVELS_CFG.find((l) => l.id === app.level) || LEVELS_CFG[0];
    setApp((s) => ({
      ...s,

// Bandeja del nivel VOCALES: las 5 vocales en minúsculas. Cada ficha es

const VOWEL_TRAY = ["a", "e", "i", "o", "u"];

function isVowel(ch) {

}

// ─────────────────────────────────────────────────────────────

// al menos una "v" minúscula (puede haber 2, como en "vivienda").

// Selección guiada por el libro escolar de 6 años (ejercicio 3 y
// tabla de sílabas de la letra V) + palabras frecuentes con V interior.

// Bandeja del nivel LETRA V: V (correcta) + 4 distractores fijos.
// B suena parecido (/b/ ≡ /v/ en español); F, N, U son confundibles
// visualmente para un niño de 6 años. La V está reutilizable porque
// algunas palabras (vivienda) tienen 2 slots.
const LETTER_V_TRAY = ["v", "b", "f", "n", "u"];

function isLetterV(ch) {
  return ch === "v";
}

// ─────────────────────────────────────────────────────────────
// Configuración por categoría. Cada nivel define su banco, bandeja,
// función que decide qué letras son slot, clave de localStorage para
// la memoria de palabras recientes, y los textos (instrucción y pista)
// que se muestran en GameScreen.
// El catId viene de `app.currentCategory`, seteado por CharacterScreen
// desde el LEVELS_CFG de screens.jsx.
// ─────────────────────────────────────────────────────────────
const CATEGORIES = {
  vocales: {
    bank: WORD_BANK_VOCALES,
    tray: VOWEL_TRAY,
    isSlot: isVowel,
    recentKey: "edinun_completa_palabras_vocales_recientes_v1",
    instruction: "Completa la palabra usando las vocales.",
    hint: "Toca cada vocal en su lugar.",
  },
  letraV: {
    bank: WORD_BANK_LETRA_V,
    tray: LETTER_V_TRAY,
    isSlot: isLetterV,
    recentKey: "edinun_completa_palabras_letra_v_recientes_v1",
    instruction: "Completa la palabra con la letra V.",
    hint: "Toca la V donde corresponde.",
  },
};

// ─────────────────────────────────────────────────────────────
// Memoria de palabras vistas recientemente — persistida en localStorage
// para que las rondas consecutivas no repitan palabras (antes el set se
// reiniciaba cada vez que GameScreen se remontaba). Mantiene una cola
// FIFO de las últimas RECENT_LIMIT palabras POR CATEGORÍA (clave en
// cfg.recentKey). Vocales y Letra V tienen buffers independientes.
// ─────────────────────────────────────────────────────────────
const RECENT_LIMIT = 10;

function getRecentlySeen(recentKey) {
  try {
    const raw = localStorage.getItem(recentKey);
    if (!raw) return [];
    const arr = JSON.parse(raw);
    return Array.isArray(arr) ? arr : [];
  } catch { return []; }
}

function pushRecentlySeen(recentKey, word) {
  const arr = getRecentlySeen(recentKey).filter((w) => w !== word);
  arr.unshift(word);
  const trimmed = arr.slice(0, RECENT_LIMIT);
  try { localStorage.setItem(recentKey, JSON.stringify(trimmed)); } catch {}
}

// ─────────────────────────────────────────────────────────────
// Generador de problemas. Recibe el id de categoría (vocales o letraV)
// y un set de palabras ya usadas en la ronda. Aplica el filtro de
// recientes (de localStorage) sobre el banco de esa categoría y oculta
// solo las letras que cumplan `cfg.isSlot` (vocales o V según el caso).
// ─────────────────────────────────────────────────────────────
function makeProblem(catId, usedKeys) {
  const cfg = CATEGORIES[catId] || CATEGORIES.vocales;

  // Doble filtro: palabras usadas EN ESTA RONDA (usedKeys, in-memory) +
  // las RECENT_LIMIT vistas recientemente entre rondas (localStorage,
  // namespaced por categoría). Así se evita repetición intra-ronda y
  // entre rondas/sesiones dentro del mismo nivel.
  const recent = new Set(getRecentlySeen(cfg.recentKey));
  const exclude = new Set([...usedKeys, ...recent]);
  let pool = cfg.bank.filter((w) => !exclude.has(w.word));
  // Si la exclusión deja poco margen (ej. tras varias rondas seguidas
  // sin recargar), relajar las recientes y conservar solo las de la
  // ronda actual.
  if (pool.length < 3) {
    pool = cfg.bank.filter((w) => !usedKeys.has(w.word));
  }
  if (pool.length === 0) pool = cfg.bank;
  const pick = pool[Math.floor(Math.random() * pool.length)];
  const word = pick.word;
  const letters = word.split("");
  const n = letters.length;

  // Se ocultan TODAS las letras que cumplan `cfg.isSlot`. En vocales =
  // todas las vocales; en letraV = todas las V's (1 o 2 por palabra).
  const hiddenIdxArr = [];
  for (let i = 0; i < n; i++) {
    if (cfg.isSlot(letters[i])) hiddenIdxArr.push(i);
  }
  const correctLetters = hiddenIdxArr.map((i) => letters[i]);

  // Respuestas aceptadas: la palabra principal + sus alternativas
  // (masculino/femenino o regional). Todas comparten el mismo
  // esqueleto consonántico, así que las casillas mostradas son
  // idénticas — solo varía qué letra cuenta como correcta en cada
  // posición.
  const acceptedWords = [word, ...(pick.alts || [])];

  return {
    emoji: pick.emoji,
    word,                    // string base (la que se muestra)
    letters,                 // array de chars
    hiddenIdx: hiddenIdxArr, // índices que el usuario debe completar
    correctLetters,          // letras objetivo (en orden de hiddenIdx)
    acceptedWords,           // todas las grafías válidas
    tray: cfg.tray,          // bandeja específica de la categoría
  };
}

// ─────────────────────────────────────────────────────────────
// Frases motivadoras para feedback de error. Adaptadas a lenguaje.
// ─────────────────────────────────────────────────────────────
const ENCOURAGEMENTS = [
  "¡Casi! Sigue intentándolo.",
  "Las palabras no muerden 📖",
  "¡La próxima es tuya!",
  "Equivocarse también es aprender.",
  "Las letras son una aventura.",
  "¡Vamos a la siguiente!",
  "Cada error te acerca al acierto.",
];

function GameScreen({ app, setApp, go }) {
  const char = CHARACTERS.find((c) => c.id === app.character) || CHARACTERS[0];
  // catId define banco/bandeja/copy. Si por alguna razón no llegó desde
  // CharacterScreen, asumimos vocales (juego original, retrocompatible).
  const catId = CATEGORIES[app.currentCategory] ? app.currentCategory : "vocales";
  const catCfg = CATEGORIES[catId];
  const catLabel = app.currentCatLabel || (catId === "letraV" ? "Letra V" : "Completa la palabra con vocales");

  // Llevar registro de palabras ya usadas en la sesión actual para no repetir.
  const usedRef = useRefG(new Set());
  const [problem, setProblem] = useStateG(() => {
    const p = makeProblem(catId, usedRef.current);
    usedRef.current.add(p.word);
    pushRecentlySeen(catCfg.recentKey, p.word);
    return p;
  });
  // `filled` es paralelo a `problem.hiddenIdx`: la letra que el usuario puso
  // en cada posición oculta (undefined = vacía). Las fichas de la bandeja
  // son reutilizables — la misma vocal puede colocarse varias veces.
  const [filled, setFilled] = useStateG([]);

  const [elapsed, setElapsed] = useStateG(0);
  const [stars, setStars] = useStateG(0);
  const [solved, setSolved] = useStateG(0);
  const [attempted, setAttempted] = useStateG(0);
  const [starsSession, setStarsSession] = useStateG(0);
  const [feedback, setFeedback] = useStateG(null);
  const [feedbackMsg, setFeedbackMsg] = useStateG("");
  const [confirmingExit, setConfirmingExit] = useStateG(false);
  const [confirmingRestart, setConfirmingRestart] = useStateG(false);
  // pendingLevel: id del nivel al que se quiere cambiar desde los chips
  // del HUD. Null = no hay cambio pendiente. La acción es destructiva
  // (pierde la ronda), por eso pasa por modal de confirmación.
  const [pendingLevel, setPendingLevel] = useStateG(null);
  const [log, setLog] = useStateG([]);

  // LEVELS_CFG vive en screens.jsx y se expone vía window. Lo leemos aquí
  // para renderizar los chips del HUD y mapear el cambio de nivel.
  const levels = (typeof LEVELS_CFG !== "undefined" && LEVELS_CFG) || (window.LEVELS_CFG || []);

  function requestSwitchLevel(lvId) {
    if (lvId === catId) return; // ya estás ahí
    setPendingLevel(lvId);
  }

  function confirmSwitchLevel() {
    if (!pendingLevel) return;
    const cfg = levels.find((l) => l.id === pendingLevel);
    if (!cfg) { setPendingLevel(null); return; }
    // Bump gameSeed para que App remonte GameScreen con la nueva categoría
    // (mismo patrón que `go("game")` en app.jsx). Reset de estrellas
    // porque cada partida arranca en 0.
    setApp((s) => ({
      ...s,
      level: cfg.id,
      currentCategory: cfg.id,
      currentCatLabel: cfg.catLabel,
      stars: 0,
      gameSeed: (s.gameSeed || 0) + 1,
    }));
    setPendingLevel(null);
  }

  // Reinicia la sesión manteniendo el nivel actual. Bump gameSeed para que
  // App remonte GameScreen con estado fresco (palabra nueva, 0/3 rondas).
  function confirmRestart() {
    setApp((s) => ({
      ...s,
      stars: 0,
      gameSeed: (s.gameSeed || 0) + 1,
    }));
    setConfirmingRestart(false);
  }

  const started = useRefG(Date.now());
  const exerciseStart = useRefG(Date.now());

  useEffectG(() => {
    const id = setInterval(() => {
      setElapsed(Math.floor((Date.now() - started.current) / 1000));
    }, 500);
    return () => clearInterval(id);
  }, []);

  function pressLetter(letter) {
    // Calcular el siguiente slot vacío DENTRO del setter para que el state
    // sea consistente cuando el usuario toca varias vocales seguidas muy
    // rápido (palabras con 2-3 vocales ocultas). Antes había bug: dos
    // pressLetter consecutivos veían el mismo `filled` viejo y escribían
    // al mismo slot.
    setFilled((prev) => {
      const len = problem.hiddenIdx.length;
      const next = [...prev];
      while (next.length < len) next.push(undefined);
      for (let i = 0; i < len; i++) {
        if (next[i] === undefined) { next[i] = letter; return next; }
      }
      return prev; // todas llenas, no hacer nada
    });
  }

  function eraseSlot(slotIdx) {
    setFilled((prev) => {
      const next = [...prev];
      while (next.length < problem.hiddenIdx.length) next.push(undefined);
      next[slotIdx] = undefined;
      return next;
    });
  }

  function erase() {
    // Borra la última letra colocada (el primer slot lleno empezando por la derecha).
    for (let i = problem.hiddenIdx.length - 1; i >= 0; i--) {
      if (filled[i] !== undefined) {
        eraseSlot(i);
        return;
      }
    }
  }

  function verify() {
    const allFilled = problem.hiddenIdx.every((_, i) => filled[i] !== undefined);
    if (!allFilled) {
      setFeedback("err");
      setFeedbackMsg("Completa todas las letras");
      setTimeout(() => { setFeedback(null); setFeedbackMsg(""); }, 700);
      return;
    }
    if (typeof window.markFirstAttempt === "function") window.markFirstAttempt();

    // Reconstruir la palabra del usuario.
    const userLetters = problem.letters.slice();
    problem.hiddenIdx.forEach((wordPos, i) => {
      userLetters[wordPos] = filled[i];
    });
    const userWord = userLetters.join("");
    // Aceptar la palabra base O cualquiera de sus alternativas
    // (masculino/femenino, regionalismo). Ej: "pato" o "pata"; "banana"
    // o "banano".
    const accepted = problem.acceptedWords || [problem.word];
    const isCorrect = accepted.includes(userWord);
    const exerciseSec = Math.max(0, Math.floor((Date.now() - exerciseStart.current) / 1000));
    const earned = isCorrect ? Math.max(1, 10 - Math.floor(exerciseSec / 3)) : 0;

    const newAttempted = attempted + 1;
    const newSolved = solved + (isCorrect ? 1 : 0);
    const newStarsSession = starsSession + earned;
    const newStarsTotal = stars + earned;

    // Para el reporte: si la palabra acepta variantes, mostrar todas
    // separadas por " o " (ej. "banana o banano", "gato o gata"). Si solo
    // hay una grafía válida, mostrar esa.
    const displayCorrect = accepted.length > 1 ? accepted.join(" o ") : problem.word;
    const entry = {
      idx: newAttempted,
      a: displayCorrect,         // palabra(s) correcta(s) para el reporte
      b: userWord,               // palabra del estudiante
      op: "📝",
      correctAnswer: displayCorrect,
      userAnswer: userWord,
      isCorrect,
      time: exerciseSec,
      earned,
      emoji: problem.emoji,
    };
    const newLog = [...log, entry];

    setFeedback(isCorrect ? "ok" : "err");
    setFeedbackMsg(isCorrect
      ? `+${earned} ⭐`
      : ENCOURAGEMENTS[Math.floor(Math.random() * ENCOURAGEMENTS.length)]
    );
    setAttempted(newAttempted);
    setSolved(newSolved);
    setStars(newStarsTotal);
    setStarsSession(newStarsSession);
    setLog(newLog);

    const wait = isCorrect ? 950 : 1200;
    setTimeout(() => {
      setFeedback(null);
      setFeedbackMsg("");
      setFilled([]);
      if (newAttempted >= 3) {
        setApp((s) => ({
          ...s,
          stars: newStarsTotal,
          lastResult: {
            category: catLabel,
            solved: newSolved,
            total: 3,
            time: elapsed,
            starsEarned: newStarsSession,
            log: newLog,
          },
        }));
        window.incrementGamesCompleted && window.incrementGamesCompleted();
        go("results");
      } else {
        const p = makeProblem(catId, usedRef.current);
        usedRef.current.add(p.word);
        pushRecentlySeen(catCfg.recentKey, p.word);
        setProblem(p);
        exerciseStart.current = Date.now();
      }
    }, wait);
  }

  function formatTime(s) {
    const m = Math.floor(s / 60);
    const ss = s % 60;
    return `${String(m).padStart(2, "0")}:${String(ss).padStart(2, "0")}`;
  }

  // Tamaño dinámico de las casillas según el largo de la palabra. Cabe en
  // ~430 px de ancho (zona-central interior). Tamaños generosos para tap.
  const wordLen = problem.letters.length;
  const SLOT_W = wordLen <= 4 ? 64 : wordLen <= 6 ? 56 : wordLen <= 8 ? 46 : 40;
  const SLOT_H = wordLen <= 4 ? 72 : wordLen <= 6 ? 66 : 58;
  const SLOT_GAP = wordLen <= 6 ? 8 : 6;

  // Mapeo letra-en-slot → índice del slot oculto.
  const slotOfHidden = (wordPos) => problem.hiddenIdx.indexOf(wordPos);

  return (
    <div style={{ position: "absolute", inset: 0, overflow: "hidden" }}>
      {/* HUD superior — logo izq, contador central (sin tabs de nivel,
          juego de 1 solo nivel), tiempo+estrellas der. */}
      <div data-qa="hud" style={{ position: "absolute", top: 10, left: 16, right: 16, display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <EdinunLogoMini size={64} />
        </div>

        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <div style={{
            display: "flex", alignItems: "center", gap: 6,
            background: "rgba(0,0,0,0.35)", borderRadius: 999, padding: "6px 12px",
            border: "1px solid rgba(242,194,96,0.4)", fontFamily: "var(--ed-font-mono)", fontSize: 13, color: "#fce9a8",
          }}>
            ⏱ {formatTime(elapsed)}
          </div>
          <div style={{
            display: "flex", alignItems: "center", gap: 6,
            background: "rgba(0,0,0,0.35)", borderRadius: 999, padding: "6px 12px",
            border: "1px solid rgba(242,194,96,0.4)", fontFamily: "var(--ed-font-display)", fontWeight: 600, color: "#fce9a8",
          }}>
            ⭐ {stars}
          </div>
        </div>
      </div>

      {/* Chips de tema centrados — permiten cambiar de nivel sin volver al
          Home. La acción es destructiva (se pierde la ronda) así que pasa
          por SwitchLevelModal. */}
      <div style={{
        position: "absolute", top: 18, left: "50%", transform: "translateX(-50%)",
        display: "flex", alignItems: "center", gap: 6,
      }}>
        {levels.map((lv) => {
          const active = lv.id === catId;
          return (
            <button
              key={lv.id}
              onClick={() => requestSwitchLevel(lv.id)}
              title={active ? "Tema actual" : `Cambiar a "${lv.label}"`}
              style={{
                padding: "5px 12px",
                borderRadius: 999,
                background: active ? lv.grad : "rgba(0,0,0,0.35)",
                color: active ? lv.ink : "rgba(252,233,168,0.85)",
                fontFamily: "var(--ed-font-display)",
                fontWeight: 700, fontSize: 11, letterSpacing: "0.02em",
                border: active ? "1px solid rgba(255,255,255,0.55)" : "1px solid rgba(242,194,96,0.35)",
                boxShadow: active
                  ? "inset 0 1px 0 rgba(255,255,255,0.45), inset 0 -2px 0 rgba(0,0,0,0.18), 0 0 12px rgba(255,255,255,0.18)"
                  : "none",
                cursor: active ? "default" : "pointer",
                transition: "all 0.18s ease",
                whiteSpace: "nowrap",
              }}
            >
              {lv.label}
            </button>
          );
        })}
      </div>

      {/* Indicador de ronda (3 dots) — debajo de los chips */}
      <div style={{
        position: "absolute", top: 54, left: "50%", transform: "translateX(-50%)",
        display: "flex", alignItems: "center", gap: 8,
      }}>
        <span className="ed-label" style={{ color: "rgba(255,255,255,0.7)" }}>Ronda</span>
        {[0,1,2].map((i) => (
          <div key={i} style={{
            width: 10, height: 10, borderRadius: "50%",
            background: i < attempted ? (i < solved ? "#fce9a8" : "#ff6b6b") : "rgba(255,255,255,0.2)",
            boxShadow: i < attempted ? "0 0 10px currentColor" : "none",
            color: i < solved ? "#fce9a8" : "#ff6b6b",
          }} />
        ))}
      </div>

      {/* Personaje compañero — columna izquierda, centrado verticalmente
          (no pegado al fondo). PNG 190 grande para destacar al personaje
          como guía pedagógico. El bocadillo se ancla aquí mismo (relativo)
          para que la cola del globo apunte directo a la cabeza. */}
      <div data-qa="personaje" style={{
        position: "absolute", left: 8, bottom: 90, width: 220,
        pointerEvents: "none", textAlign: "center",
      }}>
        {/* Bocadillo de pista — el padre flex centra al hijo inline-block que
            se ajusta al texto (sin width fijo). Así textos cortos no dejan
            espacio en blanco al lado. */}
        <div data-qa="bocadillo" style={{
          position: "absolute", left: 0, right: 0, top: -80,
          display: "flex", justifyContent: "center",
          pointerEvents: "none",
        }}>
          <div style={{
            position: "relative",
            display: "inline-block",
            maxWidth: 208,
            background: "linear-gradient(180deg, rgba(20,12,55,0.95), rgba(10,6,35,0.95))",
            border: "1.5px solid rgba(242,194,96,0.65)",
            borderRadius: 16,
            padding: "10px 14px",
            fontFamily: "var(--ed-font-display)",
            fontWeight: 700, fontSize: 14, lineHeight: 1.25,
            color: "#fce9a8", textAlign: "center",
            boxShadow: "0 10px 24px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.08)",
          }}>
            {catCfg.hint}
            {/* Cola del bocadillo — centrada al cuadro. */}
            <div style={{
              position: "absolute", bottom: -10, left: "50%", transform: "translateX(-50%)",
              width: 0, height: 0,
              borderLeft: "9px solid transparent",
              borderRight: "9px solid transparent",
              borderTop: "10px solid rgba(20,12,55,0.95)",
              filter: "drop-shadow(0 1px 0 rgba(242,194,96,0.55))",
            }} />
          </div>
        </div>

        <div style={{ position: "relative", display: "flex", justifyContent: "center" }}>
          <div style={{
            position: "absolute", bottom: 14, left: "50%", transform: "translateX(-50%)",
            width: 140, height: 16, borderRadius: "50%",
            background: "radial-gradient(ellipse, rgba(242,194,96,0.45), transparent 70%)",
            filter: "blur(5px)",
          }} />
          <char.Component size={190} floating />
        </div>
        <div style={{
          marginTop: -2,
          fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 14,
          color: "#fce9a8", letterSpacing: "0.04em",
          textShadow: "0 2px 6px rgba(0,0,0,0.6)",
        }}>{char.name}</div>
      </div>

      {/* Enunciado principal del ejercicio — texto blanco grande encima
          del cartel del emoji. Bajado a top:88 (era 76) para no chocar
          con los dots de Ronda (top:54..68). */}
      <div style={{
        position: "absolute", top: 88, left: 250, right: 250,
        textAlign: "center",
        fontFamily: "var(--ed-font-display)", fontWeight: 700,
        fontSize: 20, lineHeight: 1.15,
        color: "#fff",
        textShadow: "0 2px 6px rgba(0,0,0,0.55)",
        pointerEvents: "none",
      }}>
        {catCfg.instruction}
      </div>

      {/* ══════ ZONA CENTRAL: emoji + casillas de palabra ══════
          Distribución proporcional: gap enunciado↔cartel ≈ 32, gap interno
          cartel↔casillas ≈ 28, gap casillas↔bandeja ≈ 28 (la bandeja sube
          a bottom:30). El espacio vertical se reparte parejo. */}
      <div data-qa="zona-central" style={{
        position: "absolute", top: 128, left: "50%", transform: "translateX(-50%)",
        width: 460, textAlign: "center",
        display: "flex", flexDirection: "column", alignItems: "center",
        gap: 24,
      }}>
        {/* Cartel del emoji con marco dorado — achicado un poco (170×155
            vs 195×180 anterior) para liberar espacio vertical y dar
            respiración al enunciado/Ronda de arriba. */}
        <div style={{
          width: 170, height: 155,
          borderRadius: 20,
          background: "linear-gradient(180deg, rgba(255,255,255,0.95), rgba(240,235,225,0.9))",
          border: "3px solid #f2c260",
          boxShadow: "0 12px 28px rgba(0,0,0,0.45), 0 0 0 1px rgba(242,194,96,0.35), inset 0 -4px 0 rgba(0,0,0,0.08)",
          display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: 112, lineHeight: 1,
        }}>
          {problem.emoji}
        </div>

        {/* Palabra con casillas — letras visibles en blanco, casillas a llenar
            como slots vacíos con borde dorado. */}
        <div style={{
          display: "flex", justifyContent: "center", alignItems: "center",
          gap: SLOT_GAP,
          padding: "4px 6px",
        }}>
          {problem.letters.map((ch, wordPos) => {
            const hiddenSlot = slotOfHidden(wordPos);
            const isHidden = hiddenSlot >= 0;
            if (!isHidden) {
              // Letra visible (fija, en blanco).
              return (
                <div key={wordPos} style={{
                  width: SLOT_W, height: SLOT_H,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontFamily: "var(--ed-font-display)", fontWeight: 700,
                  fontSize: SLOT_H * 0.55,
                  color: "#fff",
                  textShadow: "0 2px 6px rgba(0,0,0,0.5)",
                  borderBottom: "3px solid rgba(255,255,255,0.35)",
                }}>
                  {ch}
                </div>
              );
            }
            // Casilla por llenar.
            const f = filled[hiddenSlot];
            const isFilled = f !== undefined;
            // El slot "activo" = primer slot vacío empezando por la izquierda.
            let activeIdx = -1;
            for (let k = 0; k < problem.hiddenIdx.length; k++) {
              if (filled[k] === undefined) { activeIdx = k; break; }
            }
            const isActive = hiddenSlot === activeIdx;
            return (
              <button
                key={wordPos}
                onClick={() => { if (isFilled) eraseSlot(hiddenSlot); }}
                style={{
                  width: SLOT_W, height: SLOT_H,
                  borderRadius: 12,
                  border: `2.5px solid ${
                    feedback === "ok" ? "#2ecc8f" :
                    feedback === "err" ? "#ff6b6b" :
                    isActive ? "#fce9a8" : "rgba(242,194,96,0.55)"
                  }`,
                  background: isFilled
                    ? "linear-gradient(180deg, rgba(252,233,168,0.95), rgba(217,164,65,0.85))"
                    : "rgba(10,6,35,0.55)",
                  color: isFilled ? "#3a2608" : "rgba(252,233,168,0.5)",
                  fontFamily: "var(--ed-font-display)", fontWeight: 800,
                  fontSize: SLOT_H * 0.55,
                  cursor: isFilled ? "pointer" : "default",
                  boxShadow: isActive
                    ? "0 0 14px rgba(252,233,168,0.5), inset 0 1px 0 rgba(255,255,255,0.15)"
                    : isFilled
                      ? "0 4px 10px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.4)"
                      : "inset 0 1px 0 rgba(255,255,255,0.08)",
                  transition: "all 0.15s ease",
                }}
                title={isFilled ? "Toca para borrar" : "Toca una letra de abajo"}
              >
                {isFilled ? f : "_"}
              </button>
            );
          })}
        </div>
      </div>

      {/* Bandeja de vocales — fila inferior centrada. 5 fichas fijas
          (a, e, i, o, u) en minúsculas, todas REUTILIZABLES (sin estado
          "consumida"). Subida a bottom:30 para que el espacio entre
          casillas y bandeja sea proporcional al espacio enunciado↔cartel. */}
      <div data-qa="bandeja" style={{
        position: "absolute", bottom: 30, left: "50%", transform: "translateX(-50%)",
        display: "flex", gap: 12, flexWrap: "nowrap",
        maxWidth: 760, justifyContent: "center",
      }}>
        {problem.tray.map((letter, trayIdx) => {
          const color = ["#ef5a5a","#f5a623","#f5d84b","#4fa0ff","#2ecc8f"][trayIdx % 5];
          return (
            <button
              key={trayIdx}
              className="ed-numpad-key"
              onClick={() => pressLetter(letter)}
              style={{
                width: 64, height: 68, fontSize: 30,
                borderColor: color,
                borderWidth: 2, borderStyle: "solid",
                cursor: "pointer",
              }}
              title="Toca para colocar (puedes usarla varias veces)"
            >
              {letter}
            </button>
          );
        })}
      </div>

      {/* Acciones derecha — VERIFICAR · BORRAR · REINICIAR · SALIR.
          Total 4 botones × 56px + 3 gaps × 12px = 260px, centrados
          verticalmente en el canvas de 540px (sobra margen). */}
      <div data-qa="acciones" style={{
        position: "absolute", right: 18, top: "50%", transform: "translateY(-50%)",
        display: "flex", flexDirection: "column", gap: 12, width: 150,
      }}>
        <button
          className="ed-btn ed-btn-verify"
          onClick={verify}
          style={{ fontSize: 15, padding: "0 10px", height: 56, fontWeight: 800, letterSpacing: "0.04em" }}
        >
          ¡VERIFICAR!
        </button>
        <button
          className="ed-btn ed-btn-erase"
          onClick={erase}
          style={{ fontSize: 15, padding: "0 10px", height: 56, fontWeight: 800, letterSpacing: "0.04em" }}
        >
          BORRAR
        </button>
        <button
          className="ed-btn ed-btn-restart"
          onClick={() => setConfirmingRestart(true)}
          title="Reiniciar la sesión"
          style={{ fontSize: 15, padding: "0 10px", height: 56, fontWeight: 800, letterSpacing: "0.04em" }}
        >
          REINICIAR
        </button>
        <button
          className="ed-btn ed-btn-ghost"
          onClick={() => setConfirmingExit(true)}
          title="Salir al inicio"
          style={{ fontSize: 15, padding: "0 10px", height: 56, fontWeight: 800, letterSpacing: "0.04em" }}
        >
          SALIR
        </button>
      </div>

      {/* Feedback overlay */}
      {feedback && (
        <PortalToBody>
          <div style={{
            position: "fixed", inset: 0, zIndex: 1000,
            pointerEvents: "none",
            display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
            gap: 14,
            background: "rgba(0,0,0,0.62)",
            backdropFilter: "blur(3px)",
            animation: "ed-pop-in 0.3s",
          }}>
            <div style={{
              fontFamily: "'Fredoka','Baloo 2',system-ui,sans-serif",
              fontWeight: 700, fontSize: "clamp(60px, 11vmin, 120px)",
              color: feedback === "ok" ? "#2ecc8f" : "#ff6b6b",
              textShadow: "0 4px 0 rgba(0,0,0,0.45), 0 0 60px currentColor",
            }}>
              {feedback === "ok" ? "¡EXCELENTE!" : "¡UPS!"}
            </div>
            {feedbackMsg && (
              <div style={{
                fontFamily: "'Fredoka','Baloo 2',system-ui,sans-serif",
                fontWeight: 700, fontSize: "clamp(18px, 2.6vmin, 30px)",
                color: feedback === "ok" ? "#fce9a8" : "#fff",
                background: "rgba(0,0,0,0.55)",
                padding: "8px 26px", borderRadius: 999,
                textShadow: "0 2px 6px rgba(0,0,0,0.6)",
                textAlign: "center", maxWidth: "80vw",
              }}>
                {feedback === "ok" ? feedbackMsg : `${feedbackMsg} — ${char.name}`}
              </div>
            )}
          </div>
        </PortalToBody>
      )}

      {/* Modal de cambio de tema — destructivo: pierde la ronda en curso. */}
      {pendingLevel && (() => {
        const cfg = levels.find((l) => l.id === pendingLevel);
        if (!cfg) return null;
        return (
          <PortalToBody>
            <div
              onClick={() => setPendingLevel(null)}
              style={{
                position: "fixed", inset: 0, zIndex: 1000,
                background: "rgba(0,0,0,0.62)",
                backdropFilter: "blur(4px)",
                display: "flex", alignItems: "center", justifyContent: "center",
                animation: "ed-pop-in 0.18s",
                padding: 16,
              }}
            >
              <div
                onClick={(e) => e.stopPropagation()}
                className="ed-card"
                style={{ padding: 24, maxWidth: 460, textAlign: "center", boxShadow: "var(--ed-shadow-card), 0 0 40px rgba(148,120,255,0.3)" }}
              >
                <div className="ed-label" style={{ color: "#a78bfa", marginBottom: 6 }}>
                  Cambiar de tema
                </div>
                <h2 className="ed-h1" style={{ fontSize: 22, lineHeight: 1.15, marginBottom: 8 }}>
                  ¿Ir a "{cfg.label}"?
                </h2>
                <p className="ed-body" style={{ marginBottom: 16, fontSize: 14 }}>
                  Vas a perder el progreso de esta ronda ({attempted}/3 palabras). No habrá reporte de esta sesión.
                </p>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                  <button className="ed-btn ed-btn-ghost" onClick={() => setPendingLevel(null)} style={{ height: 44, fontWeight: 800, letterSpacing: "0.04em" }}>
                    SEGUIR JUGANDO
                  </button>
                  <button className="ed-btn ed-btn-primary" onClick={confirmSwitchLevel} style={{ height: 44, fontWeight: 800, letterSpacing: "0.04em" }}>
                    SÍ, CAMBIAR
                  </button>
                </div>
              </div>
            </div>
          </PortalToBody>
        );
      })()}

      {/* Modal de salir */}
      {confirmingExit && (
        <PortalToBody>
          <div
            onClick={() => setConfirmingExit(false)}
            style={{
              position: "fixed", inset: 0, zIndex: 1000,
              background: "rgba(0,0,0,0.62)",
              backdropFilter: "blur(4px)",
              display: "flex", alignItems: "center", justifyContent: "center",
              animation: "ed-pop-in 0.18s",
              padding: 16,
            }}
          >
            <div
              onClick={(e) => e.stopPropagation()}
              className="ed-card"
              style={{ padding: 24, maxWidth: 440, textAlign: "center", boxShadow: "var(--ed-shadow-card), 0 0 40px rgba(255,107,107,0.3)" }}
            >
              <div className="ed-label" style={{ color: "#ff8b8b", marginBottom: 6 }}>
                Salir del juego
              </div>
              <h2 className="ed-h1" style={{ fontSize: 22, lineHeight: 1.15, marginBottom: 8 }}>
                ¿Volver al inicio?
              </h2>
              <p className="ed-body" style={{ marginBottom: 16, fontSize: 14 }}>
                Vas a perder el progreso de esta ronda ({attempted}/3 palabras). No habrá reporte de esta sesión.
              </p>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                <button className="ed-btn ed-btn-ghost" onClick={() => setConfirmingExit(false)} style={{ height: 44, fontWeight: 800, letterSpacing: "0.04em" }}>
                  SEGUIR JUGANDO
                </button>
                <button className="ed-btn ed-btn-primary" onClick={() => { setConfirmingExit(false); go("home"); }} style={{ height: 44, fontWeight: 800, letterSpacing: "0.04em" }}>
                  SÍ, SALIR
                </button>
              </div>
            </div>
          </div>
        </PortalToBody>
      )}

      {/* Modal de reiniciar — confirma antes de descartar la sesión y empezar
          una palabra nueva en el mismo nivel. */}
      {confirmingRestart && (
        <PortalToBody>
          <div
            onClick={() => setConfirmingRestart(false)}
            style={{
              position: "fixed", inset: 0, zIndex: 1000,
              background: "rgba(0,0,0,0.62)",
              backdropFilter: "blur(4px)",
              display: "flex", alignItems: "center", justifyContent: "center",
              animation: "ed-pop-in 0.18s",
              padding: 16,
            }}
          >
            <div
              onClick={(e) => e.stopPropagation()}
              className="ed-card"
              style={{ padding: 24, maxWidth: 440, textAlign: "center", boxShadow: "var(--ed-shadow-card), 0 0 40px rgba(255,107,107,0.3)" }}
            >
              <div className="ed-label" style={{ color: "#ff8b8b", marginBottom: 6 }}>
                Reiniciar juego
              </div>
              <h2 className="ed-h1" style={{ fontSize: 22, lineHeight: 1.15, marginBottom: 8 }}>
                ¿Empezar de nuevo?
              </h2>
              <p className="ed-body" style={{ marginBottom: 16, fontSize: 14 }}>
                Vas a perder el progreso de esta ronda ({attempted}/3 palabras) y volverás a la primera.
              </p>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                <button className="ed-btn ed-btn-ghost" onClick={() => setConfirmingRestart(false)} style={{ height: 44, fontWeight: 800, letterSpacing: "0.04em" }}>
                  SEGUIR JUGANDO
                </button>
                <button className="ed-btn ed-btn-primary" onClick={confirmRestart} style={{ height: 44, fontWeight: 800, letterSpacing: "0.04em" }}>
                  SÍ, REINICIAR
                </button>
              </div>
            </div>
          </div>
        </PortalToBody>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// RESULTS — Reporte académico imprimible. Misma estructura que el
// shell matemático. Solo cambia el contenido de `lastResult` y la
// columna "Operación" del reporte (acá: la palabra con emoji).
// ─────────────────────────────────────────────────────────────
function formatOp(e) {
  return `${e.emoji || "📝"}  ${e.a}`;
}

  tdNum: { color: "#888", width: 36 },
  tdOp: { fontWeight: 700 },
  tdR: { textAlign: "right" },
  tdC: { textAlign: "center", fontFamily: "'Nunito',sans-serif", fontWeight: 700 },

// app.jsx — Shell de producción EDINUN GAMES.
// Enrutador por estado y device stage adaptativo (desktop / tablet / mobile).
// Móvil portrait: el contenido NUNCA rota; un overlay BLOQUEANTE obliga
// al usuario a girar físicamente el teléfono antes de poder usar la app.

const { useState: useStateA, useEffect: useEffectA, useRef: useRefA } = React;

// ─────────────────────────────────────────────────────────────
// useViewportSize — devuelve el tamaño REAL visible del viewport.
//
// En iOS Safari (y otros mobile browsers), `window.innerHeight` y `100vh`
// reportan la altura de la ventana INCLUYENDO la URL bar, así que el
// contenido escalado a esa altura termina parcialmente fuera de pantalla
// (ej: el numpad del juego queda debajo del fondo visible). La Visual
// Viewport API reporta el área verdaderamente visible y se actualiza
// cuando la URL bar se muestra/oculta.
// ─────────────────────────────────────────────────────────────
// Detección de "resize REAL" vs "zoom del navegador".
//
// Idea: el tamaño FÍSICO de la zona visible en píxeles del display es
// invariante al ctrl+rueda. Cuando subes el zoom de 100 % a 500 %:
//   · innerWidth en CSS-px se divide entre 5
//   · devicePixelRatio se multiplica por 5
//   · innerWidth × devicePixelRatio queda igual ⇒ NO hubo resize real.
//
// Cuando arrastras la esquina de la ventana o rotas el dispositivo:
//   · innerWidth en CSS-px cambia
//   · devicePixelRatio NO cambia
//   · innerWidth × devicePixelRatio cambia ⇒ SÍ hubo resize real.
//
// Por eso comparamos contra `innerWidth × devicePixelRatio` y solo
// actualizamos el state cuando ese producto cambia. Así el lienzo se
// queda con su tamaño CSS previo durante el zoom y el navegador lo
// amplifica visualmente — junto con los glifos, que ya leen `glyphSize`
// del mismo state defendido (ver DeviceStage).
//
// La defensa anterior (tracker de _lastDPR) era frágil: se actualizaba
// en CADA evento, así que si el navegador disparaba dos resize seguidos
// para la misma acción de zoom, el segundo veía el dpr ya guardado y
// recalculaba el tamaño con el viewport pequeño. Esto causaba que los
// glifos quedaran enormes mientras el lienzo se recomprimía.
function physicalSize() {
  if (typeof window === "undefined") return { w: 0, h: 0 };
  const dpr = window.devicePixelRatio || 1;
  return { w: window.innerWidth * dpr, h: window.innerHeight * dpr };
}
let _lastPhysical = physicalSize();

function useViewportSize() {
  const [size, setSize] = useStateA(() => readSize());
  useEffectA(() => {
    function onChange() {
      const phys = physicalSize();
      // Tolerancia de 4 px reales para absorber redondeos del navegador.
      if (Math.abs(phys.w - _lastPhysical.w) < 4 && Math.abs(phys.h - _lastPhysical.h) < 4) {
        // Mismo display, distinto zoom — no actualizamos el state.
        return;
      }
      _lastPhysical = phys;
      setSize(readSize());
    }
    window.addEventListener("resize", onChange);
    window.addEventListener("orientationchange", onChange);
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", onChange);
    }
    return () => {
      window.removeEventListener("resize", onChange);
      window.removeEventListener("orientationchange", onChange);
      if (window.visualViewport) {
        window.visualViewport.removeEventListener("resize", onChange);
      }
    };
  }, []);
  return size;
}
function readSize() {
  if (typeof window === "undefined") return { vw: 0, vh: 0 };
  const vv = window.visualViewport;
  // Cuando el usuario hace pinch-zoom, vv.scale > 1 y vv.width/height
  // reflejan la región visible (más pequeña). Usar esos valores haría
  // que la escala del lienzo se reduzca al hacer zoom — exactamente lo
  // contrario de lo que el usuario quiere. Solo confiamos en vv cuando
  // scale ≈ 1 (sin zoom) — ahí da una lectura más fiel que innerWidth/
  // Height en iOS Safari (descuenta correctamente la URL bar visible).
  if (vv && Math.abs(vv.scale - 1) < 0.05) {
    return { vw: vv.width, vh: vv.height };
  }
  return { vw: window.innerWidth, vh: window.innerHeight };
}

// ─────────────────────────────────────────────────────────────
// DeviceStage — escala el lienzo lógico 900×540 (paisaje) al viewport.
//
// Reglas:
//   · Desktop / tablet: sin marco, sin notch, fondo cósmico edge-to-edge.
//   · Mobile portrait: lienzo letterboxed Y overlay BLOQUEANTE "Gira el
//     teléfono". El contenido del juego no es accesible hasta que rote.
//   · Mobile landscape: lienzo escalado al viewport visible (visualViewport,
//     no innerHeight, para no clippearse debajo de la URL bar de iOS).
// ─────────────────────────────────────────────────────────────
function DeviceStage({ children, variant = "cosmic" }) {
  const W = 900, H = 540;
  const { vw, vh } = useViewportSize();
  const minSide = Math.min(vw, vh);
  const maxSide = Math.max(vw, vh);
  let mode = "desktop";
  if (maxSide < 820) mode = "mobile";
  else if (minSide < 820) mode = "tablet";
  const portrait = vh > vw;
  const baseScale = Math.max(Math.min(vw / W, vh / H), 0.15);

  // Detección de teléfono independiente del modo: cualquier dispositivo con
  // lado menor ≤ 600 CSS-px es un teléfono. Cubre todos los teléfonos
  // actuales (iPhone SE 320 → S25 Ultra/Pro Max ~432) con margen para
  // modelos futuros más anchos. La menor tablet (iPad mini 744) queda
  // bien por encima, así que no se rompe el caso "tablet portrait usable
  // letterboxed". Solo bloqueamos cuando teléfono Y portrait — el lienzo
  // paisaje queda demasiado pequeño para jugar.
  const isPhone = minSide <= 600;
  const lockPortrait = isPhone && portrait;

  // Tamaño de los glifos del fondo: equivalente al `clamp(48px, 7vmin, 110px)`
  // que tenía el CSS, pero calculado a partir del vw/vh DEFENDIDO contra
  // cambios de DPR. Esto evita que con ctrl+rueda del mouse los glifos
  // crezcan más rápido que el lienzo (el lienzo se congela vía la defensa
  // del DPR; si CSS lee el vmin actual, los glifos no se congelan y desync).
  const glyphSize = Math.max(48, Math.min(minSide * 0.07, 110));

  const debug = typeof window !== "undefined" && /(?:^|[#&])debug(?:&|$)/.test(window.location.hash || "");

  // ─── Pinch-zoom y pan custom ─────────────────────────────────
  // Reemplaza el zoom nativo del browser. Razón: con el lienzo letterboxed
  // dentro de un wrapper viewport-sized, el visual viewport del browser
  // puede panear hasta dejar al usuario mirando solo el cosmos vacío de los
  // bordes — el "rebote" reportado en iPhone (ver .planning/ios-zoom.md).
  // Aquí los gestos operan sobre el transform del lienzo, así que el zoom
  // siempre gravita alrededor del contenido y no deriva a un borde
  // decorativo.
  const wrapperRef = useRefA(null);
  const gestureRef = useRefA(null);
  const stateRef = useRefA({ userZoom: 1, pan: { x: 0, y: 0 } });
  const [userZoom, setUserZoom] = useStateA(1);
  const [pan, setPan] = useStateA({ x: 0, y: 0 });
  const [duringGesture, setDuringGesture] = useStateA(false);

  useEffectA(() => {
    stateRef.current = { userZoom, pan };
  }, [userZoom, pan]);

  // Reset al cambiar viewport (rotación, resize). Si no, el pan queda
  // referenciado a un viewport que ya no existe.
  useEffectA(() => {
    setUserZoom(1);
    setPan({ x: 0, y: 0 });
    setDuringGesture(false);
  }, [vw, vh]);

  useEffectA(() => {
    if (lockPortrait) return;
    const el = wrapperRef.current;
    if (!el) return;

    const Z_MIN = 1;
    const Z_MAX = 4;

    const dist = (a, b) => Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
    const mid = (a, b) => ({ x: (a.clientX + b.clientX) / 2, y: (a.clientY + b.clientY) / 2 });

    function clampPan(zoom, px, py) {
      // Pan máximo: la mitad del exceso del lienzo escalado sobre el viewport.
      // En zoom=1 el max es 0 (lienzo cabe en viewport, no hay donde panear).
      // En zoom=N el lienzo mide N veces el lado contain, así que el usuario
      // puede mover ±(sw - vw)/2 antes de que la orilla del lienzo cruce la
      // orilla del viewport. Esto evita perder el contenido fuera de pantalla.
      const sw = baseScale * zoom * W;
      const sh = baseScale * zoom * H;
      const maxX = Math.max(0, (sw - vw) / 2);
      const maxY = Math.max(0, (sh - vh) / 2);
      return {
        x: Math.max(-maxX, Math.min(maxX, px)),
        y: Math.max(-maxY, Math.min(maxY, py)),
      };
    }

    function applyState(z, px, py) {
      stateRef.current = { userZoom: z, pan: { x: px, y: py } };
      setUserZoom(z);
      setPan({ x: px, y: py });
    }

    function onTouchStart(e) {
      const { userZoom: z0, pan: p0 } = stateRef.current;
      if (e.touches.length >= 2) {
        const [t0, t1] = e.touches;
        gestureRef.current = {
          mode: "pinch",
          d0: dist(t0, t1),
          m0: mid(t0, t1),
          z0, p0: { ...p0 },
        };
        setDuringGesture(true);
        e.preventDefault();
      } else if (e.touches.length === 1) {
        const t = e.touches[0];
        gestureRef.current = {
          mode: "pan-armed",
          startX: t.clientX,
          startY: t.clientY,
          z0, p0: { ...p0 },
        };
        // No preventDefault — un tap simple debe seguir generando click.
      }
    }

    function onTouchMove(e) {
      const g = gestureRef.current;
      if (!g) return;

      // Si en medio de un gesto entra un segundo dedo, transición a pinch
      // tomando el estado actual como punto de partida.
      if (e.touches.length >= 2 && g.mode !== "pinch") {
        const [t0, t1] = e.touches;
        const { userZoom: zNow, pan: pNow } = stateRef.current;
        gestureRef.current = {
          mode: "pinch",
          d0: dist(t0, t1),
          m0: mid(t0, t1),
          z0: zNow, p0: { ...pNow },
        };
        setDuringGesture(true);
        e.preventDefault();
        return;
      }

      if (e.touches.length >= 2 && g.mode === "pinch") {
        const [t0, t1] = e.touches;
        const d = dist(t0, t1);
        const m = mid(t0, t1);
        const ratio = d / g.d0;
        // Permitimos pasar transitoriamente bajo Z_MIN para sensación elástica
        // durante el gesto; en touchend hacemos snap-back al rango válido.
        const newZoom = Math.max(Z_MIN * 0.7, Math.min(Z_MAX * 1.05, g.z0 * ratio));
        const r = newZoom / g.z0;
        const ux = g.m0.x - vw / 2;
        const uy = g.m0.y - vh / 2;
        // Fórmula que mantiene el punto medio de la pinza anclado al mismo
        // píxel del lienzo durante todo el gesto. Derivación:
        //   panX_new = (mx0 - vw/2) + (newZoom/z0) * (panX0 - (mx0 - vw/2))
        //              + (mx_now - mx0)   ← desplazamiento del propio gesto
        const newPanX = ux + r * (g.p0.x - ux) + (m.x - g.m0.x);
        const newPanY = uy + r * (g.p0.y - uy) + (m.y - g.m0.y);
        applyState(newZoom, newPanX, newPanY);
        e.preventDefault();
      } else if (e.touches.length === 1 && g.mode === "pan-armed") {
        if (g.z0 <= 1.001) return; // sin zoom no panea — dejamos pasar el tap
        const t = e.touches[0];
        const dx = t.clientX - g.startX;
        const dy = t.clientY - g.startY;
        if (Math.hypot(dx, dy) > 8) {
          gestureRef.current = { ...g, mode: "pan" };
          setDuringGesture(true);
          e.preventDefault();
        }
      } else if (e.touches.length === 1 && g.mode === "pan") {
        const t = e.touches[0];
        const dx = t.clientX - g.startX;
        const dy = t.clientY - g.startY;
        applyState(g.z0, g.p0.x + dx, g.p0.y + dy);
        e.preventDefault();
      }
    }

    function onTouchEnd(e) {
      const g = gestureRef.current;
      if (!g) return;
      if (e.touches.length === 0) {
        const { userZoom: z, pan: p } = stateRef.current;
        const clampedZ = Math.max(Z_MIN, Math.min(Z_MAX, z));
        let cp;
        if (clampedZ <= 1.001) {
          cp = { x: 0, y: 0 };
        } else {
          cp = clampPan(clampedZ, p.x, p.y);
        }
        applyState(clampedZ, cp.x, cp.y);
        setDuringGesture(false);
        gestureRef.current = null;
      }
    }

    el.addEventListener("touchstart", onTouchStart, { passive: false });
    el.addEventListener("touchmove", onTouchMove, { passive: false });
    el.addEventListener("touchend", onTouchEnd, { passive: false });
    el.addEventListener("touchcancel", onTouchEnd, { passive: false });

    return () => {
      el.removeEventListener("touchstart", onTouchStart);
      el.removeEventListener("touchmove", onTouchMove);
      el.removeEventListener("touchend", onTouchEnd);
      el.removeEventListener("touchcancel", onTouchEnd);
    };
  }, [vw, vh, baseScale, lockPortrait]);

  const totalScale = baseScale * userZoom;

  return (
    <div ref={wrapperRef} style={{
      width: "100vw", height: "100dvh",
      minHeight: "-webkit-fill-available",
      overflow: "hidden",
      position: "relative",
      background: variant === "chalkboard" ? "#0b3a2d" : "#050214",
      // `touch-action: none` desactiva todos los gestos que el browser
      // interpretaría por su cuenta (pinch, pan, doble-tap-zoom). Los
      // implementamos en JS sobre el transform del lienzo para que el
      // zoom siempre quede anclado al contenido y nunca derive a los
      // bordes letterbox del wrapper. Los click/tap en botones siguen
      // funcionando — esto solo bloquea gestos del browser, no eventos.
      touchAction: "none",
    }}>
      <CosmosBg variant={variant} glyphSize={glyphSize} />

      {/* Lienzo lógico 900×540 centrado y escalado.
          El transform combina el escalado base (contain del viewport),
          el zoom del usuario y el pan acumulado. El orden CSS es
          right-to-left: scale → translate(pan) → translate(-50%,-50%). */}
      <div style={{
        width: W, height: H,
        position: "absolute",
        left: "50%", top: "50%",
        transform: `translate(-50%, -50%) translate(${pan.x}px, ${pan.y}px) scale(${totalScale})`,
        transformOrigin: "center center",
        overflow: "hidden",
        // Sin transición durante el gesto activo (el lienzo sigue la pinza
        // al instante); con transición elástica al soltar, para que el
        // snap-back de zoom/pan a los límites válidos no sea abrupto.
        transition: duringGesture ? "none" : "transform 0.22s cubic-bezier(0.2, 0.8, 0.2, 1)",
        willChange: "transform",
      }}>
        {children}
      </div>

      {lockPortrait && <RotateLockOverlay />}
      {debug && (
        <div style={{
          position: "fixed", top: 6, left: 6, zIndex: 999999,
          background: "rgba(0,0,0,0.85)", color: "#0f0",
          font: "11px ui-monospace,Menlo,monospace",
          padding: "6px 8px", borderRadius: 6,
          maxWidth: "90vw", whiteSpace: "pre",
          pointerEvents: "none",
        }}>
{`vw=${vw} vh=${vh}
min=${minSide} max=${maxSide}
mode=${mode} portrait=${portrait}
isPhone=${isPhone} LOCK=${lockPortrait}
zoom=${userZoom.toFixed(2)} pan=${pan.x.toFixed(0)},${pan.y.toFixed(0)}
vv=${typeof window!=="undefined" && window.visualViewport ? "yes" : "no"}
ua=${(typeof navigator!=="undefined" ? navigator.userAgent : "?").slice(0,60)}`}
        </div>
      )}
    </div>
  );
}

// Overlay bloqueante de rotación. En mobile portrait cubre toda la pantalla
// con un mensaje claro y un ícono animado. NO se puede descartar — el usuario
// DEBE girar el dispositivo para acceder al juego. Se desmonta solo cuando
// el viewport pasa a landscape.
function RotateLockOverlay() {
  return (
    <div
      role="dialog"
      aria-modal="true"
      aria-label="Gira tu teléfono para jugar"
      style={{
        position: "fixed", inset: 0, zIndex: 99999,
        background: "linear-gradient(180deg,#050214 0%,#0a0628 100%)",
        display: "flex", flexDirection: "column",
        alignItems: "center", justifyContent: "center",
        textAlign: "center", padding: "32px 24px",
        color: "#fce9a8",
        fontFamily: "var(--ed-font-display, system-ui)",
      }}
    >
      <div
        style={{
          width: 132, height: 132, marginBottom: 28,
          display: "flex", alignItems: "center", justifyContent: "center",
          animation: "ed-rotate-lock 2.4s ease-in-out infinite",
        }}
        aria-hidden="true"
      >
        {/* Ícono de teléfono que rota */}
        <svg viewBox="0 0 100 100" width="120" height="120" fill="none">
          <rect x="36" y="14" width="28" height="72" rx="6"
                stroke="#f2c260" strokeWidth="3" fill="rgba(242,194,96,0.08)" />
          <rect x="42" y="22" width="16" height="48" rx="2" fill="rgba(242,194,96,0.18)" />
          <circle cx="50" cy="78" r="2.5" fill="#f2c260" />
        </svg>
      </div>
      <div style={{
        fontWeight: 800,
        fontSize: "clamp(18px, 5.2vw, 26px)",
        lineHeight: 1.15,
        textTransform: "uppercase", letterSpacing: "0.02em",
        marginBottom: 12,
      }}>
        Gira tu teléfono
      </div>
      <div style={{
        fontWeight: 500,
        fontSize: "clamp(13px, 4vw, 16px)",
        lineHeight: 1.4,
        color: "rgba(252,233,168,0.78)",
        maxWidth: "min(320px, 80vw)",
      }}>
        Pon tu teléfono de lado para jugar.
      </div>
      <style>{`
        @keyframes ed-rotate-lock {
          0%   { transform: rotate(0deg); }
          45%  { transform: rotate(0deg); }
          70%  { transform: rotate(-90deg); }
          100% { transform: rotate(-90deg); }
        }
      `}</style>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// App principal
// ─────────────────────────────────────────────────────────────
function App() {
  const [route, setRoute] = useStateA("home");
  const [app, setApp] = useStateA({
    studentName: "",
    character: "escritor",
    level: "unico",
    stars: 0,
    sessionStart: Date.now(),
    gameSeed: 0,
  });

  function go(r) {
    // Al (re)entrar al juego, regeneramos la seed para que GameScreen se remonte
    // y reinicie ronda, tiempo, racha, etc. También reseteamos las estrellas:
    // cada partida empieza desde 0, no acumula entre rondas.
    if (r === "game") {
      setApp((s) => ({ ...s, gameSeed: (s.gameSeed || 0) + 1, stars: 0 }));
    }
    setRoute(r);
  }

  const screenProps = { app, setApp, go };

  let Screen = window.HomeScreen;
  if (route === "character") Screen = window.CharacterScreen;
  else if (route === "game") Screen = window.GameScreen;
  else if (route === "results") Screen = window.ResultsScreen;

  const variant = route === "game" ? "chalkboard" : "cosmic";

  return (
    <DeviceStage variant={variant}>
      <Screen key={route === "game" ? `game-${app.gameSeed}` : route} {...screenProps} />
    </DeviceStage>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>
</body>
</html>
