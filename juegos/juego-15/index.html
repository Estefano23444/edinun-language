// ─────────────────────────────────────────────────────────────
// Sparkles — chispas animadas alrededor del personaje. Refuerzan
// la estética cósmica heredada del shell.
// ─────────────────────────────────────────────────────────────
function Sparkles({ color = "#fce9a8", count = 6, seed = 1 }) {
  const pts = Array.from({ length: count }, (_, i) => {
    const a = (i * 360) / count + seed * 37;
    const r = 70 + (i % 3) * 8;
    const x = 100 + Math.cos((a * Math.PI) / 180) * r;
    const y = 100 + Math.sin((a * Math.PI) / 180) * r;
    const s = 2 + (i % 3);
    return { x, y, s, delay: i * 0.35 };
  });
  return (
    <g>
      {pts.map((p, i) => (
        <g key={i} transform={`translate(${p.x} ${p.y})`}>
          <circle r={p.s} fill={color} opacity="0.9">
            <animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" begin={`${p.delay}s`} repeatCount="indefinite" />
          </circle>
        </g>
      ))}
    </g>
  );
}

// ─────────────────────────────────────────────────────────────
// Contador de visitas — endpoint PHP del lado servidor con fallback localStorage.
// En servidores con PHP (Apache de edinun.com) muestra el conteo global real.
// En GitHub Pages / servidor estático sin PHP, el .php se sirve como texto
// plano → el fetch falla parseando JSON → caemos al contador localStorage
// (per-navegador, igual que la versión anterior). El localStorage también
// hace de caché del último valor servido por PHP para mostrar algo durante
// la primera carga / si el servidor está caído.
// ─────────────────────────────────────────────────────────────
const VISITOR_ENDPOINT = "counter.php"; // relativo a index.html del juego
const VISITOR_KEY = "edinun_visitors_v1";
const VISITOR_SESSION_FLAG = "edinun_visit_counted_v1";

async function fetchVisitorCount(opts) {
  const inc = opts && opts.increment;
  const url = inc ? VISITOR_ENDPOINT + "?inc=1" : VISITOR_ENDPOINT;
  const res = await fetch(url, { cache: "no-store" });
  if (!res.ok) throw new Error("counter http " + res.status);
  // Tolera dos contratos de servidor: JSON {"count": N} (counter.php de este
  // repo) o un numero plano "N" (contador.php legacy de otros juegos del mismo
  // server). Si el .php se sirve como texto ("<?php...") ambos parseos fallan
  // -> NaN -> throw -> el cliente cae a localStorage.
  const text = (await res.text()).trim();
  let count;
  try {
    const data = JSON.parse(text);
    count = data && typeof data.count === "number" ? data.count : Number(data);
  } catch (e) {
    count = Number(text);
  }
  if (!Number.isFinite(count)) throw new Error("counter invalid payload");
  return count;
}

function readLocalVisitorCount() {
  const raw = localStorage.getItem(VISITOR_KEY);
  const v = raw ? parseInt(raw, 10) : 0;
  return isNaN(v) ? 0 : v;
}

function writeLocalVisitorCount(n) {
  localStorage.setItem(VISITOR_KEY, String(n));
}

function useVisitorCount() {
  const [n, setN] = useState(() => readLocalVisitorCount());

  useEffect(() => {
    let cancelled = false;
    // Lee del servidor al montar. Si falla, queda el valor cacheado en local.
    fetchVisitorCount()
      .then((count) => {
        if (cancelled) return;
        setN(count);
        writeLocalVisitorCount(count);
      })
      .catch(() => { /* fallback localStorage ya cargado en el initializer */ });

    function onUpdate(ev) {
      const value = ev && ev.detail && ev.detail.count;
      if (typeof value === "number") setN(value);
      else setN(readLocalVisitorCount());
    }
    window.addEventListener("edinun:visitors-updated", onUpdate);
    return () => {
      cancelled = true;
      window.removeEventListener("edinun:visitors-updated", onUpdate);
    };
  }, []);

  return n;
}

function markFirstAttempt() {
  if (sessionStorage.getItem(VISITOR_SESSION_FLAG) === "1") return;
  sessionStorage.setItem(VISITOR_SESSION_FLAG, "1");

  fetchVisitorCount({ increment: true })
    .then((count) => {
      writeLocalVisitorCount(count);
      window.dispatchEvent(new CustomEvent("edinun:visitors-updated", { detail: { count } }));
    })
    .catch(() => {
      const next = readLocalVisitorCount() + 1;
      writeLocalVisitorCount(next);
      window.dispatchEvent(new CustomEvent("edinun:visitors-updated", { detail: { count: next } }));
    });
}

function incrementGamesCompleted() {
  const KEY = "edinun_games_completed_v1";
  const raw = localStorage.getItem(KEY);
  const next = (raw ? parseInt(raw, 10) : 0) + 1;
  localStorage.setItem(KEY, String(next));
  window.dispatchEvent(new Event("edinun:games-updated"));
  return next;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Drag con fallback tap. Usa data-dropzone para detectar destinos.
function makeDragHandler({ item, ghostHtml, onTap, onDrop, disabled }) {
  return function onPointerDown(e) {
    if (disabled) return;
    if (e.button !== undefined && e.button !== 0) return;
    e.preventDefault();
    const startX = e.clientX, startY = e.clientY;
    let started = false;
    let ghost = null;
    let currentZoneId = null;
    let lastX = startX, lastY = startY;
    const highlights = new Set();

    function clearHighlights() {
      for (const el of highlights) el.classList.remove("ed-drop-hover");
      highlights.clear();
    }
    function findZoneAt(x, y) {
      let prevVis = null;
      if (ghost) { prevVis = ghost.style.visibility; ghost.style.visibility = "hidden"; }
      const under = document.elementFromPoint(x, y);
      if (ghost) ghost.style.visibility = prevVis || "";
      if (!under || !under.closest) return null;
      const zone = under.closest("[data-dropzone]");
      return zone || null;
    }
    function onMove(ev) {
      const x = ev.clientX, y = ev.clientY;
      lastX = x; lastY = y;
      if (!started && Math.hypot(x - startX, y - startY) > 6) {
        started = true;
        ghost = document.createElement("div");
        ghost.style.cssText = "position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:none;left:" + x + "px;top:" + y + "px;";
        ghost.innerHTML = ghostHtml || `<div style="background:#fce9a8;color:#3a2608;padding:6px 12px;border-radius:10px;font-family:Fredoka,Nunito,sans-serif;font-weight:800;font-size:13px;border:2px solid #4fd8ff;box-shadow:0 6px 18px rgba(0,0,0,0.5);">${String(item).slice(0,60)}</div>`;
        document.body.appendChild(ghost);
        document.body.style.cursor = "grabbing";
      }
      if (started && ghost) {
        ghost.style.left = x + "px";
        ghost.style.top = y + "px";
        clearHighlights();
        const zone = findZoneAt(x, y);
        if (zone) { zone.classList.add("ed-drop-hover"); highlights.add(zone); currentZoneId = zone.dataset.dropzone; }
        else { currentZoneId = null; }
      }
    }
    function onUp(ev) {
      document.removeEventListener("pointermove", onMove);
      document.removeEventListener("pointerup", onUp);
      document.removeEventListener("pointercancel", onCancel);
      let finalZone = currentZoneId;
      if (started && !finalZone) {
        const x = (ev && ev.clientX != null) ? ev.clientX : lastX;
        const y = (ev && ev.clientY != null) ? ev.clientY : lastY;
        const zone = findZoneAt(x, y);
        if (zone) finalZone = zone.dataset.dropzone;
      }
      if (ghost) { ghost.remove(); ghost = null; }
      document.body.style.cursor = "";
      clearHighlights();
      if (!started) { if (onTap) onTap(item); }
      else if (finalZone && onDrop) { onDrop(finalZone, item); }
    }
    function onCancel() {
      document.removeEventListener("pointermove", onMove);
      document.removeEventListener("pointerup", onUp);
      document.removeEventListener("pointercancel", onCancel);
      if (ghost) { ghost.remove(); ghost = null; }
      document.body.style.cursor = "";
      clearHighlights();
    }
    document.addEventListener("pointermove", onMove);
    document.addEventListener("pointerup", onUp);
    document.addEventListener("pointercancel", onCancel);
  };
}

function formatTime(s) {
  const m = Math.floor(s / 60);

  return `${String(m).padStart(2, "0")}:${String(ss).padStart(2, "0")}`;
}

function calcStars(isCorrect, exerciseSec) {
  return isCorrect ? Math.max(1, 10 - Math.floor(exerciseSec / 3)) : 0;

// ─────────────────────────────────────────────────────────────
// FIFO anti-repetición por categoría (cam / tl / tono) en un solo
// key de localStorage. Ventana floor(N/2) por categoría (estándar 12),
// así el pool nunca se vacía y no se repite la última jugada.
// ─────────────────────────────────────────────────────────────
const RECENT_KEY = "edinun_juego15_recientes_v1";
const RECENT_LIMIT = 30;

function getRecent() {
  try {
    const raw = localStorage.getItem(RECENT_KEY);
    if (!raw) return [];
    const arr = JSON.parse(raw);
    return Array.isArray(arr) ? arr : [];
  } catch { return []; }
}
function pushRecent(key) {
  const arr = getRecent().filter((k) => k !== key);
  arr.unshift(key);
  const trimmed = arr.slice(0, RECENT_LIMIT);
  try { localStorage.setItem(RECENT_KEY, JSON.stringify(trimmed)); } catch {}
}

// ─────────────────────────────────────────────────────────────
// makeProblem por ronda — selección fresca con FIFO por categoría.
// ─────────────────────────────────────────────────────────────
function pickFresh(bank, prefix, idOf) {
  const pre = prefix + ":";
  const recentIds = getRecent().filter((k) => k.startsWith(pre)).map((k) => k.slice(pre.length));
  const windowN = Math.floor(bank.length / 2);
  const blocked = new Set(recentIds.slice(0, windowN));
  let pool = bank.filter((b) => !blocked.has(idOf(b)));
  if (pool.length === 0) pool = bank;
  const p = pool[Math.floor(Math.random() * pool.length)];
  return p;
}

function pickFreshN(bank, prefix, n, idOf) {
  const pre = prefix + ":";
  const recentIds = getRecent().filter((k) => k.startsWith(pre)).map((k) => k.slice(pre.length));
  const windowN = Math.floor(bank.length / 2);
  const blocked = new Set(recentIds.slice(0, windowN));
  let pool = bank.filter((b) => !blocked.has(idOf(b)));
  if (pool.length < n) pool = bank.slice();
  const picks = shuffle(pool).slice(0, n);
  return picks;
}

function makeProblemR1() {
  const picks = pickFreshN(R1_BANK, "cam", 4, (q) => q.id);
  const steps = picks.map((q) => ({ q: q.q, options: shuffle(q.options) }));
  return { steps, total: steps.length, ids: picks.map((q) => q.id) };
}

function makeProblemR2() {
  const mem = pickFresh(R2_BANK, "tl", (m) => m.id);
  // id de cada fragmento = su orden correcto (0..2). La bandeja se baraja
  // (forzamos que no quede ya ordenada para que siempre haya tarea).
  const frags = mem.frags.map((text, order) => ({ id: order, text, order }));
  let tray = shuffle(frags.map((f) => f.id));
  if (tray.join() === "0,1,2") tray = [tray[1], tray[0], tray[2]];
  return { memId: mem.id, frags, tray };
}

function makeProblemR3() {
  const item = pickFresh(R3_BANK, "tono", (it) => it.id);
  return { id: item.id, stem: item.stem, options: shuffle(item.options) };
}

// ═════════════════════════════════════════════════════════════
// GameScreen — wrapper que permite REINICIAR remontando el juego.
// ═════════════════════════════════════════════════════════════
function GameScreen({ app, setApp, go }) {
  const [restartTick, setRestartTick] = useStateG(0);
  const restart = () => setRestartTick((t) => t + 1);
  return (
    <>
      <style>{`
        .ed-drop-hover {
          outline: 3px dashed #4fd8ff !important;
          outline-offset: 2px;
          box-shadow: 0 0 22px rgba(79,216,255,0.7) !important;
          background-color: rgba(79,216,255,0.18) !important;
          transition: all 0.12s ease;
        }
        .ed-draggable { touch-action: none; user-select: none; -webkit-user-select: none; }
        @keyframes ed-hop { 0%{transform:translateY(0)} 40%{transform:translateY(-10px)} 100%{transform:translateY(0)} }
      `}</style>
      <MemoriasGame key={`mem-${restartTick}`} app={app} setApp={setApp} go={go} onRestart={restart} />
    </>
  );
}

function MemoriasGame({ app, setApp, go, onRestart }) {
  const char = CHARACTERS.find((c) => c.id === app.character) || CHARACTERS[0];
  const catLabel = app.currentCatLabel || "Memorias literarias";

  const [ronda, setRonda] = useStateG(0);

  // Picks por ronda (una sola vez por montaje).
  const [r1Pick] = useStateG(() => makeProblemR1());
  const [r2Pick] = useStateG(() => makeProblemR2());
  const [r3Pick] = useStateG(() => makeProblemR3());

  // R2 — la línea del tiempo: placed = { slotIndex: fragId }, selected = fragId|null
  const [r2Placed, setR2Placed] = useStateG({});
  const [r2Selected, setR2Selected] = useStateG(null);
  const [r2Locked, setR2Locked] = useStateG(false);

  // R1 — el camino: estado del tablero (elevado para usar VERIFICAR del rail)
  const [r1StepIdx, setR1StepIdx] = useStateG(0);
  const [r1Results, setR1Results] = useStateG([]); // bool por casilla resuelta (true=acierto)
  const [r1Chosen, setR1Chosen] = useStateG(null);
  const [r1Phase, setR1Phase] = useStateG("answering"); // answering | feedback

  // R3 — el tono justo: índice elegido | null
  const [r3Choice, setR3Choice] = useStateG(null);
  const [r3Locked, setR3Locked] = useStateG(false);

  // Shell state
  const [elapsed, setElapsed] = useStateG(0);
  const [stars, setStars] = useStateG(0);
  const [solved, setSolved] = useStateG(0);
  const [attempted, setAttempted] = useStateG(0);
  const [starsSession, setStarsSession] = useStateG(0);
  const [feedback, setFeedback] = useStateG(null);
  const [feedbackMsg, setFeedbackMsg] = useStateG("");
  const [confirmingRestart, setConfirmingRestart] = useStateG(false);
  const [confirmingExit, setConfirmingExit] = useStateG(false);
  const [log, setLog] = useStateG([]);
  const started = useRefG(Date.now());
  const exerciseStart = useRefG(Date.now());

  useEffectG(() => {
    const id = setInterval(() => setElapsed(Math.floor((Date.now() - started.current) / 1000)), 500);
    return () => clearInterval(id);
  }, []);

  // ── Estados de completitud por ronda
  const r2AllPlaced = [0, 1, 2].every((s) => r2Placed[s] !== undefined && r2Placed[s] !== null);

  // R1 (camino) y R3 (tono) se AUTO-EVALÚAN: al tocar una opción se resalta y,
  // tras una breve ventana para recapacitar (~700 ms), se califica sola (sin
  // VERIFICAR, aprobado por la autora). Solo R2 (ordenar, drag) conserva VERIFICAR.
  const canVerify =
    ronda === 1 ? (r2AllPlaced && !r2Locked) :
    false;

  const r1AutoRef = useRefG(null);
  const r3AutoRef = useRefG(null);
  // Guard de montaje: evita que los timers diferidos hagan setState / naveguen
  // sobre una instancia ya desmontada (tras REINICIAR o SALIR durante el feedback).
  const aliveRef = useRefG(true);
  useEffectG(() => () => { clearTimeout(r1AutoRef.current); clearTimeout(r3AutoRef.current); aliveRef.current = false; }, []);

  // Registrar en el FIFO los picks elegidos como EFECTO (no en el render):
  // evita escribir en localStorage durante la inicialización (pureza de render).
  useEffectG(() => {
    r1Pick.ids.forEach((id) => pushRecent("cam:" + id));
    pushRecent("tl:" + r2Pick.memId);
    pushRecent("tono:" + r3Pick.id);
  }, []);

  // Califica la casilla actual de la R1 con la opción tocada (mismo flujo que
  // tenía VERIFICAR: marca verde/rojo y SIEMPRE avanza al siguiente paso).
  function gradeR1(choiceIdx) {
    if (r1Phase !== "answering") return;
    const step = r1Pick.steps[r1StepIdx];
    const ok = !!(step.options[choiceIdx] && step.options[choiceIdx].ok);
    const willResults = r1Results.slice();
    willResults[r1StepIdx] = ok;
    setR1Phase("feedback");
    setR1Results(willResults);
    setTimeout(() => {
      if (!aliveRef.current) return;
      const next = r1StepIdx + 1;
      if (next >= r1Pick.total) {
        finishR1(willResults.filter(Boolean).length, r1Pick.total);
      } else {
        setR1StepIdx(next);
        setR1Chosen(null);
        setR1Phase("answering");
      }
    }, ok ? 760 : 2000);
  }

  // Califica la R3 con la opción tocada (se dispara sola tras ~700 ms).
  function gradeR3(choiceIdx) {
    if (r3Locked) return;
    setR3Locked(true);
    const correct = r3Pick.options[choiceIdx] && r3Pick.options[choiceIdx].ok;
    const userText = r3Pick.options[choiceIdx] ? r3Pick.options[choiceIdx].t : "—";
    const okOpt = r3Pick.options.find((o) => o.ok);
    const correctText = okOpt ? okOpt.t : "—";
    // Al fallar, unos segundos para ver cuál era el final correcto (verde ✓).
    setTimeout(() => { if (!aliveRef.current) return; answer(correct, userText, correctText, "🎭", "El tono justo"); }, correct ? 420 : 2200);
  }

  function handleVerify() {
    if (!canVerify) return;
    if (ronda === 1) {
      setR2Locked(true);
      const correct = [0, 1, 2].every((s) => r2Placed[s] === s);
      const userText = [0, 1, 2].map((s) => (r2Placed[s] != null ? r2Placed[s] + 1 : "?")).join("-");
      const correctText = "1-2-3 (antes → ahora)";
      setTimeout(() => { if (!aliveRef.current) return; answer(correct, userText, correctText, "🕰️", "La línea del tiempo"); }, 420);
    }
  }

  // R1 — el tablero llama aquí al terminar las 4 casillas.
  function finishR1(correctCount, total) {
    const ok = correctCount === total;
    const userText = `${correctCount} de ${total} casillas`;
    const correctText = `${total} de ${total} casillas`;
    // Al no llegar a la meta, decirle al niño exactamente cuánto le faltó (en
    // vez del ánimo genérico) porque vio casi todo el camino en verde.
    const faltan = total - correctCount;
    const failMsg = `Te faltó ${faltan === 1 ? "1 casilla" : faltan + " casillas"} para llegar a la meta.`;
    answer(ok, userText, correctText, "🧭", "El camino de los recuerdos", failMsg);
  }

  function handleErase() {
    if (ronda === 1) { if (r2Locked) return; setR2Placed({}); setR2Selected(null); }
  }

  function answer(isCorrect, userText, correctText, opIcon, reto, failMsg) {
    if (!aliveRef.current) return;
    if (typeof window.markFirstAttempt === "function") window.markFirstAttempt();
    const exerciseSec = Math.max(0, Math.floor((Date.now() - exerciseStart.current) / 1000));
    const earned = calcStars(isCorrect, exerciseSec);
    const newAttempted = attempted + 1;
    const newSolved = solved + (isCorrect ? 1 : 0);
    const newStarsTotal = stars + earned;
    const newStarsSession = starsSession + earned;

    const entry = {
      idx: newAttempted,
      a: reto || correctText, b: userText, op: opIcon || "·",
      correctAnswer: correctText, userAnswer: userText,
      isCorrect, time: exerciseSec, earned,
    };
    const newLog = [...log, entry];

    setFeedback(isCorrect ? "ok" : "err");
    setFeedbackMsg(isCorrect ? `+${earned} ⭐` : (failMsg || ENCOURAGEMENTS[Math.floor(Math.random() * ENCOURAGEMENTS.length)]));
    setAttempted(newAttempted);
    setSolved(newSolved);
    setStars(newStarsTotal);
    setStarsSession(newStarsSession);
    setLog(newLog);

    const wait = isCorrect ? 1000 : 1450;
    setTimeout(() => {
      if (!aliveRef.current) return;
      setFeedback(null);
      setFeedbackMsg("");
      if (newAttempted >= 3) {
        setApp((s) => ({
          ...s, stars: newStarsTotal,
          lastResult: { category: catLabel, solved: newSolved, total: 3, time: elapsed, starsEarned: newStarsSession, log: newLog },
        }));
        window.incrementGamesCompleted && window.incrementGamesCompleted();
        go("results");
      } else {
        setRonda((r) => r + 1);
        exerciseStart.current = Date.now();
      }
    }, wait);
  }

  // Enunciado = QUÉ hacer (la tarea). Bocadillo = CÓMO (la mecánica).
  const enunciado =
    ronda === 0 ? "Responde bien para llegar a la meta." :
    ronda === 1 ? "Ordena los momentos de la memoria." :
    "Elige el final que transmite emoción.";
  const bocadillo =
    ronda === 0 ? "Toca la opción correcta\npara avanzar." :
    ronda === 1 ? "Coloca cada parte:\nantes, después y ahora." :
    "Lee la frase y toca\nla opción más viva.";

  return (
    <div style={{ position: "absolute", inset: 0, overflow: "hidden" }}>
      <GameHUD elapsed={elapsed} stars={stars} attempted={attempted} solved={solved} total={3} />
      <CharacterCorner char={char} message={bocadillo} />

      {ronda === 0 && (
        <CaminoCard
          enunciado={enunciado}
          pick={r1Pick}
          stepIdx={r1StepIdx}
          results={r1Results}
          chosen={r1Chosen}
          phase={r1Phase}
          onPick={(i) => {
            if (r1Phase !== "answering") return;
            setR1Chosen(i);
            // Resalta y, si no cambia de idea en ~700 ms, califica sola.
            clearTimeout(r1AutoRef.current);
            r1AutoRef.current = setTimeout(() => gradeR1(i), 700);
          }}
        />
      )}

      {ronda === 1 && (
        <LineaTiempoCard
          enunciado={enunciado}
          pick={r2Pick}
          placed={r2Placed}
          selected={r2Selected}
          locked={r2Locked}
          onSelect={(id) => { if (!r2Locked) setR2Selected((s) => (s === id ? null : id)); }}
          onPlace={(slot, id) => {
            if (r2Locked) return;
            setR2Placed((p) => {
              const n = {};
              // un fragmento solo puede estar en un slot: lo quitamos de otros
              for (const k of Object.keys(p)) if (p[k] !== id) n[k] = p[k];
              n[slot] = id;
              return n;
            });
            setR2Selected(null);
          }}
          onUnplace={(id) => {
            if (r2Locked) return;
            setR2Placed((p) => {
              const n = { ...p };
              for (const k of Object.keys(n)) if (n[k] === id) delete n[k];
              return n;
            });
          }}
        />
      )}

      {ronda === 2 && (
        <TonoCard
          enunciado={enunciado}
          pick={r3Pick}
          chosen={r3Choice}
          locked={r3Locked}
          onPick={(i) => {
            if (r3Locked) return;
            setR3Choice(i);
            // Resalta y, si no cambia de idea en ~700 ms, califica sola.
            clearTimeout(r3AutoRef.current);
            r3AutoRef.current = setTimeout(() => gradeR3(i), 700);
          }}
        />
      )}

      <ActionRail
        canVerify={canVerify}
        onVerify={handleVerify}
        showVerify={ronda === 1}
        showErase={ronda === 1}
        onErase={handleErase}
        onRestart={() => setConfirmingRestart(true)}
        onExit={() => setConfirmingExit(true)}
      />

      <FeedbackOverlay feedback={feedback} feedbackMsg={feedbackMsg} charName={char.name} />
      <RestartModal confirmingExit={confirmingRestart} setConfirmingExit={setConfirmingRestart} attempted={attempted} total={3} onRestart={onRestart} />
      <ExitModal confirmingExit={confirmingExit} setConfirmingExit={setConfirmingExit} attempted={attempted} total={3} onExit={() => go("home")} />
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// R1 · El camino de los recuerdos — tablero de casillas 1..N + meta 🏁.
// El niño responde un mini-reto por casilla y pulsa VERIFICAR: la casilla
// se pinta VERDE ✓ si acierta o ROJA ✗ si falla, y SIEMPRE avanza a la
// siguiente, recorriendo todo el camino hasta la meta.
// ─────────────────────────────────────────────────────────────
function CaminoCard({ enunciado, pick, stepIdx, results, chosen, phase, onPick }) {
  const total = pick.total;
  const step = pick.steps[stepIdx];
  const reveal = phase === "feedback";
  // casillas ya resueltas (en feedback, la actual ya cuenta como resuelta)
  const answered = results.length;
  const nodes = Array.from({ length: total + 1 }, (_, i) => i);

  return (
    <div data-qa="zona-central" style={{
      position: "absolute", top: 64, bottom: 16, left: "50%", transform: "translateX(-50%)",
      width: 560, display: "flex", flexDirection: "column", justifyContent: "space-evenly", alignItems: "center",
    }}>
      <EnunciadoInline text={enunciado} />

      {/* Camino de casillas: 1..total y meta */}
      <div data-qa="bandeja" style={{ display: "flex", alignItems: "center", justifyContent: "center" }}>
        {nodes.map((i) => {
          const isMeta = i === total;
          const resolved = !isMeta && i < answered;       // ya respondida
          const here = !isMeta && i === stepIdx && !reveal; // casilla actual, contestando
          const good = resolved && results[i];
          const metaReached = isMeta && answered >= total;
          let bg, ink, border, content;
          if (metaReached) { bg = "linear-gradient(180deg,#fce9a8,#e9c45a)"; ink = "#3a2608"; border = "#fce9a8"; content = "🏁"; }
          else if (isMeta) { bg = "rgba(10,6,35,0.45)"; ink = "rgba(252,233,168,0.6)"; border = "rgba(242,194,96,0.45)"; content = "🏁"; }
          else if (resolved && good) { bg = "linear-gradient(180deg,#2ecc8f,#22a06c)"; ink = "#fff"; border = "#2ecc8f"; content = "✓"; }
          else if (resolved && !good) { bg = "linear-gradient(180deg,#ff6b6b,#dc5050)"; ink = "#fff"; border = "#ff6b6b"; content = "✗"; }
          else if (here) { bg = "linear-gradient(180deg,#fce9a8,#e9c45a)"; ink = "#3a2608"; border = "#fce9a8"; content = i + 1; }
          else { bg = "rgba(10,6,35,0.45)"; ink = "rgba(252,233,168,0.55)"; border = "rgba(242,194,96,0.4)"; content = i + 1; }
          return (
            <React.Fragment key={i}>
              {i > 0 && (
                <div style={{
                  width: 30, height: 5, borderRadius: 3,
                  background: i <= answered ? "#2ecc8f" : "rgba(242,194,96,0.3)",
                }} />
              )}
              <div style={{
                width: 48, height: 48, borderRadius: "50%",
                display: "flex", alignItems: "center", justifyContent: "center",
                background: bg, color: ink, border: `2.5px solid ${border}`,
                fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: here ? 24 : 20,
                boxShadow: (here || metaReached) ? "0 0 16px rgba(252,233,168,0.6)" : "inset 0 1px 0 rgba(255,255,255,0.06)",
                animation: here ? "ed-hop 1.2s ease-in-out infinite" : "none",
                flexShrink: 0,
              }}>{content}</div>
            </React.Fragment>
          );
        })}
      </div>

      {/* Progreso */}
      <div style={{
        display: "inline-flex", alignItems: "center", gap: 8,
        background: "rgba(0,0,0,0.3)", border: "1px solid rgba(242,194,96,0.45)",
        borderRadius: 999, padding: "4px 14px",
        fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 13, color: "#fce9a8",
      }}>
        🧭 Casilla {Math.min(stepIdx + 1, total)} de {total}
      </div>

      {/* Pregunta de la casilla */}
      <div style={{
        width: "fit-content", maxWidth: 450,
        padding: "12px 18px", borderRadius: 16,
        background: "linear-gradient(180deg, rgba(255,255,255,0.96), rgba(240,235,225,0.92))",
        border: "3px solid #f2c260",
        boxShadow: "0 12px 28px rgba(0,0,0,0.4), inset 0 -4px 0 rgba(0,0,0,0.06)",
        fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 16.5,
        color: "#3a2608", lineHeight: 1.3, textAlign: "center",
      }}>{step.q}</div>

      {/* Opciones */}
      <div style={{ display: "flex", flexDirection: "column", gap: 10, width: 430, maxWidth: 440 }}>
        {step.options.map((o, i) => {
          const isChosen = chosen === i;
          let bg = "rgba(255,255,255,0.92)", ink = "#3a2608", border = "rgba(116,72,32,0.25)";
          if (reveal && o.ok) { bg = "linear-gradient(180deg,#2ecc8f,#22a06c)"; ink = "#fff"; border = "#2ecc8f"; }
          else if (reveal && isChosen && !o.ok) { bg = "linear-gradient(180deg,#ff6b6b,#dc5050)"; ink = "#fff"; border = "#ff6b6b"; }
          else if (isChosen) { bg = "linear-gradient(180deg,#fce9a8,#e9c45a)"; ink = "#3a2608"; border = "#e9c45a"; }
          return (
            <button key={i}
              onClick={() => onPick(i)}
              disabled={phase !== "answering"}
              style={{
                position: "relative",
                padding: "12px 16px", borderRadius: 12,
                border: `2px solid ${border}`, background: bg, color: ink,
                fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 16,
                cursor: phase === "answering" ? "pointer" : "default",
                boxShadow: "0 3px 8px rgba(0,0,0,0.22)",
                transition: "all 0.15s ease", lineHeight: 1.25,
              }}>
              {o.t}
              {reveal && o.ok && !isChosen && (
                <span style={{
                  position: "absolute", top: -8, right: -8, width: 22, height: 22, borderRadius: "50%",
                  background: "#2ecc8f", color: "#fff", fontSize: 14, fontWeight: 800,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  border: "2px solid #fff", boxShadow: "0 2px 6px rgba(0,0,0,0.4)",
                }}>✓</span>
              )}
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// R2 · La línea del tiempo — bandeja de 3 fragmentos barajados + 3
// casilleros (Antes → Después → Ahora). Tap el fragmento, tap el
// casillero; o arrastra. VERIFICAR colorea cada casillero verde/rojo.
// ─────────────────────────────────────────────────────────────
const TL_SLOTS = [
  { i: 0, label: "Antes", color: "#4fa0ff" },
  { i: 1, label: "Después", color: "#a78bfa" },
  { i: 2, label: "Ahora", color: "#2ecc8f" },
];

function LineaTiempoCard({ enunciado, pick, placed, selected, locked, onSelect, onPlace, onUnplace }) {
  const placedIds = new Set(Object.values(placed));
  const trayIds = pick.tray.filter((id) => !placedIds.has(id));

  function fragText(id) {
    const f = pick.frags.find((x) => x.id === id);
    return f ? f.text : "";
  }

  const chipStyle = {
    padding: "9px 13px", borderRadius: 12,
    fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 14,
    lineHeight: 1.25, cursor: locked ? "default" : "grab",
    border: "2px solid", maxWidth: 430,
  };

  return (
    <div style={{
      position: "absolute", top: 64, bottom: 16, left: "50%", transform: "translateX(-50%)",
      width: 560, display: "flex", flexDirection: "column", justifyContent: "space-evenly", alignItems: "center",
    }}>
      <EnunciadoInline text={enunciado} />

      {/* Bandeja de fragmentos por colocar */}
      <div data-qa="zona-central" style={{
        width: 450, minHeight: 50,
        display: "flex", flexWrap: "wrap", gap: 8, justifyContent: "center", alignItems: "center",
      }}>
        {trayIds.length === 0 && (
          <div style={{ fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 14, color: "rgba(255,255,255,0.7)" }}>
            ¡Listo! Pulsa VERIFICAR.
          </div>
        )}
        {trayIds.map((id) => {
          const sel = selected === id;
          const handler = locked ? undefined : makeDragHandler({
            item: id,
            ghostHtml: `<div style="background:#fce9a8;color:#3a2608;padding:8px 12px;border-radius:10px;max-width:320px;font-family:Fredoka,Nunito,sans-serif;font-weight:700;font-size:14px;border:2px solid #4fd8ff;box-shadow:0 6px 18px rgba(0,0,0,0.5);">${fragText(id)}</div>`,
            onTap: (it) => onSelect(it),
            onDrop: (zone, it) => onPlace(parseInt(zone.replace("slot", ""), 10), it),
          });
          return (
            <div key={id}
              className="ed-draggable"
              onPointerDown={handler}
              style={{
                ...chipStyle,
                background: sel ? "linear-gradient(180deg,#fce9a8,#e9c45a)" : "rgba(255,255,255,0.94)",
                color: "#3a2608",
                borderColor: sel ? "#4fd8ff" : "rgba(116,72,32,0.25)",
                boxShadow: sel ? "0 0 16px rgba(79,216,255,0.6)" : "0 3px 8px rgba(0,0,0,0.25)",
                transform: sel ? "translateY(-2px)" : "none",
              }}>
              {fragText(id)}
            </div>
          );
        })}
      </div>

      {/* Línea del tiempo vertical: 3 casilleros con flechas */}
      <div style={{ display: "flex", flexDirection: "column", gap: 6, width: 450 }}>
        {TL_SLOTS.map((slot, si) => {
          const id = placed[slot.i];
          const filled = id !== undefined && id !== null;
          const ok = locked && filled ? (id === slot.i) : null;
          let zoneBg = "rgba(10,6,35,0.45)", zoneBorder = slot.color;
          if (locked && filled) {
            zoneBg = ok ? "linear-gradient(180deg, rgba(46,204,143,0.92), rgba(34,160,108,0.9))" : "linear-gradient(180deg, rgba(255,107,107,0.92), rgba(220,80,80,0.9))";
            zoneBorder = ok ? "#2ecc8f" : "#ff6b6b";
          }
          const placedHandler = (locked || !filled) ? undefined : makeDragHandler({
            item: id,
            ghostHtml: `<div style="background:#fce9a8;color:#3a2608;padding:8px 12px;border-radius:10px;max-width:320px;font-family:Fredoka,Nunito,sans-serif;font-weight:700;font-size:14px;border:2px solid #4fd8ff;box-shadow:0 6px 18px rgba(0,0,0,0.5);">${fragText(id)}</div>`,
            onTap: (it) => onUnplace(it),
            onDrop: (zone, it) => onPlace(parseInt(zone.replace("slot", ""), 10), it),
          });
          return (
            <React.Fragment key={slot.i}>
              <div style={{ display: "flex", alignItems: "stretch", gap: 10 }}>
                {/* etiqueta de tiempo */}
                <div style={{
                  width: 96, flexShrink: 0, borderRadius: 12,
                  background: slot.color, color: "#fff",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 15,
                  letterSpacing: "0.03em", boxShadow: "0 3px 8px rgba(0,0,0,0.3)",
                }}>{slot.label}</div>
                {/* casillero (dropzone) */}
                <div
                  data-dropzone={`slot${slot.i}`}
                  onClick={() => { if (!locked && selected !== null && !filled) onPlace(slot.i, selected); }}
                  style={{
                    flex: 1, minHeight: 50, borderRadius: 12, padding: "8px 12px",
                    background: zoneBg, border: `2.5px dashed ${zoneBorder}`,
                    display: "flex", alignItems: "center",
                    cursor: (!locked && selected !== null && !filled) ? "pointer" : "default",
                  }}>
                  {filled ? (
                    <div
                      className="ed-draggable"
                      onPointerDown={placedHandler ? (e) => { e.stopPropagation(); placedHandler(e); } : undefined}
                      style={{
                        fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 14,
                        color: locked ? "#fff" : "#3a2608",
                        background: locked ? "transparent" : "rgba(255,255,255,0.94)",
                        padding: locked ? 0 : "6px 10px", borderRadius: 8,
                        lineHeight: 1.25, cursor: locked ? "default" : "grab",
                        boxShadow: locked ? "none" : "0 2px 5px rgba(0,0,0,0.2)", touchAction: "none",
                      }}>
                      {locked ? (ok ? "✓ " : "✗ ") : ""}{fragText(id)}
                    </div>
                  ) : (
                    <span style={{ fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 13, color: "rgba(252,233,168,0.5)" }}>
                      Coloca aquí…
                    </span>
                  )}
                </div>
              </div>
              {si < TL_SLOTS.length - 1 && (
                <div style={{ textAlign: "center", color: "rgba(252,233,168,0.55)", fontSize: 14, lineHeight: 0.6 }}>↓</div>
              )}
            </React.Fragment>
          );
        })}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// R3 · El tono justo — una memoria con un hueco y 3 finales. El niño
// elige el final evocador. VERIFICAR; al fallar se marca en verde ✓
// el final correcto (feedback estándar §11).
// ─────────────────────────────────────────────────────────────
function TonoCard({ enunciado, pick, chosen, locked, onPick }) {
  return (
    <div data-qa="zona-central" style={{
      position: "absolute", top: 64, bottom: 16, left: "50%", transform: "translateX(-50%)",
      width: 560, display: "flex", flexDirection: "column", justifyContent: "space-evenly", alignItems: "center",
    }}>
      <EnunciadoInline text={enunciado} />

      {/* Memoria con el hueco */}
      <div style={{
        width: "fit-content", maxWidth: 450,
        padding: "16px 20px", borderRadius: 18,
        background: "linear-gradient(180deg, rgba(255,255,255,0.96), rgba(240,235,225,0.92))",
        border: "3px solid #f2c260",
        boxShadow: "0 12px 28px rgba(0,0,0,0.4), inset 0 -4px 0 rgba(0,0,0,0.06)",
        fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 20,
        color: "#3a2608", lineHeight: 1.35, textAlign: "center", fontStyle: "italic",
      }}>“{pick.stem}”</div>

      {/* Finales posibles */}
      <div data-qa="bandeja" style={{ display: "flex", flexDirection: "column", gap: 10, width: 430, maxWidth: 440 }}>
        {pick.options.map((o, i) => {
          const isChosen = chosen === i;
          let bg = "rgba(255,255,255,0.92)", ink = "#3a2608", border = "rgba(116,72,32,0.25)";
          if (locked && o.ok) { bg = "linear-gradient(180deg,#2ecc8f,#22a06c)"; ink = "#fff"; border = "#2ecc8f"; }
          else if (locked && isChosen && !o.ok) { bg = "linear-gradient(180deg,#ff6b6b,#dc5050)"; ink = "#fff"; border = "#ff6b6b"; }
          else if (isChosen) { bg = "linear-gradient(180deg,#fce9a8,#e9c45a)"; ink = "#3a2608"; border = "#e9c45a"; }
          return (
            <button key={i}
              onClick={() => onPick(i)}
              disabled={locked}
              style={{
                position: "relative",
                padding: "12px 16px", borderRadius: 12,
                border: `2px solid ${border}`, background: bg, color: ink,
                fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 16,
                cursor: locked ? "default" : "pointer",
                boxShadow: "0 3px 8px rgba(0,0,0,0.22)",
                transition: "all 0.15s ease", lineHeight: 1.25, textAlign: "left",
              }}>
              {o.t}
              {locked && o.ok && !isChosen && (
                <span style={{
                  position: "absolute", top: -8, right: -8, width: 22, height: 22, borderRadius: "50%",
                  background: "#2ecc8f", color: "#fff", fontSize: 14, fontWeight: 800,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  border: "2px solid #fff", boxShadow: "0 2px 6px rgba(0,0,0,0.4)",
                }}>✓</span>
              )}
            </button>
          );
        })}
      </div>
    </div>
  );
}

Object.assign(window, { GameScreen, ResultsScreen });

// app.jsx — Shell de producción EDINUN GAMES.
// Enrutador por estado y device stage adaptativo (desktop / tablet / mobile).
// Móvil portrait: el contenido NUNCA rota; un overlay BLOQUEANTE obliga
// al usuario a girar físicamente el teléfono antes de poder usar la app.

const { useState: useStateA, useEffect: useEffectA, useRef: useRefA } = React;

// ─────────────────────────────────────────────────────────────
// useViewportSize — devuelve el tamaño REAL visible del viewport.
//
// En iOS Safari (y otros mobile browsers), `window.innerHeight` y `100vh`
// reportan la altura de la ventana INCLUYENDO la URL bar, así que el
// contenido escalado a esa altura termina parcialmente fuera de pantalla
// (ej: el numpad del juego queda debajo del fondo visible). La Visual
// Viewport API reporta el área verdaderamente visible y se actualiza
// cuando la URL bar se muestra/oculta.
// ─────────────────────────────────────────────────────────────
// Detección de "resize REAL" vs "zoom del navegador".
//
// Idea: el tamaño FÍSICO de la zona visible en píxeles del display es
// invariante al ctrl+rueda. Cuando subes el zoom de 100 % a 500 %:
//   · innerWidth en CSS-px se divide entre 5
//   · devicePixelRatio se multiplica por 5
//   · innerWidth × devicePixelRatio queda igual ⇒ NO hubo resize real.
//
// Cuando arrastras la esquina de la ventana o rotas el dispositivo:
//   · innerWidth en CSS-px cambia
//   · devicePixelRatio NO cambia
//   · innerWidth × devicePixelRatio cambia ⇒ SÍ hubo resize real.
//
// Por eso comparamos contra `innerWidth × devicePixelRatio` y solo
// actualizamos el state cuando ese producto cambia. Así el lienzo se
// queda con su tamaño CSS previo durante el zoom y el navegador lo
// amplifica visualmente — junto con los glifos, que ya leen `glyphSize`
// del mismo state defendido (ver DeviceStage).
//
// La defensa anterior (tracker de _lastDPR) era frágil: se actualizaba
// en CADA evento, así que si el navegador disparaba dos resize seguidos
// para la misma acción de zoom, el segundo veía el dpr ya guardado y
// recalculaba el tamaño con el viewport pequeño. Esto causaba que los
// glifos quedaran enormes mientras el lienzo se recomprimía.
function physicalSize() {
  if (typeof window === "undefined") return { w: 0, h: 0 };
  const dpr = window.devicePixelRatio || 1;
  return { w: window.innerWidth * dpr, h: window.innerHeight * dpr };
}
let _lastPhysical = physicalSize();

function useViewportSize() {
  const [size, setSize] = useStateA(() => readSize());
  useEffectA(() => {
    function onChange() {
      const phys = physicalSize();
      // Tolerancia de 4 px reales para absorber redondeos del navegador.
      if (Math.abs(phys.w - _lastPhysical.w) < 4 && Math.abs(phys.h - _lastPhysical.h) < 4) {
        // Mismo display, distinto zoom — no actualizamos el state.
        return;
      }
      _lastPhysical = phys;
      setSize(readSize());
    }
    window.addEventListener("resize", onChange);
    window.addEventListener("orientationchange", onChange);
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", onChange);
    }
    return () => {
      window.removeEventListener("resize", onChange);
      window.removeEventListener("orientationchange", onChange);
      if (window.visualViewport) {
        window.visualViewport.removeEventListener("resize", onChange);
      }
    };
  }, []);
  return size;
}
function readSize() {
  if (typeof window === "undefined") return { vw: 0, vh: 0 };
  const vv = window.visualViewport;
  // Cuando el usuario hace pinch-zoom, vv.scale > 1 y vv.width/height
  // reflejan la región visible (más pequeña). Usar esos valores haría
  // que la escala del lienzo se reduzca al hacer zoom — exactamente lo
  // contrario de lo que el usuario quiere. Solo confiamos en vv cuando
  // scale ≈ 1 (sin zoom) — ahí da una lectura más fiel que innerWidth/
  // Height en iOS Safari (descuenta correctamente la URL bar visible).
  if (vv && Math.abs(vv.scale - 1) < 0.05) {
    return { vw: vv.width, vh: vv.height };
  }
  return { vw: window.innerWidth, vh: window.innerHeight };
}

// ─────────────────────────────────────────────────────────────
// DeviceStage — escala el lienzo lógico 900×540 (paisaje) al viewport.
//
// Reglas:
//   · Desktop / tablet: sin marco, sin notch, fondo cósmico edge-to-edge.
//   · Mobile portrait: lienzo letterboxed Y overlay BLOQUEANTE "Gira el
//     teléfono". El contenido del juego no es accesible hasta que rote.
//   · Mobile landscape: lienzo escalado al viewport visible (visualViewport,
//     no innerHeight, para no clippearse debajo de la URL bar de iOS).
// ─────────────────────────────────────────────────────────────
function DeviceStage({ children, variant = "cosmic" }) {
  const W = 900, H = 540;
  const { vw, vh } = useViewportSize();
  const minSide = Math.min(vw, vh);
  const maxSide = Math.max(vw, vh);
  let mode = "desktop";
  if (maxSide < 820) mode = "mobile";
  else if (minSide < 820) mode = "tablet";
  const portrait = vh > vw;
  const baseScale = Math.max(Math.min(vw / W, vh / H), 0.15);

  // Detección de teléfono independiente del modo: cualquier dispositivo con
  // lado menor ≤ 600 CSS-px es un teléfono. Cubre todos los teléfonos
  // actuales (iPhone SE 320 → S25 Ultra/Pro Max ~432) con margen para
  // modelos futuros más anchos. La menor tablet (iPad mini 744) queda
  // bien por encima, así que no se rompe el caso "tablet portrait usable
  // letterboxed". Solo bloqueamos cuando teléfono Y portrait — el lienzo
  // paisaje queda demasiado pequeño para jugar.
  const isPhone = minSide <= 600;
  const lockPortrait = isPhone && portrait;

  // Tamaño de los glifos del fondo: equivalente al `clamp(48px, 7vmin, 110px)`
  // que tenía el CSS, pero calculado a partir del vw/vh DEFENDIDO contra
  // cambios de DPR. Esto evita que con ctrl+rueda del mouse los glifos
  // crezcan más rápido que el lienzo (el lienzo se congela vía la defensa
  // del DPR; si CSS lee el vmin actual, los glifos no se congelan y desync).
  const glyphSize = Math.max(48, Math.min(minSide * 0.07, 110));

  const debug = typeof window !== "undefined" && /(?:^|[#&])debug(?:&|$)/.test(window.location.hash || "");

  // ─── Pinch-zoom y pan custom ─────────────────────────────────
  // Reemplaza el zoom nativo del browser. Razón: con el lienzo letterboxed
  // dentro de un wrapper viewport-sized, el visual viewport del browser
  // puede panear hasta dejar al usuario mirando solo el cosmos vacío de los
  // bordes — el "rebote" reportado en iPhone (ver .planning/ios-zoom.md).
  // Aquí los gestos operan sobre el transform del lienzo, así que el zoom
  // siempre gravita alrededor del contenido y no deriva a un borde
  // decorativo.
  const wrapperRef = useRefA(null);
  const gestureRef = useRefA(null);
  const stateRef = useRefA({ userZoom: 1, pan: { x: 0, y: 0 } });
  const [userZoom, setUserZoom] = useStateA(1);
  const [pan, setPan] = useStateA({ x: 0, y: 0 });
  const [duringGesture, setDuringGesture] = useStateA(false);

  useEffectA(() => {
    stateRef.current = { userZoom, pan };
  }, [userZoom, pan]);

  // Reset al cambiar viewport (rotación, resize). Si no, el pan queda
  // referenciado a un viewport que ya no existe.
  useEffectA(() => {
    setUserZoom(1);
    setPan({ x: 0, y: 0 });
    setDuringGesture(false);
  }, [vw, vh]);

  useEffectA(() => {
    if (lockPortrait) return;
    const el = wrapperRef.current;
    if (!el) return;

    const Z_MIN = 1;
    const Z_MAX = 4;

    const dist = (a, b) => Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
    const mid = (a, b) => ({ x: (a.clientX + b.clientX) / 2, y: (a.clientY + b.clientY) / 2 });

    function clampPan(zoom, px, py) {
      // Pan máximo: la mitad del exceso del lienzo escalado sobre el viewport.
      // En zoom=1 el max es 0 (lienzo cabe en viewport, no hay donde panear).
      // En zoom=N el lienzo mide N veces el lado contain, así que el usuario
      // puede mover ±(sw - vw)/2 antes de que la orilla del lienzo cruce la
      // orilla del viewport. Esto evita perder el contenido fuera de pantalla.
      const sw = baseScale * zoom * W;
      const sh = baseScale * zoom * H;
      const maxX = Math.max(0, (sw - vw) / 2);
      const maxY = Math.max(0, (sh - vh) / 2);
      return {
        x: Math.max(-maxX, Math.min(maxX, px)),
        y: Math.max(-maxY, Math.min(maxY, py)),
      };
    }

    function applyState(z, px, py) {
      stateRef.current = { userZoom: z, pan: { x: px, y: py } };
      setUserZoom(z);
      setPan({ x: px, y: py });
    }

    function onTouchStart(e) {
      const { userZoom: z0, pan: p0 } = stateRef.current;
      if (e.touches.length >= 2) {
        const [t0, t1] = e.touches;
        gestureRef.current = {
          mode: "pinch",
          d0: dist(t0, t1),
          m0: mid(t0, t1),
          z0, p0: { ...p0 },
        };
        setDuringGesture(true);
        e.preventDefault();
      } else if (e.touches.length === 1) {
        const t = e.touches[0];
        gestureRef.current = {
          mode: "pan-armed",
          startX: t.clientX,
          startY: t.clientY,
          z0, p0: { ...p0 },
        };
        // No preventDefault — un tap simple debe seguir generando click.
      }
    }

    function onTouchMove(e) {
      const g = gestureRef.current;
      if (!g) return;

      // Si en medio de un gesto entra un segundo dedo, transición a pinch
      // tomando el estado actual como punto de partida.
      if (e.touches.length >= 2 && g.mode !== "pinch") {
        const [t0, t1] = e.touches;
        const { userZoom: zNow, pan: pNow } = stateRef.current;
        gestureRef.current = {
          mode: "pinch",
          d0: dist(t0, t1),
          m0: mid(t0, t1),
          z0: zNow, p0: { ...pNow },
        };
        setDuringGesture(true);
        e.preventDefault();
        return;
      }

      if (e.touches.length >= 2 && g.mode === "pinch") {
        const [t0, t1] = e.touches;
        const d = dist(t0, t1);
        const m = mid(t0, t1);
        const ratio = d / g.d0;
        // Permitimos pasar transitoriamente bajo Z_MIN para sensación elástica
        // durante el gesto; en touchend hacemos snap-back al rango válido.
        const newZoom = Math.max(Z_MIN * 0.7, Math.min(Z_MAX * 1.05, g.z0 * ratio));
        const r = newZoom / g.z0;
        const ux = g.m0.x - vw / 2;
        const uy = g.m0.y - vh / 2;
        // Fórmula que mantiene el punto medio de la pinza anclado al mismo
        // píxel del lienzo durante todo el gesto. Derivación:
        //   panX_new = (mx0 - vw/2) + (newZoom/z0) * (panX0 - (mx0 - vw/2))
        //              + (mx_now - mx0)   ← desplazamiento del propio gesto
        const newPanX = ux + r * (g.p0.x - ux) + (m.x - g.m0.x);
        const newPanY = uy + r * (g.p0.y - uy) + (m.y - g.m0.y);
        applyState(newZoom, newPanX, newPanY);
        e.preventDefault();
      } else if (e.touches.length === 1 && g.mode === "pan-armed") {
        if (g.z0 <= 1.001) return; // sin zoom no panea — dejamos pasar el tap
        const t = e.touches[0];
        const dx = t.clientX - g.startX;
        const dy = t.clientY - g.startY;
        if (Math.hypot(dx, dy) > 8) {
          gestureRef.current = { ...g, mode: "pan" };
          setDuringGesture(true);
          e.preventDefault();
        }
      } else if (e.touches.length === 1 && g.mode === "pan") {
        const t = e.touches[0];
        const dx = t.clientX - g.startX;
        const dy = t.clientY - g.startY;
        applyState(g.z0, g.p0.x + dx, g.p0.y + dy);
        e.preventDefault();
      }
    }

    function onTouchEnd(e) {
      const g = gestureRef.current;
      if (!g) return;
      if (e.touches.length === 0) {
        const { userZoom: z, pan: p } = stateRef.current;
        const clampedZ = Math.max(Z_MIN, Math.min(Z_MAX, z));
        let cp;
        if (clampedZ <= 1.001) {
          cp = { x: 0, y: 0 };
        } else {
          cp = clampPan(clampedZ, p.x, p.y);
        }
        applyState(clampedZ, cp.x, cp.y);
        setDuringGesture(false);
        gestureRef.current = null;
      }
    }

    el.addEventListener("touchstart", onTouchStart, { passive: false });
    el.addEventListener("touchmove", onTouchMove, { passive: false });
    el.addEventListener("touchend", onTouchEnd, { passive: false });
    el.addEventListener("touchcancel", onTouchEnd, { passive: false });

    return () => {
      el.removeEventListener("touchstart", onTouchStart);
      el.removeEventListener("touchmove", onTouchMove);
      el.removeEventListener("touchend", onTouchEnd);
      el.removeEventListener("touchcancel", onTouchEnd);
    };
  }, [vw, vh, baseScale, lockPortrait]);

  const totalScale = baseScale * userZoom;

  return (
    <div ref={wrapperRef} style={{
      width: "100vw", height: "100dvh",
      minHeight: "-webkit-fill-available",
      overflow: "hidden",
      position: "relative",
      background: variant === "chalkboard" ? "#0b3a2d" : "#050214",
      // `touch-action: none` desactiva todos los gestos que el browser
      // interpretaría por su cuenta (pinch, pan, doble-tap-zoom). Los
      // implementamos en JS sobre el transform del lienzo para que el
      // zoom siempre quede anclado al contenido y nunca derive a los
      // bordes letterbox del wrapper. Los click/tap en botones siguen
      // funcionando — esto solo bloquea gestos del browser, no eventos.
      touchAction: "none",
    }}>
      <CosmosBg variant={variant} glyphSize={glyphSize} />

      {/* Lienzo lógico 900×540 centrado y escalado.
          El transform combina el escalado base (contain del viewport),
          el zoom del usuario y el pan acumulado. El orden CSS es
          right-to-left: scale → translate(pan) → translate(-50%,-50%). */}
      <div style={{
        width: W, height: H,
        position: "absolute",
        left: "50%", top: "50%",
        transform: `translate(-50%, -50%) translate(${pan.x}px, ${pan.y}px) scale(${totalScale})`,
        transformOrigin: "center center",
        overflow: "hidden",
        // Sin transición durante el gesto activo (el lienzo sigue la pinza
        // al instante); con transición elástica al soltar, para que el
        // snap-back de zoom/pan a los límites válidos no sea abrupto.
        transition: duringGesture ? "none" : "transform 0.22s cubic-bezier(0.2, 0.8, 0.2, 1)",
        willChange: "transform",
      }}>
        {children}
      </div>

      {lockPortrait && <RotateLockOverlay />}
      {debug && (
        <div style={{
          position: "fixed", top: 6, left: 6, zIndex: 999999,
          background: "rgba(0,0,0,0.85)", color: "#0f0",
          font: "11px ui-monospace,Menlo,monospace",
          padding: "6px 8px", borderRadius: 6,
          maxWidth: "90vw", whiteSpace: "pre",
          pointerEvents: "none",
        }}>
{`vw=${vw} vh=${vh}
min=${minSide} max=${maxSide}
mode=${mode} portrait=${portrait}
isPhone=${isPhone} LOCK=${lockPortrait}
zoom=${userZoom.toFixed(2)} pan=${pan.x.toFixed(0)},${pan.y.toFixed(0)}
vv=${typeof window!=="undefined" && window.visualViewport ? "yes" : "no"}
ua=${(typeof navigator!=="undefined" ? navigator.userAgent : "?").slice(0,60)}`}
        </div>
      )}
    </div>
  );
}

// Overlay bloqueante de rotación. En mobile portrait cubre toda la pantalla
// con un mensaje claro y un ícono animado. NO se puede descartar — el usuario
// DEBE girar el dispositivo para acceder al juego. Se desmonta solo cuando
// el viewport pasa a landscape.
function RotateLockOverlay() {
  return (
    <div
      role="dialog"
      aria-modal="true"
      aria-label="Gira tu teléfono para jugar"
      style={{
        position: "fixed", inset: 0, zIndex: 99999,
        background: "linear-gradient(180deg,#050214 0%,#0a0628 100%)",
        display: "flex", flexDirection: "column",
        alignItems: "center", justifyContent: "center",
        textAlign: "center", padding: "32px 24px",
        color: "#fce9a8",
        fontFamily: "var(--ed-font-display, system-ui)",
      }}
    >
      <div
        style={{
          width: 132, height: 132, marginBottom: 28,
          display: "flex", alignItems: "center", justifyContent: "center",
          animation: "ed-rotate-lock 2.4s ease-in-out infinite",
        }}
        aria-hidden="true"
      >

          <rect x="36" y="14" width="28" height="72" rx="6"
                stroke="#f2c260" strokeWidth="3" fill="rgba(242,194,96,0.08)" />
          <rect x="42" y="22" width="16" height="48" rx="2" fill="rgba(242,194,96,0.18)" />
          <circle cx="50" cy="78" r="2.5" fill="#f2c260" />
        </svg>
      </div>
      <div style={{
        fontWeight: 800,
        fontSize: "clamp(18px, 5.2vw, 26px)",
        lineHeight: 1.15,
        textTransform: "uppercase", letterSpacing: "0.02em",
        marginBottom: 12,
      }}>
        Gira tu teléfono
      </div>
      <div style={{
        fontWeight: 500,
        fontSize: "clamp(13px, 4vw, 16px)",
        lineHeight: 1.4,
        color: "rgba(252,233,168,0.78)",
        maxWidth: "min(320px, 80vw)",
      }}>
        Pon tu teléfono de lado para jugar.
      </div>
      <style>{`
        @keyframes ed-rotate-lock {
          0%   { transform: rotate(0deg); }
          45%  { transform: rotate(0deg); }
          70%  { transform: rotate(-90deg); }
          100% { transform: rotate(-90deg); }
        }
      `}</style>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// App principal
// ─────────────────────────────────────────────────────────────
function App() {
  const [route, setRoute] = useStateA("home");
  const [app, setApp] = useStateA({
    studentName: "",
    character: "narrador",
    level: "memorias",
    stars: 0,
    sessionStart: Date.now(),
    gameSeed: 0,
  });

  function go(r) {
    // Al (re)entrar al juego, regeneramos la seed para que GameScreen se remonte
    // y reinicie ronda, tiempo, racha, etc. También reseteamos las estrellas:
    // cada partida empieza desde 0, no acumula entre rondas.
    if (r === "game") {
      setApp((s) => ({ ...s, gameSeed: (s.gameSeed || 0) + 1, stars: 0 }));
    }
    setRoute(r);
  }

  const screenProps = { app, setApp, go };

  let Screen = window.HomeScreen;
  if (route === "character") Screen = window.CharacterScreen;
  else if (route === "game") Screen = window.GameScreen;
  else if (route === "results") Screen = window.ResultsScreen;

  const variant = route === "game" ? "chalkboard" : "cosmic";

  return (
    <DeviceStage variant={variant}>
      <Screen key={route === "game" ? `game-${app.gameSeed}` : route} {...screenProps} />
    </DeviceStage>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>
</body>
