// ─────────────────────────────────────────────────────────────
// Sparkles — chispas animadas alrededor del personaje. Refuerzan
// la estética cósmica heredada del shell.
// ─────────────────────────────────────────────────────────────
function Sparkles({ color = "#fce9a8", count = 6, seed = 1 }) {
  const pts = Array.from({ length: count }, (_, i) => {
    const a = (i * 360) / count + seed * 37;
    const r = 70 + (i % 3) * 8;
    const x = 100 + Math.cos((a * Math.PI) / 180) * r;
    const y = 100 + Math.sin((a * Math.PI) / 180) * r;
    const s = 2 + (i % 3);
    return { x, y, s, delay: i * 0.35 };
  });
  return (
    <g>
      {pts.map((p, i) => (
        <g key={i} transform={`translate(${p.x} ${p.y})`}>
          <circle r={p.s} fill={color} opacity="0.9">
            <animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" begin={`${p.delay}s`} repeatCount="indefinite" />
          </circle>
        </g>
      ))}
    </g>
  );
}

// ─────────────────────────────────────────────────────────────
// Contador de visitas — endpoint PHP del lado servidor con fallback localStorage.
// En servidores con PHP (Apache de edinun.com) muestra el conteo global real.
// En GitHub Pages / servidor estático sin PHP, el .php se sirve como texto
// plano → el fetch falla parseando JSON → caemos al contador localStorage
// (per-navegador, igual que la versión anterior). El localStorage también
// hace de caché del último valor servido por PHP para mostrar algo durante
// la primera carga / si el servidor está caído.
// ─────────────────────────────────────────────────────────────
const VISITOR_ENDPOINT = "counter.php"; // relativo a index.html del juego
const VISITOR_KEY = "edinun_visitors_v1";
const VISITOR_SESSION_FLAG = "edinun_visit_counted_v1";

async function fetchVisitorCount(opts) {
  const inc = opts && opts.increment;
  const url = inc ? VISITOR_ENDPOINT + "?inc=1" : VISITOR_ENDPOINT;
  const res = await fetch(url, { cache: "no-store" });
  if (!res.ok) throw new Error("counter http " + res.status);
  // Tolera dos contratos de servidor: JSON {"count": N} (counter.php de este
  // repo) o un numero plano "N" (contador.php legacy de otros juegos del mismo
  // server). Si el .php se sirve como texto ("<?php...") ambos parseos fallan
  // -> NaN -> throw -> el cliente cae a localStorage.
  const text = (await res.text()).trim();
  let count;
  try {
    const data = JSON.parse(text);
    count = data && typeof data.count === "number" ? data.count : Number(data);
  } catch (e) {
    count = Number(text);
  }
  if (!Number.isFinite(count)) throw new Error("counter invalid payload");
  return count;
}

function readLocalVisitorCount() {
  const raw = localStorage.getItem(VISITOR_KEY);
  const v = raw ? parseInt(raw, 10) : 0;
  return isNaN(v) ? 0 : v;
}

function writeLocalVisitorCount(n) {
  localStorage.setItem(VISITOR_KEY, String(n));
}

function useVisitorCount() {
  const [n, setN] = useState(() => readLocalVisitorCount());

  useEffect(() => {
    let cancelled = false;
    // Lee del servidor al montar. Si falla, queda el valor cacheado en local.
    fetchVisitorCount()
      .then((count) => {
        if (cancelled) return;
        setN(count);
        writeLocalVisitorCount(count);
      })
      .catch(() => { /* fallback localStorage ya cargado en el initializer */ });

    function onUpdate(ev) {
      const value = ev && ev.detail && ev.detail.count;
      if (typeof value === "number") setN(value);
      else setN(readLocalVisitorCount());
    }
    window.addEventListener("edinun:visitors-updated", onUpdate);
    return () => {
      cancelled = true;
      window.removeEventListener("edinun:visitors-updated", onUpdate);
    };
  }, []);

  return n;
}

function markFirstAttempt() {
  if (sessionStorage.getItem(VISITOR_SESSION_FLAG) === "1") return;
  sessionStorage.setItem(VISITOR_SESSION_FLAG, "1");

  fetchVisitorCount({ increment: true })
    .then((count) => {
      writeLocalVisitorCount(count);
      window.dispatchEvent(new CustomEvent("edinun:visitors-updated", { detail: { count } }));
    })
    .catch(() => {
      const next = readLocalVisitorCount() + 1;
      writeLocalVisitorCount(next);
      window.dispatchEvent(new CustomEvent("edinun:visitors-updated", { detail: { count: next } }));
    });
}

function incrementGamesCompleted() {
  const KEY = "edinun_games_completed_v1";
  const raw = localStorage.getItem(KEY);
  const next = (raw ? parseInt(raw, 10) : 0) + 1;
  localStorage.setItem(KEY, String(next));
  window.dispatchEvent(new Event("edinun:games-updated"));
  return next;
}

const { useState: useStateG, useEffect: useEffectG, useRef: useRefG, useMemo: useMemoG } = React;

function PortalToBody({ children }) {
  return ReactDOM.createPortal(children, document.body);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const ss = s % 60;
  return `${String(m).padStart(2, "0")}:${String(ss).padStart(2, "0")}`;
}

function calcStars(isCorrect, exerciseSec) {
  return isCorrect ? Math.max(1, 10 - Math.floor(exerciseSec / 3)) : 0;
}

// Drag+tap con PointerEvents (funciona en táctil; mismo patrón que juego-10).
// Las fichas usan onPointerDown; los cajones se marcan con [data-dropzone].
// onTap(item) si fue un toque; onDrop(zoneId, item) si se soltó sobre un cajón.
function makeDragHandler({ item, ghostHtml, onTap, onDrop, disabled }) {
  return function onPointerDown(e) {
    if (disabled) return;
    if (e.button !== undefined && e.button !== 0) return;
    e.preventDefault();
    const startX = e.clientX, startY = e.clientY;
    let started = false;
    let ghost = null;
    let currentZoneId = null;
    let lastX = startX, lastY = startY;
    const highlights = new Set();

    function clearHighlights() {
      for (const el of highlights) el.classList.remove("ed-drop-hover");
      highlights.clear();
    }
    function findZoneAt(x, y) {
      let prevVis = null;
      if (ghost) { prevVis = ghost.style.visibility; ghost.style.visibility = "hidden"; }
      const under = document.elementFromPoint(x, y);
      if (ghost) ghost.style.visibility = prevVis || "";
      if (!under || !under.closest) return null;
      return under.closest("[data-dropzone]") || null;
    }
    function onMove(ev) {
      const x = ev.clientX, y = ev.clientY;
      lastX = x; lastY = y;
      if (!started && Math.hypot(x - startX, y - startY) > 6) {
        started = true;
        ghost = document.createElement("div");
        ghost.style.cssText = "position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:none;left:" + x + "px;top:" + y + "px;";
        ghost.innerHTML = ghostHtml || `<div style="background:#fce9a8;color:#3a2608;padding:6px 12px;border-radius:10px;font-family:Fredoka,Nunito,sans-serif;font-weight:800;font-size:14px;border:2px solid #4fd8ff;box-shadow:0 6px 18px rgba(0,0,0,0.5);">${String(item).slice(0,60)}</div>`;
        document.body.appendChild(ghost);
        document.body.style.cursor = "grabbing";
      }
      if (started && ghost) {
        ghost.style.left = x + "px";
        ghost.style.top = y + "px";
        clearHighlights();
        const zone = findZoneAt(x, y);
        if (zone) { zone.classList.add("ed-drop-hover"); highlights.add(zone); currentZoneId = zone.dataset.dropzone; }
        else currentZoneId = null;
      }
    }
    function onUp(ev) {
      document.removeEventListener("pointermove", onMove);
      document.removeEventListener("pointerup", onUp);
      document.removeEventListener("pointercancel", onCancel);
      let finalZone = currentZoneId;
      if (started && !finalZone) {
        const x = (ev && ev.clientX != null) ? ev.clientX : lastX;
        const y = (ev && ev.clientY != null) ? ev.clientY : lastY;
        const zone = findZoneAt(x, y);
        if (zone) finalZone = zone.dataset.dropzone;
      }
      if (ghost) { ghost.remove(); ghost = null; }
      document.body.style.cursor = "";
      clearHighlights();
      if (!started) { if (onTap) onTap(item); }
      else if (finalZone && onDrop) { onDrop(finalZone, item); }
    }
    function onCancel() {
      document.removeEventListener("pointermove", onMove);
      document.removeEventListener("pointerup", onUp);
      document.removeEventListener("pointercancel", onCancel);
      if (ghost) { ghost.remove(); ghost = null; }
      document.body.style.cursor = "";
      clearHighlights();
    }
    document.addEventListener("pointermove", onMove);
    document.addEventListener("pointerup", onUp);
    document.addEventListener("pointercancel", onCancel);
  };
}

    if (lvId === currentId) return;

    if (!pendingLevel) return;

            border: "1px solid rgba(242,194,96,0.4)", fontFamily: "var(--ed-font-display)", fontWeight: 600, color: "#fce9a8",
          }}>
            ⭐ {stars}
          </div>
        </div>
      </div>

      {/* Pestañas de tema (estilo juego-14): tema actual resaltado, tocar
          otro pide confirmación antes de cambiar. */}

        <div data-qa="hud-temas" style={{
          position: "absolute", top: 22, left: "50%", transform: "translateX(-50%)",

            const active = lv.id === currentId;
            return (
              <button key={lv.id} onClick={() => requestSwitch(lv.id)}

                style={{
                  padding: "4px 12px", borderRadius: 999,
                  background: active ? lv.grad : "rgba(0,0,0,0.35)",
                  color: active ? lv.ink : "rgba(252,233,168,0.85)",
                  fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 11, letterSpacing: "0.02em",
                  border: active ? "1px solid rgba(255,255,255,0.55)" : "1px solid rgba(242,194,96,0.35)",
                  boxShadow: active ? "inset 0 1px 0 rgba(255,255,255,0.45), inset 0 -2px 0 rgba(0,0,0,0.18), 0 0 12px rgba(255,255,255,0.18)" : "none",
                  cursor: active ? "default" : "pointer", transition: "all 0.18s ease", whiteSpace: "nowrap",
                }}>
                {lv.label}
              </button>
            );
          })}
        </div>
      )}

      <div style={{
        position: "absolute", top: 58, left: "50%", transform: "translateX(-50%)",
        display: "flex", alignItems: "center", gap: 8,
      }}>
        <span className="ed-label" style={{ color: "rgba(255,255,255,0.7)" }}>Ronda</span>
        {Array.from({ length: total }).map((_, i) => {
          // Colorea cada punto por el resultado REAL de SU ronda (dorado si se
          // acertó, rojo si se falló), no por el conteo acumulado.
          const done = i < roundResults.length;

      <SwitchLevelModal pendingLevel={pendingLevel} levels={levels}
        attempted={attempted} total={total}
        onCancel={() => setPendingLevel(null)} onConfirm={confirmSwitch} />
    </>
  );
}

// answer() compartido: registra el log y avanza/termina.
function makeAnswer(ctx) {
  return function answer(isCorrect, userText, correctText, opIcon, reto) {
    if (typeof window.markFirstAttempt === "function") window.markFirstAttempt();
    const exerciseSec = Math.max(0, Math.floor((Date.now() - ctx.exerciseStart.current) / 1000));
    const earned = calcStars(isCorrect, exerciseSec);
    const newAttempted = ctx.attempted + 1;
    const newSolved = ctx.solved + (isCorrect ? 1 : 0);
    const newStarsTotal = ctx.stars + earned;
    const newStarsSession = ctx.starsSession + earned;

    const entry = {
      idx: newAttempted, a: reto || correctText, b: userText, op: opIcon || "·",
      correctAnswer: correctText, userAnswer: userText,
      isCorrect, time: exerciseSec, earned,
    };
    const newLog = [...ctx.log, entry];

    ctx.setFeedback(isCorrect ? "ok" : "err");
    ctx.setFeedbackMsg(isCorrect ? `+${earned} ⭐` : ENCOURAGEMENTS[Math.floor(Math.random() * ENCOURAGEMENTS.length)]);
    ctx.setAttempted(newAttempted);
    ctx.setSolved(newSolved);
    ctx.setStars(newStarsTotal);
    ctx.setStarsSession(newStarsSession);
    ctx.setLog(newLog);

    const wait = isCorrect ? 1000 : 1450;
    setTimeout(() => {
      ctx.setFeedback(null);
      ctx.setFeedbackMsg("");
      if (newAttempted >= 3) {
        ctx.setApp((s) => ({
          ...s, stars: newStarsTotal,
          lastResult: { category: ctx.catLabel, solved: newSolved, total: 3, time: ctx.elapsed, starsEarned: newStarsSession, log: newLog },
        }));
        window.incrementGamesCompleted && window.incrementGamesCompleted();
        ctx.go("results");
      } else {
        ctx.onNextRound && ctx.onNextRound();
        ctx.exerciseStart.current = Date.now();
      }
    }, wait);
  };
}

// ─── FIFO anti-repetición (compartido, prefijo por ronda) ───────
const RECENT_KEY = "edinun_escritura_noticia_recientes_v1";
const RECENT_LIMIT = 60;
function getRecent() {
  try { const r = localStorage.getItem(RECENT_KEY); const a = r ? JSON.parse(r) : []; return Array.isArray(a) ? a : []; }
  catch { return []; }
}
function pushRecent(key) {
  const a = getRecent().filter((k) => k !== key);
  a.unshift(key);
  try { localStorage.setItem(RECENT_KEY, JSON.stringify(a.slice(0, RECENT_LIMIT))); } catch {}
}
function pickFresh(bank, prefix) {
  const pre = prefix + ":";
  const recentIds = getRecent().filter((k) => k.startsWith(pre)).map((k) => k.slice(pre.length));
  const windowN = Math.floor(bank.length / 2);
  const blocked = new Set(recentIds.slice(0, windowN));
  let pool = bank.filter((b) => !blocked.has(b.id));
  if (pool.length === 0) pool = bank;
  const p = pool[Math.floor(Math.random() * pool.length)];
  pushRecent(pre + p.id);
  return p;
}

// ─── OrderRound — ordenar N tarjetas en casillas numeradas 1..N ──
// Drag + re-arrastre + bandeja para devolver. items: [{id,n,label,cue}].
// slots/setSlots viven en el padre (para validar). zona/tray ids únicos
// por prefijo para no chocar si hubiera dos en pantalla.
function OrderRound({ items, byId, slots, setSlots, locked, accent = "#a78bfa", ink = "#1a0a3a", slotW = 250, prefix = "o" }) {
  const TRAY = "__tray-" + prefix;
  const SLOT_PRE = "slot-" + prefix + "-";
  const [shuffled] = useStateG(() => shuffle(items.map((c) => c.id)));

  function placeZone(zoneId, cardId) {
    if (locked) return;
    setSlots((prev) => {
      const s = prev.slice();
      const cur = s.indexOf(cardId);
      if (cur !== -1) s[cur] = null;
      if (zoneId === TRAY) return s;
      if (zoneId.indexOf(SLOT_PRE) !== 0) return s;
      const idx = parseInt(zoneId.slice(SLOT_PRE.length), 10);
      if (isNaN(idx)) return s;
      s[idx] = cardId;
      return s;
    });
  }
  function tapCard(cardId) {
    if (locked) return;
    setSlots((prev) => {
      const s = prev.slice();
      const cur = s.indexOf(cardId);
      if (cur !== -1) { s[cur] = null; return s; }
      const empty = s.indexOf(null);
      if (empty !== -1) s[empty] = cardId;
      return s;
    });
  }
  const card = (id, ok) => {
    const c = byId[id];
    if (!c) return null;
    return (
      <div key={id}
        className={locked ? "" : "ed-draggable"}
        onClick={(e) => e.stopPropagation()}
        onPointerDown={locked ? undefined : makeDragHandler({
          item: id, disabled: locked,
          ghostHtml: `<div style="background:linear-gradient(180deg,#fce9a8,#e9c45a);color:#3a2608;padding:8px 14px;border-radius:10px;font-family:Fredoka,Nunito,sans-serif;font-weight:800;font-size:15px;border:2px solid #4fd8ff;box-shadow:0 8px 20px rgba(0,0,0,0.5);white-space:nowrap;">${c.label}</div>`,
          onTap: tapCard, onDrop: placeZone,
        })}
        style={{
          padding: c.cue ? "6px 12px" : "9px 14px", borderRadius: 10, textAlign: "center", minWidth: 150, maxWidth: 200,
          background: locked ? (ok ? "linear-gradient(180deg,#2ecc8f,#22a06c)" : "linear-gradient(180deg,#ff6b6b,#dc5050)") : "rgba(255,255,255,0.95)",
          color: locked ? "#fff" : "#3a2608", boxShadow: "0 3px 8px rgba(0,0,0,0.28)",
        }}>
        <div style={{ fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 15, lineHeight: 1.12 }}>
          {locked ? (ok ? "✓ " : "✗ ") : ""}{c.label}
        </div>
        {c.cue && (
          <div style={{ fontFamily: "var(--ed-font-display)", fontWeight: 600, fontSize: 11, opacity: 0.72, lineHeight: 1.15, marginTop: 1 }}>{c.cue}</div>
        )}
      </div>
    );
  };
  return (
    <>
      {/* Bandeja: tarjetas por colocar (también zona para devolver) */}
      <div data-dropzone={TRAY} data-qa="bandeja" style={{
        display: "flex", gap: 8, flexWrap: "wrap", justifyContent: "center", alignItems: "center",
        minHeight: 50, minWidth: 340, maxWidth: 430, borderRadius: 12, padding: "4px 8px",
      }}>
        {shuffled.filter((id) => !slots.includes(id)).map((id) => card(id, null))}
        {slots.every(Boolean) && (
          <div style={{ fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 14, color: "rgba(255,255,255,0.7)", pointerEvents: "none" }}>
            ¡Listo! Pulsa VERIFICAR.
          </div>
        )}
      </div>
      {/* Casillas numeradas 1..N */}
      <div style={{ display: "flex", flexDirection: "column", gap: 7, alignItems: "center" }}>
        {slots.map((id, i) => {
          const ok = (locked && id) ? (byId[id].n === i + 1) : null;
          const correcta = (locked && !ok) ? items.find((c) => c.n === i + 1) : null;
          return (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{
                width: 30, height: 30, flexShrink: 0, borderRadius: 8,
                background: accent, color: ink, fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 16,
                display: "flex", alignItems: "center", justifyContent: "center",
              }}>{i + 1}</div>
              <div data-dropzone={`slot-${prefix}-${i}`}
                style={{
                  width: slotW, minHeight: 44, borderRadius: 12, padding: "4px 8px",
                  background: "rgba(10,6,35,0.4)",
                  border: `2px dashed ${id ? "rgba(167,139,250,0.25)" : "rgba(167,139,250,0.6)"}`,
                  display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 4,
                }}>
                {id ? card(id, ok) : (
                  <span style={{ fontFamily: "var(--ed-font-display)", fontWeight: 600, fontSize: 12, color: "rgba(252,233,168,0.4)", pointerEvents: "none" }}>
                    Suelta aquí el {i + 1}
                  </span>
                )}
                {correcta && (
                  <div style={{
                    fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 11.5,
                    color: "#7dffc4", lineHeight: 1.15, textAlign: "center", pointerEvents: "none",
                  }}>
                    ✓ Aquí va: {correcta.label}
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </>
  );
}

// Shooter "Atrapa lo digital" — frases flotan hacia abajo; tocar las
// digitales (acierto), dejar caer las de papel. Auto-evaluado (§13).
function DigitalShooter({ onFinish }) {
  const DURATION = 8;
  const [bubbles, setBubbles] = useStateG([]);
  const [stats, setStats] = useStateG({ aciertos: 0, errores: 0, perdidas: 0 });
  const [timeLeft, setTimeLeft] = useStateG(DURATION);
  const nextIdRef = useRefG(0);
  const finishedRef = useRefG(false);
  const usedDigRef = useRefG(new Set());
  const usedPapRef = useRefG(new Set());
  const doneRef = useRefG(false);

  // Box 480×300. Velocidad CONSTANTE (sin random) + soltar una burbuja nueva
  // solo cuando la anterior bajó SPAWN_GAP: como todas caen al mismo ritmo,
  // las separaciones verticales se conservan → NUNCA se superponen.
  const BOX_W = 480, BOX_H = 300;
  const SPEED = 2.4;        // px por tick de 40ms → 60px/s (~1.6× más rápido)
  const SPAWN_GAP = 26;     // separación vertical mínima entre burbujas
  const FLOOR = BOX_H - 8;  // y a la que la burbuja sale por abajo

  function estW(t) { return Math.ceil(t.length * 8.2) + 36; }
  function pickPhrase(useDig) {
    const pool = useDig ? E2_DIGITAL : E2_PAPEL;
    const used = useDig ? usedDigRef.current : usedPapRef.current;
    let avail = pool.filter((w) => !used.has(w));
    if (avail.length === 0) { used.clear(); avail = pool; }
    const w = avail[Math.floor(Math.random() * avail.length)];
    used.add(w);
    return w;
  }
  function newBubble() {
    const useDig = Math.random() < 0.6;
    const text = pickPhrase(useDig);
    const id = nextIdRef.current++;
    const w = estW(text);
    const margin = 10;
    const maxX = Math.max(margin, BOX_W - w - margin);
    const x = margin + Math.random() * (maxX - margin);
    return { id, text, isDig: useDig, x, y: -38 };
  }

  useEffectG(() => {
    const tick = setInterval(() => {
      if (finishedRef.current) return;
      setBubbles((bs) => {
        // mover todas al mismo ritmo
        const next = [];
        let perdidasDelta = 0;
        for (const b of bs) {
          const ny = b.y + SPEED;
          if (ny > FLOOR) { if (b.isDig) perdidasDelta++; }
          else next.push({ ...b, y: ny });
        }
        if (perdidasDelta > 0) setStats((s) => ({ ...s, perdidas: s.perdidas + perdidasDelta }));
        // soltar una nueva solo si la más alta ya bajó lo suficiente
        const minY = next.length ? Math.min(...next.map((b) => b.y)) : Infinity;
        if (next.length === 0 || minY >= SPAWN_GAP) next.push(newBubble());
        return next;
      });
    }, 40);

    const countdown = setInterval(() => {
      setTimeLeft((t) => {
        if (t <= 1) { clearInterval(countdown); clearInterval(tick); finishedRef.current = true; return 0; }
        return t - 1;
      });
    }, 1000);

    return () => { clearInterval(tick); clearInterval(countdown); };
  }, []);

  useEffectG(() => {
    if (timeLeft === 0 && finishedRef.current && !doneRef.current) {
      doneRef.current = true;
      // Espera ~1.4s tras el "¡Tiempo!" para que el niño vea el revelado
      // (las burbujas digitales se marcan en verde ✓) antes de cerrar.
      const t = setTimeout(() => onFinish(stats), 1400);
      return () => clearTimeout(t);
    }
  }, [timeLeft, stats]);

  function handleTap(b) {
    if (finishedRef.current) return;
    setBubbles((bs) => bs.filter((x) => x.id !== b.id));
    if (b.isDig) setStats((s) => ({ ...s, aciertos: s.aciertos + 1 }));
    else setStats((s) => ({ ...s, errores: s.errores + 1 }));
  }

  const revealing = timeLeft === 0;
  return (
    <div style={{
      position: "relative", width: BOX_W, height: BOX_H, overflow: "hidden",
      borderRadius: 16, background: "rgba(11,58,45,0.45)",
      border: "2px solid rgba(242,194,96,0.4)",
    }}>
      <div style={{
        position: "absolute", top: 8, left: 12, right: 12, zIndex: 10,
        display: "flex", alignItems: "center", justifyContent: "space-between",
        fontFamily: "var(--ed-font-display)", color: "#fce9a8", fontSize: 13, fontWeight: 700,
        pointerEvents: "none",
      }}>
        <div>💻 {stats.aciertos} &nbsp; ✖ {stats.errores} &nbsp; ⬇ {stats.perdidas}</div>
        <div style={{ color: timeLeft <= 5 ? "#ff8b8b" : "#fce9a8" }}>⏱ {timeLeft}s</div>
      </div>

      {bubbles.map((b) => {
        // Al acabar el tiempo, REVELA: las digitales (las que había que atrapar)
        // se marcan en verde con ✓, las de papel se atenúan.
        const revOk = revealing && b.isDig;
        const revPaper = revealing && !b.isDig;
        return (
          <button key={b.id} onClick={() => handleTap(b)}
            style={{
              position: "absolute", left: b.x, top: 0,
              // Posición vía transform + transition: la GPU interpola entre los
              // pasos del timer (cada 40ms) → caída fluida, no a saltitos.
              transform: `translateY(${b.y}px)`,
              transition: "transform 0.12s linear",
              willChange: "transform",
              padding: "9px 14px", borderRadius: 999,
              background: revOk ? "linear-gradient(180deg,#2ecc8f,#22a06c)" : "rgba(255,255,255,0.96)",
              border: `2px solid ${revOk ? "#2ecc8f" : revPaper ? "rgba(120,120,120,0.5)" : "#f2c260"}`,
              fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 15,
              color: revOk ? "#fff" : "#1a1a1a",
              opacity: revPaper ? 0.45 : 1,
              cursor: revealing ? "default" : "pointer", whiteSpace: "nowrap",
              boxShadow: revOk ? "0 0 14px rgba(46,204,143,0.8)" : "0 4px 10px rgba(0,0,0,0.45)",
            }}>{revOk ? "✓ " : ""}{b.text}</button>
        );
      })}

      {revealing && (
        // Banner inferior (no cubre las burbujas reveladas).
        <div style={{
          position: "absolute", left: 0, right: 0, bottom: 0,
          padding: "8px 12px", textAlign: "center",
          background: "rgba(0,0,0,0.62)", color: "#fce9a8",
          fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 15,
        }}>¡Tiempo! Lo digital iba en <span style={{ color: "#7ef0bd" }}>verde ✓</span></div>
      )}
    </div>
  );
}

function EscrituraGame({ app, setApp, go, onRestart }) {
  const char = CHARACTERS.find((c) => c.id === app.character) || CHARACTERS[0];
  const catLabel = app.currentCatLabel || "Escritura y tecnología · 11 años";

  const [ronda, setRonda] = useStateG(0);
  const [r1Set] = useStateG(() => pickFresh(E1_TIMELINES, "e1"));
  const r1Items = r1Set.items;
  const r1ById = useMemoG(() => { const m = {}; r1Items.forEach((c) => { m[c.id] = c; }); return m; }, [r1Set]);
  const [r1Slots, setR1Slots] = useStateG(() => r1Items.map(() => null));
  const [r1Locked, setR1Locked] = useStateG(false);

  // R2 shooter — auto-evaluado
  const r2DoneRef = useRefG(false);

  // R3 acertijo
  const [r3Pick] = useStateG(() => pickFresh(E3_ACERTIJOS, "e3"));
  const [r3Revealed, setR3Revealed] = useStateG(1);
  const [r3Choice, setR3Choice] = useStateG(null);
  const [r3Locked, setR3Locked] = useStateG(false);
  const [r3Opts] = useStateG(() => shuffle(r3Pick.options));

  const [elapsed, setElapsed] = useStateG(0);
  const [stars, setStars] = useStateG(0);
  const [solved, setSolved] = useStateG(0);
  const [attempted, setAttempted] = useStateG(0);
  const [starsSession, setStarsSession] = useStateG(0);
  const [feedback, setFeedback] = useStateG(null);
  const [feedbackMsg, setFeedbackMsg] = useStateG("");
  const [confirmingExit, setConfirmingExit] = useStateG(false);
  const [confirmingRestart, setConfirmingRestart] = useStateG(false);
  const [log, setLog] = useStateG([]);
  const started = useRefG(Date.now());
  const exerciseStart = useRefG(Date.now());

  useEffectG(() => {
    const id = setInterval(() => setElapsed(Math.floor((Date.now() - started.current) / 1000)), 500);
    return () => clearInterval(id);
  }, []);

  const answer = makeAnswer({
    attempted, solved, stars, starsSession, log, elapsed, catLabel,
    exerciseStart, setApp, go,
    setFeedback, setFeedbackMsg, setAttempted, setSolved, setStars, setStarsSession, setLog,
    onNextRound: () => setRonda((r) => r + 1),
  });

  // R3 (acertijo, 1 opción) se AUTO-EVALÚA: al tocar una herramienta se resalta
  // y, tras una breve ventana para recapacitar (~700 ms), se califica sola. Por
  // eso su VERIFICAR se oculta y su canVerify queda en false.
  const r3AutoRef = useRefG(null);
  // Timer del revelado→answer: se guarda para limpiarlo si el niño SALE /
  // REINICIA durante la ventana (evita setState/go tras desmontar).
  const gradeTimerRef = useRefG(null);
  useEffectG(() => () => { clearTimeout(r3AutoRef.current); clearTimeout(gradeTimerRef.current); }, []);

  const canVerify =
    feedback ? false :
    ronda === 0 ? (r1Slots.every(Boolean) && !r1Locked) : false;

  function gradeR3(choice) {
    if (r3Locked) return;
    setR3Locked(true);
    const correct = choice === r3Pick.answer;
    // Registra cuántas pistas usó el niño en el reporte académico.
    const u = `${choice} · ${r3Revealed} pista${r3Revealed === 1 ? "" : "s"}`;
    gradeTimerRef.current = setTimeout(() => answer(correct, u, r3Pick.answer, "🔎", "El asistente misterioso"), correct ? 450 : 1500);
  }

  function handleVerify() {
    if (!canVerify) return;
    if (ronda === 0) {
      setR1Locked(true);
      const correct = r1Slots.every((id, i) => r1ById[id] && r1ById[id].n === i + 1);
      const u = r1Slots.map((id, i) => `${i + 1}. ${r1ById[id] ? r1ById[id].label : "?"}`).join(" · ");
      const c = r1Items.slice().sort((a, b) => a.n - b.n).map((it) => `${it.n}. ${it.label}`).join(" · ");
      gradeTimerRef.current = setTimeout(() => answer(correct, u, c, "⏳", "La máquina del tiempo"), correct ? 450 : 1500);
    }
  }

  function handleShooterFinish(s) {
    if (r2DoneRef.current) return;
    r2DoneRef.current = true;
    const correct = s.aciertos >= 4 && s.errores <= 2;
    const u = `${s.aciertos} atrapadas, ${s.errores} fallos`;
    // "Respuesta correcta" del reporte: ejemplos reales de lo digital (no una
    // descripción genérica) para que enseñe la clasificación.
    const c = `Digital: ${E2_DIGITAL.slice(0, 3).join(", ")}…`;
    answer(correct, u, c, "🎯", "Atrapa lo digital");
  }

  function handleErase() {
    if (ronda === 0 && !r1Locked) setR1Slots(r1Items.map(() => null));
  }

  const enunciado =
    ronda === 0 ? "Ordena los inventos de la escritura, del más antiguo al más nuevo." :
    ronda === 1 ? "Atrapa las frases de la escritura digital." :
    "Adivina qué herramienta digital se describe.";
  const bocadillo =
    ronda === 0 ? `Arrastra cada ficha\na su casilla, del 1 al ${r1Items.length}.` :
    ronda === 1 ? "¡Rápido! Toca\nsolo lo digital." :
    "Toca «Otra pista» si la\nnecesitas y elige la herramienta.";

  return (
    <div style={{ position: "absolute", inset: 0, overflow: "hidden" }}>
      <GameHUD elapsed={elapsed} stars={stars} attempted={attempted} solved={solved} total={3} app={app} setApp={setApp} roundResults={log.map((e) => e.isCorrect)} />
      <CharacterCorner char={char} message={bocadillo} />

      {/* R1 — La máquina del tiempo (ordenar) */}
      {ronda === 0 && (
        <div data-qa="zona-central" style={{
          position: "absolute", top: 74, bottom: 14, left: "50%", transform: "translateX(-50%)",
          width: 560, display: "flex", flexDirection: "column", justifyContent: "space-evenly", alignItems: "center",
        }}>
          <EnunciadoInline text={enunciado} />
          <OrderRound items={r1Items} byId={r1ById} slots={r1Slots} setSlots={setR1Slots}
            locked={r1Locked} accent="#4fa0ff" ink="#08264d" slotW={250} prefix="e1" />
        </div>
      )}

      {/* R2 — Atrapa lo digital (shooter) */}
      {ronda === 1 && (
        <div data-qa="zona-central" style={{
          position: "absolute", top: 74, bottom: 14, left: "50%", transform: "translateX(-50%)",
          width: 560, display: "flex", flexDirection: "column", justifyContent: "space-evenly", alignItems: "center",
        }}>
          <EnunciadoInline text={enunciado} />
          <div style={{ width: "100%", display: "flex", justifyContent: "flex-end" }}>
            <DigitalShooter onFinish={handleShooterFinish} />
          </div>
        </div>
      )}

      {/* R3 — El asistente misterioso (acertijo) */}
      {ronda === 2 && (
        <div data-qa="zona-central" style={{
          position: "absolute", top: 74, bottom: 14, left: "50%", transform: "translateX(-50%)",
          width: 560, display: "flex", flexDirection: "column", justifyContent: "space-evenly", alignItems: "center",
        }}>
          <EnunciadoInline text={enunciado} />
          <div style={{
            width: "fit-content", maxWidth: 460, padding: "14px 22px", borderRadius: 16,
            background: "linear-gradient(180deg, rgba(255,255,255,0.96), rgba(244,238,228,0.92))",
            border: "3px solid #f2c260", boxShadow: "0 12px 28px rgba(0,0,0,0.4), inset 0 -4px 0 rgba(0,0,0,0.06)",
            color: "#3a2608",
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, justifyContent: "center", marginBottom: 8 }}>
              <span style={{ fontSize: 22 }}>💬</span>
              <span style={{ fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 16 }}>¿Qué herramienta soy?</span>
            </div>
            {r3Pick.clues.slice(0, r3Revealed).map((c, i) => (
              <div key={i} style={{
                display: "flex", gap: 8, alignItems: "flex-start",
                fontFamily: "var(--ed-font-display)", fontWeight: 600, fontSize: 15, lineHeight: 1.3, marginTop: i ? 6 : 0,
              }}>
                <span style={{ color: "#d9a441", fontWeight: 800 }}>•</span>
                <span style={{ textAlign: "left" }}>{c}</span>
              </div>
            ))}
          </div>
          {r3Revealed < r3Pick.clues.length && !r3Locked ? (
            <button onClick={() => setR3Revealed((n) => Math.min(r3Pick.clues.length, n + 1))}
              style={{
                padding: "8px 18px", borderRadius: 999, border: "2px solid rgba(242,194,96,0.6)",
                background: "rgba(10,6,35,0.5)", color: "#fce9a8",
                fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 13, cursor: "pointer",
              }}>
              🔎 Otra pista ({r3Revealed}/{r3Pick.clues.length})
            </button>
          ) : (
            <div style={{ height: 16 }} />
          )}
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap", justifyContent: "center", maxWidth: 520 }}>
            {r3Opts.map((opt, i) => (
              <OptionButton key={opt} label={opt} locked={r3Locked}
                isCorrect={opt === r3Pick.answer} isPicked={r3Choice === opt}
                onClick={() => {
                  if (r3Locked) return;
                  setR3Choice(opt);
                  clearTimeout(r3AutoRef.current);
                  r3AutoRef.current = setTimeout(() => gradeR3(opt), 700);
                }}
                color={["#4fa0ff", "#e0a23a", "#2ecc8f"][i % 3]} />
            ))}
          </div>
        </div>
      )}

      <ActionRail
        canVerify={canVerify} onVerify={handleVerify}
        hideVerify={ronda === 1 || ronda === 2}
        showErase={ronda === 0} onErase={handleErase}
        onRestart={() => setConfirmingRestart(true)} onExit={() => setConfirmingExit(true)}
      />
      <FeedbackOverlay feedback={feedback} feedbackMsg={feedbackMsg} charName={char.name} />
      <ConfirmModal open={confirmingRestart} onClose={() => setConfirmingRestart(false)}
        label="Reiniciar juego" labelColor="#ff8b8b" title="¿Empezar de nuevo?"
        body={`Vas a perder el progreso de esta ronda (${attempted}/3) y volverás a la primera.`}
        confirmText="SÍ, REINICIAR" onConfirm={() => { setConfirmingRestart(false); onRestart && onRestart(); }} />
      <ConfirmModal open={confirmingExit} onClose={() => setConfirmingExit(false)}
        label="Salir del juego" labelColor="#ff8b4c" title="¿Volver al inicio?" glow="rgba(255,138,76,0.3)"
        body={`Vas a perder el progreso de esta ronda (${attempted}/3). No habrá reporte de esta sesión.`}
        confirmText="SÍ, SALIR" onConfirm={() => { setConfirmingExit(false); go("home"); }} />
    </div>
  );
}

// objetividad). opinionIdx en índice variable. Noticias originales.

// R3 — ¿Confiable o trampa? (acertijo binario, detector de fake news).
const N3_HEADLINES = [
  { id: "c1", text: "Un estudio de la universidad muestra que dormir bien mejora la memoria.", confiable: true },
  { id: "c2", text: "El municipio informó que el agua volverá a las 3 de la tarde.", confiable: true },

function NoticiaGame({ app, setApp, go, onRestart }) {
  const char = CHARACTERS.find((c) => c.id === app.character) || CHARACTERS[0];
  const catLabel = app.currentCatLabel || "Textos periodísticos: la noticia · 12 años";

  const [ronda, setRonda] = useStateG(0);
  // R1 — ordenar la pirámide
  const [r1Set] = useStateG(() => pickFresh(N1_NEWS, "n1"));
  const r1Items = r1Set.parts;
  const r1ById = useMemoG(() => { const m = {}; r1Items.forEach((c) => { m[c.id] = c; }); return m; }, [r1Set]);
  const [r1Slots, setR1Slots] = useStateG(() => r1Items.map(() => null));
  const [r1Locked, setR1Locked] = useStateG(false);
  // R2 — detective
  const [r2Pick] = useStateG(() => pickFresh(N2_TEXTS, "n2"));
  const [r2Choice, setR2Choice] = useStateG(null);
  const [r2Locked, setR2Locked] = useStateG(false);
  // R3 — confiable o trampa
  const [r3Pick] = useStateG(() => pickFresh(N3_HEADLINES, "n3"));
  const [r3Choice, setR3Choice] = useStateG(null);
  const [r3Locked, setR3Locked] = useStateG(false);

  const [elapsed, setElapsed] = useStateG(0);
  const [stars, setStars] = useStateG(0);
  const [solved, setSolved] = useStateG(0);
  const [attempted, setAttempted] = useStateG(0);
  const [starsSession, setStarsSession] = useStateG(0);
  const [feedback, setFeedback] = useStateG(null);
  const [feedbackMsg, setFeedbackMsg] = useStateG("");
  const [confirmingExit, setConfirmingExit] = useStateG(false);
  const [confirmingRestart, setConfirmingRestart] = useStateG(false);
  const [log, setLog] = useStateG([]);
  const started = useRefG(Date.now());
  const exerciseStart = useRefG(Date.now());

  useEffectG(() => {
    const id = setInterval(() => setElapsed(Math.floor((Date.now() - started.current) / 1000)), 500);
    return () => clearInterval(id);
  }, []);

  const answer = makeAnswer({
    attempted, solved, stars, starsSession, log, elapsed, catLabel,
    exerciseStart, setApp, go,
    setFeedback, setFeedbackMsg, setAttempted, setSolved, setStars, setStarsSession, setLog,
    onNextRound: () => setRonda((r) => r + 1),
  });

  // R2 (caza la opinión) y R3 (confiable o trampa) son de 1 toque → se
  // AUTO-EVALÚAN: al tocar la frase / el veredicto se resalta y, tras una
  // breve ventana (~700 ms), se califica sola. Su VERIFICAR se oculta.
  const r2AutoRef = useRefG(null);
  const r3AutoRef = useRefG(null);
  // Timer del revelado→answer: se limpia si el niño SALE / REINICIA durante la
  // ventana (evita setState/go tras desmontar).
  const gradeTimerRef = useRefG(null);
  useEffectG(() => () => { clearTimeout(r2AutoRef.current); clearTimeout(r3AutoRef.current); clearTimeout(gradeTimerRef.current); }, []);

  const canVerify =
    feedback ? false :
    ronda === 0 ? (r1Slots.every(Boolean) && !r1Locked) :
    ronda === 1 ? (r2Choice !== null && !r2Locked) :
    false;

  function gradeR2(choice) {
    if (r2Locked) return;
    setR2Locked(true);
    const correct = choice === r2Pick.opinionIdx;
    gradeTimerRef.current = setTimeout(() => answer(correct, r2Pick.lines[choice], r2Pick.lines[r2Pick.opinionIdx], "🔍", "Caza la opinión"), correct ? 450 : 1500);
  }

  function gradeR3(choice) {
    if (r3Locked) return;
    setR3Locked(true);
    const correct = (choice === "CONFIABLE") === r3Pick.confiable;
    gradeTimerRef.current = setTimeout(() => answer(correct, choice, r3Pick.confiable ? "CONFIABLE" : "TRAMPA", "🛡️", "¿Confiable o trampa?"), correct ? 450 : 1500);
  }

  function handleVerify() {
    if (!canVerify) return;
    if (ronda === 0) {
      setR1Locked(true);
      const correct = r1Slots.every((id, i) => r1ById[id] && r1ById[id].n === i + 1);
      const u = r1Slots.map((id, i) => `${i + 1}. ${r1ById[id] ? r1ById[id].label : "?"}`).join(" · ");
      const c = r1Items.slice().sort((a, b) => a.n - b.n).map((it) => `${it.n}. ${it.label}`).join(" · ");
      gradeTimerRef.current = setTimeout(() => answer(correct, u, c, "📰", "Arma la noticia"), correct ? 450 : 1500);
    } else if (ronda === 1) {
      // R2 (caza la opinión) ahora se confirma con VERIFICAR.
      gradeR2(r2Choice);
    }
  }

  function handleErase() {
    if (ronda === 0 && !r1Locked) setR1Slots(r1Items.map(() => null));
  }

  const enunciado =
    ronda === 0 ? "Arma la noticia ordenando sus partes de la más a la menos importante." :
    ronda === 1 ? "Encuentra la frase que opina y rompe la objetividad." :
    "Decide si el titular es confiable o una trampa.";
  const bocadillo =
    ronda === 0 ? "Arrastra cada parte.\nEmpieza por lo más importante." :
    ronda === 1 ? "Toca la frase que opina\ny pulsa VERIFICAR." :
    "Lee el titular y toca\nconfiable o trampa.";

  return (
    <div style={{ position: "absolute", inset: 0, overflow: "hidden" }}>
      <GameHUD elapsed={elapsed} stars={stars} attempted={attempted} solved={solved} total={3} app={app} setApp={setApp} roundResults={log.map((e) => e.isCorrect)} />
      <CharacterCorner char={char} message={bocadillo} />

      {/* R1 — Arma la noticia (ordenar) */}
      {ronda === 0 && (
        <div data-qa="zona-central" style={{
          position: "absolute", top: 74, bottom: 14, left: "50%", transform: "translateX(-50%)",
          width: 560, display: "flex", flexDirection: "column", justifyContent: "space-evenly", alignItems: "center",
        }}>
          <EnunciadoInline text={enunciado} />
          <OrderRound items={r1Items} byId={r1ById} slots={r1Slots} setSlots={setR1Slots}
            locked={r1Locked} accent="#e0a23a" ink="#3a2608" slotW={290} prefix="n1" />
        </div>
      )}

      {/* R2 — Caza la opinión (detective: tocar la frase subjetiva).
          La noticia va en una HOJITA de papel rayado (renglones azules +
          margen rojo + pin), angosta y centrada; cada frase es clicable. */}
      {ronda === 1 && (
        <div data-qa="zona-central" style={{
          position: "absolute", top: 74, bottom: 14, left: "50%", transform: "translateX(-50%)",
          width: 560, display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center", gap: 22,
        }}>
          <EnunciadoInline text={enunciado} />
          <div data-qa="bandeja" style={{
            position: "relative", width: 358, boxSizing: "border-box",
            padding: "30px 22px 22px 46px", borderRadius: 6,
            background: "#fbf7ec",
            backgroundImage: "repeating-linear-gradient(to bottom, transparent 0, transparent 31px, rgba(86,120,194,0.28) 31px, rgba(86,120,194,0.28) 32px)",
            backgroundPosition: "0 34px",
            border: "1px solid rgba(0,0,0,0.12)",
            boxShadow: "0 16px 32px rgba(0,0,0,0.45)",
            transform: "rotate(-1.2deg)",
            fontFamily: "var(--ed-font-display)", fontWeight: 400, fontSize: 17,
            color: "#3a3a4a", lineHeight: "32px", textAlign: "left",
          }}>
            {/* Pin de la hojita */}
            <div style={{
              position: "absolute", top: -9, left: "50%", transform: "translateX(-50%)",
              width: 16, height: 16, borderRadius: "50%",
              background: "radial-gradient(circle at 35% 30%, #ff8f8f, #d6463f)",
              boxShadow: "0 3px 6px rgba(0,0,0,0.4)", border: "1px solid rgba(0,0,0,0.15)",
            }} />
            {/* Margen rojo */}
            <div style={{ position: "absolute", top: 0, bottom: 0, left: 34, width: 2, background: "rgba(214,93,77,0.45)" }} />
            {r2Pick.lines.map((line, i) => {
              const sel = r2Choice === i;
              const isOpinion = i === r2Pick.opinionIdx;
              const showCorrect = r2Locked && isOpinion;
              const showWrong = r2Locked && sel && !isOpinion;
              let bg = "transparent", ink = "#3a3a4a";
              if (showCorrect) { bg = "rgba(46,204,143,0.85)"; ink = "#0a3a25"; }
              else if (showWrong) { bg = "rgba(255,120,120,0.85)"; ink = "#5a0a0a"; }
              else if (sel) { bg = "rgba(255,221,120,0.92)"; ink = "#3a3a4a"; }
              const choose = () => {
                if (r2Locked) return;
                // Solo selecciona la frase; se confirma con VERIFICAR (manual).
                setR2Choice(i);
              };
              return (
                <React.Fragment key={i}>
                  <span role="button" tabIndex={r2Locked ? -1 : 0}
                    aria-label={`Frase: ${line}`}
                    onClick={choose}
                    onKeyDown={(e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); choose(); } }}
                    style={{
                      cursor: r2Locked ? "default" : "pointer",
                      background: bg, color: ink, borderRadius: 4, padding: "1px 3px",
                      boxDecorationBreak: "clone", WebkitBoxDecorationBreak: "clone",
                      transition: "background 0.15s ease, color 0.15s ease",
                    }}>{line}</span>{i < r2Pick.lines.length - 1 ? " " : ""}
                </React.Fragment>
              );
            })}
          </div>
        </div>
      )}

      {/* R3 — ¿Confiable o trampa? (acertijo binario) */}
      {ronda === 2 && (
        <div data-qa="zona-central" style={{
          position: "absolute", top: 74, bottom: 14, left: "50%", transform: "translateX(-50%)",
          width: 560, display: "flex", flexDirection: "column", justifyContent: "space-evenly", alignItems: "center",
        }}>
          <EnunciadoInline text={enunciado} />
          <div style={{ position: "relative", width: "fit-content", maxWidth: 360 }}>
            <div style={{ position: "absolute", top: -16, left: -6, fontSize: 28, transform: "rotate(-8deg)", filter: "drop-shadow(0 3px 4px rgba(0,0,0,0.4))" }}>📰</div>
            <Cartel maxWidth={360} fontSize={18} pad="16px 22px">{`“${r3Pick.text}”`}</Cartel>
          </div>
          <div style={{ display: "flex", gap: 16, justifyContent: "center" }}>
            <OptionButton label="CONFIABLE" locked={r3Locked} isCorrect={r3Pick.confiable} isPicked={r3Choice === "CONFIABLE"}
              onClick={() => {
                if (r3Locked) return;
                setR3Choice("CONFIABLE");
                clearTimeout(r3AutoRef.current);
                r3AutoRef.current = setTimeout(() => gradeR3("CONFIABLE"), 700);
              }} color="#2ecc8f" />
            <OptionButton label="TRAMPA" locked={r3Locked} isCorrect={!r3Pick.confiable} isPicked={r3Choice === "TRAMPA"}
              onClick={() => {
                if (r3Locked) return;
                setR3Choice("TRAMPA");
                clearTimeout(r3AutoRef.current);
                r3AutoRef.current = setTimeout(() => gradeR3("TRAMPA"), 700);
              }} color="#ef5a5a" />
          </div>
        </div>
      )}

      <ActionRail
        canVerify={canVerify} onVerify={handleVerify}
        hideVerify={ronda === 2}
        showErase={ronda === 0} onErase={handleErase}
        onRestart={() => setConfirmingRestart(true)} onExit={() => setConfirmingExit(true)}
      />
      <FeedbackOverlay feedback={feedback} feedbackMsg={feedbackMsg} charName={char.name} />
      <ConfirmModal open={confirmingRestart} onClose={() => setConfirmingRestart(false)}
        label="Reiniciar juego" labelColor="#ff8b8b" title="¿Empezar de nuevo?"
        body={`Vas a perder el progreso de esta ronda (${attempted}/3) y volverás a la primera.`}
        confirmText="SÍ, REINICIAR" onConfirm={() => { setConfirmingRestart(false); onRestart && onRestart(); }} />
      <ConfirmModal open={confirmingExit} onClose={() => setConfirmingExit(false)}
        label="Salir del juego" labelColor="#ff8b4c" title="¿Volver al inicio?" glow="rgba(255,138,76,0.3)"
        body={`Vas a perder el progreso de esta ronda (${attempted}/3). No habrá reporte de esta sesión.`}
        confirmText="SÍ, SALIR" onConfirm={() => { setConfirmingExit(false); go("home"); }} />
    </div>
  );
}

// GameScreen — router por nivel (con REINICIAR que remonta el juego)
// ═════════════════════════════════════════════════════════════
function GameScreen({ app, setApp, go }) {
  const [tick, setTick] = useStateG(0);
  const restart = () => setTick((t) => t + 1);
  if (app.level === "noticia") return <NoticiaGame key={`n-${tick}`} app={app} setApp={setApp} go={go} onRestart={restart} />;
  return <EscrituraGame key={`e-${tick}`} app={app} setApp={setApp} go={go} onRestart={restart} />;
}

// Enrutador por estado y device stage adaptativo (desktop / tablet / mobile).
// Móvil portrait: el contenido NUNCA rota; un overlay BLOQUEANTE obliga
// al usuario a girar físicamente el teléfono antes de poder usar la app.

const { useState: useStateA, useEffect: useEffectA, useRef: useRefA } = React;

// ─────────────────────────────────────────────────────────────
// useViewportSize — devuelve el tamaño REAL visible del viewport.
//
// En iOS Safari (y otros mobile browsers), `window.innerHeight` y `100vh`
// reportan la altura de la ventana INCLUYENDO la URL bar, así que el
// contenido escalado a esa altura termina parcialmente fuera de pantalla
// (ej: el numpad del juego queda debajo del fondo visible). La Visual
// Viewport API reporta el área verdaderamente visible y se actualiza
// cuando la URL bar se muestra/oculta.
// ─────────────────────────────────────────────────────────────
// Detección de "resize REAL" vs "zoom del navegador".
//
// Idea: el tamaño FÍSICO de la zona visible en píxeles del display es
// invariante al ctrl+rueda. Cuando subes el zoom de 100 % a 500 %:
//   · innerWidth en CSS-px se divide entre 5
//   · devicePixelRatio se multiplica por 5
//   · innerWidth × devicePixelRatio queda igual ⇒ NO hubo resize real.
//
// Cuando arrastras la esquina de la ventana o rotas el dispositivo:
//   · innerWidth en CSS-px cambia
//   · devicePixelRatio NO cambia
//   · innerWidth × devicePixelRatio cambia ⇒ SÍ hubo resize real.
//
// Por eso comparamos contra `innerWidth × devicePixelRatio` y solo
// actualizamos el state cuando ese producto cambia. Así el lienzo se
// queda con su tamaño CSS previo durante el zoom y el navegador lo
// amplifica visualmente — junto con los glifos, que ya leen `glyphSize`
// del mismo state defendido (ver DeviceStage).
//
// La defensa anterior (tracker de _lastDPR) era frágil: se actualizaba
// en CADA evento, así que si el navegador disparaba dos resize seguidos
// para la misma acción de zoom, el segundo veía el dpr ya guardado y
// recalculaba el tamaño con el viewport pequeño. Esto causaba que los
// glifos quedaran enormes mientras el lienzo se recomprimía.
function physicalSize() {
  if (typeof window === "undefined") return { w: 0, h: 0 };
  const dpr = window.devicePixelRatio || 1;
  return { w: window.innerWidth * dpr, h: window.innerHeight * dpr };
}
let _lastPhysical = physicalSize();

function useViewportSize() {
  const [size, setSize] = useStateA(() => readSize());
  useEffectA(() => {
    function onChange() {
      const phys = physicalSize();
      // Tolerancia de 4 px reales para absorber redondeos del navegador.
      if (Math.abs(phys.w - _lastPhysical.w) < 4 && Math.abs(phys.h - _lastPhysical.h) < 4) {
        // Mismo display, distinto zoom — no actualizamos el state.
        return;
      }
      _lastPhysical = phys;
      setSize(readSize());
    }
    window.addEventListener("resize", onChange);
    window.addEventListener("orientationchange", onChange);
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", onChange);
    }
    return () => {
      window.removeEventListener("resize", onChange);
      window.removeEventListener("orientationchange", onChange);
      if (window.visualViewport) {
        window.visualViewport.removeEventListener("resize", onChange);
      }
    };
  }, []);
  return size;
}
function readSize() {
  if (typeof window === "undefined") return { vw: 0, vh: 0 };
  const vv = window.visualViewport;
  // Cuando el usuario hace pinch-zoom, vv.scale > 1 y vv.width/height
  // reflejan la región visible (más pequeña). Usar esos valores haría
  // que la escala del lienzo se reduzca al hacer zoom — exactamente lo
  // contrario de lo que el usuario quiere. Solo confiamos en vv cuando
  // scale ≈ 1 (sin zoom) — ahí da una lectura más fiel que innerWidth/
  // Height en iOS Safari (descuenta correctamente la URL bar visible).
  if (vv && Math.abs(vv.scale - 1) < 0.05) {
    return { vw: vv.width, vh: vv.height };
  }
  return { vw: window.innerWidth, vh: window.innerHeight };
}

// ─────────────────────────────────────────────────────────────
// DeviceStage — escala el lienzo lógico 900×540 (paisaje) al viewport.
//
// Reglas:
//   · Desktop / tablet: sin marco, sin notch, fondo cósmico edge-to-edge.
//   · Mobile portrait: lienzo letterboxed Y overlay BLOQUEANTE "Gira el
//     teléfono". El contenido del juego no es accesible hasta que rote.
//   · Mobile landscape: lienzo escalado al viewport visible (visualViewport,
//     no innerHeight, para no clippearse debajo de la URL bar de iOS).
// ─────────────────────────────────────────────────────────────
function DeviceStage({ children, variant = "cosmic" }) {
  const W = 900, H = 540;
  const { vw, vh } = useViewportSize();
  const minSide = Math.min(vw, vh);
  const maxSide = Math.max(vw, vh);
  let mode = "desktop";
  if (maxSide < 820) mode = "mobile";
  else if (minSide < 820) mode = "tablet";
  const portrait = vh > vw;
  const baseScale = Math.max(Math.min(vw / W, vh / H), 0.15);

  // Detección de teléfono independiente del modo: cualquier dispositivo con
  // lado menor ≤ 600 CSS-px es un teléfono. Cubre todos los teléfonos
  // actuales (iPhone SE 320 → S25 Ultra/Pro Max ~432) con margen para
  // modelos futuros más anchos. La menor tablet (iPad mini 744) queda
  // bien por encima, así que no se rompe el caso "tablet portrait usable
  // letterboxed". Solo bloqueamos cuando teléfono Y portrait — el lienzo
  // paisaje queda demasiado pequeño para jugar.
  const isPhone = minSide <= 600;
  const lockPortrait = isPhone && portrait;

  // Tamaño de los glifos del fondo: equivalente al `clamp(48px, 7vmin, 110px)`
  // que tenía el CSS, pero calculado a partir del vw/vh DEFENDIDO contra
  // cambios de DPR. Esto evita que con ctrl+rueda del mouse los glifos
  // crezcan más rápido que el lienzo (el lienzo se congela vía la defensa
  // del DPR; si CSS lee el vmin actual, los glifos no se congelan y desync).
  const glyphSize = Math.max(48, Math.min(minSide * 0.07, 110));

  const debug = typeof window !== "undefined" && /(?:^|[#&])debug(?:&|$)/.test(window.location.hash || "");

  // ─── Pinch-zoom y pan custom ─────────────────────────────────
  // Reemplaza el zoom nativo del browser. Razón: con el lienzo letterboxed
  // dentro de un wrapper viewport-sized, el visual viewport del browser
  // puede panear hasta dejar al usuario mirando solo el cosmos vacío de los
  // bordes — el "rebote" reportado en iPhone (ver .planning/ios-zoom.md).
  // Aquí los gestos operan sobre el transform del lienzo, así que el zoom
  // siempre gravita alrededor del contenido y no deriva a un borde
  // decorativo.
  const wrapperRef = useRefA(null);
  const gestureRef = useRefA(null);
  const stateRef = useRefA({ userZoom: 1, pan: { x: 0, y: 0 } });
  const [userZoom, setUserZoom] = useStateA(1);
  const [pan, setPan] = useStateA({ x: 0, y: 0 });
  const [duringGesture, setDuringGesture] = useStateA(false);

  useEffectA(() => {
    stateRef.current = { userZoom, pan };
  }, [userZoom, pan]);

  // Reset al cambiar viewport (rotación, resize). Si no, el pan queda
  // referenciado a un viewport que ya no existe.
  useEffectA(() => {
    setUserZoom(1);
    setPan({ x: 0, y: 0 });
    setDuringGesture(false);
  }, [vw, vh]);

  useEffectA(() => {
    if (lockPortrait) return;
    const el = wrapperRef.current;
    if (!el) return;

    const Z_MIN = 1;
    const Z_MAX = 4;

    const dist = (a, b) => Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
    const mid = (a, b) => ({ x: (a.clientX + b.clientX) / 2, y: (a.clientY + b.clientY) / 2 });

    function clampPan(zoom, px, py) {
      // Pan máximo: la mitad del exceso del lienzo escalado sobre el viewport.
      // En zoom=1 el max es 0 (lienzo cabe en viewport, no hay donde panear).
      // En zoom=N el lienzo mide N veces el lado contain, así que el usuario
      // puede mover ±(sw - vw)/2 antes de que la orilla del lienzo cruce la
      // orilla del viewport. Esto evita perder el contenido fuera de pantalla.
      const sw = baseScale * zoom * W;
      const sh = baseScale * zoom * H;
      const maxX = Math.max(0, (sw - vw) / 2);
      const maxY = Math.max(0, (sh - vh) / 2);
      return {
        x: Math.max(-maxX, Math.min(maxX, px)),
        y: Math.max(-maxY, Math.min(maxY, py)),
      };
    }

    function applyState(z, px, py) {
      stateRef.current = { userZoom: z, pan: { x: px, y: py } };
      setUserZoom(z);
      setPan({ x: px, y: py });
    }

    function onTouchStart(e) {
      const { userZoom: z0, pan: p0 } = stateRef.current;
      if (e.touches.length >= 2) {
        const [t0, t1] = e.touches;
        gestureRef.current = {
          mode: "pinch",
          d0: dist(t0, t1),
          m0: mid(t0, t1),
          z0, p0: { ...p0 },
        };
        setDuringGesture(true);
        e.preventDefault();
      } else if (e.touches.length === 1) {
        const t = e.touches[0];
        gestureRef.current = {
          mode: "pan-armed",
          startX: t.clientX,
          startY: t.clientY,
          z0, p0: { ...p0 },
        };
        // No preventDefault — un tap simple debe seguir generando click.
      }
    }

    function onTouchMove(e) {
      const g = gestureRef.current;
      if (!g) return;

      // Si en medio de un gesto entra un segundo dedo, transición a pinch
      // tomando el estado actual como punto de partida.
      if (e.touches.length >= 2 && g.mode !== "pinch") {
        const [t0, t1] = e.touches;
        const { userZoom: zNow, pan: pNow } = stateRef.current;
        gestureRef.current = {
          mode: "pinch",
          d0: dist(t0, t1),
          m0: mid(t0, t1),
          z0: zNow, p0: { ...pNow },
        };
        setDuringGesture(true);
        e.preventDefault();
        return;
      }

      if (e.touches.length >= 2 && g.mode === "pinch") {
        const [t0, t1] = e.touches;
        const d = dist(t0, t1);
        const m = mid(t0, t1);
        const ratio = d / g.d0;
        // Permitimos pasar transitoriamente bajo Z_MIN para sensación elástica
        // durante el gesto; en touchend hacemos snap-back al rango válido.
        const newZoom = Math.max(Z_MIN * 0.7, Math.min(Z_MAX * 1.05, g.z0 * ratio));
        const r = newZoom / g.z0;
        const ux = g.m0.x - vw / 2;
        const uy = g.m0.y - vh / 2;
        // Fórmula que mantiene el punto medio de la pinza anclado al mismo
        // píxel del lienzo durante todo el gesto. Derivación:
        //   panX_new = (mx0 - vw/2) + (newZoom/z0) * (panX0 - (mx0 - vw/2))
        //              + (mx_now - mx0)   ← desplazamiento del propio gesto
        const newPanX = ux + r * (g.p0.x - ux) + (m.x - g.m0.x);
        const newPanY = uy + r * (g.p0.y - uy) + (m.y - g.m0.y);
        applyState(newZoom, newPanX, newPanY);
        e.preventDefault();
      } else if (e.touches.length === 1 && g.mode === "pan-armed") {
        if (g.z0 <= 1.001) return; // sin zoom no panea — dejamos pasar el tap
        const t = e.touches[0];
        const dx = t.clientX - g.startX;
        const dy = t.clientY - g.startY;
        if (Math.hypot(dx, dy) > 8) {
          gestureRef.current = { ...g, mode: "pan" };
          setDuringGesture(true);
          e.preventDefault();
        }
      } else if (e.touches.length === 1 && g.mode === "pan") {
        const t = e.touches[0];
        const dx = t.clientX - g.startX;
        const dy = t.clientY - g.startY;
        applyState(g.z0, g.p0.x + dx, g.p0.y + dy);
        e.preventDefault();
      }
    }

    function onTouchEnd(e) {
      const g = gestureRef.current;
      if (!g) return;
      if (e.touches.length === 0) {
        const { userZoom: z, pan: p } = stateRef.current;
        const clampedZ = Math.max(Z_MIN, Math.min(Z_MAX, z));
        let cp;
        if (clampedZ <= 1.001) {
          cp = { x: 0, y: 0 };
        } else {
          cp = clampPan(clampedZ, p.x, p.y);
        }
        applyState(clampedZ, cp.x, cp.y);
        setDuringGesture(false);
        gestureRef.current = null;
      }
    }

    el.addEventListener("touchstart", onTouchStart, { passive: false });
    el.addEventListener("touchmove", onTouchMove, { passive: false });
    el.addEventListener("touchend", onTouchEnd, { passive: false });
    el.addEventListener("touchcancel", onTouchEnd, { passive: false });

    return () => {
      el.removeEventListener("touchstart", onTouchStart);
      el.removeEventListener("touchmove", onTouchMove);
      el.removeEventListener("touchend", onTouchEnd);
      el.removeEventListener("touchcancel", onTouchEnd);
    };
  }, [vw, vh, baseScale, lockPortrait]);

  const totalScale = baseScale * userZoom;

  return (
    <div ref={wrapperRef} style={{
      width: "100vw", height: "100dvh",
      minHeight: "-webkit-fill-available",
      overflow: "hidden",
      position: "relative",
      background: variant === "chalkboard" ? "#0b3a2d" : "#050214",
      // `touch-action: none` desactiva todos los gestos que el browser
      // interpretaría por su cuenta (pinch, pan, doble-tap-zoom). Los
      // implementamos en JS sobre el transform del lienzo para que el
      // zoom siempre quede anclado al contenido y nunca derive a los
      // bordes letterbox del wrapper. Los click/tap en botones siguen
      // funcionando — esto solo bloquea gestos del browser, no eventos.
      touchAction: "none",
    }}>
      <CosmosBg variant={variant} glyphSize={glyphSize} />

      {/* Lienzo lógico 900×540 centrado y escalado.
          El transform combina el escalado base (contain del viewport),
          el zoom del usuario y el pan acumulado. El orden CSS es
          right-to-left: scale → translate(pan) → translate(-50%,-50%). */}
      <div style={{
        width: W, height: H,
        position: "absolute",
        left: "50%", top: "50%",
        transform: `translate(-50%, -50%) translate(${pan.x}px, ${pan.y}px) scale(${totalScale})`,
        transformOrigin: "center center",
        overflow: "hidden",
        // Sin transición durante el gesto activo (el lienzo sigue la pinza
        // al instante); con transición elástica al soltar, para que el
        // snap-back de zoom/pan a los límites válidos no sea abrupto.
        transition: duringGesture ? "none" : "transform 0.22s cubic-bezier(0.2, 0.8, 0.2, 1)",
        willChange: "transform",
      }}>
        {children}
      </div>

      {lockPortrait && <RotateLockOverlay />}
      {debug && (
        <div style={{
          position: "fixed", top: 6, left: 6, zIndex: 999999,
          background: "rgba(0,0,0,0.85)", color: "#0f0",
          font: "11px ui-monospace,Menlo,monospace",
          padding: "6px 8px", borderRadius: 6,
          maxWidth: "90vw", whiteSpace: "pre",
          pointerEvents: "none",
        }}>
{`vw=${vw} vh=${vh}
min=${minSide} max=${maxSide}
mode=${mode} portrait=${portrait}
isPhone=${isPhone} LOCK=${lockPortrait}
zoom=${userZoom.toFixed(2)} pan=${pan.x.toFixed(0)},${pan.y.toFixed(0)}
vv=${typeof window!=="undefined" && window.visualViewport ? "yes" : "no"}
ua=${(typeof navigator!=="undefined" ? navigator.userAgent : "?").slice(0,60)}`}
        </div>
      )}
    </div>
  );
}

// Overlay bloqueante de rotación. En mobile portrait cubre toda la pantalla
// con un mensaje claro y un ícono animado. NO se puede descartar — el usuario
// DEBE girar el dispositivo para acceder al juego. Se desmonta solo cuando
// el viewport pasa a landscape.
function RotateLockOverlay() {
  return (
    <div
      role="dialog"
      aria-modal="true"
      aria-label="Gira tu teléfono para jugar"
      style={{
        position: "fixed", inset: 0, zIndex: 99999,
        background: "linear-gradient(180deg,#050214 0%,#0a0628 100%)",
        display: "flex", flexDirection: "column",
        alignItems: "center", justifyContent: "center",
        textAlign: "center", padding: "32px 24px",
        color: "#fce9a8",
        fontFamily: "var(--ed-font-display, system-ui)",
      }}
    >
      <div
        style={{
          width: 132, height: 132, marginBottom: 28,
          display: "flex", alignItems: "center", justifyContent: "center",
          animation: "ed-rotate-lock 2.4s ease-in-out infinite",
        }}
        aria-hidden="true"
      >
        {/* Ícono de teléfono que rota */}
        <svg viewBox="0 0 100 100" width="120" height="120" fill="none">
          <rect x="36" y="14" width="28" height="72" rx="6"
                stroke="#f2c260" strokeWidth="3" fill="rgba(242,194,96,0.08)" />
          <rect x="42" y="22" width="16" height="48" rx="2" fill="rgba(242,194,96,0.18)" />
          <circle cx="50" cy="78" r="2.5" fill="#f2c260" />
        </svg>
      </div>
      <div style={{
        fontWeight: 800,
        fontSize: "clamp(18px, 5.2vw, 26px)",
        lineHeight: 1.15,
        textTransform: "uppercase", letterSpacing: "0.02em",
        marginBottom: 12,
      }}>
        Gira tu teléfono
      </div>
      <div style={{
        fontWeight: 500,
        fontSize: "clamp(13px, 4vw, 16px)",
        lineHeight: 1.4,
        color: "rgba(252,233,168,0.78)",
        maxWidth: "min(320px, 80vw)",
      }}>
        Pon tu teléfono de lado para jugar.
      </div>
      <style>{`
        @keyframes ed-rotate-lock {
          0%   { transform: rotate(0deg); }
          45%  { transform: rotate(0deg); }
          70%  { transform: rotate(-90deg); }
          100% { transform: rotate(-90deg); }
        }
      `}</style>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// App principal
// ─────────────────────────────────────────────────────────────
function App() {
  const [route, setRoute] = useStateA("home");
  const [app, setApp] = useStateA({
    studentName: "",
    character: "explorador",
    level: null,
    stars: 0,
    sessionStart: Date.now(),
    gameSeed: 0,
  });

  function go(r) {
    // Al (re)entrar al juego, regeneramos la seed para que GameScreen se remonte
    // y reinicie ronda, tiempo, racha, etc. También reseteamos las estrellas:
    // cada partida empieza desde 0, no acumula entre rondas.
    if (r === "game") {
      setApp((s) => ({ ...s, gameSeed: (s.gameSeed || 0) + 1, stars: 0 }));
    }
    setRoute(r);
  }

  const screenProps = { app, setApp, go };

  let Screen = window.HomeScreen;
  if (route === "character") Screen = window.CharacterScreen;
  else if (route === "game") Screen = window.GameScreen;
  else if (route === "results") Screen = window.ResultsScreen;

  const variant = route === "game" ? "chalkboard" : "cosmic";

  return (
    <DeviceStage variant={variant}>
      <Screen key={route === "game" ? `game-${app.gameSeed}` : route} {...screenProps} />
    </DeviceStage>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>
</body>
</html>
