// ─────────────────────────────────────────────────────────────
// CONTINÚA EN OTRO ARCHIVO LÓGICAMENTE — pero para empaquetar va aquí
// Los 4 sub-juegos: TiposDeTextoGame, PoeticaGame, EscrituraGame, EnriquecimientoGame
// ─────────────────────────────────────────────────────────────
// Para minimizar lecturas, mantenemos todo en este único archivo.
// Cada sub-juego implementa su propio state (attempted, solved, stars, log…)
// porque el shell de game-screens.jsx tradicional (juego-2) lo hace así.

// ─────────────────────────────────────────────────────────────
// TEMA 1 · TiposDeTextoGame — 3 rondas:
//   R1: Trivia 3 botones (literario / informativo / funcional)
//   R2: Organizador gráfico (drag 4 piezas a 4 cuadros)
//   R3: Pinta burbujas del mapa (tap múltiple toggle)
// ─────────────────────────────────────────────────────────────
function TiposDeTextoGame({ app, setApp, go, onRestart }) {
  const char = CHARACTERS.find((c) => c.id === app.character) || CHARACTERS[0];
  const catLabel = app.currentCatLabel || "Tipos de texto";

  // 3 rondas con mecánicas distintas. Ronda 0=trivia, 1=organizador, 2=burbujas.
  const [ronda, setRonda] = useStateG(0);

  // State controlado de cada card (levantado para que ActionRail pueda actuar)
  const [r1Selected, setR1Selected] = useStateG(null);
  const [r1Locked, setR1Locked] = useStateG(false);
  const [r2Placed, setR2Placed] = useStateG({});
  const [r2Picked, setR2Picked] = useStateG(null);
  const [r2Verified, setR2Verified] = useStateG(false);
  const [r3Picked, setR3Picked] = useStateG(new Set());
  const [r3Locked, setR3Locked] = useStateG(false);

  // R1 — pick aleatorio del banco de textos
  const [r1Pick] = useStateG(() => {
    // FIFO ventana floor(N/2) sobre ESTE banco (estándar 12)
    const ids = new Set(TIPOS_BANK.map((t) => t.id));
    const recentIds = getRecent("tipos").filter((k) => ids.has(k));
    const blocked = new Set(recentIds.slice(0, Math.floor(TIPOS_BANK.length / 2)));
    let pool = TIPOS_BANK.filter((t) => !blocked.has(t.id));
    if (pool.length < 1) pool = TIPOS_BANK;
    const p = pool[Math.floor(Math.random() * pool.length)];
    pushRecent("tipos", p.id);
    return p;
  });

  // R2 — pick aleatorio del banco de organizadores
  const [r2Pick] = useStateG(() => {
    // FIFO ventana floor(N/2) sobre ESTE banco (estándar 12)
    const ids = new Set(ORG_BANK.map((t) => t.id));
    const recentIds = getRecent("tipos").filter((k) => ids.has(k));
    const blocked = new Set(recentIds.slice(0, Math.floor(ORG_BANK.length / 2)));
    let pool = ORG_BANK.filter((t) => !blocked.has(t.id));
    if (pool.length < 1) pool = ORG_BANK;
    const p = pool[Math.floor(Math.random() * pool.length)];
    pushRecent("tipos", p.id);
    return p;
  });

  // R3 — los 3 mapas, uno por tipo. Mezclamos el orden.
  const [r3Order] = useStateG(() => shuffle(BURBUJAS_DATA));
  const r3Current = r3Order[0]; // mostramos uno; el shell solo usa 1 ronda r3

  // Estados del shell
  const [elapsed, setElapsed] = useStateG(0);
  const [stars, setStars] = useStateG(0);
  const [solved, setSolved] = useStateG(0);
  const [attempted, setAttempted] = useStateG(0);
  const [starsSession, setStarsSession] = useStateG(0);
  const [feedback, setFeedback] = useStateG(null);
  const [feedbackMsg, setFeedbackMsg] = useStateG("");
  const [confirmingExit, setConfirmingExit] = useStateG(false);
  const [log, setLog] = useStateG([]);
  const started = useRefG(Date.now());
  const exerciseStart = useRefG(Date.now());

  useEffectG(() => {
    const id = setInterval(() => setElapsed(Math.floor((Date.now() - started.current) / 1000)), 500);
    return () => clearInterval(id);
  }, []);

  // R1 (trivia, 1 opción) AUTO-EVALUADA: al tocar se resalta y, tras ~700ms
  // para recapacitar, se califica sola. Su VERIFICAR se oculta.
  const r1AutoRef = useRefG(null);
  useEffectG(() => () => clearTimeout(r1AutoRef.current), []);

  // Glifos chalkboard del Tema 1
  useEffectG(() => {
    window.__currentChalkGlyphs = [
      { c: "📖", l: "6%",  t: "12%", r: "-8deg" },
      { c: "📰", l: "82%", t: "16%", r: "6deg",  s: "0.62em" },
      { c: "📋", l: "10%", t: "78%", r: "12deg", s: "0.6em" },
      { c: "🍰", l: "88%", t: "72%", r: "-10deg", s: "0.5em" },
      { c: "🦋", l: "45%", t: "8%",  r: "4deg",  s: "0.55em" },
      { c: "?",  l: "3%",  t: "45%", r: "-4deg", s: "0.6em" },
      { c: "📝", l: "92%", t: "45%", r: "8deg",  s: "0.5em" },
      { c: "✏",  l: "30%", t: "55%", r: "-6deg", s: "0.55em" },
      { c: "📚", l: "70%", t: "62%", r: "8deg",  s: "0.5em" },
      { c: "¡",  l: "55%", t: "30%", r: "-4deg", s: "0.55em" },
    ];
    return () => { window.__currentChalkGlyphs = null; };
  }, []);

  // canVerify y showErase por ronda. R1 auto-evaluada → canVerify false.
  const canVerify =
    ronda === 0 ? false :
    ronda === 1 ? (Object.keys(r2Placed).length === 4 && !r2Verified) :
    ronda === 2 ? (r3Picked.size > 0 && !r3Locked) :
    false;
  const showErase = ronda !== 0;

  // Califica la R1 con la opción tocada (misma rama que tenía handleVerify).
  function gradeR1(tipo) {
    if (r1Locked) return;
    setR1Locked(true);
    answer(tipo === r1Pick.tipo, tipo, r1Pick.tipo, "📖");
  }

  function handleVerify() {
    if (!canVerify) return;
    if (ronda === 1) {
      setR2Verified(true);
      let allOK = true;
      const SLOTS = ["definicion", "oracion", "sinonimo", "dibujo"];
      for (const s of SLOTS) {
        const pieceIdx = r2Placed[s];
        if (pieceIdx === undefined) { allOK = false; break; }
        if (r2Pieces[pieceIdx].slot !== s) { allOK = false; break; }
      }
      setTimeout(() => answer(allOK, JSON.stringify(r2Placed), "ok", "🗂"), 400);
    } else if (ronda === 2) {
      setR3Locked(true);
      const correctSet = new Set(r3Current.correctos);
      let isOK = r3Picked.size === correctSet.size;
      if (isOK) for (const w of r3Picked) if (!correctSet.has(w)) { isOK = false; break; }
      setTimeout(() => answer(isOK, Array.from(r3Picked).join(","), r3Current.correctos.join(","), "💧"), 400);
    }
  }

  function handleErase() {
    if (ronda === 1) {
      if (r2Verified) return;
      setR2Placed({});
      setR2Picked(null);
    } else if (ronda === 2) {
      if (r3Locked) return;
      setR3Picked(new Set());
    }
  }

  // r2Pieces se calcula en el componente, lo necesitamos arriba para verify
  const [r2Pieces] = useStateG(() => {
    const SLOTS = ["definicion", "oracion", "sinonimo", "dibujo"];
    return shuffle(SLOTS.map((s) => ({ slot: s, text: r2Pick[s] })));
  });

  function answer(isCorrect, userText, correctText, opIcon) {
    if (typeof window.markFirstAttempt === "function") window.markFirstAttempt();
    const exerciseSec = Math.max(0, Math.floor((Date.now() - exerciseStart.current) / 1000));
    const earned = calcStars(isCorrect, exerciseSec);
    const newAttempted = attempted + 1;
    const newSolved = solved + (isCorrect ? 1 : 0);
    const newStarsTotal = stars + earned;
    const newStarsSession = starsSession + earned;

    const entry = {
      idx: newAttempted,
      a: correctText, b: userText, op: opIcon || "·",
      correctAnswer: correctText, userAnswer: userText,
      isCorrect, time: exerciseSec, earned,
    };
    const newLog = [...log, entry];

    // Al fallar, el tablero (marcas verde/rojo + respuesta correcta) queda
    // visible un momento ANTES del overlay "¡UPS!" para que se pueda leer.
    const _revealDelay = isCorrect ? 0 : 3000;
    const _okMsg = `+${earned} ⭐`;
    const _errMsg = ENCOURAGEMENTS[Math.floor(Math.random() * ENCOURAGEMENTS.length)];
    setTimeout(() => {
      setFeedback(isCorrect ? "ok" : "err");
      setFeedbackMsg(isCorrect ? _okMsg : _errMsg);
    }, _revealDelay);
    setAttempted(newAttempted);
    setSolved(newSolved);
    setStars(newStarsTotal);
    setStarsSession(newStarsSession);
    setLog(newLog);

    const wait = _revealDelay + (isCorrect ? 950 : 1100);
    setTimeout(() => {
      setFeedback(null);
      setFeedbackMsg("");
      if (newAttempted >= 3) {
        setApp((s) => ({
          ...s, stars: newStarsTotal,
          lastResult: { category: catLabel, solved: newSolved, total: 3, time: elapsed, starsEarned: newStarsSession, log: newLog },
        }));
        window.incrementGamesCompleted && window.incrementGamesCompleted();
        go("results");
      } else {
        setRonda((r) => r + 1);
        exerciseStart.current = Date.now();
      }
    }, wait);
  }

  const [confirmingActualExit, setConfirmingActualExit] = useStateG(false);

  // Enunciado (QUÉ hacer) — grande, arriba, blanco con sombra.
  // Bocadillo (CÓMO) — corto, dentro del bocadillo del personaje.
  const enunciado =
    ronda === 0 ? "¿Qué tipo de texto es?" :
    ronda === 1 ? "Organizador gráfico de relación." :
    `Encuentra los textos ${r3Current.id === "literario" ? "literarios" : r3Current.id === "informativo" ? "informativos" : "funcionales"}.`;

  const bocadillo =
    ronda === 0 ? "Lee y elige." :
    ronda === 1 ? "Arrastra cada pista a su cuadro." :
    "Toca las burbujas correctas.";

  return (
    <div style={{ position: "absolute", inset: 0, overflow: "hidden" }}>
      <GameHUD elapsed={elapsed} stars={stars} attempted={attempted} solved={solved} total={3} app={app} setApp={setApp} />

      <CharacterCorner char={char} message={bocadillo} />
      <GameEnunciado text={enunciado} />

      {/* Zona central — varía por ronda. right:168 deja sitio al ActionRail. */}
      <div data-qa="zona-central" style={{
        position: "absolute", top: 128, left: "50%", transform: "translateX(-50%)", width: 440, bottom: 14,
      }}>
        {ronda === 0 && (
          <TiposTriviaCard pick={r1Pick}
            selected={r1Selected} locked={r1Locked}
            onSelect={(t) => {
              if (r1Locked) return;
              setR1Selected(t);
              clearTimeout(r1AutoRef.current);
              r1AutoRef.current = setTimeout(() => gradeR1(t), 700);
            }}
          />
        )}
        {ronda === 1 && (
          <OrganizadorCard pick={r2Pick}
            pieces={r2Pieces} placed={r2Placed} picked={r2Picked} verified={r2Verified}
            onPickPiece={(idx) => { if (r2Verified) return; if (Object.values(r2Placed).includes(idx)) return; setR2Picked(r2Picked === idx ? null : idx); }}
            onPickFromSlot={(slot) => {
              if (r2Verified) return;
              const idx = r2Placed[slot];
              if (idx === undefined) return;
              const next = { ...r2Placed };
              delete next[slot];
              setR2Placed(next);
              setR2Picked(idx);
            }}
            onPlaceIn={(slot, explicitIdx) => {
              if (r2Verified) return;
              const idx = explicitIdx !== undefined ? explicitIdx : r2Picked;
              if (idx === null || idx === undefined) {
                if (r2Placed[slot] !== undefined) { const next = { ...r2Placed }; delete next[slot]; setR2Placed(next); }
                return;
              }
              const next = { ...r2Placed };
              for (const k of Object.keys(next)) if (next[k] === idx) delete next[k];
              next[slot] = idx;
              setR2Placed(next);
              setR2Picked(null);
            }}
          />
        )}
        {ronda === 2 && (
          <BurbujasCard data={r3Current}
            picked={r3Picked} locked={r3Locked}
            onToggle={(w) => { if (r3Locked) return; const next = new Set(r3Picked); if (next.has(w)) next.delete(w); else next.add(w); setR3Picked(next); }}
          />
        )}
      </div>

      <ActionRail
        canVerify={canVerify}
        onVerify={handleVerify}
        hideVerify={ronda === 0}
        showErase={showErase}
        onErase={handleErase}
        onRestart={() => setConfirmingExit(true)}
        onExit={() => setConfirmingActualExit(true)}
      />

      <FeedbackOverlay feedback={feedback} feedbackMsg={feedbackMsg} charName={char.name} />
      <RestartModal confirmingExit={confirmingExit} setConfirmingExit={setConfirmingExit} attempted={attempted} total={3} onRestart={onRestart} />
      <ExitModal confirmingExit={confirmingActualExit} setConfirmingExit={setConfirmingActualExit} attempted={attempted} total={3} onExit={() => go("home")} />
    </div>
  );
}

function TiposTriviaCard({ pick, selected, locked, onSelect }) {
  function choose(tipo) {
    if (locked) return;
    onSelect && onSelect(tipo);
  }
  const optionsShuffled = React.useMemo(() => shuffle([
    { id: "literario",   label: "LITERARIO",   color: "#ffc06e" },
    { id: "informativo", label: "INFORMATIVO", color: "#ffe97a" },
    { id: "funcional",   label: "FUNCIONAL",   color: "#7ab8ff" },
  ]), [pick.id]);

  return (
    <div style={{
      display: "flex", flexDirection: "column", alignItems: "center",
      justifyContent: "center", height: "100%", gap: 26, padding: "0 4px",
    }}>
      {/* Texto arriba — una sola columna */}
      <div style={{
        width: "100%", maxWidth: 440,
        background: "linear-gradient(180deg, rgba(255,255,255,0.96), rgba(245,238,225,0.95))",
        border: "3px solid #f2c260",
        borderRadius: 18,
        padding: "16px 22px",
        boxShadow: "0 10px 24px rgba(0,0,0,0.45)",
        color: "#3a2608",
      }}>
        <div style={{ fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 16, marginBottom: 6 }}>
          {pick.titulo}
        </div>
        <div style={{ fontSize: 13.5, lineHeight: 1.4, fontStyle: "italic" }}>"{pick.fragmento}"</div>
      </div>
      {/* Opciones apiladas en columna debajo, mismo eje vertical — orden aleatorio */}
      <div style={{ display: "flex", flexDirection: "column", gap: 10, alignItems: "stretch", width: "100%", maxWidth: 280 }}>
        {optionsShuffled.map((opt) => {
          // Al bloquear: la opción correcta (pick.tipo) se pinta verde con ✓,
          // la elegida equivocada en rojo.
          const isRight = locked && opt.id === pick.tipo;
          const isWrongPick = locked && selected === opt.id && opt.id !== pick.tipo;
          return (
            <button key={opt.id} onClick={() => choose(opt.id)}
              disabled={locked}
              style={{
                position: "relative",
                padding: "14px 18px", borderRadius: 14,
                background: isRight
                  ? "linear-gradient(180deg,#2ecc8f,#22a06c)"
                  : isWrongPick
                  ? "linear-gradient(180deg,#ff8b8b,#dc5050)"
                  : selected === opt.id ? "linear-gradient(180deg,#fce9a8,#d9a441)" : "rgba(255,255,255,0.92)",
                color: isRight || isWrongPick ? "#fff" : "#3a2608",
                border: `3px solid ${isRight ? "#2ecc8f" : isWrongPick ? "#ff6b6b" : opt.color}`,
                fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 14, letterSpacing: "0.04em",
                cursor: locked ? "default" : "pointer",
                boxShadow: isRight
                  ? "0 0 0 4px rgba(255,255,255,0.9), 0 0 26px rgba(46,204,143,0.85)"
                  : selected === opt.id
                  ? "0 0 0 4px rgba(255,255,255,1), 0 0 0 8px rgba(252,233,168,0.65), 0 0 38px rgba(252,233,168,0.9), 0 8px 22px -4px rgba(0,0,0,0.55)"
                  : "0 6px 14px rgba(0,0,0,0.35)",
                transform: (selected === opt.id && !locked) || isRight ? "translateY(-4px) scale(1.04)" : "none",
                transition: "all 0.18s ease",
                opacity: locked && !isRight && !isWrongPick ? 0.5 : 1,
              }}>
              {opt.label}
              {isRight && (
                <span style={{
                  position: "absolute", top: -8, right: -8, width: 24, height: 24, borderRadius: "50%",
                  background: "#2ecc8f", color: "#fff", fontSize: 14, fontWeight: 900,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  border: "2px solid #fff", boxShadow: "0 2px 6px rgba(0,0,0,0.4)",
                }}>✓</span>
              )}
            </button>
          );
        })}
      </div>
    </div>
  );
}

function OrganizadorCard({ pick, pieces, placed, picked, verified, onPickPiece, onPickFromSlot, onPlaceIn }) {
  // 4 cuadros (2x2) alrededor de la palabra central + bandeja con piezas.
  // Soporta DRAG (HTML5) y tap-to-place, también desde slot a slot.
  const LABELS = { definicion: "Definición", oracion: "Oración", sinonimo: "Sinónimo", dibujo: "Dibujo" };
  const [dragIdx, setDragIdx] = React.useState(null);
  const [dragOverSlot, setDragOverSlot] = React.useState(null);

  const pickPiece = (idx) => onPickPiece && onPickPiece(idx);
  const pickFromSlot = (slot) => onPickFromSlot && onPickFromSlot(slot);
  const placeIn = (slot, explicitIdx) => onPlaceIn && onPlaceIn(slot, explicitIdx);

  function renderSlot(slot, pos) {
    const idx = placed[slot];
    const piece = idx !== undefined ? pieces[idx] : null;
    const correct = verified && piece && piece.slot === slot;
    const wrong = verified && piece && piece.slot !== slot;
    const isHover = dragOverSlot === slot;
    const isDragSource = piece && dragIdx === idx;
    // Al verificar, revelamos la pieza CORRECTA de cada cuadro en verde
    // (la que de verdad va aquí), para que se vea la solución.
    const correctPiece = verified ? pieces.find((p) => p.slot === slot) : null;
    return (
      <div key={slot}
        // Tap: si tiene pieza y nada en mano → la levanta. Si no, intenta placeIn.
        onClick={() => {
          if (verified) return;
          if (piece && picked === null) { pickFromSlot(slot); return; }
          placeIn(slot);
        }}
        // Drag-source: la pieza colocada se puede arrastrar a otro slot.
        draggable={!verified && !!piece}
        onDragStart={(e) => {
          if (verified || !piece) return;
          e.dataTransfer.effectAllowed = "move";
          e.dataTransfer.setData("text/plain", String(idx));
          setDragIdx(idx);
        }}
        onDragEnd={() => { setDragIdx(null); setDragOverSlot(null); }}
        onDragOver={(e) => { if (!verified) { e.preventDefault(); setDragOverSlot(slot); } }}
        onDragLeave={() => setDragOverSlot((s) => s === slot ? null : s)}
        onDrop={(e) => {
          if (verified) return;
          e.preventDefault();
          const raw = e.dataTransfer.getData("text/plain");
          const dIdx = parseInt(raw, 10);
          setDragOverSlot(null);
          setDragIdx(null);
          if (!Number.isNaN(dIdx)) placeIn(slot, dIdx);
        }}
        style={{
          ...pos,
          position: "absolute",
          width: 170, height: 70,
          border: `2px ${verified ? "solid" : "dashed"} ${
            verified ? (correct ? "#2ecc8f" : "#ff6b6b") : isHover ? "#4fd8ff" : "rgba(252,233,168,0.55)"
          }`,
          background: correct
            ? "linear-gradient(180deg, rgba(46,204,143,0.92), rgba(34,160,108,0.85))"
            : piece
            ? "linear-gradient(180deg, rgba(252,233,168,0.95), rgba(217,164,65,0.85))"
            : isHover ? "rgba(79,216,255,0.18)" : "rgba(10,6,35,0.55)",
          color: correct ? "#06381f" : piece ? "#3a2608" : "rgba(252,233,168,0.65)",
          fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 12, lineHeight: 1.2,
          borderRadius: 12, padding: "8px 10px",
          cursor: verified ? "default" : (piece ? "grab" : "pointer"),
          userSelect: "none",
          textAlign: piece && piece.slot === "dibujo" && piece.text.length < 4 ? "center" : "left",
          overflow: "hidden",
          opacity: isDragSource ? 0.4 : 1,
          boxShadow: correct ? "0 0 14px rgba(46,204,143,0.55)" : wrong ? "0 0 14px rgba(255,107,107,0.5)" : isHover ? "0 0 12px rgba(79,216,255,0.5)" : "none",
          transition: "background 0.15s, border-color 0.15s, opacity 0.15s",
        }}>
        <div style={{ fontSize: 9, fontWeight: 800, letterSpacing: "0.06em", color: correct ? "#06381f" : piece ? "#3a2608" : "#a78bfa", textTransform: "uppercase", marginBottom: 2 }}>
          {LABELS[slot]} {verified && (correct ? "✓" : "✗")}
        </div>
        {/* Lo que puso el niño (su respuesta) — a 1 línea si hay revelado abajo */}
        <div style={{
          fontSize: piece && piece.text.length < 4 ? 28 : 11, lineHeight: 1.15,
          ...(verified && !correct ? { whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" } : {}),
        }}>
          {piece ? piece.text : "(vacío)"}
        </div>
        {/* Al fallar, revelamos la pieza correcta de este cuadro en verde. */}
        {verified && !correct && correctPiece && (
          <div style={{
            marginTop: 3, fontSize: correctPiece.text.length < 4 ? 20 : 9.5, fontWeight: 800,
            color: "#0a3a1e", background: "rgba(46,204,143,0.85)",
            borderRadius: 6, padding: "1px 5px", lineHeight: 1.15,
            whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
          }}>
            ✓ {correctPiece.text}
          </div>
        )}
      </div>
    );
  }

  return (
    <div style={{ position: "absolute", inset: 0, padding: "0 8px",
      display: "flex", flexDirection: "column", justifyContent: "center", gap: 14 }}>

      {/* Cuadros (2×2) con palabra central — alto fijo */}
      <div style={{ position: "relative", height: 210 }}>
        {renderSlot("definicion", { left: "8%",  top: 0 })}
        {renderSlot("oracion",    { right: "8%", top: 0 })}
        {renderSlot("sinonimo",   { left: "8%",  bottom: 0 })}
        {renderSlot("dibujo",     { right: "8%", bottom: 0 })}

        {/* Palabra central */}
        <div style={{
          position: "absolute", left: "50%", top: "50%", transform: "translate(-50%,-50%)",
          background: "linear-gradient(180deg, #f2c260, #d9a441)",
          border: "3px solid rgba(255,255,255,0.85)",
          padding: "10px 22px", borderRadius: 999,
          fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 16, color: "#3a2608",
          boxShadow: "0 8px 18px rgba(0,0,0,0.45)",
          whiteSpace: "nowrap",
        }}>
          {pick.palabra}
        </div>
      </div>

      {/* Bandeja con piezas (sólo las no colocadas) — pegada a los slots, sin gap muerto */}
      <div data-qa="bandeja" style={{
        background: "rgba(10,6,35,0.45)",
        border: "1px dashed rgba(252,233,168,0.3)",
        borderRadius: 12,
        padding: "10px 8px",
        display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap",
        minHeight: 56,
      }}>
        {pieces.map((p, i) => {
          if (Object.values(placed).includes(i)) return null;
          const isPicked = picked === i;
          const isDragging = dragIdx === i;
          return (
            <div key={i}
              draggable={!verified}
              onDragStart={(e) => {
                if (verified) return;
                e.dataTransfer.effectAllowed = "move";
                e.dataTransfer.setData("text/plain", String(i));
                setDragIdx(i);
              }}
              onDragEnd={() => { setDragIdx(null); setDragOverSlot(null); }}
              onClick={() => { if (!verified) pickPiece(i); }}
              style={{
                padding: "8px 12px", maxWidth: 180,
                background: isPicked ? "linear-gradient(180deg,#fce9a8,#d9a441)" : "rgba(255,255,255,0.92)",
                color: "#3a2608",
                border: `2px solid ${isPicked ? "#4fd8ff" : "rgba(242,194,96,0.65)"}`,
                borderRadius: 10,
                fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: p.text.length < 4 ? 24 : 11,
                lineHeight: 1.2,
                cursor: verified ? "default" : "grab",
                userSelect: "none",
                opacity: isDragging ? 0.4 : 1,
                boxShadow: isPicked ? "0 0 14px rgba(79,216,255,0.6)" : "0 4px 10px rgba(0,0,0,0.3)",
                transition: "opacity 0.15s",
              }}>
              {p.text}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function BurbujasCard({ data, picked, locked, onToggle }) {
  function toggle(word) {
    if (locked) return;
    onToggle && onToggle(word);
  }
  // 7 burbujas en CÍRCULO equidistante (tipo reloj) alrededor del centro.
  // Ellipse rx=40 / ry=44 sobre zona-central 440×398. Cada burbuja con
  // translate(-50%,-50%) → posición = centro real de la burbuja.
  const RX = 40, RY = 44;
  const circlePositions = Array.from({ length: 7 }).map((_, i) => {
    const ang = (i / 7) * 2 * Math.PI; // 0 = top, clockwise
    return {
      left: `${50 + Math.sin(ang) * RX}%`,
      top: `${50 - Math.cos(ang) * RY}%`,
    };
  });
  // Asignación por longitud para no chocar con personaje/ActionRail:
  //   los textos más cortos van a posiciones laterales (clock 3 y 9, más expuestas),
  //   los más largos a top/bottom donde hay ancho disponible.
  //   rank 0 (corto) → clock 3   |  rank 4 → 12 (top)
  //   rank 1         → clock 9   |  rank 5 → 5  (bot-der)
  //   rank 2         → clock 1.5 |  rank 6 (largo) → 7 (bot-izq)
  //   rank 3         → clock 10.5
  const RANK_TO_POS = [2, 5, 1, 6, 0, 3, 4];
  // Shuffle primero → sort por longitud (estable) → empates quedan en orden random.
  // Así dos palabras del mismo largo intercambian posiciones entre rondas.
  const wordToPos = React.useMemo(() => {
    const shuffled = shuffle([...data.burbujas]);
    const sorted = shuffled.sort((a, b) => a.length - b.length);
    const m = new Map();
    sorted.forEach((w, rank) => m.set(w, circlePositions[RANK_TO_POS[rank]]));
    return m;
  }, [data.id]);

  return (
    <div style={{ position: "absolute", inset: 0, padding: "0 8px" }}>
      <div style={{ position: "relative", height: "100%" }}>
        {/* Burbuja central */}
        <div style={{
          position: "absolute", left: "50%", top: "50%", transform: "translate(-50%,-50%)",
          background: `linear-gradient(180deg, ${data.color}, #d9a441)`,
          border: "3px solid rgba(255,255,255,0.85)",
          padding: "14px 24px", borderRadius: 999,
          fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 13, color: "#3a2608",
          boxShadow: "0 8px 18px rgba(0,0,0,0.45)",
          whiteSpace: "nowrap", textAlign: "center",
        }}>
          {data.centro}
        </div>

        {/* Burbujas exteriores */}
        {data.burbujas.map((w, i) => {
          const pos = wordToPos.get(w) || circlePositions[i] || { left: "50%", top: "90%" };
          const isPicked = picked.has(w);
          const isCorrect = data.correctos.includes(w);
          const showResult = locked;
          let bg = isPicked ? "linear-gradient(180deg,#ff9ecf,#c5418f)" : "rgba(255,255,255,0.92)";
          let border = isPicked ? "#c5418f" : "rgba(242,194,96,0.55)";
          let mark = "";
          if (showResult) {
            // Simple: TODA respuesta correcta en verde (✓), las que tocaste
            // mal en rojo (✗), el resto atenuado.
            if (isCorrect)        { bg = "linear-gradient(180deg,#9bf2c6,#2ecc8f)"; border = "#2ecc8f"; mark = "✓ "; }
            else if (isPicked)    { bg = "linear-gradient(180deg,#ffb3b3,#ff6b6b)"; border = "#ff6b6b"; mark = "✗ "; }
            else                  { bg = "rgba(255,255,255,0.45)"; border = "rgba(242,194,96,0.35)"; }
          }
          return (
            <button key={i} onClick={() => toggle(w)} disabled={locked}
              style={{
                position: "absolute", ...pos, transform: "translate(-50%,-50%)",
                padding: "10px 16px", borderRadius: 999,
                background: bg, color: "#3a2608", border: `2px solid ${border}`,
                fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 12,
                cursor: locked ? "default" : "pointer",
                boxShadow: "0 4px 12px rgba(0,0,0,0.35)",
                whiteSpace: "nowrap",
              }}>
              {mark}{w}
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// TEMA 2 · PoeticaGame — 3 rondas:
//   R1: Trivia 3 botones (POÉTICA / INFORMA / PIDE ALGO)
//   R2: Empareja refrán ↔ significado (tap-tap líneas)
//   R3: Encerrar figuras literarias en versos (tap múltiple)
// ─────────────────────────────────────────────────────────────
function PoeticaGame({ app, setApp, go, onRestart }) {
  const char = CHARACTERS.find((c) => c.id === app.character) || CHARACTERS[0];
  const catLabel = app.currentCatLabel || "Lenguaje poético";

  const [ronda, setRonda] = useStateG(0);

  // R1 — pick aleatorio
  const [r1Pick] = useStateG(() => {
    // FIFO ventana floor(N/2) sobre ESTE banco (estándar 12)
    const ids = new Set(FUNCIONES_BANK.map((t) => t.id));
    const recentIds = getRecent("poetica").filter((k) => ids.has(k));
    const blocked = new Set(recentIds.slice(0, Math.floor(FUNCIONES_BANK.length / 2)));
    let pool = FUNCIONES_BANK.filter((t) => !blocked.has(t.id));
    if (pool.length < 1) pool = FUNCIONES_BANK;
    const p = pool[Math.floor(Math.random() * pool.length)];
    pushRecent("poetica", p.id);
    return p;
  });

  // R2 — 3 refranes al azar (con su significado)
  const [r2Pairs] = useStateG(() => {
    // FIFO ventana floor(N/2) sobre ESTE banco (estándar 12)
    const ids = new Set(REFRANES_BANK.map((t) => t.id));
    const recentIds = getRecent("poetica").filter((k) => ids.has(k));
    const blocked = new Set(recentIds.slice(0, Math.floor(REFRANES_BANK.length / 2)));
    let pool = REFRANES_BANK.filter((t) => !blocked.has(t.id));
    if (pool.length < 3) pool = REFRANES_BANK;
    const picks = shuffle(pool).slice(0, 3);
    picks.forEach((p) => pushRecent("poetica", p.id));
    return picks;
  });

  // R3 — pick aleatorio del banco de poemas
  const [r3Pick] = useStateG(() => {
    // FIFO ventana floor(N/2) sobre ESTE banco (estándar 12)
    const ids = new Set(POEMAS_BANK.map((t) => t.id));
    const recentIds = getRecent("poetica").filter((k) => ids.has(k));
    const blocked = new Set(recentIds.slice(0, Math.floor(POEMAS_BANK.length / 2)));
    let pool = POEMAS_BANK.filter((t) => !blocked.has(t.id));
    if (pool.length < 1) pool = POEMAS_BANK;
    const p = pool[Math.floor(Math.random() * pool.length)];
    pushRecent("poetica", p.id);
    return p;
  });

  // Estados del shell
  const [elapsed, setElapsed] = useStateG(0);
  const [stars, setStars] = useStateG(0);
  const [solved, setSolved] = useStateG(0);
  const [attempted, setAttempted] = useStateG(0);
  const [starsSession, setStarsSession] = useStateG(0);
  const [feedback, setFeedback] = useStateG(null);
  const [feedbackMsg, setFeedbackMsg] = useStateG("");
  const [confirmingExit, setConfirmingExit] = useStateG(false);
  const [confirmingActualExit, setConfirmingActualExit] = useStateG(false);
  const [log, setLog] = useStateG([]);
  const started = useRefG(Date.now());
  const exerciseStart = useRefG(Date.now());

  // States levantados de las cards
  const [r1Selected, setR1Selected] = useStateG(null);
  const [r1Locked, setR1Locked] = useStateG(false);
  // r2: 3 refranes a la izq + 4 significados a la derecha (1 distractor). origIdx === -1 → distractor.
  const [r2RightOrder] = useStateG(() => {
    const correct = r2Pairs.map((p, i) => ({ origIdx: i, sig: p.significado }));
    const usedIds = new Set(r2Pairs.map((p) => p.id));
    const distractorPool = REFRANES_BANK.filter((b) => !usedIds.has(b.id));
    const distractor = distractorPool.length > 0
      ? distractorPool[Math.floor(Math.random() * distractorPool.length)]
      : null;
    const items = distractor
      ? [...correct, { origIdx: -1, sig: distractor.significado }]
      : correct;
    return shuffle(items);
  });
  const [r2SelectedLeft, setR2SelectedLeft] = useStateG(null);
  const [r2Connections, setR2Connections] = useStateG({});
  const [r2Verified, setR2Verified] = useStateG(false);
  const [r3Picked, setR3Picked] = useStateG(new Set());
  const [r3Locked, setR3Locked] = useStateG(false);

  useEffectG(() => {
    const id = setInterval(() => setElapsed(Math.floor((Date.now() - started.current) / 1000)), 500);
    return () => clearInterval(id);
  }, []);

  // R1 (trivia, 1 opción) AUTO-EVALUADA: al tocar se resalta y, tras ~700ms, califica sola.
  const r1AutoRef = useRefG(null);
  useEffectG(() => () => clearTimeout(r1AutoRef.current), []);

  useEffectG(() => {
    window.__currentChalkGlyphs = [
      { c: "✨", l: "6%",  t: "12%", r: "-8deg" },
      { c: "💫", l: "82%", t: "16%", r: "6deg",  s: "0.62em" },
      { c: "✏",  l: "10%", t: "78%", r: "12deg", s: "0.7em" },
      { c: "*",  l: "88%", t: "72%", r: "-10deg", s: "0.5em" },
      { c: "❤",  l: "45%", t: "8%",  r: "4deg",  s: "0.55em" },
      { c: "🌙", l: "3%",  t: "45%", r: "-4deg", s: "0.5em" },
      { c: "📖", l: "92%", t: "45%", r: "8deg",  s: "0.5em" },
      { c: "¿",  l: "30%", t: "55%", r: "-6deg", s: "0.55em" },
      { c: "¡",  l: "70%", t: "62%", r: "8deg",  s: "0.55em" },
      { c: "✨", l: "55%", t: "30%", r: "-4deg", s: "0.46em" },
    ];
    return () => { window.__currentChalkGlyphs = null; };
  }, []);

  function answer(isCorrect, userText, correctText, opIcon) {
    if (typeof window.markFirstAttempt === "function") window.markFirstAttempt();
    const exerciseSec = Math.max(0, Math.floor((Date.now() - exerciseStart.current) / 1000));
    const earned = calcStars(isCorrect, exerciseSec);
    const newAttempted = attempted + 1;
    const newSolved = solved + (isCorrect ? 1 : 0);
    const newStarsTotal = stars + earned;
    const newStarsSession = starsSession + earned;
    const entry = { idx: newAttempted, a: correctText, b: userText, op: opIcon || "·",
      correctAnswer: correctText, userAnswer: userText, isCorrect, time: exerciseSec, earned };
    const newLog = [...log, entry];

    // Al fallar, el tablero (marcas verde/rojo + respuesta correcta) queda
    // visible un momento ANTES del overlay "¡UPS!" para que se pueda leer.
    const _revealDelay = isCorrect ? 0 : 3000;
    const _okMsg = `+${earned} ⭐`;
    const _errMsg = ENCOURAGEMENTS[Math.floor(Math.random() * ENCOURAGEMENTS.length)];
    setTimeout(() => {
      setFeedback(isCorrect ? "ok" : "err");
      setFeedbackMsg(isCorrect ? _okMsg : _errMsg);
    }, _revealDelay);
    setAttempted(newAttempted); setSolved(newSolved); setStars(newStarsTotal);
    setStarsSession(newStarsSession); setLog(newLog);

    const wait = _revealDelay + (isCorrect ? 950 : 1100);
    setTimeout(() => {
      setFeedback(null); setFeedbackMsg("");
      if (newAttempted >= 3) {
        setApp((s) => ({
          ...s, stars: newStarsTotal,
          lastResult: { category: catLabel, solved: newSolved, total: 3, time: elapsed, starsEarned: newStarsSession, log: newLog },
        }));
        window.incrementGamesCompleted && window.incrementGamesCompleted();
        go("results");
      } else {
        setRonda((r) => r + 1);
        exerciseStart.current = Date.now();
      }
    }, wait);
  }

  // R1 auto-evaluada → canVerify false.
  const canVerify =
    ronda === 0 ? false :
    ronda === 1 ? (Object.keys(r2Connections).length === r2Pairs.length && !r2Verified) :
    ronda === 2 ? (r3Picked.size > 0 && !r3Locked) :
    false;
  const showErase = ronda !== 0;

  // Califica la R1 con la opción tocada (misma rama que tenía handleVerify).
  function gradeR1(funcion) {
    if (r1Locked) return;
    setR1Locked(true);
    answer(funcion === r1Pick.funcion, funcion, r1Pick.funcion, "✨");
  }

  function handleVerify() {
    if (!canVerify) return;
    if (ronda === 1) {
      setR2Verified(true);
      let ok = true;
      for (let i = 0; i < r2Pairs.length; i++) {
        const ri = r2Connections[i];
        if (ri === undefined) { ok = false; break; }
        if (r2RightOrder[ri].origIdx !== i) { ok = false; break; }
      }
      setTimeout(() => answer(ok, JSON.stringify(r2Connections), "ok", "🔗"), 400);
    } else if (ronda === 2) {
      setR3Locked(true);
      const correctSet = new Set();
      r3Pick.versos.forEach((v, i) => { if (v.figura) correctSet.add(i); });
      let ok = r3Picked.size === correctSet.size;
      if (ok) for (const i of r3Picked) if (!correctSet.has(i)) { ok = false; break; }
      setTimeout(() => answer(ok, Array.from(r3Picked).join(","), Array.from(correctSet).join(","), "✨"), 400);
    }
  }

  function handleErase() {
    if (ronda === 1) {
      if (r2Verified) return;
      setR2Connections({});
      setR2SelectedLeft(null);
    } else if (ronda === 2) {
      if (r3Locked) return;
      setR3Picked(new Set());
    }
  }

  const enunciado =
    ronda === 0 ? "¿Qué función cumple esta oración?" :
    ronda === 1 ? "Une cada refrán con su significado." :
    "Encuentra las figuras literarias del poema.";

  const bocadillo =
    ronda === 0 ? "Lee y elige." :
    ronda === 1 ? "Toca un refrán y luego su significado." :
    "Toca los versos con figuras.";

  return (
    <div style={{ position: "absolute", inset: 0, overflow: "hidden" }}>
      <GameHUD elapsed={elapsed} stars={stars} attempted={attempted} solved={solved} total={3} app={app} setApp={setApp} />

      <CharacterCorner char={char} message={bocadillo} />
      <GameEnunciado text={enunciado} />

      <div data-qa="zona-central" style={{
        position: "absolute", top: 128, left: "50%", transform: "translateX(-50%)", width: 440, bottom: 14,
      }}>
        {ronda === 0 && (
          <PoeticaTriviaCard pick={r1Pick}
            selected={r1Selected} locked={r1Locked}
            onSelect={(t) => {
              if (r1Locked) return;
              setR1Selected(t);
              clearTimeout(r1AutoRef.current);
              r1AutoRef.current = setTimeout(() => gradeR1(t), 700);
            }}
          />
        )}
        {ronda === 1 && (
          <RefranesCard pairs={r2Pairs} rightOrder={r2RightOrder}
            selectedLeft={r2SelectedLeft} connections={r2Connections} verified={r2Verified}
            onTapLeft={(i) => { if (r2Verified) return; setR2SelectedLeft(r2SelectedLeft === i ? null : i); }}
            onTapRight={(rightIdx) => {
              if (r2Verified) return;
              if (r2SelectedLeft === null) {
                const k = Object.entries(r2Connections).find(([_, v]) => v === rightIdx);
                if (k) { const next = { ...r2Connections }; delete next[k[0]]; setR2Connections(next); }
                return;
              }
              const next = { ...r2Connections };
              delete next[r2SelectedLeft];
              for (const k of Object.keys(next)) if (next[k] === rightIdx) delete next[k];
              next[r2SelectedLeft] = rightIdx;
              setR2Connections(next);
              setR2SelectedLeft(null);
            }}
          />
        )}
        {ronda === 2 && (
          <FigurasCard poema={r3Pick}
            picked={r3Picked} locked={r3Locked}
            onToggle={(i) => { if (r3Locked) return; const next = new Set(r3Picked); if (next.has(i)) next.delete(i); else next.add(i); setR3Picked(next); }}
          />
        )}
      </div>

      <ActionRail
        canVerify={canVerify}
        onVerify={handleVerify}
        hideVerify={ronda === 0}
        showErase={showErase}
        onErase={handleErase}
        onRestart={() => setConfirmingExit(true)}
        onExit={() => setConfirmingActualExit(true)}
      />

      <FeedbackOverlay feedback={feedback} feedbackMsg={feedbackMsg} charName={char.name} />
      <RestartModal confirmingExit={confirmingExit} setConfirmingExit={setConfirmingExit} attempted={attempted} total={3} onRestart={onRestart} />
      <ExitModal confirmingExit={confirmingActualExit} setConfirmingExit={setConfirmingActualExit} attempted={attempted} total={3} onExit={() => go("home")} />
    </div>
  );
}

function PoeticaTriviaCard({ pick, selected, locked, onSelect }) {
  function choose(f) {
    if (locked) return;
    onSelect && onSelect(f);
  }
  return (
    <div style={{
      display: "flex", flexDirection: "column", alignItems: "center",
      justifyContent: "center", height: "100%", gap: 26, padding: "0 4px",
    }}>
      {/* Oración arriba — una sola columna */}
      <div style={{
        width: "100%", maxWidth: 440,
        background: "linear-gradient(180deg, rgba(255,255,255,0.96), rgba(245,238,225,0.95))",
        border: "3px solid #f2c260", borderRadius: 18,
        padding: "18px 24px", boxShadow: "0 10px 24px rgba(0,0,0,0.45)",
        color: "#3a2608",
        fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 17, lineHeight: 1.3,
        textAlign: "center", fontStyle: "italic",
      }}>
        "{pick.oracion}"
      </div>
      {/* Opciones apiladas en columna debajo */}
      <div style={{ display: "flex", flexDirection: "column", gap: 10, alignItems: "stretch", width: "100%", maxWidth: 280 }}>
        {[
          { id: "poetica", label: "POÉTICA",   color: "#ffe97a" },
          { id: "informa", label: "INFORMA",   color: "#7ab8ff" },
          { id: "pide",    label: "PIDE ALGO", color: "#ffc06e" },
        ].map((opt) => {
          const isRight = locked && opt.id === pick.funcion;
          const isWrongPick = locked && selected === opt.id && opt.id !== pick.funcion;
          return (
            <button key={opt.id} onClick={() => choose(opt.id)} disabled={locked}
              style={{
                position: "relative",
                padding: "12px 20px", borderRadius: 14,
                background: isRight
                  ? "linear-gradient(180deg,#2ecc8f,#22a06c)"
                  : isWrongPick
                  ? "linear-gradient(180deg,#ff8b8b,#dc5050)"
                  : selected === opt.id ? "linear-gradient(180deg,#fce9a8,#d9a441)" : "rgba(255,255,255,0.92)",
                color: isRight || isWrongPick ? "#fff" : "#3a2608",
                border: `3px solid ${isRight ? "#2ecc8f" : isWrongPick ? "#ff6b6b" : opt.color}`,
                fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 14, letterSpacing: "0.04em",
                cursor: locked ? "default" : "pointer",
                boxShadow: isRight
                  ? "0 0 0 4px rgba(255,255,255,0.9), 0 0 26px rgba(46,204,143,0.85)"
                  : selected === opt.id
                  ? "0 0 0 4px rgba(255,255,255,1), 0 0 0 8px rgba(252,233,168,0.65), 0 0 38px rgba(252,233,168,0.9), 0 8px 22px -4px rgba(0,0,0,0.55)"
                  : "0 6px 14px rgba(0,0,0,0.35)",
                transform: (selected === opt.id && !locked) || isRight ? "translateY(-4px) scale(1.04)" : "none",
                transition: "all 0.18s ease",
                opacity: locked && !isRight && !isWrongPick ? 0.5 : 1,
              }}>
              {opt.label}
              {isRight && (
                <span style={{
                  position: "absolute", top: -8, right: -8, width: 24, height: 24, borderRadius: "50%",
                  background: "#2ecc8f", color: "#fff", fontSize: 14, fontWeight: 900,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  border: "2px solid #fff", boxShadow: "0 2px 6px rgba(0,0,0,0.4)",
                }}>✓</span>
              )}
            </button>
          );
        })}
      </div>
    </div>
  );
}

function RefranesCard({ pairs, rightOrder, selectedLeft, connections, verified, onTapLeft, onTapRight }) {
  // Componente CONTROLADO — state vive en el padre.
  const tapLeft = (i) => onTapLeft && onTapLeft(i);
  const tapRight = (rightIdx) => onTapRight && onTapRight(rightIdx);

  // Un color por pareja: al conectar un refrán con su significado, ambos lados
  // (y el punto central) se pintan del mismo color, para ver de un vistazo qué
  // va con qué. En la verificación manda el verde/rojo.
  const PAIR_COLORS = [
    { bg: "linear-gradient(180deg,#bfe3ff,#6fb3ec)", border: "#2b7fc4" }, // azul
    { bg: "linear-gradient(180deg,#e7d2ff,#b78ff0)", border: "#7d4fc0" }, // morado
    { bg: "linear-gradient(180deg,#ffe0b0,#f2b25a)", border: "#c47d1e" }, // naranja
    { bg: "linear-gradient(180deg,#bff2d6,#6fd6a0)", border: "#1e9e5e" }, // verde agua
  ];

  return (
    <div style={{ position: "absolute", inset: 0, padding: "8px 8px" }}>
      <div style={{ position: "absolute", left: 0, right: 0, top: 0, bottom: 0 }}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 14px 1fr", gap: 12, height: "100%", alignItems: "stretch" }}>
          {/* Columna izquierda — refranes (3) */}
          <div style={{ display: "flex", flexDirection: "column", gap: 8, justifyContent: "space-around" }}>
            {pairs.map((p, i) => {
              const isSel = selectedLeft === i;
              const isConnected = connections[i] !== undefined;
              const isCorrect = verified && connections[i] !== undefined && rightOrder[connections[i]].origIdx === i;
              const isWrong   = verified && (connections[i] === undefined || rightOrder[connections[i]].origIdx !== i);
              const pc = PAIR_COLORS[i % PAIR_COLORS.length];
              // Al verificar: cada refrán muestra el color + número de su pareja
              // (revela el emparejamiento correcto), y el borde verde/rojo dice
              // si el niño lo conectó bien.
              let bg, border;
              if (verified) {
                bg = pc.bg;
                border = isCorrect ? "#2ecc8f" : "#ff6b6b";
              } else {
                bg = isConnected ? pc.bg : "rgba(255,255,255,0.92)";
                border = isConnected ? pc.border : "rgba(242,194,96,0.55)";
                if (isSel) border = "#4fd8ff";
              }
              return (
                <button key={i} onClick={() => tapLeft(i)} disabled={verified}
                  style={{
                    display: "flex", alignItems: "center", gap: 8,
                    padding: "10px 12px", borderRadius: 12,
                    background: bg,
                    color: "#3a2608", border: `2.5px solid ${border}`,
                    fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 13, lineHeight: 1.25,
                    textAlign: "left", cursor: "pointer",
                    boxShadow: isSel ? "0 0 14px rgba(79,216,255,0.6)" : isConnected && !verified ? `0 0 10px ${pc.border}66` : "0 4px 10px rgba(0,0,0,0.35)",
                  }}>
                  {verified && (
                    <span style={{
                      flexShrink: 0, width: 22, height: 22, borderRadius: "50%",
                      background: pc.border, color: "#fff", fontWeight: 900, fontSize: 12,
                      display: "flex", alignItems: "center", justifyContent: "center",
                      border: "2px solid #fff",
                    }}>{i + 1}</span>
                  )}
                  <span>"{p.refran}"</span>
                </button>
              );
            })}
          </div>
          {/* Columna central — indicadores (mismo count que pairs) */}
          <div style={{ display: "flex", flexDirection: "column", gap: 8, alignItems: "center", justifyContent: "space-around" }}>
            {pairs.map((_, i) => {
              const has = connections[i] !== undefined;
              const pc = PAIR_COLORS[i % PAIR_COLORS.length];
              return <div key={i} style={{
                width: 14, height: 14, borderRadius: "50%",
                background: has ? (verified ? "#fce9a8" : pc.border) : "rgba(255,255,255,0.2)",
                border: "1px solid rgba(252,233,168,0.5)",
                boxShadow: has && !verified ? `0 0 8px ${pc.border}` : "none",
                transition: "all 0.15s ease",
              }} />;
            })}
          </div>
          {/* Columna derecha — significados (4, con 1 distractor) */}
          <div style={{ display: "flex", flexDirection: "column", gap: 8, justifyContent: "space-around" }}>
            {rightOrder.map((r, j) => {
              const usedBy = Object.entries(connections).find(([_, v]) => v === j);
              const isConnected = !!usedBy;
              const leftI = usedBy ? Number(usedBy[0]) : null;
              const isCorrect = verified && isConnected && r.origIdx === leftI;
              const isWrong   = verified && isConnected && r.origIdx !== leftI;
              // Al verificar: el significado muestra el color + número del refrán
              // al que pertenece DE VERDAD (r.origIdx). El distractor va en gris.
              const trueGroup = r.origIdx; // -1 = distractor (no va con ninguno)
              const pcTrue = trueGroup >= 0 ? PAIR_COLORS[trueGroup % PAIR_COLORS.length] : null;
              const pcPlay = leftI !== null ? PAIR_COLORS[leftI % PAIR_COLORS.length] : null;
              let bg, border;
              if (verified) {
                bg = pcTrue ? pcTrue.bg : "rgba(180,180,180,0.45)";
                border = isCorrect ? "#2ecc8f" : isWrong ? "#ff6b6b" : "rgba(242,194,96,0.55)";
              } else {
                bg = isConnected ? pcPlay.bg : "rgba(255,255,255,0.92)";
                border = isConnected ? pcPlay.border : "rgba(242,194,96,0.55)";
              }
              return (
                <button key={j} onClick={() => tapRight(j)} disabled={verified}
                  style={{
                    display: "flex", alignItems: "center", gap: 8,
                    padding: "10px 12px", borderRadius: 12,
                    background: bg,
                    color: "#3a2608", border: `2.5px solid ${border}`,
                    fontFamily: "var(--ed-font-display)", fontWeight: 600, fontSize: 12, lineHeight: 1.25,
                    textAlign: "left", cursor: "pointer",
                    boxShadow: isConnected && !verified ? `0 0 10px ${pcPlay.border}66` : "0 4px 10px rgba(0,0,0,0.35)",
                  }}>
                  {verified && (
                    pcTrue ? (
                      <span style={{
                        flexShrink: 0, width: 22, height: 22, borderRadius: "50%",
                        background: pcTrue.border, color: "#fff", fontWeight: 900, fontSize: 12,
                        display: "flex", alignItems: "center", justifyContent: "center",
                        border: "2px solid #fff",
                      }}>{trueGroup + 1}</span>
                    ) : (
                      <span style={{
                        flexShrink: 0, fontSize: 9, fontWeight: 800, color: "#555",
                        background: "rgba(255,255,255,0.8)", borderRadius: 6, padding: "2px 6px",
                      }}>sobra</span>
                    )
                  )}
                  <span>{r.sig}</span>
                </button>
              );
            })}
          </div>
        </div>
      </div>

    </div>
  );
}

function FigurasCard({ poema, picked, locked, onToggle }) {
  function toggle(i) {
    if (locked) return;
    onToggle && onToggle(i);
  }

  return (
    <div style={{ position: "absolute", inset: 0, padding: "0 8px",
      display: "flex", alignItems: "center", justifyContent: "center" }}>
      <div style={{
        margin: "0 auto", maxWidth: 420,
        background: "linear-gradient(180deg, rgba(255,255,255,0.96), rgba(245,238,225,0.95))",
        border: "3px solid #f2c260", borderRadius: 14,
        padding: "12px 18px",
        boxShadow: "0 10px 24px rgba(0,0,0,0.45)",
        display: "flex", flexDirection: "column", gap: 6,
      }}>
        <div style={{ fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 12, color: "#a78bfa", letterSpacing: "0.06em", textTransform: "uppercase", textAlign: "center" }}>
          {poema.titulo}
        </div>
        {poema.versos.map((v, i) => {
          const isPicked = picked.has(i);
          const isCorrect = locked && v.figura;          // es figura → respuesta correcta
          const isWrong   = locked && isPicked && !v.figura; // tocaste un verso sin figura
          let bg = isPicked ? "linear-gradient(180deg,#fce9a8,#d9a441)" : "transparent";
          let color = "#3a2608";
          let border = isPicked ? "#d9a441" : "transparent";
          if (locked) {
            // Simple: TODA figura en verde, lo que tocaste mal en rojo, el resto neutro.
            if (isCorrect)      { bg = "linear-gradient(180deg,#9bf2c6,#2ecc8f)"; border = "#2ecc8f"; color = "#06381f"; }
            else if (isWrong)   { bg = "linear-gradient(180deg,#ffb3b3,#ff6b6b)"; border = "#ff6b6b"; color = "#fff"; }
            else                { bg = "transparent"; border = "rgba(255,255,255,0.15)"; color = "rgba(58,38,8,0.5)"; }
          }
          return (
            <button key={i} onClick={() => toggle(i)} disabled={locked}
              style={{
                padding: "8px 12px", borderRadius: 10,
                background: bg, color, border: `2px solid ${border}`,
                fontFamily: "var(--ed-font-display)", fontWeight: 600, fontSize: 14, lineHeight: 1.3,
                textAlign: "left", cursor: locked ? "default" : "pointer",
                fontStyle: "italic",
              }}>
              {v.texto}
            </button>
          );
        })}
      </div>

    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// TEMA 3 · EscrituraGame — 3 rondas:
//   R1: Ordena las 6 partes del informe (drag a slots numerados)
//   R2: Conector correcto (trivia 3 botones, función arriba)
//   R3: Caza los errores (tap múltiple sobre palabras)
// ─────────────────────────────────────────────────────────────
function EscrituraGame({ app, setApp, go, onRestart }) {
  const char = CHARACTERS.find((c) => c.id === app.character) || CHARACTERS[0];
  const catLabel = app.currentCatLabel || "Escritura académica";

  const [ronda, setRonda] = useStateG(0);

  const [r1Pick] = useStateG(() => {
    return INFORME_CONTEXTOS[Math.floor(Math.random() * INFORME_CONTEXTOS.length)];
  });

  const [r2Pick] = useStateG(() => {
    // FIFO ventana floor(N/2) sobre ESTE banco (estándar 12)
    const ids = new Set(CONECTORES_BANK.map((t) => t.id));
    const recentIds = getRecent("escritura").filter((k) => ids.has(k));
    const blocked = new Set(recentIds.slice(0, Math.floor(CONECTORES_BANK.length / 2)));
    let pool = CONECTORES_BANK.filter((t) => !blocked.has(t.id));
    if (pool.length < 1) pool = CONECTORES_BANK;
    const p = pool[Math.floor(Math.random() * pool.length)];
    pushRecent("escritura", p.id);
    return p;
  });

  const [r3Pick] = useStateG(() => {
    // FIFO ventana floor(N/2) sobre ESTE banco (estándar 12)
    const ids = new Set(ERRORES_BANK.map((t) => t.id));
    const recentIds = getRecent("escritura").filter((k) => ids.has(k));
    const blocked = new Set(recentIds.slice(0, Math.floor(ERRORES_BANK.length / 2)));
    let pool = ERRORES_BANK.filter((t) => !blocked.has(t.id));
    if (pool.length < 1) pool = ERRORES_BANK;
    const p = pool[Math.floor(Math.random() * pool.length)];
    pushRecent("escritura", p.id);
    return p;
  });

  const [elapsed, setElapsed] = useStateG(0);
  const [stars, setStars] = useStateG(0);
  const [solved, setSolved] = useStateG(0);
  const [attempted, setAttempted] = useStateG(0);
  const [starsSession, setStarsSession] = useStateG(0);
  const [feedback, setFeedback] = useStateG(null);
  const [feedbackMsg, setFeedbackMsg] = useStateG("");
  const [confirmingExit, setConfirmingExit] = useStateG(false);
  const [confirmingActualExit, setConfirmingActualExit] = useStateG(false);
  const [log, setLog] = useStateG([]);
  const started = useRefG(Date.now());
  const exerciseStart = useRefG(Date.now());

  // States levantados de las cards
  const [r1Pieces] = useStateG(() => shuffle(INFORME_PARTES.map((p, i) => ({ text: p, origIdx: i }))));
  const [r1Placed, setR1Placed] = useStateG([null, null, null, null, null, null]);
  const [r1Picked, setR1Picked] = useStateG(null);
  const [r1Verified, setR1Verified] = useStateG(false);
  const [r2Opciones] = useStateG(() => shuffle([r2Pick.correcta, ...r2Pick.distractores]));
  const [r2Selected, setR2Selected] = useStateG(null);
  const [r2Locked, setR2Locked] = useStateG(false);
  const [r3Picked, setR3Picked] = useStateG(new Set());
  const [r3Locked, setR3Locked] = useStateG(false);

  useEffectG(() => {
    const id = setInterval(() => setElapsed(Math.floor((Date.now() - started.current) / 1000)), 500);
    return () => clearInterval(id);
  }, []);

  // R2 (conector, 1 opción) AUTO-EVALUADA: al tocar se resalta y, tras ~700ms, califica sola.
  const r2AutoRef = useRefG(null);
  useEffectG(() => () => clearTimeout(r2AutoRef.current), []);

  useEffectG(() => {
    window.__currentChalkGlyphs = [
      { c: "📑", l: "6%",  t: "12%", r: "-8deg" },
      { c: "🖊", l: "82%", t: "16%", r: "6deg",  s: "0.62em" },
      { c: "📊", l: "10%", t: "78%", r: "12deg", s: "0.7em" },
      { c: "✓",  l: "88%", t: "72%", r: "-10deg", s: "0.5em" },
      { c: "✗",  l: "45%", t: "8%",  r: "4deg",  s: "0.5em" },
      { c: "?",  l: "3%",  t: "45%", r: "-4deg", s: "0.55em" },
      { c: ".",  l: "92%", t: "45%", r: "8deg",  s: "0.7em" },
      { c: ",",  l: "30%", t: "55%", r: "-6deg", s: "0.7em" },
      { c: ";",  l: "70%", t: "62%", r: "8deg",  s: "0.6em" },
      { c: ":",  l: "55%", t: "30%", r: "-4deg", s: "0.6em" },
    ];
    return () => { window.__currentChalkGlyphs = null; };
  }, []);

  function answer(isCorrect, userText, correctText, opIcon) {
    if (typeof window.markFirstAttempt === "function") window.markFirstAttempt();
    const exerciseSec = Math.max(0, Math.floor((Date.now() - exerciseStart.current) / 1000));
    const earned = calcStars(isCorrect, exerciseSec);
    const newAttempted = attempted + 1;
    const newSolved = solved + (isCorrect ? 1 : 0);
    const newStarsTotal = stars + earned;
    const newStarsSession = starsSession + earned;
    const entry = { idx: newAttempted, a: correctText, b: userText, op: opIcon || "·",
      correctAnswer: correctText, userAnswer: userText, isCorrect, time: exerciseSec, earned };
    const newLog = [...log, entry];
    // Al fallar, el tablero (marcas verde/rojo + respuesta correcta) queda
    // visible un momento ANTES del overlay "¡UPS!" para que se pueda leer.
    const _revealDelay = isCorrect ? 0 : 3000;
    const _okMsg = `+${earned} ⭐`;
    const _errMsg = ENCOURAGEMENTS[Math.floor(Math.random() * ENCOURAGEMENTS.length)];
    setTimeout(() => {
      setFeedback(isCorrect ? "ok" : "err");
      setFeedbackMsg(isCorrect ? _okMsg : _errMsg);
    }, _revealDelay);
    setAttempted(newAttempted); setSolved(newSolved); setStars(newStarsTotal);
    setStarsSession(newStarsSession); setLog(newLog);
    const wait = _revealDelay + (isCorrect ? 950 : 1100);
    setTimeout(() => {
      setFeedback(null); setFeedbackMsg("");
      if (newAttempted >= 3) {
        setApp((s) => ({
          ...s, stars: newStarsTotal,
          lastResult: { category: catLabel, solved: newSolved, total: 3, time: elapsed, starsEarned: newStarsSession, log: newLog },
        }));
        window.incrementGamesCompleted && window.incrementGamesCompleted();
        go("results");
      } else {
        setRonda((r) => r + 1);
        exerciseStart.current = Date.now();
      }
    }, wait);
  }

  // r3 — parsear tokens del párrafo (algunos marcados con [..] son errores)
  const r3Tokens = useMemoG(() => {
    const arr = [];
    const regex = /(\[[^\]]+\])|(\s+)|([^\s\[\]]+)/g;
    let m;
    while ((m = regex.exec(r3Pick.tokens)) !== null) {
      if (m[1]) arr.push({ type: "err", text: m[1].slice(1, -1) });
      else if (m[2]) arr.push({ type: "space", text: m[2] });
      else arr.push({ type: "ok", text: m[3] });
    }
    return arr;
  }, [r3Pick.tokens]);

  // R2 (conector, 1 opción) auto-evaluada → canVerify false en esa ronda.
  const canVerify =
    ronda === 0 ? (r1Placed.every((p) => p !== null) && !r1Verified) :
    ronda === 1 ? false :
    ronda === 2 ? (r3Picked.size > 0 && !r3Locked) :
    false;
  const showErase = ronda !== 1;

  // Califica la R2 con la opción tocada (misma rama que tenía handleVerify).
  function gradeR2(opt) {
    if (r2Locked) return;
    setR2Locked(true);
    answer(opt === r2Pick.correcta, opt, r2Pick.correcta, "🔗");
  }

  function handleVerify() {
    if (!canVerify) return;
    if (ronda === 0) {
      setR1Verified(true);
      let ok = true;
      for (let i = 0; i < INFORME_PARTES.length; i++) {
        if (r1Placed[i] !== INFORME_PARTES[i]) { ok = false; break; }
      }
      setTimeout(() => answer(ok, r1Placed.join(" → "), INFORME_PARTES.join(" → "), "📑"), 400);
    } else if (ronda === 2) {
      setR3Locked(true);
      const correctSet = new Set();
      r3Tokens.forEach((t, i) => { if (t.type === "err") correctSet.add(i); });
      let ok = correctSet.size === r3Picked.size;
      if (ok) for (const i of r3Picked) if (!correctSet.has(i)) { ok = false; break; }
      // Delay largo: el usuario debe poder leer el texto y ver qué marcó bien/mal
      // (verde = acertó error, amarillo = error que no detectó, rojo = palabra
      // correcta que marcó por error) antes de que el overlay tape la pantalla.
      const reviewDelay = ok ? 2500 : 4000;
      setTimeout(() => answer(ok,
        Array.from(r3Picked).map((i) => r3Tokens[i].text).join(", "),
        r3Tokens.filter((t) => t.type === "err").map((t) => t.text).join(", "), "✗"), reviewDelay);
    }
  }

  function handleErase() {
    if (ronda === 0) {
      if (r1Verified) return;
      setR1Placed([null, null, null, null, null, null]);
      setR1Picked(null);
    } else if (ronda === 2) {
      if (r3Locked) return;
      setR3Picked(new Set());
    }
  }

  const enunciado =
    ronda === 0 ? "Ordena las partes del informe (1 a 6)." :
    ronda === 1 ? "Elige el conector correcto." :
    "Encuentra las palabras con error.";

  const bocadillo =
    ronda === 0 ? "¡Arrástralas y arma el informe en orden!" :
    ronda === 1 ? "Lee y elige." :
    "Toca las palabras con error.";

  return (
    <div style={{ position: "absolute", inset: 0, overflow: "hidden" }}>
      <GameHUD elapsed={elapsed} stars={stars} attempted={attempted} solved={solved} total={3} app={app} setApp={setApp} />

      <CharacterCorner char={char} message={bocadillo} />
      <GameEnunciado text={enunciado} />

      <div data-qa="zona-central" style={{
        position: "absolute", top: 128, left: "50%", transform: "translateX(-50%)", width: 440, bottom: 14,
      }}>
        {ronda === 0 && (
          <OrdenInformeCard contexto={r1Pick}
            pieces={r1Pieces} placed={r1Placed} picked={r1Picked} verified={r1Verified}
            onPickPiece={(text) => { if (r1Verified) return; if (r1Placed.includes(text)) return; setR1Picked(r1Picked === text ? null : text); }}
            onPickFromSlot={(idx) => {
              if (r1Verified) return;
              const text = r1Placed[idx];
              if (!text) return;
              const next = [...r1Placed];
              next[idx] = null;
              setR1Placed(next);
              setR1Picked(text);
            }}
            onPlaceAt={(idx, explicitText) => {
              if (r1Verified) return;
              const text = explicitText !== undefined ? explicitText : r1Picked;
              if (text === null || text === undefined) {
                if (r1Placed[idx]) { const next = [...r1Placed]; next[idx] = null; setR1Placed(next); }
                return;
              }
              const next = [...r1Placed];
              for (let k = 0; k < next.length; k++) if (next[k] === text) next[k] = null;
              next[idx] = text;
              setR1Placed(next);
              setR1Picked(null);
            }}
          />
        )}
        {ronda === 1 && (
          <ConectoresCard pick={r2Pick} opciones={r2Opciones}
            selected={r2Selected} locked={r2Locked}
            onSelect={(opt) => {
              if (r2Locked) return;
              setR2Selected(opt);
              clearTimeout(r2AutoRef.current);
              r2AutoRef.current = setTimeout(() => gradeR2(opt), 700);
            }}
          />
        )}
        {ronda === 2 && (
          <ErroresCard pick={r3Pick} tokens={r3Tokens}
            picked={r3Picked} locked={r3Locked}
            onToggle={(idx) => { if (r3Locked) return; const next = new Set(r3Picked); if (next.has(idx)) next.delete(idx); else next.add(idx); setR3Picked(next); }}
          />
        )}
      </div>

      <ActionRail
        canVerify={canVerify}
        onVerify={handleVerify}
        hideVerify={ronda === 1}
        showErase={showErase}
        onErase={handleErase}
        onRestart={() => setConfirmingExit(true)}
        onExit={() => setConfirmingActualExit(true)}
      />

      <FeedbackOverlay feedback={feedback} feedbackMsg={feedbackMsg} charName={char.name} />
      <RestartModal confirmingExit={confirmingExit} setConfirmingExit={setConfirmingExit} attempted={attempted} total={3} onRestart={onRestart} />
      <ExitModal confirmingExit={confirmingActualExit} setConfirmingExit={setConfirmingActualExit} attempted={attempted} total={3} onExit={() => go("home")} />
    </div>
  );
}

function OrdenInformeCard({ contexto, pieces, placed, picked, verified, onPickPiece, onPickFromSlot, onPlaceAt }) {
  // Soporta DRAG (HTML5) y tap-to-place. Slot lleno también es pickeable/draggable.
  const [dragText, setDragText] = React.useState(null);
  const [dragOverIdx, setDragOverIdx] = React.useState(null);
  const pickPiece = (text) => onPickPiece && onPickPiece(text);
  const pickFromSlot = (idx) => onPickFromSlot && onPickFromSlot(idx);
  const placeAt = (idx, explicitText) => onPlaceAt && onPlaceAt(idx, explicitText);

  return (
    <div style={{ position: "absolute", inset: 0, padding: "4px 8px", display: "flex", flexDirection: "column", justifyContent: "center", gap: 10 }}>
      <div style={{
        textAlign: "center",
        fontFamily: "var(--ed-font-display)",
        fontWeight: 800, fontSize: 13, color: "#fce9a8",
        textShadow: "0 2px 4px rgba(0,0,0,0.4)",
      }}>
        {contexto.titulo}
      </div>

      <div style={{ display: "flex", gap: 12, justifyContent: "center", alignItems: "flex-start" }}>
        {/* Slots numerados (izquierda) */}
        <div style={{ flex: "0 0 220px", display: "flex", flexDirection: "column", gap: 6, overflow: "auto" }}>
          {placed.map((t, i) => {
            const correct = verified && t === INFORME_PARTES[i];
            const wrong = verified && t !== INFORME_PARTES[i];
            const isHover = dragOverIdx === i;
            const isDragSource = t && dragText === t;
            return (
              <div key={i}
                // Tap: si tiene pieza y nada en mano → la levanta. Si no, intenta placeAt.
                onClick={() => {
                  if (verified) return;
                  if (t && picked === null) { pickFromSlot(i); return; }
                  placeAt(i);
                }}
                // Drag-source: pieza colocada se puede arrastrar a otro slot.
                draggable={!verified && !!t}
                onDragStart={(e) => {
                  if (verified || !t) return;
                  e.dataTransfer.effectAllowed = "move";
                  e.dataTransfer.setData("text/plain", t);
                  setDragText(t);
                }}
                onDragEnd={() => { setDragText(null); setDragOverIdx(null); }}
                onDragOver={(e) => { if (!verified) { e.preventDefault(); setDragOverIdx(i); } }}
                onDragLeave={() => setDragOverIdx((x) => x === i ? null : x)}
                onDrop={(e) => {
                  if (verified) return;
                  e.preventDefault();
                  const raw = e.dataTransfer.getData("text/plain");
                  setDragOverIdx(null); setDragText(null);
                  if (raw) placeAt(i, raw);
                }}
                style={{
                  display: "flex", alignItems: "center", gap: 8,
                  padding: "8px 12px", borderRadius: 10,
                  // Acierto → fondo verde sólido (resalta tu acierto); fallo →
                  // dorado con borde rojo; vacío → oscuro.
                  background: correct ? "linear-gradient(180deg,#9bf2c6,#2ecc8f)"
                    : t ? "linear-gradient(180deg,#fce9a8,#d9a441)"
                    : isHover ? "rgba(79,216,255,0.18)" : "rgba(10,6,35,0.55)",
                  color: correct ? "#06381f" : t ? "#3a2608" : "rgba(252,233,168,0.5)",
                  border: `2px ${correct || wrong ? "solid" : "dashed"} ${correct ? "#2ecc8f" : wrong ? "#ff6b6b" : isHover ? "#4fd8ff" : "rgba(252,233,168,0.45)"}`,
                  fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 12,
                  textAlign: "left", cursor: verified ? "default" : (t ? "grab" : "pointer"),
                  userSelect: "none",
                  width: "100%", minHeight: 38,
                  opacity: isDragSource ? 0.4 : 1,
                  boxShadow: correct ? "0 0 14px rgba(46,204,143,0.55)" : isHover ? "0 0 12px rgba(79,216,255,0.5)" : "none",
                  transition: "background 0.15s, border-color 0.15s, opacity 0.15s",
                }}>
                <span style={{ fontWeight: 800, fontSize: 14, color: t ? "#3a2608" : "#a78bfa" }}>{i + 1}.</span>
                <span style={{ flex: 1, display: "flex", flexDirection: "column", gap: 2 }}>
                  <span>{t || "(vacío)"}</span>
                  {/* Al fallar, revelamos qué parte va de verdad en esta posición. */}
                  {wrong && (
                    <span style={{
                      alignSelf: "flex-start", fontSize: 10, fontWeight: 800,
                      color: "#0a3a1e", background: "rgba(46,204,143,0.9)",
                      borderRadius: 5, padding: "1px 6px",
                    }}>✓ {INFORME_PARTES[i]}</span>
                  )}
                </span>
              </div>
            );
          })}
        </div>

        {/* Bandeja de piezas (derecha) — ancho ajustado al contenido, alto solo lo necesario */}
        <div style={{
          flex: "0 1 auto", maxWidth: 200, minWidth: 160,
          alignSelf: "flex-start",
          background: "rgba(10,6,35,0.45)",
          border: "1px dashed rgba(252,233,168,0.3)",
          borderRadius: 12,
          padding: 10,
          display: "flex", flexWrap: "wrap", alignContent: "flex-start", justifyContent: "center", gap: 8,
        }}>
          {pieces.map((p, i) => {
            if (placed.includes(p.text)) return null;
            const isPicked = picked === p.text;
            const isDragging = dragText === p.text;
            return (
              <div key={i}
                draggable={!verified}
                onDragStart={(e) => {
                  if (verified) return;
                  e.dataTransfer.effectAllowed = "move";
                  e.dataTransfer.setData("text/plain", p.text);
                  setDragText(p.text);
                }}
                onDragEnd={() => { setDragText(null); setDragOverIdx(null); }}
                onClick={() => { if (!verified) pickPiece(p.text); }}
                style={{
                  padding: "8px 12px", borderRadius: 10,
                  background: isPicked ? "linear-gradient(180deg,#fce9a8,#d9a441)" : "rgba(255,255,255,0.92)",
                  color: "#3a2608",
                  border: `2px solid ${isPicked ? "#4fd8ff" : "rgba(242,194,96,0.65)"}`,
                  fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 12,
                  cursor: verified ? "default" : "grab", userSelect: "none",
                  opacity: isDragging ? 0.4 : 1,
                  boxShadow: isPicked ? "0 0 14px rgba(79,216,255,0.6)" : "0 4px 10px rgba(0,0,0,0.3)",
                  transition: "opacity 0.15s",
                }}>
                {p.text}
              </div>
            );
          })}
        </div>
      </div>

    </div>
  );
}
