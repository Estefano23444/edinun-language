// ─────────────────────────────────────────────────────────────
// Sparkles — chispas animadas alrededor del personaje. Refuerzan
// la estética cósmica heredada del shell.
// ─────────────────────────────────────────────────────────────
function Sparkles({ color = "#fce9a8", count = 6, seed = 1 }) {
  const pts = Array.from({ length: count }, (_, i) => {
    const a = (i * 360) / count + seed * 37;
    const r = 70 + (i % 3) * 8;
    const x = 100 + Math.cos((a * Math.PI) / 180) * r;
    const y = 100 + Math.sin((a * Math.PI) / 180) * r;
    const s = 2 + (i % 3);
    return { x, y, s, delay: i * 0.35 };
  });
  return (
    <g>
      {pts.map((p, i) => (
        <g key={i} transform={`translate(${p.x} ${p.y})`}>
          <circle r={p.s} fill={color} opacity="0.9">
            <animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" begin={`${p.delay}s`} repeatCount="indefinite" />
          </circle>
        </g>
      ))}
    </g>
  );
}

}

// ─────────────────────────────────────────────────────────────
// Contador de visitantes (compartido entre juegos del repo via
// localStorage).
// ─────────────────────────────────────────────────────────────
function useVisitorCount() {
  const KEY = "edinun_visitors_v1";
  const [n, setN] = useState(() => {
    const raw = localStorage.getItem(KEY);
    const v = raw ? parseInt(raw, 10) : 0;
    return isNaN(v) ? 0 : v;
  });
  useEffect(() => {
    function onUpdate() {
      const raw = localStorage.getItem(KEY);
      const v = raw ? parseInt(raw, 10) : 0;
      if (!isNaN(v)) setN(v);
    }
    window.addEventListener("edinun:visitors-updated", onUpdate);
    return () => window.removeEventListener("edinun:visitors-updated", onUpdate);
  }, []);
  return n;
}

function markFirstAttempt() {
  const KEY = "edinun_visitors_v1";
  const SESSION_FLAG = "edinun_visit_counted_v1";
  if (sessionStorage.getItem(SESSION_FLAG) === "1") return;
  const raw = localStorage.getItem(KEY);
  const current = raw ? parseInt(raw, 10) : 0;
  const next = (isNaN(current) ? 0 : current) + 1;
  localStorage.setItem(KEY, String(next));
  sessionStorage.setItem(SESSION_FLAG, "1");
  window.dispatchEvent(new Event("edinun:visitors-updated"));
}

function incrementGamesCompleted() {
  const KEY = "edinun_games_completed_v1";
  const raw = localStorage.getItem(KEY);
  const next = (raw ? parseInt(raw, 10) : 0) + 1;
  localStorage.setItem(KEY, String(next));
  window.dispatchEvent(new Event("edinun:games-updated"));
  return next;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Drag con fallback tap. Usa data-dropzone para detectar destinos.
function makeDragHandler({ item, ghostHtml, onTap, onDrop, disabled }) {
  return function onPointerDown(e) {
    if (disabled) return;
    if (e.button !== undefined && e.button !== 0) return;
    e.preventDefault();
    const startX = e.clientX, startY = e.clientY;
    let started = false;
    let ghost = null;
    let currentZoneId = null;
    let lastX = startX, lastY = startY;
    const highlights = new Set();

    function clearHighlights() {
      for (const el of highlights) el.classList.remove("ed-drop-hover");
      highlights.clear();
    }
    function findZoneAt(x, y) {
      let prevVis = null;
      if (ghost) { prevVis = ghost.style.visibility; ghost.style.visibility = "hidden"; }
      const under = document.elementFromPoint(x, y);
      if (ghost) ghost.style.visibility = prevVis || "";
      if (!under || !under.closest) return null;
      const zone = under.closest("[data-dropzone]");
      return zone || null;
    }
    function onMove(ev) {
      const x = ev.clientX, y = ev.clientY;
      lastX = x; lastY = y;
      if (!started && Math.hypot(x - startX, y - startY) > 6) {
        started = true;
        ghost = document.createElement("div");
        ghost.style.cssText = "position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:none;left:" + x + "px;top:" + y + "px;";
        ghost.innerHTML = ghostHtml || `<div style="background:#fce9a8;color:#3a2608;padding:6px 12px;border-radius:10px;font-family:Fredoka,Nunito,sans-serif;font-weight:800;font-size:13px;border:2px solid #4fd8ff;box-shadow:0 6px 18px rgba(0,0,0,0.5);">${String(item).slice(0,60)}</div>`;
        document.body.appendChild(ghost);
        document.body.style.cursor = "grabbing";
      }
      if (started && ghost) {
        ghost.style.left = x + "px";
        ghost.style.top = y + "px";
        clearHighlights();
        const zone = findZoneAt(x, y);
        if (zone) { zone.classList.add("ed-drop-hover"); highlights.add(zone); currentZoneId = zone.dataset.dropzone; }
        else { currentZoneId = null; }
      }
    }
    function onUp(ev) {
      document.removeEventListener("pointermove", onMove);
      document.removeEventListener("pointerup", onUp);
      document.removeEventListener("pointercancel", onCancel);
      let finalZone = currentZoneId;
      if (started && !finalZone) {
        const x = (ev && ev.clientX != null) ? ev.clientX : lastX;
        const y = (ev && ev.clientY != null) ? ev.clientY : lastY;
        const zone = findZoneAt(x, y);
        if (zone) finalZone = zone.dataset.dropzone;
      }
      if (ghost) { ghost.remove(); ghost = null; }
      document.body.style.cursor = "";
      clearHighlights();
      if (!started) { if (onTap) onTap(item); }
      else if (finalZone && onDrop) { onDrop(finalZone, item); }
    }
    function onCancel() {
      document.removeEventListener("pointermove", onMove);
      document.removeEventListener("pointerup", onUp);
      document.removeEventListener("pointercancel", onCancel);
      if (ghost) { ghost.remove(); ghost = null; }
      document.body.style.cursor = "";
      clearHighlights();
    }
    document.addEventListener("pointermove", onMove);
    document.addEventListener("pointerup", onUp);
    document.addEventListener("pointercancel", onCancel);
  };
}

function formatTime(s) {

}

// ─────────────────────────────────────────────────────────────
// FIFO anti-repetición por categoría en un solo key de localStorage.
// Ventana ≈ floor(N/2) por categoría.
// ─────────────────────────────────────────────────────────────
const RECENT_KEY = "edinun_juego24_recientes_v1";
const RECENT_LIMIT = 28;

function getRecent() {
  try {
    const raw = localStorage.getItem(RECENT_KEY);
    if (!raw) return [];
    const arr = JSON.parse(raw);
    return Array.isArray(arr) ? arr : [];
  } catch { return []; }
}
function pushRecent(key) {
  const arr = getRecent().filter((k) => k !== key);
  arr.unshift(key);
  const trimmed = arr.slice(0, RECENT_LIMIT);
  try { localStorage.setItem(RECENT_KEY, JSON.stringify(trimmed)); } catch {}
}
// Elige N ítems frescos bloqueando los más recientes de su categoría.
// Clave de la VARIEDAD: el pool debe quedar SIEMPRE con al menos un ítem
// extra por encima de N; si no, shuffle solo reordena y el CONJUNTO mostrado
// es siempre el mismo (o alterna entre 2 fijos). Por eso la ventana de bloqueo
// se limita a `bank.length - n - 1` además del clásico floor(N/2).
function pickFreshSet(bank, prefix, idOf, n) {
  const pre = prefix + ":";
  const recentIds = getRecent().filter((k) => k.startsWith(pre)).map((k) => k.slice(pre.length));
  const maxBlock = Math.max(0, bank.length - n - 1);
  const windowN = Math.min(Math.floor(bank.length / 2), maxBlock);
  const blocked = new Set(recentIds.slice(0, windowN));
  let pool = bank.filter((b) => !blocked.has(idOf(b)));
  if (pool.length < n) pool = bank.slice();
  const sh = shuffle(pool).slice(0, n);
  sh.forEach((b) => pushRecent(pre + idOf(b)));
  return sh;
}

// ─────────────────────────────────────────────────────────────
function makeProblemR0() {
  const chosen = pickFreshSet(R0_PAIRS, "par", (x) => x.id, 5);
  const pairs = chosen.map((p) => ({ ...p }));
  const langs = shuffle(pairs.map((p) => p.lang));
  return { pairs, langs };
}

function makeProblemR1() {
  const cards = [];
  for (const cat of R1_CATS) {
    const picked = pickFreshSet(R1_BANK[cat.id], "orig-" + cat.id, (x) => x, 2);
    picked.forEach((w) => cards.push({ id: cat.id + ":" + w, word: w, cat: cat.id }));
  }
  return { cards: shuffle(cards), cats: R1_CATS };
}

function makeProblemR2() {
  const fichas = R2_BINS.map((bin) => {
    const picked = pickFreshSet(R2_BANK[bin.id], "tec-" + bin.id, (x) => x, 1)[0];
    return { id: bin.id + ":" + picked, text: picked, tipo: bin.id };
  });
  return { fichas: shuffle(fichas), bins: R2_BINS };
}

          }}>
            {feedback === "ok" ? feedbackMsg : `${feedbackMsg} — ${charName}`}
          </div>
        )}
      </div>
    </PortalToBody>
  );
}

// ═════════════════════════════════════════════════════════════
// GameScreen — wrapper que permite REINICIAR remontando el juego.
// ═════════════════════════════════════════════════════════════
function GameScreen({ app, setApp, go }) {
  const [restartTick, setRestartTick] = useStateG(0);
  const restart = () => setRestartTick((t) => t + 1);
  return (
    <>
      <style>{`
        .ed-drop-hover {
          outline: 3px dashed #4fd8ff !important;
          outline-offset: 2px;
          box-shadow: 0 0 22px rgba(79,216,255,0.7) !important;
          background-color: rgba(79,216,255,0.18) !important;
          transition: all 0.12s ease;
        }
        .ed-draggable { touch-action: none; user-select: none; -webkit-user-select: none; }
        @keyframes ed-shake-x {
          0%,100% { transform: translateX(0); }
          20% { transform: translateX(-6px); }
          40% { transform: translateX(6px); }
          60% { transform: translateX(-4px); }
          80% { transform: translateX(4px); }
        }
      `}</style>
      <VocesGame key={`voces-${restartTick}`} app={app} setApp={setApp} go={go} onRestart={restart} />
    </>

}

function VocesGame({ app, setApp, go, onRestart }) {
  const char = CHARACTERS.find((c) => c.id === app.character) || CHARACTERS[0];
  const catLabel = app.currentCatLabel || "De tantas formas se habla en Ecuador";

  const [ronda, setRonda] = useStateG(0);

  // Picks por ronda (una sola vez por montaje).
  const [r0Pick] = useStateG(() => makeProblemR0());
  const [r1Pick] = useStateG(() => makeProblemR1());
  const [r2Pick] = useStateG(() => makeProblemR2());

  // R0 — emparejar: {nacId: lengua}
  const [r0Links, setR0Links] = useStateG({});
  const [r0Selected, setR0Selected] = useStateG(null);
  const [r0Locked, setR0Locked] = useStateG(false);

  // R2 — clasificar: {fichaId: binId}
  const [r2Placed, setR2Placed] = useStateG({});
  const [r2Locked, setR2Locked] = useStateG(false);

  // Shell state
  const [elapsed, setElapsed] = useStateG(0);
  const [stars, setStars] = useStateG(0);
  const [solved, setSolved] = useStateG(0);
  const [attempted, setAttempted] = useStateG(0);
  const [starsSession, setStarsSession] = useStateG(0);
  const [feedback, setFeedback] = useStateG(null);
  const [feedbackMsg, setFeedbackMsg] = useStateG("");
  const [confirmingRestart, setConfirmingRestart] = useStateG(false);
  const [confirmingExit, setConfirmingExit] = useStateG(false);
  const [log, setLog] = useStateG([]);
  const started = useRefG(Date.now());
  const exerciseStart = useRefG(Date.now());

  useEffectG(() => {
    const id = setInterval(() => setElapsed(Math.floor((Date.now() - started.current) / 1000)), 500);
    return () => clearInterval(id);
  }, []);

  // ── Estados de completitud por ronda
  const r0AllLinked = r0Pick.pairs.every((p) => r0Links[p.id]);
  const r2AllPlaced = r2Pick.fichas.every((f) => r2Placed[f.id]);

  // R0 y R2 usan VERIFICAR manual. R1 (selector) se auto-evalúa.
  const canVerify =
    ronda === 0 ? (r0AllLinked && !r0Locked) :
    ronda === 2 ? (r2AllPlaced && !r2Locked) :
    false;

  function handleVerifyR0() {
    if (!r0AllLinked || r0Locked) return;
    setR0Locked(true);
    const okCount = r0Pick.pairs.filter((p) => r0Links[p.id] === p.lang).length;
    const correct = okCount === r0Pick.pairs.length;
    const u = `${okCount}/${r0Pick.pairs.length} enlaces correctos`;
    setTimeout(() => answer(correct, u, "Cada nacionalidad con su lengua", "🗣️", "Une la nacionalidad con su lengua", null), correct ? 500 : 5000);
  }

  function handleVerifyR2() {
    if (!r2AllPlaced || r2Locked) return;
    setR2Locked(true);
    const okCount = r2Pick.fichas.filter((f) => r2Placed[f.id] === f.tipo).length;
    const correct = okCount === r2Pick.fichas.length;
    const u = `${okCount}/${r2Pick.fichas.length} bien ubicadas`;
    setTimeout(() => answer(correct, u, "Cada tecnicismo en su materia", "🧩", "Cada tecnicismo a su mundo", null), correct ? 500 : 5000);
  }

  function handleVerify() {
    if (ronda === 0) handleVerifyR0();
    else if (ronda === 2) handleVerifyR2();
  }

  function handleR1Finish(res) {
    const correct = res.correct >= res.total - 1; // permite 1 fallo entre las 6
    const u = `${res.correct}/${res.total} aciertos`;
    answer(correct, u, "Clasificar el origen de cada palabra", "🔤", "¿De dónde viene la palabra?", null);
  }

  function handleErase() {
    if (ronda === 0 && !r0Locked) { setR0Links({}); setR0Selected(null); }
    else if (ronda === 2 && !r2Locked) setR2Placed({});
  }

  function answer(isCorrect, userText, correctText, opIcon, reto, note) {
    if (typeof window.markFirstAttempt === "function") window.markFirstAttempt();
    const exerciseSec = Math.max(0, Math.floor((Date.now() - exerciseStart.current) / 1000));
    const earned = calcStars(isCorrect, exerciseSec);
    const newAttempted = attempted + 1;
    const newSolved = solved + (isCorrect ? 1 : 0);
    const newStarsTotal = stars + earned;
    const newStarsSession = starsSession + earned;

    const entry = {
      idx: newAttempted,
      a: reto || correctText, b: userText, op: opIcon || "·",
      correctAnswer: correctText, userAnswer: userText,
      isCorrect, time: exerciseSec, earned,
    };
    const newLog = [...log, entry];

    setFeedback(isCorrect ? "ok" : "err");
    setFeedbackMsg(isCorrect ? `+${earned} ⭐` : ENCOURAGEMENTS[Math.floor(Math.random() * ENCOURAGEMENTS.length)]);
    setAttempted(newAttempted);
    setSolved(newSolved);
    setStars(newStarsTotal);
    setStarsSession(newStarsSession);
    setLog(newLog);

    const wait = isCorrect ? 1100 : 1600;
    setTimeout(() => {
      setFeedback(null);
      setFeedbackMsg("");
      if (newAttempted >= 3) {
        setApp((s) => ({
          ...s, stars: newStarsTotal,
          lastResult: { category: catLabel, solved: newSolved, total: 3, time: elapsed, starsEarned: newStarsSession, log: newLog },
        }));
        window.incrementGamesCompleted && window.incrementGamesCompleted();
        go("results");
      } else {
        setRonda((r) => r + 1);
        exerciseStart.current = Date.now();
      }
    }, wait);
  }

  // Enunciado = QUÉ hacer (la tarea). Bocadillo = CÓMO (la mecánica).
  const enunciado =
    ronda === 0 ? "Une cada nacionalidad con la lengua que habla." :
    ronda === 1 ? "Clasifica cada palabra según su origen." :
    "Lleva cada palabra a la materia donde es un tecnicismo.";
  const bocadillo =
    ronda === 0 ? "Toca una nacionalidad\ny luego su lengua\npara enlazarlas." :
    ronda === 1 ? "Toca el origen: kichwa,\nextranjerismo o\ncoloquial ecuatoriano." :
    "Arrástrala a su materia:\ncambia de sentido\nen cada una.";

  return (
    <div style={{ position: "absolute", inset: 0, overflow: "hidden" }}>
      <GameHUD elapsed={elapsed} stars={stars} attempted={attempted} solved={solved} total={3} />
      <CharacterCorner char={char} message={bocadillo} />
      <GameEnunciado text={enunciado} top={104} />

      {ronda === 0 && (
        <EmparejaCard
          pick={r0Pick}
          links={r0Links}
          setLinks={setR0Links}
          selected={r0Selected}
          setSelected={setR0Selected}
          locked={r0Locked}
        />
      )}

      {ronda === 1 && (
        <OrigenSelector pick={r1Pick} onFinish={handleR1Finish} />
      )}

      {ronda === 2 && (
        <TecnicismoBins
          pick={r2Pick}
          placed={r2Placed}
          setPlaced={setR2Placed}
          locked={r2Locked}
        />
      )}

      <ActionRail
        canVerify={canVerify}
        onVerify={handleVerify}
        hideVerify={ronda === 1}
        showErase={ronda === 0 || ronda === 2}
        onErase={handleErase}
        onRestart={() => setConfirmingRestart(true)}
        onExit={() => setConfirmingExit(true)}
      />

      <FeedbackOverlay feedback={feedback} feedbackMsg={feedbackMsg} charName={char.name} />
      <RestartModal confirmingExit={confirmingRestart} setConfirmingExit={setConfirmingRestart} attempted={attempted} total={3} onRestart={onRestart} />
      <ExitModal confirmingExit={confirmingExit} setConfirmingExit={setConfirmingExit} attempted={attempted} total={3} onExit={() => go("home")} />
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// R0 · Une la nacionalidad con su lengua (EMPAREJAR). Dos columnas:
// nacionalidades (izq) y lenguas (der). Toca una nacionalidad para
// seleccionarla y luego una lengua para enlazarlas; cada par toma un
// color. Tocar una nacionalidad enlazada la desconecta. Al VERIFICAR
// (locked) cada enlace se marca verde (correcto) o rojo (incorrecto) y
// se revela la lengua correcta de los fallos (§11).
// ─────────────────────────────────────────────────────────────
function EmparejaCard({ pick, links, setLinks, selected, setSelected, locked }) {
  const pairs = pick.pairs;
  const langs = pick.langs;
  const wrapRef = useRefG(null);
  const nacRefs = useRefG({});
  const langRefs = useRefG({});
  const [lines, setLines] = useStateG([]);

  const colorOf = (nacId) => {
    const i = pairs.findIndex((p) => p.id === nacId);
    return LINK_COLORS[i % LINK_COLORS.length];
  };
  // lengua -> nacId que la eligió
  const langToNac = {};
  Object.keys(links).forEach((nacId) => { const l = links[nacId]; if (l) langToNac[l] = nacId; });

  // Mide las posiciones de los botones enlazados y arma los segmentos SVG
  // (de borde derecho de la nacionalidad → borde izquierdo de la lengua).
  useEffectG(() => {
    function measure() {
      const wrap = wrapRef.current;
      if (!wrap) { setLines([]); return; }
      const w = wrap.getBoundingClientRect();
      // El stage se escala con transform: scale(); getBoundingClientRect()
      // devuelve px ya escalados, pero el espacio interno del SVG es sin
      // escalar. Dividimos por el factor de escala (ancho real / ancho layout).
      const scale = wrap.offsetWidth ? w.width / wrap.offsetWidth : 1;
      const next = [];
      Object.keys(links).forEach((nacId) => {
        const lang = links[nacId];
        const ne = nacRefs.current[nacId];
        const le = langRefs.current[lang];
        if (!ne || !le) return;
        const a = ne.getBoundingClientRect();
        const b = le.getBoundingClientRect();
        const pair = pairs.find((p) => p.id === nacId);
        let color = colorOf(nacId);
        if (locked && pair) color = pair.lang === lang ? "#2ecc8f" : "#ff6b6b";
        next.push({
          key: nacId, color,
          x1: (a.right - w.left) / scale, y1: (a.top - w.top + a.height / 2) / scale,
          x2: (b.left - w.left) / scale, y2: (b.top - w.top + b.height / 2) / scale,
        });
      });
      setLines(next);
    }
    measure();
    const t = setTimeout(measure, 60);
    window.addEventListener("resize", measure);
    return () => { clearTimeout(t); window.removeEventListener("resize", measure); };
  }, [links, locked]);

  function tapNac(nacId) {
    if (locked) return;
    if (links[nacId]) {
      setLinks((prev) => { const n = { ...prev }; delete n[nacId]; return n; });
      setSelected(null);
      return;
    }
    setSelected((s) => (s === nacId ? null : nacId));
  }
  function tapLang(lang) {
    if (locked || !selected) return;
    setLinks((prev) => {
      const n = { ...prev };
      for (const k of Object.keys(n)) { if (n[k] === lang) delete n[k]; }
      n[selected] = lang;
      return n;
    });
    setSelected(null);
  }

  const BOX_W = 150;

  return (
    <div data-qa="zona-central" style={{
      position: "absolute", top: 150, bottom: 18, left: "50%", transform: "translateX(-50%)",
      width: 470, display: "flex", flexDirection: "column", alignItems: "center",
    }}>
      <div ref={wrapRef} style={{ position: "relative", display: "flex", gap: 96, justifyContent: "center", flex: 1, width: "100%", alignItems: "stretch" }}>
        {/* Líneas de enlace */}
        <svg style={{ position: "absolute", inset: 0, width: "100%", height: "100%", pointerEvents: "none", overflow: "visible", zIndex: 1 }}>
          {lines.map((ln) => (
            <g key={ln.key}>
              <line x1={ln.x1} y1={ln.y1} x2={ln.x2} y2={ln.y2}
                stroke={ln.color} strokeWidth={3.5} strokeLinecap="round"
                style={{ filter: "drop-shadow(0 1px 2px rgba(0,0,0,0.35))" }} />
              <circle cx={ln.x1} cy={ln.y1} r={4.5} fill={ln.color} stroke="#fff" strokeWidth={1.5} />
              <circle cx={ln.x2} cy={ln.y2} r={4.5} fill={ln.color} stroke="#fff" strokeWidth={1.5} />
            </g>
          ))}
        </svg>

        {/* Columna NACIONALIDAD */}
        <div style={{ display: "flex", flexDirection: "column", width: BOX_W, position: "relative", zIndex: 2 }}>
          <div style={{
            fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 11,
            letterSpacing: "0.08em", color: "rgba(252,233,168,0.85)", textAlign: "center",
            textTransform: "uppercase", marginBottom: 6,
          }}>Nacionalidad</div>
          <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "flex-start", gap: 18 }}>
          {pairs.map((p) => {
            const linked = !!links[p.id];
            const sel = selected === p.id;
            const col = colorOf(p.id);
            const ok = locked && links[p.id] === p.lang;
            const wrong = locked && linked && links[p.id] !== p.lang;
            let bg = "rgba(255,255,255,0.94)", ink = "#15303a", border = "rgba(116,72,32,0.25)";
            if (ok) { bg = "linear-gradient(180deg,#2ecc8f,#22a06c)"; ink = "#fff"; border = "#2ecc8f"; }
            else if (wrong) { bg = "linear-gradient(180deg,#ff6b6b,#dc5050)"; ink = "#fff"; border = "#ff6b6b"; }
            else if (sel) { border = "#4fd8ff"; }
            else if (linked) { border = col; }
            return (
              <div key={p.id}>
                <button ref={(el) => { nacRefs.current[p.id] = el; }} onClick={() => tapNac(p.id)} disabled={locked}
                  style={{
                    position: "relative", width: "100%", height: 40, borderRadius: 11,
                    border: `2.5px solid ${border}`, background: bg, color: ink,
                    cursor: locked ? "default" : "pointer",
                    fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 15,
                    boxShadow: sel ? "0 0 16px rgba(79,216,255,0.6)" : "0 3px 8px rgba(0,0,0,0.22)",
                    transform: sel ? "translateY(-1px)" : "none",
                    transition: "all 0.14s ease", display: "flex", alignItems: "center", justifyContent: "center", gap: 6,
                  }}>
                  <span>{p.nac}</span>
                  {ok && (
                    <span style={{
                      position: "absolute", top: -8, right: -8, width: 20, height: 20, borderRadius: "50%",
                      background: "#2ecc8f", color: "#fff", fontSize: 12, fontWeight: 800,
                      display: "flex", alignItems: "center", justifyContent: "center",
                      border: "2px solid #fff", boxShadow: "0 2px 6px rgba(0,0,0,0.4)",
                    }}>✓</span>
                  )}
                </button>
                {wrong && (
                  <div style={{
                    marginTop: 3, fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 11,
                    color: "#7dffc4", textAlign: "center",
                  }}>→ {p.lang}</div>
                )}
              </div>
            );
          })}
          </div>
        </div>

        {/* Columna LENGUA */}
        <div style={{ display: "flex", flexDirection: "column", width: BOX_W, position: "relative", zIndex: 2 }}>
          <div style={{
            fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 11,
            letterSpacing: "0.08em", color: "rgba(252,233,168,0.85)", textAlign: "center",
            textTransform: "uppercase", marginBottom: 6,
          }}>Lengua</div>
          <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "flex-start", gap: 18 }}>
          {langs.map((lang) => {
            const nacId = langToNac[lang];
            const linked = !!nacId;
            const col = linked ? colorOf(nacId) : null;
            const partnerLang = linked ? pairs.find((p) => p.id === nacId).lang : null;
            const ok = locked && linked && partnerLang === lang;
            const wrong = locked && linked && partnerLang !== lang;
            let bg = "rgba(255,255,255,0.94)", ink = "#15303a", border = "rgba(116,72,32,0.25)";
            if (ok) { bg = "linear-gradient(180deg,#2ecc8f,#22a06c)"; ink = "#fff"; border = "#2ecc8f"; }
            else if (wrong) { bg = "linear-gradient(180deg,#ff6b6b,#dc5050)"; ink = "#fff"; border = "#ff6b6b"; }
            else if (linked) { border = col; }
            const clickable = !locked && !!selected;
            return (
              <button key={lang} ref={(el) => { langRefs.current[lang] = el; }} onClick={() => tapLang(lang)} disabled={locked}
                style={{
                  position: "relative", width: "100%", height: 40, borderRadius: 11,
                  border: `2.5px solid ${border}`, background: bg, color: ink,
                  cursor: clickable ? "pointer" : "default",
                  fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 14.5,
                  boxShadow: "0 3px 8px rgba(0,0,0,0.22)",
                  transition: "all 0.14s ease", display: "flex", alignItems: "center", justifyContent: "center", gap: 6,
                }}>
                <span>{lang}</span>
              </button>
            );
          })}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// R1 · ¿De dónde viene la palabra? (SELECTOR, §13). Aparece una palabra
// del libro y se toca su origen entre 3 chips. Al acertar: breve verde y
// avanza. Al fallar: marca la opción elegida en rojo, revela la correcta
// en verde y AVANZA automáticamente (no deja atascado al estudiante).
// Auto-evaluado: al terminar las 6 tarjetas llama onFinish({correct,total}).
// ─────────────────────────────────────────────────────────────
function OrigenSelector({ pick, onFinish }) {
  const cards = pick.cards;
  const cats = pick.cats;
  const [idx, setIdx] = useStateG(0);
  const [chosen, setChosen] = useStateG(null);
  const [locked, setLocked] = useStateG(false);
  const correctRef = useRefG(0);
  const doneRef = useRefG(false);

  const card = cards[idx];

  function choose(catId) {
    if (locked) return;
    setChosen(catId);
    setLocked(true);
    const ok = catId === card.cat;
    if (ok) correctRef.current += 1;
    const wait = ok ? 650 : 1250;
    setTimeout(() => {
      if (idx + 1 >= cards.length) {
        if (doneRef.current) return;
        doneRef.current = true;
        onFinish({ correct: correctRef.current, total: cards.length });
      } else {
        setIdx((i) => i + 1);
        setChosen(null);
        setLocked(false);
      }
    }, wait);
  }

  return (
    <div data-qa="zona-central" style={{
      position: "absolute", top: 150, bottom: 18, left: "50%", transform: "translateX(-50%)",
      width: 470, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "flex-start", gap: 26,
    }}>
      {/* Progreso */}
      <div style={{
        fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 13,
        color: "rgba(252,233,168,0.85)", letterSpacing: "0.04em",
      }}>
        Palabra {idx + 1} de {cards.length}
      </div>

      {/* Carta con la palabra */}
      <div key={card.id} style={{
        width: "fit-content", maxWidth: 360, padding: "16px 26px", borderRadius: 16,
        background: "linear-gradient(180deg, rgba(255,255,255,0.98), rgba(238,246,244,0.94))",
        border: "3px solid #f2c260",
        boxShadow: "0 10px 24px rgba(0,0,0,0.4)",
        textAlign: "center",
        animation: "ed-pop-in 0.25s",
      }}>
        <div style={{
          fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 26, lineHeight: 1.15,
          color: "#15303a", fontStyle: "italic",
        }}>
          «{card.word}»
        </div>
      </div>

      {/* Chips de origen */}
      <div style={{ display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap", width: "100%" }}>
        {cats.map((c) => {
          const isChosen = chosen === c.id;
          const isAnswer = locked && c.id === card.cat;
          const isWrongPick = locked && isChosen && c.id !== card.cat;
          let bg, ink, border, shake = false;
          if (isAnswer) { bg = "linear-gradient(180deg,#2ecc8f,#22a06c)"; ink = "#fff"; border = "#2ecc8f"; }
          else if (isWrongPick) { bg = "linear-gradient(180deg,#ff6b6b,#dc5050)"; ink = "#fff"; border = "#ff6b6b"; shake = true; }
          else { bg = "rgba(255,255,255,0.95)"; ink = "#15303a"; border = "rgba(116,72,32,0.25)"; }
          return (
            <button key={c.id} onClick={() => choose(c.id)} disabled={locked}
              style={{
                position: "relative", flex: "1 1 140px", maxWidth: 156, minHeight: 96,
                padding: "14px 10px", borderRadius: 16,
                border: `2.5px solid ${border}`, background: bg, color: ink,
                cursor: locked ? "default" : "pointer",
                fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 14, lineHeight: 1.18,
                boxShadow: "0 4px 10px rgba(0,0,0,0.28)",
                display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 7,
                transition: "all 0.14s ease",
                animation: shake ? "ed-shake-x 0.4s" : "none",
              }}>
              <span style={{ fontSize: 26, lineHeight: 1 }}>{c.emoji}</span>
              <span>{c.label}</span>
              {isAnswer && !isChosen && (
                <span style={{
                  position: "absolute", top: -8, right: -8, width: 22, height: 22, borderRadius: "50%",
                  background: "#2ecc8f", color: "#fff", fontSize: 14, fontWeight: 800,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  border: "2px solid #fff", boxShadow: "0 2px 6px rgba(0,0,0,0.4)",
                }}>✓</span>
              )}
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// R2 · Cada tecnicismo a su mundo (CLASIFICAR). Bandeja de palabras + 4
// cajas (materias) en cuadrícula 2×2. Drag + tap-seleccionar + tap-caja.
// Al verificar (locked): cada palabra se marca verde (materia correcta) o
// roja (materia incorrecta).
// ─────────────────────────────────────────────────────────────
function TecnicismoBins({ pick, placed, setPlaced, locked }) {
  const fichas = pick.fichas;
  const bins = pick.bins;
  const [selected, setSelected] = useStateG(null);
  const TRAY = "__trayTecnicismos";

  function placeZone(zoneId, fichaId) {
    if (locked) return;
    setSelected(null);
    setPlaced((prev) => {
      const next = { ...prev };
      if (zoneId === TRAY) { delete next[fichaId]; return next; }
      if (!bins.some((b) => b.id === zoneId)) return next;
      next[fichaId] = zoneId;
      return next;
    });
  }
  function tapFicha(fichaId) {
    if (locked) return;
    if (placed[fichaId]) { setPlaced((prev) => { const n = { ...prev }; delete n[fichaId]; return n; }); setSelected(null); return; }
    setSelected((s) => (s === fichaId ? null : fichaId));
  }
  function tapBin(binId) {
    if (locked || !selected) return;
    placeZone(binId, selected);
  }

  const trayFichas = fichas.filter((f) => !placed[f.id]);
  const allPlaced = fichas.every((f) => placed[f.id]);

  const ghost = (text) => `<div style="background:linear-gradient(180deg,#fce9a8,#e9c45a);color:#3a2608;padding:8px 14px;border-radius:12px;font-family:Fredoka,Nunito,sans-serif;font-weight:800;font-size:15px;border:2px solid #4fd8ff;box-shadow:0 8px 20px rgba(0,0,0,0.5);text-align:center;">${text}</div>`;

  return (
    <div data-qa="zona-central" style={{
      position: "absolute", top: 150, bottom: 12, left: "50%", transform: "translateX(-50%)",
      width: 390, display: "flex", flexDirection: "column", justifyContent: "flex-start", alignItems: "center", gap: 12,
    }}>
      {/* Bandeja de palabras por clasificar */}
      <div data-dropzone={TRAY} data-qa="bandeja" style={{
        display: "flex", gap: 9, flexWrap: "wrap", justifyContent: "center", alignItems: "center",
        minHeight: 48, width: 386, borderRadius: 12, padding: "8px 6px",
        background: "rgba(8,40,38,0.3)", border: "1.5px dashed rgba(95,224,208,0.4)",
      }}>
        {trayFichas.map((f) => {
          const sel = selected === f.id;
          return (
            <div key={f.id}
              className={locked ? "" : "ed-draggable"}
              onPointerDown={locked ? undefined : makeDragHandler({
                item: f.id, disabled: locked, ghostHtml: ghost(f.text),
                onTap: tapFicha, onDrop: placeZone,
              })}
              style={{
                padding: "8px 16px", borderRadius: 11, textAlign: "center",
                background: sel ? "linear-gradient(180deg,#fce9a8,#e9c45a)" : "rgba(255,255,255,0.94)",
                color: "#3a2608", border: `2px solid ${sel ? "#4fd8ff" : "rgba(116,72,32,0.25)"}`,
                boxShadow: sel ? "0 0 16px rgba(79,216,255,0.6)" : "0 3px 8px rgba(0,0,0,0.25)",
                transform: sel ? "translateY(-2px)" : "none",
                fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 16, lineHeight: 1.2,
                cursor: "grab", touchAction: "none",
                transition: "all 0.15s ease",
              }}>
              {f.text}
            </div>
          );
        })}
        {allPlaced && (
          <div style={{ fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 13, color: "rgba(255,255,255,0.7)", pointerEvents: "none" }}>
            ¡Listo! Pulsa VERIFICAR.
          </div>
        )}
      </div>

      {/* Cajas (materias) — cuadrícula 2×2 */}
      <div style={{ display: "flex", gap: 14, flexWrap: "wrap", justifyContent: "center", width: 386 }}>
        {bins.map((bin) => {
          const inside = fichas.filter((f) => placed[f.id] === bin.id);
          return (
            <div key={bin.id} data-dropzone={bin.id}
              onClick={() => tapBin(bin.id)}
              style={{
                width: 186, minHeight: 92, borderRadius: 13, padding: "8px 7px 10px",
                background: "rgba(8,40,38,0.5)", border: `2.5px dashed ${bin.color}`,
                display: "flex", flexDirection: "column", alignItems: "center", gap: 6,
                cursor: (selected && !locked) ? "pointer" : "default",
              }}>
              <div style={{ display: "flex", justifyContent: "center", width: "100%", pointerEvents: "none" }}>
                <span style={{
                  display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 6,
                  fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 13,
                  color: "#fff", background: bin.color, borderRadius: 8, padding: "3px 12px",
                  letterSpacing: "0.02em", boxShadow: "0 2px 6px rgba(0,0,0,0.3)",
                }}>
                  <span style={{ fontSize: 15, lineHeight: 1 }}>{bin.emoji}</span>
                  <span>{bin.label}</span>
                </span>
              </div>
              {bin.hint && inside.length === 0 && (
                <div style={{
                  fontFamily: "var(--ed-font-display)", fontWeight: 600, fontSize: 10.5,
                  color: "rgba(252,233,168,0.7)", fontStyle: "italic", pointerEvents: "none",
                }}>{bin.hint}</div>
              )}
              {inside.map((f) => {
                const ok = locked ? f.tipo === bin.id : null;
                return (
                  <div key={f.id}
                    className={locked ? "" : "ed-draggable"}
                    onClick={(e) => e.stopPropagation()}
                    onPointerDown={locked ? undefined : makeDragHandler({
                      item: f.id, disabled: locked, ghostHtml: ghost(f.text),
                      onTap: tapFicha, onDrop: placeZone,
                    })}
                    style={{
                      fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 15,
                      padding: "6px 12px", borderRadius: 9, lineHeight: 1.2, textAlign: "center",
                      background: locked ? (ok ? "linear-gradient(180deg,#2ecc8f,#22a06c)" : "linear-gradient(180deg,#ff6b6b,#dc5050)") : "rgba(255,255,255,0.94)",
                      color: locked ? "#fff" : "#3a2608", boxShadow: "0 2px 5px rgba(0,0,0,0.25)",
                      cursor: locked ? "default" : "grab", touchAction: "none",
                    }}
                    title={locked ? "" : "Arrástralo a otra caja o a la bandeja"}>
                    {locked ? (ok ? "✓ " : "✗ ") : ""}{f.text}
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>
    </div>
  );
}

      <div className="ed-label" style={{ fontSize: 9, color: "var(--ed-ink-soft)", marginBottom: 2 }}>{label}</div>
      <div style={{ fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: emphasis ? 22 : 18, color: tone, lineHeight: 1 }}>
        {value}
      </div>
    </div>
  );
}

Object.assign(window, { GameScreen, ResultsScreen });

// app.jsx — Shell de producción EDINUN GAMES.
// Enrutador por estado y device stage adaptativo (desktop / tablet / mobile).
// Móvil portrait: el contenido NUNCA rota; un overlay BLOQUEANTE obliga
// al usuario a girar físicamente el teléfono antes de poder usar la app.

const { useState: useStateA, useEffect: useEffectA, useRef: useRefA } = React;

// ─────────────────────────────────────────────────────────────
// useViewportSize — devuelve el tamaño REAL visible del viewport.
//
// En iOS Safari (y otros mobile browsers), `window.innerHeight` y `100vh`
// reportan la altura de la ventana INCLUYENDO la URL bar, así que el
// contenido escalado a esa altura termina parcialmente fuera de pantalla
// (ej: el numpad del juego queda debajo del fondo visible). La Visual
// Viewport API reporta el área verdaderamente visible y se actualiza
// cuando la URL bar se muestra/oculta.
// ─────────────────────────────────────────────────────────────
// Detección de "resize REAL" vs "zoom del navegador".
//
// Idea: el tamaño FÍSICO de la zona visible en píxeles del display es
// invariante al ctrl+rueda. Cuando subes el zoom de 100 % a 500 %:
//   · innerWidth en CSS-px se divide entre 5
//   · devicePixelRatio se multiplica por 5
//   · innerWidth × devicePixelRatio queda igual ⇒ NO hubo resize real.
//
// Cuando arrastras la esquina de la ventana o rotas el dispositivo:
//   · innerWidth en CSS-px cambia
//   · devicePixelRatio NO cambia
//   · innerWidth × devicePixelRatio cambia ⇒ SÍ hubo resize real.
//
// Por eso comparamos contra `innerWidth × devicePixelRatio` y solo
// actualizamos el state cuando ese producto cambia. Así el lienzo se
// queda con su tamaño CSS previo durante el zoom y el navegador lo
// amplifica visualmente — junto con los glifos, que ya leen `glyphSize`
// del mismo state defendido (ver DeviceStage).
//
// La defensa anterior (tracker de _lastDPR) era frágil: se actualizaba
// en CADA evento, así que si el navegador disparaba dos resize seguidos
// para la misma acción de zoom, el segundo veía el dpr ya guardado y
// recalculaba el tamaño con el viewport pequeño. Esto causaba que los
// glifos quedaran enormes mientras el lienzo se recomprimía.
function physicalSize() {
  if (typeof window === "undefined") return { w: 0, h: 0 };
  const dpr = window.devicePixelRatio || 1;
  return { w: window.innerWidth * dpr, h: window.innerHeight * dpr };
}
let _lastPhysical = physicalSize();

function useViewportSize() {
  const [size, setSize] = useStateA(() => readSize());
  useEffectA(() => {
    function onChange() {
      const phys = physicalSize();
      // Tolerancia de 4 px reales para absorber redondeos del navegador.
      if (Math.abs(phys.w - _lastPhysical.w) < 4 && Math.abs(phys.h - _lastPhysical.h) < 4) {
        // Mismo display, distinto zoom — no actualizamos el state.
        return;
      }
      _lastPhysical = phys;
      setSize(readSize());
    }
    window.addEventListener("resize", onChange);
    window.addEventListener("orientationchange", onChange);
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", onChange);
    }
    return () => {
      window.removeEventListener("resize", onChange);
      window.removeEventListener("orientationchange", onChange);
      if (window.visualViewport) {
        window.visualViewport.removeEventListener("resize", onChange);
      }
    };
  }, []);
  return size;
}
function readSize() {
  if (typeof window === "undefined") return { vw: 0, vh: 0 };
  const vv = window.visualViewport;
  // Cuando el usuario hace pinch-zoom, vv.scale > 1 y vv.width/height
  // reflejan la región visible (más pequeña). Usar esos valores haría
  // que la escala del lienzo se reduzca al hacer zoom — exactamente lo
  // contrario de lo que el usuario quiere. Solo confiamos en vv cuando
  // scale ≈ 1 (sin zoom) — ahí da una lectura más fiel que innerWidth/
  // Height en iOS Safari (descuenta correctamente la URL bar visible).
  if (vv && Math.abs(vv.scale - 1) < 0.05) {
    return { vw: vv.width, vh: vv.height };
  }
  return { vw: window.innerWidth, vh: window.innerHeight };
}

// ─────────────────────────────────────────────────────────────
// DeviceStage — escala el lienzo lógico 900×540 (paisaje) al viewport.
//
// Reglas:
//   · Desktop / tablet: sin marco, sin notch, fondo cósmico edge-to-edge.
//   · Mobile portrait: lienzo letterboxed Y overlay BLOQUEANTE "Gira el
//     teléfono". El contenido del juego no es accesible hasta que rote.
//   · Mobile landscape: lienzo escalado al viewport visible (visualViewport,
//     no innerHeight, para no clippearse debajo de la URL bar de iOS).
// ─────────────────────────────────────────────────────────────
function DeviceStage({ children, variant = "cosmic" }) {
  const W = 900, H = 540;
  const { vw, vh } = useViewportSize();
  const minSide = Math.min(vw, vh);
  const maxSide = Math.max(vw, vh);
  let mode = "desktop";
  if (maxSide < 820) mode = "mobile";
  else if (minSide < 820) mode = "tablet";
  const portrait = vh > vw;
  const baseScale = Math.max(Math.min(vw / W, vh / H), 0.15);

  // Detección de teléfono independiente del modo: cualquier dispositivo con
  // lado menor ≤ 600 CSS-px es un teléfono. Cubre todos los teléfonos
  // actuales (iPhone SE 320 → S25 Ultra/Pro Max ~432) con margen para
  // modelos futuros más anchos. La menor tablet (iPad mini 744) queda
  // bien por encima, así que no se rompe el caso "tablet portrait usable
  // letterboxed". Solo bloqueamos cuando teléfono Y portrait — el lienzo
  // paisaje queda demasiado pequeño para jugar.
  const isPhone = minSide <= 600;
  const lockPortrait = isPhone && portrait;

  // Tamaño de los glifos del fondo: equivalente al `clamp(48px, 7vmin, 110px)`
  // que tenía el CSS, pero calculado a partir del vw/vh DEFENDIDO contra
  // cambios de DPR. Esto evita que con ctrl+rueda del mouse los glifos
  // crezcan más rápido que el lienzo (el lienzo se congela vía la defensa
  // del DPR; si CSS lee el vmin actual, los glifos no se congelan y desync).
  const glyphSize = Math.max(48, Math.min(minSide * 0.07, 110));

  const debug = typeof window !== "undefined" && /(?:^|[#&])debug(?:&|$)/.test(window.location.hash || "");

  // ─── Pinch-zoom y pan custom ─────────────────────────────────
  // Reemplaza el zoom nativo del browser. Razón: con el lienzo letterboxed
  // dentro de un wrapper viewport-sized, el visual viewport del browser
  // puede panear hasta dejar al usuario mirando solo el cosmos vacío de los
  // bordes — el "rebote" reportado en iPhone (ver .planning/ios-zoom.md).
  // Aquí los gestos operan sobre el transform del lienzo, así que el zoom
  // siempre gravita alrededor del contenido y no deriva a un borde
  // decorativo.
  const wrapperRef = useRefA(null);
  const gestureRef = useRefA(null);
  const stateRef = useRefA({ userZoom: 1, pan: { x: 0, y: 0 } });
  const [userZoom, setUserZoom] = useStateA(1);
  const [pan, setPan] = useStateA({ x: 0, y: 0 });
  const [duringGesture, setDuringGesture] = useStateA(false);

  useEffectA(() => {
    stateRef.current = { userZoom, pan };
  }, [userZoom, pan]);

  // Reset al cambiar viewport (rotación, resize). Si no, el pan queda
  // referenciado a un viewport que ya no existe.
  useEffectA(() => {
    setUserZoom(1);
    setPan({ x: 0, y: 0 });
    setDuringGesture(false);
  }, [vw, vh]);

  useEffectA(() => {
    if (lockPortrait) return;
    const el = wrapperRef.current;
    if (!el) return;

    const Z_MIN = 1;
    const Z_MAX = 4;

    const dist = (a, b) => Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
    const mid = (a, b) => ({ x: (a.clientX + b.clientX) / 2, y: (a.clientY + b.clientY) / 2 });

    function clampPan(zoom, px, py) {
      // Pan máximo: la mitad del exceso del lienzo escalado sobre el viewport.
      // En zoom=1 el max es 0 (lienzo cabe en viewport, no hay donde panear).
      // En zoom=N el lienzo mide N veces el lado contain, así que el usuario
      // puede mover ±(sw - vw)/2 antes de que la orilla del lienzo cruce la
      // orilla del viewport. Esto evita perder el contenido fuera de pantalla.
      const sw = baseScale * zoom * W;
      const sh = baseScale * zoom * H;
      const maxX = Math.max(0, (sw - vw) / 2);
      const maxY = Math.max(0, (sh - vh) / 2);
      return {
        x: Math.max(-maxX, Math.min(maxX, px)),
        y: Math.max(-maxY, Math.min(maxY, py)),
      };
    }

    function applyState(z, px, py) {
      stateRef.current = { userZoom: z, pan: { x: px, y: py } };
      setUserZoom(z);
      setPan({ x: px, y: py });
    }

    function onTouchStart(e) {
      const { userZoom: z0, pan: p0 } = stateRef.current;
      if (e.touches.length >= 2) {
        const [t0, t1] = e.touches;
        gestureRef.current = {
          mode: "pinch",
          d0: dist(t0, t1),
          m0: mid(t0, t1),
          z0, p0: { ...p0 },
        };
        setDuringGesture(true);
        e.preventDefault();
      } else if (e.touches.length === 1) {
        const t = e.touches[0];
        gestureRef.current = {
          mode: "pan-armed",
          startX: t.clientX,
          startY: t.clientY,
          z0, p0: { ...p0 },
        };
        // No preventDefault — un tap simple debe seguir generando click.
      }
    }

    function onTouchMove(e) {
      const g = gestureRef.current;
      if (!g) return;

      // Si en medio de un gesto entra un segundo dedo, transición a pinch
      // tomando el estado actual como punto de partida.
      if (e.touches.length >= 2 && g.mode !== "pinch") {
        const [t0, t1] = e.touches;
        const { userZoom: zNow, pan: pNow } = stateRef.current;
        gestureRef.current = {
          mode: "pinch",
          d0: dist(t0, t1),
          m0: mid(t0, t1),
          z0: zNow, p0: { ...pNow },
        };
        setDuringGesture(true);
        e.preventDefault();
        return;
      }

      if (e.touches.length >= 2 && g.mode === "pinch") {
        const [t0, t1] = e.touches;
        const d = dist(t0, t1);
        const m = mid(t0, t1);
        const ratio = d / g.d0;
        // Permitimos pasar transitoriamente bajo Z_MIN para sensación elástica
        // durante el gesto; en touchend hacemos snap-back al rango válido.
        const newZoom = Math.max(Z_MIN * 0.7, Math.min(Z_MAX * 1.05, g.z0 * ratio));
        const r = newZoom / g.z0;
        const ux = g.m0.x - vw / 2;
        const uy = g.m0.y - vh / 2;
        // Fórmula que mantiene el punto medio de la pinza anclado al mismo
        // píxel del lienzo durante todo el gesto. Derivación:
        //   panX_new = (mx0 - vw/2) + (newZoom/z0) * (panX0 - (mx0 - vw/2))
        //              + (mx_now - mx0)   ← desplazamiento del propio gesto
        const newPanX = ux + r * (g.p0.x - ux) + (m.x - g.m0.x);
        const newPanY = uy + r * (g.p0.y - uy) + (m.y - g.m0.y);
        applyState(newZoom, newPanX, newPanY);
        e.preventDefault();
      } else if (e.touches.length === 1 && g.mode === "pan-armed") {
        if (g.z0 <= 1.001) return; // sin zoom no panea — dejamos pasar el tap
        const t = e.touches[0];
        const dx = t.clientX - g.startX;
        const dy = t.clientY - g.startY;
        if (Math.hypot(dx, dy) > 8) {
          gestureRef.current = { ...g, mode: "pan" };
          setDuringGesture(true);
          e.preventDefault();
        }
      } else if (e.touches.length === 1 && g.mode === "pan") {
        const t = e.touches[0];
        const dx = t.clientX - g.startX;
        const dy = t.clientY - g.startY;
        applyState(g.z0, g.p0.x + dx, g.p0.y + dy);
        e.preventDefault();
      }
    }

    function onTouchEnd(e) {
      const g = gestureRef.current;
      if (!g) return;
      if (e.touches.length === 0) {
        const { userZoom: z, pan: p } = stateRef.current;
        const clampedZ = Math.max(Z_MIN, Math.min(Z_MAX, z));
        let cp;
        if (clampedZ <= 1.001) {
          cp = { x: 0, y: 0 };
        } else {
          cp = clampPan(clampedZ, p.x, p.y);
        }
        applyState(clampedZ, cp.x, cp.y);
        setDuringGesture(false);
        gestureRef.current = null;
      }
    }

    el.addEventListener("touchstart", onTouchStart, { passive: false });
    el.addEventListener("touchmove", onTouchMove, { passive: false });
    el.addEventListener("touchend", onTouchEnd, { passive: false });
    el.addEventListener("touchcancel", onTouchEnd, { passive: false });

    return () => {
      el.removeEventListener("touchstart", onTouchStart);
      el.removeEventListener("touchmove", onTouchMove);
      el.removeEventListener("touchend", onTouchEnd);
      el.removeEventListener("touchcancel", onTouchEnd);
    };
  }, [vw, vh, baseScale, lockPortrait]);

  const totalScale = baseScale * userZoom;

  return (
    <div ref={wrapperRef} style={{
      width: "100vw", height: "100dvh",
      minHeight: "-webkit-fill-available",
      overflow: "hidden",
      position: "relative",
      background: variant === "chalkboard" ? "#0b3a2d" : "#050214",
      // `touch-action: none` desactiva todos los gestos que el browser
      // interpretaría por su cuenta (pinch, pan, doble-tap-zoom). Los
      // implementamos en JS sobre el transform del lienzo para que el
      // zoom siempre quede anclado al contenido y nunca derive a los
      // bordes letterbox del wrapper. Los click/tap en botones siguen
      // funcionando — esto solo bloquea gestos del browser, no eventos.
      touchAction: "none",
    }}>
      <CosmosBg variant={variant} glyphSize={glyphSize} />

      {/* Lienzo lógico 900×540 centrado y escalado.
          El transform combina el escalado base (contain del viewport),
          el zoom del usuario y el pan acumulado. El orden CSS es
          right-to-left: scale → translate(pan) → translate(-50%,-50%). */}
      <div style={{
        width: W, height: H,
        position: "absolute",
        left: "50%", top: "50%",
        transform: `translate(-50%, -50%) translate(${pan.x}px, ${pan.y}px) scale(${totalScale})`,
        transformOrigin: "center center",
        overflow: "hidden",
        // Sin transición durante el gesto activo (el lienzo sigue la pinza
        // al instante); con transición elástica al soltar, para que el
        // snap-back de zoom/pan a los límites válidos no sea abrupto.
        transition: duringGesture ? "none" : "transform 0.22s cubic-bezier(0.2, 0.8, 0.2, 1)",
        willChange: "transform",
      }}>
        {children}
      </div>

      {lockPortrait && <RotateLockOverlay />}
      {debug && (
        <div style={{
          position: "fixed", top: 6, left: 6, zIndex: 999999,
          background: "rgba(0,0,0,0.85)", color: "#0f0",
          font: "11px ui-monospace,Menlo,monospace",
          padding: "6px 8px", borderRadius: 6,
          maxWidth: "90vw", whiteSpace: "pre",
          pointerEvents: "none",
        }}>
{`vw=${vw} vh=${vh}
min=${minSide} max=${maxSide}
mode=${mode} portrait=${portrait}
isPhone=${isPhone} LOCK=${lockPortrait}
zoom=${userZoom.toFixed(2)} pan=${pan.x.toFixed(0)},${pan.y.toFixed(0)}
vv=${typeof window!=="undefined" && window.visualViewport ? "yes" : "no"}
ua=${(typeof navigator!=="undefined" ? navigator.userAgent : "?").slice(0,60)}`}
        </div>
      )}
    </div>
  );
}

// Overlay bloqueante de rotación. En mobile portrait cubre toda la pantalla
// con un mensaje claro y un ícono animado. NO se puede descartar — el usuario
// DEBE girar el dispositivo para acceder al juego. Se desmonta solo cuando
// el viewport pasa a landscape.
function RotateLockOverlay() {
  return (
    <div
      role="dialog"
      aria-modal="true"
      aria-label="Gira tu teléfono para jugar"
      style={{
        position: "fixed", inset: 0, zIndex: 99999,
        background: "linear-gradient(180deg,#050214 0%,#0a0628 100%)",
        display: "flex", flexDirection: "column",
        alignItems: "center", justifyContent: "center",
        textAlign: "center", padding: "32px 24px",
        color: "#fce9a8",
        fontFamily: "var(--ed-font-display, system-ui)",
      }}
    >
      <div
        style={{
          width: 132, height: 132, marginBottom: 28,
          display: "flex", alignItems: "center", justifyContent: "center",
          animation: "ed-rotate-lock 2.4s ease-in-out infinite",
        }}
        aria-hidden="true"
      >
        {/* Ícono de teléfono que rota */}
        <svg viewBox="0 0 100 100" width="120" height="120" fill="none">
          <rect x="36" y="14" width="28" height="72" rx="6"
                stroke="#f2c260" strokeWidth="3" fill="rgba(242,194,96,0.08)" />
          <rect x="42" y="22" width="16" height="48" rx="2" fill="rgba(242,194,96,0.18)" />
          <circle cx="50" cy="78" r="2.5" fill="#f2c260" />
        </svg>
      </div>
      <div style={{
        fontWeight: 800,
        fontSize: "clamp(18px, 5.2vw, 26px)",
        lineHeight: 1.15,
        textTransform: "uppercase", letterSpacing: "0.02em",
        marginBottom: 12,
      }}>
        Gira tu teléfono
      </div>
      <div style={{
        fontWeight: 500,
        fontSize: "clamp(13px, 4vw, 16px)",
        lineHeight: 1.4,
        color: "rgba(252,233,168,0.78)",
        maxWidth: "min(320px, 80vw)",
      }}>
        Pon tu teléfono de lado para jugar.
      </div>
      <style>{`
        @keyframes ed-rotate-lock {
          0%   { transform: rotate(0deg); }
          45%  { transform: rotate(0deg); }
          70%  { transform: rotate(-90deg); }
          100% { transform: rotate(-90deg); }
        }
      `}</style>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// App principal
// ─────────────────────────────────────────────────────────────
function App() {
  const [route, setRoute] = useStateA("home");
  const [app, setApp] = useStateA({
    studentName: "",
    character: "explorador",
    level: "voces",
    stars: 0,
    sessionStart: Date.now(),
    gameSeed: 0,
  });

  function go(r) {
    // Al (re)entrar al juego, regeneramos la seed para que GameScreen se remonte
    // y reinicie ronda, tiempo, racha, etc. También reseteamos las estrellas:
    // cada partida empieza desde 0, no acumula entre rondas.
    if (r === "game") {
      setApp((s) => ({ ...s, gameSeed: (s.gameSeed || 0) + 1, stars: 0 }));
    }
    setRoute(r);
  }

  const screenProps = { app, setApp, go };

  let Screen = window.HomeScreen;
  if (route === "character") Screen = window.CharacterScreen;
  else if (route === "game") Screen = window.GameScreen;
  else if (route === "results") Screen = window.ResultsScreen;

  const variant = route === "game" ? "chalkboard" : "cosmic";

  return (
    <DeviceStage variant={variant}>
      <Screen key={route === "game" ? `game-${app.gameSeed}` : route} {...screenProps} />
    </DeviceStage>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>
