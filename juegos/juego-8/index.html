// ─────────────────────────────────────────────────────────────
// Sparkles — chispas animadas alrededor del personaje. Refuerzan
// la estética cósmica heredada del shell.
// ─────────────────────────────────────────────────────────────
function Sparkles({ color = "#fce9a8", count = 6, seed = 1 }) {
  const pts = Array.from({ length: count }, (_, i) => {
    const a = (i * 360) / count + seed * 37;
    const r = 70 + (i % 3) * 8;
    const x = 100 + Math.cos((a * Math.PI) / 180) * r;
    const y = 100 + Math.sin((a * Math.PI) / 180) * r;
    const s = 2 + (i % 3);
    return { x, y, s, delay: i * 0.35 };
  });
  return (
    <g>
      {pts.map((p, i) => (
        <g key={i} transform={`translate(${p.x} ${p.y})`}>
          <circle r={p.s} fill={color} opacity="0.9">
            <animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" begin={`${p.delay}s`} repeatCount="indefinite" />
          </circle>
        </g>
      ))}
    </g>
  );
}

// ─────────────────────────────────────────────────────────────
// Contador de visitas — endpoint PHP del lado servidor con fallback localStorage.
// En servidores con PHP (Apache de edinun.com) muestra el conteo global real.
// En GitHub Pages / servidor estático sin PHP, el .php se sirve como texto
// plano → el fetch falla parseando JSON → caemos al contador localStorage
// (per-navegador, igual que la versión anterior). El localStorage también
// hace de caché del último valor servido por PHP para mostrar algo durante
// la primera carga / si el servidor está caído.
// ─────────────────────────────────────────────────────────────
const VISITOR_ENDPOINT = "counter.php"; // relativo a index.html del juego
const VISITOR_KEY = "edinun_visitors_v1";
const VISITOR_SESSION_FLAG = "edinun_visit_counted_v1";

async function fetchVisitorCount(opts) {
  const inc = opts && opts.increment;
  const url = inc ? VISITOR_ENDPOINT + "?inc=1" : VISITOR_ENDPOINT;
  const res = await fetch(url, { cache: "no-store" });
  if (!res.ok) throw new Error("counter http " + res.status);
  // Tolera dos contratos de servidor: JSON {"count": N} (counter.php de este
  // repo) o un numero plano "N" (contador.php legacy de otros juegos del mismo
  // server). Si el .php se sirve como texto ("<?php...") ambos parseos fallan
  // -> NaN -> throw -> el cliente cae a localStorage.
  const text = (await res.text()).trim();
  let count;
  try {
    const data = JSON.parse(text);
    count = data && typeof data.count === "number" ? data.count : Number(data);
  } catch (e) {
    count = Number(text);
  }
  if (!Number.isFinite(count)) throw new Error("counter invalid payload");
  return count;
}

function readLocalVisitorCount() {
  const raw = localStorage.getItem(VISITOR_KEY);
  const v = raw ? parseInt(raw, 10) : 0;
  return isNaN(v) ? 0 : v;
}

function writeLocalVisitorCount(n) {
  localStorage.setItem(VISITOR_KEY, String(n));
}

function useVisitorCount() {
  const [n, setN] = useState(() => readLocalVisitorCount());

  useEffect(() => {
    let cancelled = false;
    // Lee del servidor al montar. Si falla, queda el valor cacheado en local.
    fetchVisitorCount()
      .then((count) => {
        if (cancelled) return;
        setN(count);
        writeLocalVisitorCount(count);
      })
      .catch(() => { /* fallback localStorage ya cargado en el initializer */ });

    function onUpdate(ev) {
      const value = ev && ev.detail && ev.detail.count;
      if (typeof value === "number") setN(value);
      else setN(readLocalVisitorCount());
    }
    window.addEventListener("edinun:visitors-updated", onUpdate);
    return () => {
      cancelled = true;
      window.removeEventListener("edinun:visitors-updated", onUpdate);
    };
  }, []);

  return n;
}

function markFirstAttempt() {
  if (sessionStorage.getItem(VISITOR_SESSION_FLAG) === "1") return;
  sessionStorage.setItem(VISITOR_SESSION_FLAG, "1");

  fetchVisitorCount({ increment: true })
    .then((count) => {
      writeLocalVisitorCount(count);
      window.dispatchEvent(new CustomEvent("edinun:visitors-updated", { detail: { count } }));
    })
    .catch(() => {
      const next = readLocalVisitorCount() + 1;
      writeLocalVisitorCount(next);
      window.dispatchEvent(new CustomEvent("edinun:visitors-updated", { detail: { count: next } }));
    });
}

function incrementGamesCompleted() {
  const KEY = "edinun_games_completed_v1";
  const raw = localStorage.getItem(KEY);
  const next = (raw ? parseInt(raw, 10) : 0) + 1;
  localStorage.setItem(KEY, String(next));
  window.dispatchEvent(new Event("edinun:games-updated"));
  return next;
}

        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
          <div style={{ position: "relative" }}>

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function makeDragHandler({ item, ghostHtml, onTap, onDrop, disabled }) {
  return function onPointerDown(e) {
    if (disabled) return;
    if (e.button !== undefined && e.button !== 0) return;
    e.preventDefault();
    const startX = e.clientX, startY = e.clientY;
    let started = false;
    let ghost = null;
    let currentZoneId = null;
    let lastX = startX, lastY = startY;
    const highlights = new Set();

    function clearHighlights() {
      for (const el of highlights) el.classList.remove("ed-drop-hover");
      highlights.clear();
    }
    function findZoneAt(x, y) {
      let prevVis = null;
      if (ghost) { prevVis = ghost.style.visibility; ghost.style.visibility = "hidden"; }
      const under = document.elementFromPoint(x, y);
      if (ghost) ghost.style.visibility = prevVis || "";
      if (!under || !under.closest) return null;
      const zone = under.closest("[data-dropzone]");
      return zone || null;
    }
    function onMove(ev) {
      const x = ev.clientX, y = ev.clientY;
      lastX = x; lastY = y;
      if (!started && Math.hypot(x - startX, y - startY) > 6) {
        started = true;
        ghost = document.createElement("div");
        ghost.style.cssText = "position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:none;left:" + x + "px;top:" + y + "px;";
        ghost.innerHTML = ghostHtml || `<div style="background:#fce9a8;color:#3a2608;padding:6px 12px;border-radius:10px;font-family:Fredoka,Nunito,sans-serif;font-weight:800;font-size:12px;border:2px solid #4fd8ff;box-shadow:0 6px 18px rgba(0,0,0,0.5);">${String(item).slice(0,60)}</div>`;
        document.body.appendChild(ghost);
        document.body.style.cursor = "grabbing";
      }
      if (started && ghost) {
        ghost.style.left = x + "px";
        ghost.style.top = y + "px";
        clearHighlights();
        const zone = findZoneAt(x, y);
        if (zone) { zone.classList.add("ed-drop-hover"); highlights.add(zone); currentZoneId = zone.dataset.dropzone; }
        else { currentZoneId = null; }
      }
    }
    function onUp(ev) {
      document.removeEventListener("pointermove", onMove);
      document.removeEventListener("pointerup", onUp);
      document.removeEventListener("pointercancel", onCancel);
      let finalZone = currentZoneId;
      if (started && !finalZone) {
        const x = (ev && ev.clientX != null) ? ev.clientX : lastX;
        const y = (ev && ev.clientY != null) ? ev.clientY : lastY;
        const zone = findZoneAt(x, y);
        if (zone) finalZone = zone.dataset.dropzone;
      }
      if (ghost) { ghost.remove(); ghost = null; }
      document.body.style.cursor = "";
      clearHighlights();
      if (!started) { if (onTap) onTap(item); }
      else if (finalZone && onDrop) { onDrop(finalZone, item); }
    }
    function onCancel() {
      document.removeEventListener("pointermove", onMove);
      document.removeEventListener("pointerup", onUp);
      document.removeEventListener("pointercancel", onCancel);
      if (ghost) { ghost.remove(); ghost = null; }
      document.body.style.cursor = "";
      clearHighlights();
    }
    document.addEventListener("pointermove", onMove);
    document.addEventListener("pointerup", onUp);
    document.addEventListener("pointercancel", onCancel);
  };
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const ss = s % 60;
  return `${String(m).padStart(2, "0")}:${String(ss).padStart(2, "0")}`;
}

function calcStars(isCorrect, exerciseSec) {
  return isCorrect ? Math.max(1, 10 - Math.floor(exerciseSec / 3)) : 0;
}

const RECENT_KEYS = {
  escritor: "edinun_juego8_escritor_recientes_v1",
  narrador: "edinun_juego8_narrador_recientes_v1",
};
// FIFO compartido sp/mod/cit (escritor) y mag/elem/par (narrador). Como cada
// sesión pushea ~5 entradas y el banco más chico tiene 5, ponemos el límite alto
// para retener historia de 5–6 sesiones y evitar repeticiones consecutivas.
const RECENT_LIMIT = 30;

function getRecent(level) {
  try {
    const raw = localStorage.getItem(RECENT_KEYS[level]);
    if (!raw) return [];
    const arr = JSON.parse(raw);
    return Array.isArray(arr) ? arr : [];
  } catch { return []; }
}
function pushRecent(level, key) {
  const arr = getRecent(level).filter((k) => k !== key);
  arr.unshift(key);
  const trimmed = arr.slice(0, RECENT_LIMIT);
  try { localStorage.setItem(RECENT_KEYS[level], JSON.stringify(trimmed)); } catch {}
}

function GameHUD({ elapsed, stars, attempted, solved, total = 3, app, setApp }) {
  const levels = (typeof LEVELS_CFG !== "undefined" && LEVELS_CFG) || (window.LEVELS_CFG || []);
  const currentId = app && app.currentCategory ? app.currentCategory : "escritor";
  const [pendingLevel, setPendingLevel] = useStateG(null);

  function requestSwitch(lvId) {
    if (lvId === currentId) return;
    setPendingLevel(lvId);
  }
  function confirmSwitch() {
    if (!pendingLevel) return;
    const cfg = levels.find((l) => l.id === pendingLevel);
    if (!cfg) { setPendingLevel(null); return; }
    setApp((s) => ({
      ...s,
      level: cfg.id,
      currentCategory: cfg.id,
      currentCatLabel: cfg.catLabel,
    }));
    setPendingLevel(null);
  }

  return (
    <>
      <div data-qa="hud" style={{
        position: "absolute", top: 10, left: 16, right: 16,
        display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12,
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <EdinunLogoMini size={64} />
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <div style={{
            display: "flex", alignItems: "center", gap: 6,
            background: "rgba(0,0,0,0.35)", borderRadius: 999, padding: "6px 12px",
            border: "1px solid rgba(242,194,96,0.4)", fontFamily: "var(--ed-font-mono)", fontSize: 13, color: "#fce9a8",
          }}>
            ⏱ {formatTime(elapsed)}
          </div>
          <div style={{
            display: "flex", alignItems: "center", gap: 6,
            background: "rgba(0,0,0,0.35)", borderRadius: 999, padding: "6px 12px",
            border: "1px solid rgba(242,194,96,0.4)", fontFamily: "var(--ed-font-display)", fontWeight: 600, color: "#fce9a8",
          }}>
            ⭐ {stars}
          </div>
        </div>
      </div>

      <div data-qa="hud-temas" style={{
        position: "absolute", top: 22, left: "50%", transform: "translateX(-50%)",
        display: "flex", alignItems: "center", gap: 5,
      }}>
        {levels.map((lv) => {
          const active = lv.id === currentId;
          return (
            <button
              key={lv.id}
              onClick={() => requestSwitch(lv.id)}
              title={active ? "Tema actual" : `Cambiar a "${lv.label}"`}
              style={{
                padding: "4px 12px",
                borderRadius: 999,
                background: active ? lv.grad : "rgba(0,0,0,0.35)",
                color: active ? lv.ink : "rgba(252,233,168,0.85)",
                fontFamily: "var(--ed-font-display)",
                fontWeight: 700, fontSize: 11, letterSpacing: "0.02em",
                border: active ? "1px solid rgba(255,255,255,0.55)" : "1px solid rgba(242,194,96,0.35)",
                boxShadow: active
                  ? "inset 0 1px 0 rgba(255,255,255,0.45), inset 0 -2px 0 rgba(0,0,0,0.18), 0 0 12px rgba(255,255,255,0.18)"
                  : "none",
                cursor: active ? "default" : "pointer",
                transition: "all 0.18s ease",
                whiteSpace: "nowrap",
              }}
            >
              {lv.label}
            </button>
          );
        })}
      </div>

      <div style={{
        position: "absolute", top: 58, left: "50%", transform: "translateX(-50%)",
        display: "flex", alignItems: "center", gap: 8,
      }}>
        <span className="ed-label" style={{ color: "rgba(255,255,255,0.7)" }}>Ronda</span>
        {Array.from({ length: total }).map((_, i) => (
          <div key={i} style={{
            width: 10, height: 10, borderRadius: "50%",

            boxShadow: i < attempted ? "0 0 10px currentColor" : "none",

      <SwitchLevelModal

      />
    </>
  );
}

// ─────────────────────────────────────────────────────────────
// N1 · El escritor — 3 rondas distintas
// ─────────────────────────────────────────────────────────────
function EscritorGame({ app, setApp, go, onRestart }) {
  const char = CHARACTERS.find((c) => c.id === app.character) || CHARACTERS[0];
  const catLabel = app.currentCatLabel || "Planificar la escritura";

  const [ronda, setRonda] = useStateG(0);

  // R1 state — 3 oraciones simultáneas: un corte (split index) por cada una.
  const [r1Splits, setR1Splits] = useStateG([null, null, null]);
  const [r1Locked, setR1Locked] = useStateG(false);

  // R2 state — Caza modificadores (shooter): chip seleccionado + asignación a carpeta.
  const [r2PickedChip, setR2PickedChip] = useStateG(null);  // idx del chip seleccionado
  const [r2Marks, setR2Marks] = useStateG({});               // { chipIdx: "md"|"mi" }
  const [r2Locked, setR2Locked] = useStateG(false);

  // R3 state — sastre de citas: { slotIdx: signo }
  const [r3Placed, setR3Placed] = useStateG({});
  const [r3Picked, setR3Picked] = useStateG(null);
  const [r3Locked, setR3Locked] = useStateG(false);

  // Picks
  const [r1Picks] = useStateG(() => {
    // 3 oraciones distintas. FIFO anti-repetición por categoría: bloqueamos solo
    // las últimas floor(N/2) usadas de este prefijo (estándar 12), así el pool
    // nunca se vacía mientras queden opciones frescas.
    const windowN = Math.floor(SP_BANK.length / 2);
    const recentIds = getRecent("escritor")
      .filter((k) => k.startsWith("sp:"))
      .map((k) => k.slice("sp:".length));
    const blocked = new Set(recentIds.slice(0, windowN));
    let pool = SP_BANK.filter((p) => !blocked.has(p.id));
    if (pool.length < 3) pool = SP_BANK.slice();
    // Mezcla
    const picks = [];
    const usados = new Set();
    while (picks.length < 3 && pool.length > 0) {
      const idx = Math.floor(Math.random() * pool.length);
      const candidato = pool[idx];
      if (!usados.has(candidato.id)) {
        picks.push(candidato);
        usados.add(candidato.id);
        pushRecent("escritor", "sp:" + candidato.id);
      }
      pool.splice(idx, 1);
    }
    // Si quedan huecos (banco muy pequeño), rellenar de SP_BANK ignorando recencia
    while (picks.length < 3) {
      const c = SP_BANK[Math.floor(Math.random() * SP_BANK.length)];
      if (!usados.has(c.id)) { picks.push(c); usados.add(c.id); }
    }
    return picks;
  });

  // FIFO con anti-repetición por categoría (estándar 12): bloqueamos solo las
  // últimas floor(N/2) usadas de este prefijo, donde N = tamaño del banco. Así el
  // pool nunca se vacía mientras queden opciones frescas y el nuevo pick difiere
  // de las últimas ~floor(N/2) jugadas.
  function pickEscritorFIFO(bank, prefix) {
    const windowN = Math.floor(bank.length / 2);
    const recentIds = getRecent("escritor")
      .filter((k) => k.startsWith(prefix))
      .map((k) => k.slice(prefix.length));
    const blocked = new Set(recentIds.slice(0, windowN));
    let pool = bank.filter((p) => !blocked.has(p.id));
    if (pool.length < 1) pool = bank;
    const p = pool[Math.floor(Math.random() * pool.length)];
    pushRecent("escritor", prefix + p.id);
    return p;
  }

  const [r2Pick] = useStateG(() => pickEscritorFIFO(MOD_BANK,   "mod:"));
  const [r3Pick] = useStateG(() => pickEscritorFIFO(CITAS_BANK, "cit:"));

  // Lista plana de slots para R3 (con su signo correcto e índice)
  const r3Slots = r3Pick.partes.map((pt, i) => pt.s != null ? { idx: i, signo: pt.s } : null).filter(Boolean);

  // Shell state
  const [elapsed, setElapsed] = useStateG(0);
  const [stars, setStars] = useStateG(0);
  const [solved, setSolved] = useStateG(0);
  const [attempted, setAttempted] = useStateG(0);
  const [starsSession, setStarsSession] = useStateG(0);
  const [feedback, setFeedback] = useStateG(null);
  const [feedbackMsg, setFeedbackMsg] = useStateG("");
  const [confirmingRestart, setConfirmingRestart] = useStateG(false);
  const [confirmingExit, setConfirmingExit] = useStateG(false);
  const [log, setLog] = useStateG([]);
  const started = useRefG(Date.now());
  const exerciseStart = useRefG(Date.now());

  useEffectG(() => {
    const id = setInterval(() => setElapsed(Math.floor((Date.now() - started.current) / 1000)), 500);
    return () => clearInterval(id);
  }, []);

  useEffectG(() => {
    window.__currentChalkGlyphs = [
      { c: "✍",  l: "6%",  t: "12%", r: "-8deg" },
      { c: "S",  l: "82%", t: "16%", r: "6deg",  s: "0.6em" },
      { c: "P",  l: "10%", t: "78%", r: "12deg", s: "0.6em" },
      { c: "MD", l: "88%", t: "72%", r: "-10deg", s: "0.5em" },
      { c: ":",  l: "45%", t: "8%",  r: "4deg",  s: "0.6em" },
      { c: '"',  l: "3%",  t: "45%", r: "-4deg", s: "0.65em" },
      { c: ",",  l: "92%", t: "45%", r: "8deg",  s: "0.7em" },
      { c: "MI", l: "30%", t: "55%", r: "-6deg", s: "0.5em" },
      { c: "📖", l: "70%", t: "62%", r: "8deg",  s: "0.55em" },
      { c: "✨", l: "55%", t: "30%", r: "-4deg", s: "0.45em" },
    ];
    return () => { window.__currentChalkGlyphs = null; };
  }, []);

  // Verificación
  // R1: cada una de las 3 oraciones debe tener un corte elegido.
  const r1Done = r1Splits.every((s) => s !== null);
  // R2: cada modificador (no núcleo) debe estar asignado a su carpeta.
  const r2AllMarked = r2Pick.tokens.every((t, i) => t.tipo === "n" || r2Marks[i]);
  // R3: todos los slots llenos
  const r3AllPlaced = r3Slots.every((s) => r3Placed[s.idx]);

  const canVerify =
    ronda === 0 ? (r1Done && !r1Locked) :
    ronda === 1 ? (r2AllMarked && !r2Locked) :
    ronda === 2 ? (r3AllPlaced && !r3Locked) :
    false;
  const showErase = true;

  function handleVerify() {
    if (!canVerify) return;
    if (ronda === 0) {
      setR1Locked(true);
      // Las 3 oraciones deben estar correctamente cortadas
      let correct = true;
      const userParts = [];
      const correctParts = [];
      r1Picks.forEach((p, i) => {
        const choice = r1Splits[i];
        if (choice !== p.splitIdx) correct = false;
        const userSujeto = p.palabras.slice(0, choice + 1).join(" ");
        const userPredicado = p.palabras.slice(choice + 1).join(" ");
        const okSujeto = p.palabras.slice(0, p.splitIdx + 1).join(" ");
        const okPredicado = p.palabras.slice(p.splitIdx + 1).join(" ");
        userParts.push(`${i + 1}) S:${userSujeto} | P:${userPredicado}`);
        correctParts.push(`${i + 1}) S:${okSujeto} | P:${okPredicado}`);
      });
      setTimeout(() => answer(correct, userParts.join("  "), correctParts.join("  "), "✂"), correct ? 350 : 2500);
    } else if (ronda === 1) {
      setR2Locked(true);
      let correct = true;
      for (let i = 0; i < r2Pick.tokens.length; i++) {
        const t = r2Pick.tokens[i];
        if (t.tipo === "n") continue;
        if (r2Marks[i] !== t.tipo) { correct = false; break; }
      }
      const userText = r2Pick.tokens.filter((t) => t.tipo !== "n").map((t, _i) => {
        const realIdx = r2Pick.tokens.indexOf(t);
        return `${t.w}=${r2Marks[realIdx] || "?"}`;
      }).join(" ");
      const correctText = r2Pick.tokens.filter((t) => t.tipo !== "n").map((t) => `${t.w}=${t.tipo}`).join(" ");
      setTimeout(() => answer(correct, userText, correctText, "🎯"), correct ? 350 : 2500);
    } else if (ronda === 2) {
      setR3Locked(true);
      let correct = true;
      for (const s of r3Slots) {
        if (r3Placed[s.idx] !== s.signo) { correct = false; break; }
      }
      // Texto completo de la cita, con los signos en su lugar — más útil en el reporte.
      const armar = (mapSlot) => {
        const out = [];
        r3Pick.partes.forEach((pt, i) => {
          if (pt.br) { out.push(" / "); return; }
          if (pt.t != null) out.push(pt.t);
          else out.push(mapSlot(i, pt.s));
        });
        // Junta texto+signo sin espacio (el signo va pegado a la palabra anterior).
        return out
          .map((piece, idx) => {
            const next = out[idx + 1];
            const isSignSingleChar = piece && piece.length === 1 && '.,:;!?"”¡¿'.includes(piece);
            const sep = (isSignSingleChar || (next && next === " / ")) ? "" : " ";
            return piece + sep;
          })
          .join("")
          .replace(/\s+\//g, " /")
          .trim();
      };
      const userText = armar((i) => r3Placed[i] || "▢");
      const correctText = armar((i, esperado) => esperado);
      setTimeout(() => answer(correct, userText, correctText, "✒️"), correct ? 350 : 2500);
    }
  }

  function handleErase() {
    if (ronda === 0) { if (r1Locked) return; setR1Splits([null, null, null]); }
    else if (ronda === 1) { if (r2Locked) return; setR2Marks({}); setR2PickedChip(null); }
    else if (ronda === 2) { if (r3Locked) return; setR3Placed({}); setR3Picked(null); }
  }

  function answer(isCorrect, userText, correctText, opIcon) {
    if (typeof window.markFirstAttempt === "function") window.markFirstAttempt();
    const exerciseSec = Math.max(0, Math.floor((Date.now() - exerciseStart.current) / 1000));
    const earned = calcStars(isCorrect, exerciseSec);
    const newAttempted = attempted + 1;
    const newSolved = solved + (isCorrect ? 1 : 0);
    const newStarsTotal = stars + earned;
    const newStarsSession = starsSession + earned;

    const entry = {
      idx: newAttempted,
      a: correctText, b: userText, op: opIcon || "·",
      correctAnswer: correctText, userAnswer: userText,
      isCorrect, time: exerciseSec, earned,
    };
    const newLog = [...log, entry];

    setFeedback(isCorrect ? "ok" : "err");
    setFeedbackMsg(isCorrect ? `+${earned} ⭐` : ENCOURAGEMENTS[Math.floor(Math.random() * ENCOURAGEMENTS.length)]);
    setAttempted(newAttempted);
    setSolved(newSolved);
    setStars(newStarsTotal);
    setStarsSession(newStarsSession);
    setLog(newLog);

    const wait = isCorrect ? 950 : 1400;
    setTimeout(() => {
      setFeedback(null);
      setFeedbackMsg("");
      if (newAttempted >= 3) {
        setApp((s) => ({
          ...s, stars: newStarsTotal,
          lastResult: { category: catLabel, solved: newSolved, total: 3, time: elapsed, starsEarned: newStarsSession, log: newLog },
        }));
        window.incrementGamesCompleted && window.incrementGamesCompleted();
        go("results");
      } else {
        setRonda((r) => r + 1);
        exerciseStart.current = Date.now();
      }
    }, wait);
  }

  // Enunciado = QUÉ hacer (objetivo curricular). Bocadillo = CÓMO (mecánica).
  const enunciado =
    ronda === 0 ? "Divide cada oración en sujeto y predicado." :
    ronda === 1 ? "Clasifica los modificadores como directos o indirectos." :
    "Completa la cita con los signos de puntuación.";

  // Bocadillo dinámico: en R2 cambia según el chip seleccionado para
  // explicar qué significa Modificador Directo / Indirecto.
  const bocadillo =
    ronda === 0
      ? "Toca la ✂ que divida la oración."
      :
    ronda === 1
      ? "Arrastra cada palabra al lugar correcto."
      :
    "Toma un globo y suéltalo en el espacio correcto.";

  // Por ronda: cuán abajo está el enunciado y dónde arranca la zona-central.
  // Mantenemos la zona-central CORTA (height auto) para que cartel+botones queden
  // cerca del centro óptico del lienzo y no haya "huecos" arriba/abajo.
  const enunciadoTop =
    ronda === 0 ? 110 :  // R1 ruleta
    ronda === 1 ? 105 :  // R2 caza modificadores — sube para dejar más aire a chips+buckets
    105;                 // R3 cazapuntuación
  const zonaCentralTop =
    ronda === 0 ? 160 :  // R1 cartel + SUJETO/PREDICADO ≈ 170px
    ronda === 1 ? 185 :  // R2 oración + 2 cajones — más aire entre enunciado y oración
    155;                 // R3 cita + banco globos: bajamos un poco para repartir mejor el alto

  return (
    <div style={{ position: "absolute", inset: 0, overflow: "hidden" }}>
      <GameHUD elapsed={elapsed} stars={stars} attempted={attempted} solved={solved} total={3} app={app} setApp={setApp} />
      <CharacterCorner char={char} message={bocadillo} />
      <GameEnunciado text={enunciado} top={enunciadoTop} />

      <div data-qa="zona-central" style={{
        position: "absolute", top: zonaCentralTop, left: "50%", transform: "translateX(-50%)",
        width: 440,
        // height auto: el contenido manda su altura, sin huecos forzados
      }}>
        {ronda === 0 && (
          <SujetoPredicadoCard
            picks={r1Picks}
            splits={r1Splits}
            locked={r1Locked}
            onChooseSplit={(oracionIdx, palabraIdx) => {
              if (r1Locked) return;
              const next = r1Splits.slice();
              next[oracionIdx] = palabraIdx;
              setR1Splits(next);
            }}
          />
        )}
        {ronda === 1 && (
          <DetectiveModCard
            pick={r2Pick}
            marks={r2Marks}
            pickedChip={r2PickedChip}
            locked={r2Locked}
            onPickChip={(idx) => {
              if (r2Locked) return;
              setR2PickedChip(r2PickedChip === idx ? null : idx);
            }}
            onAssignBucket={(bucket) => {
              if (r2Locked || r2PickedChip == null) return;
              const next = { ...r2Marks, [r2PickedChip]: bucket };
              setR2Marks(next);
              setR2PickedChip(null);
            }}
            onAssignTo={(chipIdx, bucket) => {
              if (r2Locked) return;
              const next = { ...r2Marks, [chipIdx]: bucket };
              setR2Marks(next);
              setR2PickedChip(null);
            }}
            onUnmark={(chipIdx) => {
              if (r2Locked) return;
              const next = { ...r2Marks };
              delete next[chipIdx];
              setR2Marks(next);
            }}
          />
        )}
        {ronda === 2 && (
          <LabCitasCard
            pick={r3Pick}
            placed={r3Placed}
            picked={r3Picked}
            locked={r3Locked}
            onPickLabel={(s) => { if (r3Locked) return; setR3Picked(r3Picked === s ? null : s); }}
            onPlaceIn={(slotIdx) => {
              if (r3Locked) return;
              if (r3Picked === null) {
                if (r3Placed[slotIdx]) {
                  const next = { ...r3Placed }; delete next[slotIdx];
                  setR3Placed(next);
                }
                return;
              }
              const next = { ...r3Placed };
              next[slotIdx] = r3Picked;
              setR3Placed(next);
              setR3Picked(null);
            }}
            onSetPlaced={(next) => { if (r3Locked) return; setR3Placed(next); setR3Picked(null); }}
          />
        )}
      </div>

      <ActionRail
        canVerify={canVerify}
        onVerify={handleVerify}
        showErase={showErase}
        onErase={handleErase}
        onRestart={() => setConfirmingRestart(true)}
        onExit={() => setConfirmingExit(true)}
      />

      <FeedbackOverlay feedback={feedback} feedbackMsg={feedbackMsg} charName={char.name} />
      <RestartModal confirmingExit={confirmingRestart} setConfirmingExit={setConfirmingRestart} attempted={attempted} total={3} onRestart={onRestart} />
      <ExitModal confirmingExit={confirmingExit} setConfirmingExit={setConfirmingExit} attempted={attempted} total={3} onExit={() => go("home")} />
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// N1 · R1 — Divide 3 oraciones en sujeto y predicado. Sin ruleta:
// las 3 frases se muestran apiladas y el niño marca el corte en cada una.
// ─────────────────────────────────────────────────────────────
function SujetoPredicadoCard({ picks, splits, locked, onChooseSplit }) {
  return (
    <div style={{ position: "relative", width: "100%", display: "flex", flexDirection: "column", alignItems: "center", gap: 38 }}>
      {/* Cartel grande con las 3 oraciones apiladas */}
      <div style={{
        width: "100%", maxWidth: 440,
        background: "linear-gradient(180deg, rgba(255,253,245,0.97), rgba(245,238,225,0.92))",
        border: "3px solid #f2c260",
        borderRadius: 18, padding: "14px 14px",
        boxShadow: "0 10px 22px rgba(0,0,0,0.45)",
        display: "flex", flexDirection: "column", gap: 16,
      }}>
        {picks.map((pick, oracionIdx) => {
          const palabras = pick.palabras;
          const splitOk = pick.splitIdx;
          const chosen = splits[oracionIdx];
          const isCorrect = locked && chosen === splitOk;
          const isWrong = locked && chosen !== splitOk;
          return (
            <div key={oracionIdx} style={{
              display: "flex", flexWrap: "wrap", gap: 3, justifyContent: "center", alignItems: "center",
              paddingTop: oracionIdx === 0 ? 0 : 14,
              borderTop: oracionIdx === 0 ? "none" : "1px dashed rgba(180,136,23,0.3)",
            }}>
              {/* Numerito de la oración */}
              <span style={{
                display: "inline-flex", alignItems: "center", justifyContent: "center",
                width: 22, height: 22, borderRadius: "50%",
                background: isCorrect ? "#2ecc8f" : isWrong ? "#ff6b6b" : "rgba(58,38,8,0.85)",
                color: "#fff",
                fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 11,
                marginRight: 4,
                flexShrink: 0,
              }}>{oracionIdx + 1}</span>
              {palabras.map((p, i) => {
                const beforeSplit = chosen !== null && i <= chosen;
                const afterSplit  = chosen !== null && i >  chosen;
                let bg = "rgba(252,233,168,0.55)";
                let border = "2px solid rgba(217,164,65,0.4)";
                let color = "#3a2608";
                if (beforeSplit) { bg = "linear-gradient(180deg, #ffe97a, #d7b12a)"; border = "2px solid #b48817"; }
                if (afterSplit)  { bg = "linear-gradient(180deg, #ff9a9a, #d94a4a)"; border = "2px solid #a31818"; color = "#fff"; }
                return (
                  <React.Fragment key={i}>
                    <span style={{
                      display: "inline-block",
                      padding: "4px 9px",
                      borderRadius: 8,
                      background: bg, border, color,
                      fontFamily: "var(--ed-font-display)", fontWeight: 700,
                      fontSize: 14, lineHeight: 1.15,
                      userSelect: "none",
                      boxShadow: chosen !== null ? "0 2px 3px rgba(0,0,0,0.2)" : "none",
                      transition: "all 0.18s",
                    }}>{p}</span>
                    {i < palabras.length - 1 && (() => {
                      const isCutChosen = chosen === i;
                      // Al fallar, revelamos en verde (✓) dónde iba realmente el corte.
                      const revealCut = isWrong && i === splitOk && !isCutChosen;
                      const asBar = isCutChosen || revealCut;
                      const barColor = isCutChosen
                        ? (isCorrect ? "#2ecc8f" : isWrong ? "#ff6b6b" : "#4fd8ff")
                        : "#2ecc8f";
                      return (
                        <button
                          onClick={() => !locked && onChooseSplit(oracionIdx, i)}
                          disabled={locked}
                          style={{
                            width: isCutChosen ? 5 : revealCut ? 22 : 20, height: 28,
                            padding: 0,
                            background: asBar ? barColor : "transparent",
                            border: asBar ? "none" : "2px dashed rgba(180,136,23,0.5)",
                            borderRadius: isCutChosen ? 3 : 6,
                            color: revealCut ? "#fff" : "#b48817",
                            cursor: locked ? "default" : "pointer",
                            fontSize: 12, fontWeight: 800,
                            lineHeight: 1,
                            display: "flex", alignItems: "center", justifyContent: "center",
                            transition: "all 0.18s",
                            boxShadow: asBar ? `0 0 10px ${barColor}` : "none",
                          }}
                          title={isCutChosen ? "Corte aquí" : revealCut ? "Aquí iba el corte" : "Toca para cortar aquí"}
                        >
                          {isCutChosen ? "" : revealCut ? "✓" : "✂"}
                        </button>
                      );
                    })()}
                  </React.Fragment>
                );
              })}
            </div>
          );
        })}
      </div>
      {/* Leyenda compartida abajo */}
      <div style={{ display: "flex", gap: 12, alignItems: "center", justifyContent: "center" }}>
        <div style={{
          background: "linear-gradient(180deg, #ffe97a, #d7b12a)", color: "#3a2608",
          padding: "5px 14px", borderRadius: 999,
          fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 11,
          border: "2px solid #b48817", letterSpacing: "0.06em",
          boxShadow: "0 3px 7px rgba(0,0,0,0.3)",
        }}>SUJETO ←</div>
        <div style={{ color: "#fce9a8", fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 17 }}>✂</div>
        <div style={{
          background: "linear-gradient(180deg, #ff9a9a, #d94a4a)", color: "#fff",
          padding: "5px 14px", borderRadius: 999,
          fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 11,
          border: "2px solid #a31818", letterSpacing: "0.06em",
          boxShadow: "0 3px 7px rgba(0,0,0,0.3)",
        }}>→ PREDICADO</div>
      </div>
    </div>
  );
}

          background: "linear-gradient(180deg, #ffe97a, #d7b12a)",

          padding: "6px 16px", borderRadius: 999,

        }}>SUJETO ←</div>

          color: "#fce9a8", fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 20,
        }}>✂</div>

          padding: "6px 16px", borderRadius: 999,
          fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 12,

}

// ─────────────────────────────────────────────────────────────
// N1 · R2 — Oración completa con el núcleo bloqueado (rojo).
// El niño toca cada palabra/grupo y la manda a DIRECTO o INDIRECTO.
// ─────────────────────────────────────────────────────────────
function DetectiveModCard({ pick, marks, pickedChip, locked, onPickChip, onAssignBucket, onAssignTo, onUnmark }) {
  const colorMD = { bg: "linear-gradient(180deg, #b9e3ff, #4f9ee0)", border: "#1466a6", text: "#0a2540" };
  const colorMI = { bg: "linear-gradient(180deg, #b8efc4, #5fb878)", border: "#1e6e2e", text: "#0a3a18" };
  const pickedTokenIdx = pickedChip; // renombrado conceptualmente — sigue siendo el idx seleccionado

  // 2 carpetas — sirven como botones (tap) y como dropzones (arrastrar).
  // Muestran las palabras que han recibido dentro.
  const Bucket = ({ tipo }) => {
    const cfg = tipo === "md" ? colorMD : colorMI;
    const label = tipo === "md" ? "DIRECTO" : "INDIRECTO";
    const icono = tipo === "md" ? "📘" : "📗";
    const tip = tipo === "md" ? "artículo o adjetivo" : "con preposición";
    const canDrop = !locked && pickedTokenIdx != null;
    // Tokens asignados a esta carpeta
    const dentro = pick.tokens
      .map((t, i) => ({ ...t, _i: i }))
      .filter((t) => marks[t._i] === tipo);
    return (
      <div
        onClick={() => canDrop && onAssignBucket(tipo)}
        data-dropzone={`bucket:${tipo}`}
        style={{
          width: 200, height: 130,
          padding: "10px 14px 12px 14px",
          background: cfg.bg,
          border: `3px ${canDrop ? "solid #fce9a8" : "dashed " + cfg.border}`,
          borderRadius: 14,
          color: cfg.text,
          fontFamily: "var(--ed-font-display)", fontWeight: 800,
          cursor: canDrop ? "pointer" : "default",
          boxShadow: canDrop ? "0 0 16px rgba(252,233,168,0.55)" : "0 6px 14px rgba(0,0,0,0.35), inset 0 -3px 0 rgba(0,0,0,0.15)",
          transform: canDrop ? "translateY(-2px)" : "none",
          transition: "all 0.18s",
          display: "flex", flexDirection: "column", alignItems: "center",
          fontSize: 13, letterSpacing: "0.06em",
          position: "relative",
          boxSizing: "border-box",
        }}>
        {/* Encabezado fijo: nunca se mueve */}
        <div style={{
          height: 28, flex: "0 0 auto",
          display: "flex", alignItems: "center", justifyContent: "center", gap: 5,
          whiteSpace: "nowrap",
        }}>
          <span>{icono} {label}</span>
          <span style={{ fontSize: 10, fontWeight: 700, opacity: 0.8 }}>· {tip}</span>
        </div>
        {/* Área donde caen las palabras — altura flexible que no toca el encabezado */}
        <div style={{
          width: "100%", flex: "1 1 auto", minHeight: 0,
          background: "rgba(255,255,255,0.45)",
          border: `1.5px dashed ${cfg.border}`,
          borderRadius: 10,
          padding: "5px 7px",
          display: "flex", flexWrap: "wrap", justifyContent: "center", alignItems: "center", gap: 5,
          marginTop: 4,
          overflow: "hidden",
        }}>
          {dentro.length === 0 ? (
            <span style={{ fontSize: 10, fontStyle: "italic", opacity: 0.55, fontWeight: 700, letterSpacing: "0.04em" }}>
              ⤵ suelta aquí
            </span>
          ) : dentro.map((t) => {
            const isWrong = locked && t.tipo !== tipo;
            const isCorrect = locked && t.tipo === tipo;
            // Al fallar, revelamos a qué carpeta pertenecía la palabra.
            const correctLabel = isWrong ? (t.tipo === "md" ? "DIRECTO" : "INDIRECTO") : null;
            return (
              <div
                key={t._i}
                className="ed-draggable"
                onPointerDown={locked ? undefined : makeDragHandler({
                  item: t._i,
                  ghostHtml: `<div style="padding:6px 11px;border-radius:8px;background:${cfg.bg};color:${cfg.text};border:2px solid ${cfg.border};font-family:Fredoka,Nunito,sans-serif;font-weight:700;font-size:13px;box-shadow:0 10px 22px rgba(0,0,0,0.5);white-space:nowrap;">${t.w}</div>`,
                  onTap: () => onUnmark(t._i),
                  onDrop: (zoneId) => {
                    if (zoneId && zoneId.startsWith("bucket:") && onAssignTo) {
                      const newBucket = zoneId.slice("bucket:".length);
                      if (newBucket !== tipo) onAssignTo(t._i, newBucket);
                    }
                  },
                  disabled: locked,
                })}
                style={{
                  display: "inline-flex", alignItems: "center",
                  padding: "3px 9px", borderRadius: 8,
                  background: "rgba(255,255,255,0.85)",
                  border: `2px solid ${isCorrect ? "#2ecc8f" : isWrong ? "#ff6b6b" : cfg.border}`,
                  color: cfg.text,
                  fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 13,
                  cursor: locked ? "default" : "grab",
                  boxShadow: "0 2px 4px rgba(0,0,0,0.2)",
                  userSelect: "none",
                  touchAction: "none",
                }}
                title={locked ? "" : "Arrástrala a la otra carpeta o tócala para devolver"}
              >{t.w}{correctLabel && (
                <span style={{ marginLeft: 6, fontSize: 10, fontWeight: 800, color: "#1e8a5d", whiteSpace: "nowrap" }}>→ {correctLabel}</span>
              )}</div>
            );
          })}
        </div>
      </div>
    );
  };

  return (
    <div style={{ position: "relative", width: "100%", display: "flex", flexDirection: "column", alignItems: "center", gap: 32 }}>
      {/* Cartel con la oración completa — núcleo en rojo, modificadores tocables */}
      <div style={{
        width: "fit-content", maxWidth: 450,
        background: "linear-gradient(180deg, rgba(255,253,245,0.97), rgba(245,238,225,0.92))",
        border: "3px solid #f2c260",
        borderRadius: 18,
        padding: "14px 18px",
        boxShadow: "0 10px 22px rgba(0,0,0,0.45)",
      }}>
        <div style={{
          display: "flex", flexWrap: "wrap", gap: 6, justifyContent: "center", alignItems: "center",
        }}>
          {pick.tokens.map((t, i) => {
            // Núcleo: rojo, bloqueado
            if (t.tipo === "n") {
              return (
                <span key={i} style={{
                  display: "inline-flex", alignItems: "center", gap: 4,
                  padding: "7px 14px", borderRadius: 10,
                  background: "linear-gradient(180deg, #ff9a9a, #d94a4a)",
                  color: "#fff",
                  fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 17,
                  border: "2px solid #a31818",
                  boxShadow: "0 3px 7px rgba(0,0,0,0.3)",
                  cursor: "not-allowed",
                  userSelect: "none",
                }}>
                  {pick.icono && <span style={{ fontSize: 15 }}>{pick.icono}</span>}
                  {t.w}
                  <span style={{ fontSize: 9, opacity: 0.85, letterSpacing: "0.06em", marginLeft: 2 }}>NÚCLEO</span>
                </span>
              );
            }
            const choice = marks[i];
            const expected = t.tipo;
            const isPicked = pickedTokenIdx === i;
            const isCorrect = locked && choice === expected;
            const isWrong = locked && choice && choice !== expected;
            const isEmpty = locked && !choice;

            let bg = "rgba(252,233,168,0.85)";
            let border = "2px solid rgba(217,164,65,0.7)";
            let color = "#3a2608";
            if (choice === "md") { bg = colorMD.bg; border = `2px solid ${colorMD.border}`; color = colorMD.text; }
            if (choice === "mi") { bg = colorMI.bg; border = `2px solid ${colorMI.border}`; color = colorMI.text; }
            if (isCorrect) border = "2px solid #2ecc8f";
            if (isWrong)   { bg = "rgba(255,107,107,0.5)"; border = "2px solid #ff6b6b"; }
            if (isPicked)  border = "2px solid #4fd8ff";

            // Color del ghost al arrastrar (visible mientras se mueve)
            const ghostColor = choice === "md" ? colorMD : choice === "mi" ? colorMI : { bg: "linear-gradient(180deg, #fce9a8, #d9a441)", border: "#b48817", text: "#3a2608" };
            return (
              <div
                key={i}
                className="ed-draggable"
                onPointerDown={locked ? undefined : makeDragHandler({
                  item: i,
                  ghostHtml: `<div style="padding:8px 14px;border-radius:10px;background:${ghostColor.bg};color:${ghostColor.text};border:2.5px solid ${ghostColor.border};font-family:Fredoka,Nunito,sans-serif;font-weight:800;font-size:16px;box-shadow:0 10px 22px rgba(0,0,0,0.5);white-space:nowrap;">${t.w}</div>`,
                  onTap: () => {
                    if (choice) onUnmark(i);
                    else onPickChip(i);
                  },
                  onDrop: (zoneId) => {
                    if (zoneId && zoneId.startsWith("bucket:") && onAssignTo) {
                      const bucket = zoneId.slice("bucket:".length);
                      onAssignTo(i, bucket);
                    }
                  },
                  disabled: locked,
                })}
                style={{
                  display: "inline-flex", alignItems: "center", justifyContent: "center",
                  padding: "7px 13px", borderRadius: 10,
                  background: bg, border, color,
                  fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 16,
                  cursor: locked ? "default" : "grab",
                  boxShadow: isPicked
                    ? "0 0 16px rgba(79,216,255,0.7)"
                    : (choice ? "0 3px 6px rgba(0,0,0,0.25)" : "0 2px 4px rgba(0,0,0,0.18)"),
                  transform: isPicked ? "translateY(-3px) scale(1.04)" : "none",
                  transition: "all 0.18s",
                  userSelect: "none",
                  touchAction: "none",
                }}>
                {t.w}
                {(isWrong || isEmpty) && (
                  <sup style={{ fontSize: 9, color: "#1e8a5d", marginLeft: 3, fontWeight: 800, letterSpacing: "0.04em" }}>
                    ✓{expected === "md" ? "DIRECTO" : "INDIRECTO"}
                  </sup>
                )}
              </div>
            );
          })}
        </div>
      </div>

      {/* 2 carpetas como botones */}
      <div style={{ display: "flex", gap: 16, alignItems: "stretch", justifyContent: "center" }}>
        <Bucket tipo="md" />
        <Bucket tipo="mi" />
      </div>
    </div>
  );
}
