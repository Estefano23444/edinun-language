// ─────────────────────────────────────────────────────────────
// N1 · R3 — Cazapuntuación (shooter): cita con varios huecos arriba,
// banco de globos con signos abajo (incluye distractores).
// ─────────────────────────────────────────────────────────────
function LabCitasCard({ pick, placed, picked, locked, onPickLabel, onPlaceIn, onSetPlaced }) {
  const usadosPorSigno = {};
  for (const v of Object.values(placed)) {
    usadosPorSigno[v] = (usadosPorSigno[v] || 0) + 1;
  }
  const disponiblesPorSigno = {};
  for (const s of pick.bandeja) {
    disponiblesPorSigno[s] = (disponiblesPorSigno[s] || 0) + 1;
  }
  // Orden estable de signos en el banco: por aparición en la bandeja original
  const ordenSignos = [];
  const visto = new Set();
  for (const s of pick.bandeja) {
    if (!visto.has(s)) { visto.add(s); ordenSignos.push(s); }
  }

  // Render del cartel de cita: soporta {t}, {s}, {br}
  // Agrupamos cada texto con los slots que le siguen (hasta el próximo texto)
  // en un span nowrap, así el wrap nunca deja signos colgados sin su frase.
  const renderCita = () => {
    const lineas = [[]];
    pick.partes.forEach((p, i) => {
      if (p.br) { lineas.push([]); return; }
      lineas[lineas.length - 1].push({ ...p, _i: i });
    });
    const renderSlot = (p) => {
      const val = placed[p._i];
      const expected = p.s;
      const isCorrect = locked && val === expected;
      const isWrong = locked && val && val !== expected;
      const isEmpty = locked && !val;
      let bg = "rgba(255,255,255,0.85)";
      let border = "2px dashed rgba(30,110,46,0.6)";
      let color = "#0a3a18";
      if (val) {
        bg = "linear-gradient(180deg, #fce9a8, #d9a441)";
        border = "2px solid #b48817";
        color = "#3a2608";
      }
      if (isCorrect) { bg = "rgba(46,204,143,0.55)"; border = "2px solid #2ecc8f"; }
      if (isWrong)   { bg = "rgba(255,107,107,0.5)"; border = "2px solid #ff6b6b"; }
      const isFilled = val != null && !locked;
      return (
        <span key={p._i}
          data-dropzone={`citaslot:${p._i}`}
          className={isFilled ? "ed-draggable" : ""}
          onClick={!isFilled ? () => onPlaceIn(p._i) : undefined}
          onPointerDown={isFilled ? makeDragHandler({
            item: val,
            ghostHtml: `<div style="display:inline-flex;align-items:center;justify-content:center;min-width:26px;min-height:30px;padding:0 5px;border-radius:8px;background:linear-gradient(180deg,#fce9a8,#d9a441);color:#3a2608;border:2px solid #b48817;font-family:Fredoka,Nunito,sans-serif;font-weight:800;font-size:16px;box-shadow:0 8px 18px rgba(0,0,0,0.45);">${val === '"' ? "”" : val}</div>`,
            onTap: () => onPlaceIn(p._i),
            onDrop: (zoneId) => {
              if (zoneId && zoneId.startsWith("citaslot:") && onSetPlaced) {
                const newSlotIdx = parseInt(zoneId.slice("citaslot:".length), 10);
                if (newSlotIdx === p._i) return;
                const next = { ...placed };
                next[newSlotIdx] = val;
                delete next[p._i];
                onSetPlaced(next);
              }
            },
            disabled: locked,
          }) : undefined}
          style={{
            display: "inline-flex", alignItems: "center", justifyContent: "center",
            minWidth: 26, minHeight: 30,
            padding: "0 5px", margin: "0 1px",
            borderRadius: 8,
            background: bg, border, color,
            fontWeight: 800,
            fontFamily: "var(--ed-font-display)", fontSize: 16,
            cursor: locked ? "default" : (isFilled ? "grab" : "pointer"),
            userSelect: "none",
            touchAction: isFilled ? "none" : "auto",
            boxShadow: val ? "0 2px 5px rgba(0,0,0,0.25)" : "none",
            transition: "all 0.15s",
            verticalAlign: "middle",
          }}>
          {val || "▢"}
          {(isWrong || isEmpty) && (
            <sup style={{ fontSize: 9, color: "#1e8a5d", marginLeft: 2, fontWeight: 800 }}>
              ✓{expected === '"' ? "”" : expected}
            </sup>
          )}
        </span>
      );
    };
    // Agrupa una línea: cada {t} arranca un grupo nuevo, y los {s} siguientes
    // se acumulan en el mismo grupo. Cada grupo va en un span nowrap.
    const buildGroups = (linea) => {
      const groups = [];
      let cur = null;
      for (const p of linea) {
        if (p.t != null) {
          if (cur) groups.push(cur);
          cur = [p];
        } else {
          if (!cur) cur = [];
          cur.push(p);
        }
      }
      if (cur) groups.push(cur);
      return groups;
    };
    return lineas.map((linea, lineaIdx) => (
      <div key={lineaIdx} style={{
        display: "flex", flexWrap: "wrap", justifyContent: "center", alignItems: "center",
        gap: 4, width: "100%",
        marginTop: lineaIdx === 0 ? 0 : 18,
      }}>
        {buildGroups(linea).map((grupo, gIdx) => (
          <span key={gIdx} style={{
            whiteSpace: "nowrap",
            display: "inline-flex", alignItems: "center", gap: 2,
          }}>
            {grupo.map((p) => p.t != null
              ? <span key={p._i} style={{ padding: "0 4px" }}>{p.t}</span>
              : renderSlot(p)
            )}
          </span>
        ))}
      </div>
    ));
  };
  return (
    <div style={{ position: "relative", width: "100%", display: "flex", flexDirection: "column", alignItems: "center", gap: 36 }}>
      {/* Cartel verde con la cita */}
      <div style={{
        width: "100%", maxWidth: 430,
        background: "linear-gradient(180deg, rgba(229,252,239,0.97), rgba(200,238,220,0.92))",
        border: "3px solid #5fb878",
        borderRadius: 22,
        padding: "14px 20px 16px 20px",
        boxShadow: "0 12px 26px rgba(0,0,0,0.5), inset 0 -6px 0 rgba(95,184,120,0.25)",
        color: "#0a3a18",
        position: "relative",
      }}>
        <div style={{
          fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 14, lineHeight: 1.55,
        }}>
          {renderCita()}
        </div>
      </div>

      {/* Banco de GLOBOS — flotan con animación, todos en una sola fila */}
      <div data-qa="bandeja" style={{
        width: "fit-content", maxWidth: 440,
        background: "rgba(10,6,35,0.55)",
        border: "1.5px solid rgba(95,184,120,0.45)",
        borderRadius: 16,
        padding: "14px 14px 14px 14px",
        display: "flex", flexWrap: "nowrap", gap: 7, justifyContent: "center", alignItems: "flex-end",
        position: "relative",
      }}>
        <div style={{
          position: "absolute", top: -10, left: "50%", transform: "translateX(-50%)",
          background: "rgba(10,6,35,0.85)",
          color: "#b8efc4", padding: "2px 10px", borderRadius: 999,
          fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 9.5,
          letterSpacing: "0.1em",
          border: "1px solid rgba(95,184,120,0.5)",
        }}>🎯 GLOBOS</div>
        {ordenSignos.map((signo, idx) => {
          const isPicked = picked === signo;
          const agotado = false;  // globos ilimitados — siempre disponibles
          // Color del globo por signo (variedad visual)
          const palettes = [
            ["#fce9a8", "#d9a441", "#b48817"],
            ["#b9e3ff", "#4f9ee0", "#1466a6"],
            ["#b8efc4", "#5fb878", "#1e6e2e"],
            ["#ffb9d4", "#d94a8a", "#a31866"],
            ["#d6c7ff", "#9670d9", "#532a99"],
            ["#ffcfa3", "#d9824a", "#a3501e"],
          ];
          const pal = palettes[idx % palettes.length];
          // Animación bobbing: cada globo flota con delay distinto
          const delay = (idx * 0.18).toFixed(2) + "s";
          return (
            <div key={signo}
              className="ed-draggable ed-float-soft"
              onPointerDown={agotado ? undefined : makeDragHandler({
                item: signo,
                ghostHtml: `<div style="width:48px;height:48px;border-radius:50%;background:linear-gradient(180deg,${pal[0]},${pal[1]});border:3px solid ${pal[2]};display:flex;align-items:center;justify-content:center;font-family:Fredoka,Nunito,sans-serif;font-weight:800;font-size:24px;color:#3a2608;box-shadow:0 8px 22px rgba(0,0,0,0.5);">${signo === '"' ? '&quot;' : signo}</div>`,
                onTap: () => onPickLabel(signo),
                onDrop: (zoneId, item) => {
                  if (zoneId && zoneId.startsWith("citaslot:") && onSetPlaced) {
                    const slotIdx = parseInt(zoneId.slice("citaslot:".length), 10);
                    const next = { ...placed };
                    next[slotIdx] = item;
                    onSetPlaced(next);
                  }
                },
                disabled: locked,
              })}
              style={{
                position: "relative",
                width: 42, height: 42, borderRadius: "50%",
                background: agotado
                  ? "rgba(255,255,255,0.05)"
                  : `linear-gradient(180deg, ${pal[0]}, ${pal[1]})`,
                border: agotado
                  ? "2px dashed rgba(252,233,168,0.2)"
                  : `3px solid ${isPicked ? "#4fd8ff" : pal[2]}`,
                color: agotado ? "rgba(252,233,168,0.3)" : "#3a2608",
                fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 20,
                flexShrink: 0,
                display: "flex", alignItems: "center", justifyContent: "center",
                cursor: agotado || locked ? "default" : "grab",
                boxShadow: agotado
                  ? "none"
                  : (isPicked ? "0 0 18px rgba(79,216,255,0.7)" : "0 4px 10px rgba(0,0,0,0.4), inset 0 -3px 0 rgba(0,0,0,0.15)"),
                transform: isPicked ? "translateY(-3px) scale(1.05)" : "none",
                transition: "transform 0.18s, box-shadow 0.18s",
                userSelect: "none",
                animationDelay: delay,
              }}>
              {signo === '"' ? "”" : signo}
              {/* Cordel del globo (decoración) */}
              <span style={{
                position: "absolute", bottom: -8, left: "50%",
                width: 2, height: 8,
                background: agotado ? "rgba(252,233,168,0.15)" : pal[2],
                transform: "translateX(-50%)",
                borderRadius: 2,
                pointerEvents: "none",
              }} />
            </div>
          );
        })}
      </div>
    </div>
  );
}

// (Sin uso — sustituido por LabCitasCard, se mantiene como referencia)
function _SastreCitasCard_DEPRECATED({ pick, placed, picked, locked, onPickLabel, onPlaceIn, onSetPlaced }) {
  // Construye banda: cada signo por separado, sin duplicados removidos al usarlos (porque hay dos `"`)
  // Cuento qué slots tienen cada signo, y la bandeja muestra el restante.
  const usadosPorSigno = {};
  for (const v of Object.values(placed)) {
    usadosPorSigno[v] = (usadosPorSigno[v] || 0) + 1;
  }
  const disponiblesPorSigno = {};
  for (const s of pick.bandeja) {
    disponiblesPorSigno[s] = (disponiblesPorSigno[s] || 0) + 1;
  }

  return (
    <div style={{ position: "relative", width: "100%", height: "100%", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 22 }}>
      {/* Cartel con la frase — fit-content para que se adapte al texto. */}
      <div style={{
        width: "fit-content", maxWidth: 430,
        background: "linear-gradient(180deg, rgba(255,253,245,0.97), rgba(245,238,225,0.92))",
        border: "3px solid #f2c260",
        borderRadius: 18,
        padding: "18px 22px",
        boxShadow: "0 12px 26px rgba(0,0,0,0.5)",
        color: "#3a2608",
        display: "flex", flexWrap: "wrap", justifyContent: "center", alignItems: "center", gap: 4,
        fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 16, lineHeight: 1.6,
      }}>
        {pick.partes.map((p, i) => {
          if (p.t) {
            return <span key={i} style={{ padding: "0 4px" }}>{p.t}</span>;
          }
          // slot
          const val = placed[i];
          const expected = p.s;
          const isCorrect = locked && val === expected;
          const isWrong = locked && val && val !== expected;
          const isEmpty = locked && !val;

          let bg = "rgba(252,233,168,0.5)";
          let border = "2px dashed rgba(217,164,65,0.6)";
          let color = "#3a2608";
          if (val) {
            bg = "linear-gradient(180deg, #fce9a8, #d9a441)";
            border = "2px solid #b48817";
          }
          if (isCorrect) { bg = "rgba(46,204,143,0.5)"; border = "2px solid #2ecc8f"; }
          if (isWrong)   { bg = "rgba(255,107,107,0.5)"; border = "2px solid #ff6b6b"; }

          return (
            <span key={i}
              data-dropzone={`citaslot:${i}`}
              onClick={() => onPlaceIn(i)}
              style={{
                display: "inline-flex", alignItems: "center", justifyContent: "center",
                minWidth: 26, minHeight: 30,
                padding: "0 6px", margin: "0 1px",
                borderRadius: 8,
                background: bg, border,
                color, fontWeight: 800,
                fontFamily: "var(--ed-font-display)", fontSize: 18,
                cursor: locked ? "default" : "pointer",
                userSelect: "none",
                boxShadow: val ? "0 2px 5px rgba(0,0,0,0.25)" : "none",
                transition: "all 0.15s",
              }}>
              {val || "▢"}
              {(isWrong || isEmpty) && (
                <sup style={{ fontSize: 9, color: "#1e8a5d", marginLeft: 2, fontWeight: 800 }}>
                  ✓{expected === '"' ? "”" : expected}
                </sup>
              )}
            </span>
          );
        })}
      </div>

      {/* Bandeja con los 4 signos */}
      <div data-qa="bandeja" style={{
        width: "100%", maxWidth: 380,
        background: "rgba(10,6,35,0.55)",
        border: "1px dashed rgba(252,233,168,0.4)",
        borderRadius: 14,
        padding: "10px 12px",
        display: "flex", gap: 10, justifyContent: "center", alignItems: "center",
      }}>
        {Object.keys(disponiblesPorSigno).map((signo) => {
          const restante = disponiblesPorSigno[signo] - (usadosPorSigno[signo] || 0);
          const isPicked = picked === signo;
          if (restante <= 0) return (
            <div key={signo} style={{
              padding: "8px 14px", borderRadius: 10,
              background: "rgba(255,255,255,0.05)",
              border: "2px dashed rgba(252,233,168,0.2)",
              color: "rgba(252,233,168,0.3)",
              fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 20,
              minWidth: 50, textAlign: "center",
            }}>
              {signo === '"' ? "”" : signo}
            </div>
          );
          return (
            <div key={signo}
              className="ed-draggable"
              onPointerDown={makeDragHandler({
                item: signo,
                ghostHtml: `<div style="background:#fce9a8;color:#3a2608;padding:8px 18px;border-radius:10px;font-family:Fredoka,Nunito,sans-serif;font-weight:800;font-size:20px;border:2px solid #4fd8ff;box-shadow:0 8px 22px rgba(0,0,0,0.5);">${signo === '"' ? '&quot;' : signo}</div>`,
                onTap: () => onPickLabel(signo),
                onDrop: (zoneId, item) => {
                  if (zoneId && zoneId.startsWith("citaslot:") && onSetPlaced) {
                    const slotIdx = parseInt(zoneId.slice("citaslot:".length), 10);
                    const next = { ...placed };
                    next[slotIdx] = item;
                    onSetPlaced(next);
                  }
                },
                disabled: locked,
              })}
              style={{
                padding: "8px 14px", borderRadius: 10,
                background: isPicked ? "linear-gradient(180deg,#fce9a8,#d9a441)" : "rgba(255,255,255,0.94)",
                color: "#3a2608",
                border: `2px solid ${isPicked ? "#4fd8ff" : "rgba(242,194,96,0.6)"}`,
                fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 22,
                cursor: locked ? "default" : "grab",
                boxShadow: isPicked ? "0 0 16px rgba(79,216,255,0.65)" : "0 3px 7px rgba(0,0,0,0.3)",
                transform: isPicked ? "translateY(-2px)" : "none",
                transition: "all 0.15s",
                minWidth: 50, textAlign: "center",
                userSelect: "none",
                position: "relative",
              }}>
              {signo === '"' ? "”" : signo}
              {restante > 1 && (
                <span style={{
                  position: "absolute", top: -8, right: -8,
                  width: 22, height: 22, borderRadius: "50%",
                  background: "#4fd8ff", color: "#0a2540",
                  fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 12,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  border: "2px solid #fff",
                  boxShadow: "0 2px 5px rgba(0,0,0,0.4)",
                }}>×{restante}</span>
              )}
            </div>
          );
        })}
      </div>

    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// N2 · El narrador — 3 rondas distintas
// ─────────────────────────────────────────────────────────────
function NarradorGame({ app, setApp, go, onRestart }) {
  const char = CHARACTERS.find((c) => c.id === app.character) || CHARACTERS[0];
  const catLabel = app.currentCatLabel || "Dar vida a las historias";

  const [ronda, setRonda] = useStateG(0);

  // R1 — Laboratorio del cuentacuentos: { categoria: palabraElegida }
  const [r1Placed, setR1Placed] = useStateG({});
  const [r1Locked, setR1Locked] = useStateG(false);

  // R2 — Camino del cuentacuentos: pasoActual (0..5). En cada paso, idx elegido + locked
  const [r2Step, setR2Step] = useStateG(0);             // paso actual (0..4 piedras + 5 = ganó)
  const [r2Picks, setR2Picks] = useStateG([]);          // {pasoIdx, idxElegido, ok}
  const [r2Locked, setR2Locked] = useStateG(false);

  // R3 — Ordena el cuento: { slotIdx (1..5): fraseId }
  const [r3Orden, setR3Orden] = useStateG({});
  const [r3Locked, setR3Locked] = useStateG(false);

  // Picks — FIFO con anti-repetición por categoría (estándar 12): bloqueamos solo
  // las últimas floor(N/2) usadas de este prefijo, donde N = tamaño del banco. Así
  // el pool nunca se vacía mientras queden opciones frescas y el nuevo pick difiere
  // de las últimas ~floor(N/2) jugadas.
  function pickWithFIFO(bank, prefix) {
    const windowN = Math.floor(bank.length / 2);
    const recentIds = getRecent("narrador")
      .filter((k) => k.startsWith(prefix))
      .map((k) => k.slice(prefix.length));
    const blocked = new Set(recentIds.slice(0, windowN));
    let pool = bank.filter((p) => !blocked.has(p.id));
    if (pool.length < 1) pool = bank;
    const p = pool[Math.floor(Math.random() * pool.length)];
    pushRecent("narrador", prefix + p.id);
    return p;
  }

  const [r1Pick] = useStateG(() => pickWithFIFO(LAB_BANK,    "lab:"));
  const [r2Pick] = useStateG(() => pickWithFIFO(CAMINO_BANK, "cam:"));
  const [r3Pick] = useStateG(() => pickWithFIFO(ORDEN_BANK,  "ord:"));
  // Frases mezcladas (banco visible) — el niño las arrastra a los slots 1..5
  const [r3FrasesShuffled] = useStateG(() => shuffle(r3Pick.frases));

  // Shell state
  const [elapsed, setElapsed] = useStateG(0);
  const [stars, setStars] = useStateG(0);
  const [solved, setSolved] = useStateG(0);
  const [attempted, setAttempted] = useStateG(0);
  const [starsSession, setStarsSession] = useStateG(0);
  const [feedback, setFeedback] = useStateG(null);
  const [feedbackMsg, setFeedbackMsg] = useStateG("");
  const [confirmingRestart, setConfirmingRestart] = useStateG(false);
  const [confirmingExit, setConfirmingExit] = useStateG(false);
  const [log, setLog] = useStateG([]);
  const started = useRefG(Date.now());
  const exerciseStart = useRefG(Date.now());

  useEffectG(() => {
    const id = setInterval(() => setElapsed(Math.floor((Date.now() - started.current) / 1000)), 500);
    return () => clearInterval(id);
  }, []);

  useEffectG(() => {
    window.__currentChalkGlyphs = [
      { c: "📖", l: "6%",  t: "12%", r: "-8deg" },
      { c: "🗣", l: "82%", t: "16%", r: "6deg",  s: "0.6em" },
      { c: "💬", l: "10%", t: "78%", r: "12deg", s: "0.65em" },
      { c: "✨", l: "88%", t: "72%", r: "-10deg", s: "0.55em" },
      { c: "👤", l: "45%", t: "8%",  r: "4deg",  s: "0.55em" },
      { c: "📍", l: "3%",  t: "45%", r: "-4deg", s: "0.55em" },
      { c: "🎭", l: "92%", t: "45%", r: "8deg",  s: "0.5em" },
      { c: "?",  l: "30%", t: "55%", r: "-6deg", s: "0.6em" },
      { c: "→",  l: "70%", t: "62%", r: "8deg",  s: "0.6em" },
      { c: "★",  l: "55%", t: "30%", r: "-4deg", s: "0.5em" },
    ];
    return () => { window.__currentChalkGlyphs = null; };
  }, []);

  // R1 — todos los 3 huecos del cuento llenos
  const r1AllPlaced = r1Pick.frases.every((f) => r1Placed[f.categoria]);
  // R2 — el camino llega al final cuando se completaron los 5 pasos
  const r2Done = r2Step >= r2Pick.pasos.length;
  // R3 — todos los 5 slots están llenos
  const r3AllPlaced = [1, 2, 3, 4, 5].every((s) => r3Orden[s]);

  const canVerify =
    ronda === 0 ? (r1AllPlaced && !r1Locked) :
    ronda === 1 ? (r2Done && !r2Locked) :
    ronda === 2 ? (r3AllPlaced && !r3Locked) :
    false;
  const showErase = true;

  function handleVerify() {
    if (!canVerify) return;
    if (ronda === 0) {
      setR1Locked(true);
      let correct = true;
      for (const f of r1Pick.frases) {
        if (r1Placed[f.categoria] !== f.correcta) { correct = false; break; }
      }
      const userText = r1Pick.frases.map((f) => `${f.categoria}: ${r1Placed[f.categoria] || "?"}`).join(" · ");
      const correctText = r1Pick.frases.map((f) => `${f.categoria}: ${f.correcta}`).join(" · ");
      setTimeout(() => answer(correct, userText, correctText, "🧪"), correct ? 350 : 2500);
    } else if (ronda === 1) {
      setR2Locked(true);
      // El correct se computa por la cantidad de pasos acertados en primera elección
      const aciertos = r2Picks.filter((p) => p.ok).length;
      const correct = aciertos === r2Pick.pasos.length;
      const userText = r2Pick.pasos.map((p, i) => {
        const elegido = r2Picks.find((x) => x.pasoIdx === i);
        return `${p.elemento}: ${elegido ? p.opciones[elegido.idxElegido] : "?"}`;
      }).join(" → ");
      const correctText = r2Pick.pasos.map((p) => `${p.elemento}: ${p.opciones[p.correctaIdx]}`).join(" → ");
      setTimeout(() => answer(correct, userText, correctText, "🪜"), correct ? 350 : 2500);
    } else if (ronda === 2) {
      setR3Locked(true);
      let correct = true;
      for (let s = 1; s <= 5; s++) {
        const fraseId = r3Orden[s];
        const frase = r3Pick.frases.find((f) => f.id === fraseId);
        if (!frase || frase.orden !== s) { correct = false; break; }
      }
      const userText = [1, 2, 3, 4, 5].map((s) => {
        const fid = r3Orden[s];
        const f = r3Pick.frases.find((x) => x.id === fid);
        return `${s}. ${f ? f.texto : "?"}`;
      }).join(" | ");
      const correctText = [1, 2, 3, 4, 5].map((s) => {
        const f = r3Pick.frases.find((x) => x.orden === s);
        return `${s}. ${f.texto}`;
      }).join(" | ");
      setTimeout(() => answer(correct, userText, correctText, "📖"), correct ? 350 : 2500);
    }
  }

  function handleErase() {
    if (ronda === 0) { if (r1Locked) return; setR1Placed({}); }
    else if (ronda === 1) {
      if (r2Locked) return;
      setR2Step(0); setR2Picks([]);
    }
    else if (ronda === 2) {
      if (r3Locked) return;
      setR3Orden({});
    }
  }

  function answer(isCorrect, userText, correctText, opIcon) {
    if (typeof window.markFirstAttempt === "function") window.markFirstAttempt();
    const exerciseSec = Math.max(0, Math.floor((Date.now() - exerciseStart.current) / 1000));
    const earned = calcStars(isCorrect, exerciseSec);
    const newAttempted = attempted + 1;
    const newSolved = solved + (isCorrect ? 1 : 0);
    const newStarsTotal = stars + earned;
    const newStarsSession = starsSession + earned;

    const entry = {
      idx: newAttempted,
      a: correctText, b: userText, op: opIcon || "·",
      correctAnswer: correctText, userAnswer: userText,
      isCorrect, time: exerciseSec, earned,
    };
    const newLog = [...log, entry];

    setFeedback(isCorrect ? "ok" : "err");
    setFeedbackMsg(isCorrect ? `+${earned} ⭐` : ENCOURAGEMENTS[Math.floor(Math.random() * ENCOURAGEMENTS.length)]);
    setAttempted(newAttempted);
    setSolved(newSolved);
    setStars(newStarsTotal);
    setStarsSession(newStarsSession);
    setLog(newLog);

    const wait = isCorrect ? 950 : 1400;
    setTimeout(() => {
      setFeedback(null);
      setFeedbackMsg("");
      if (newAttempted >= 3) {
        setApp((s) => ({
          ...s, stars: newStarsTotal,
          lastResult: { category: catLabel, solved: newSolved, total: 3, time: elapsed, starsEarned: newStarsSession, log: newLog },
        }));
        window.incrementGamesCompleted && window.incrementGamesCompleted();
        go("results");
      } else {
        setRonda((r) => r + 1);
        exerciseStart.current = Date.now();
      }
    }, wait);
  }

  // Enunciado = QUÉ hacer (objetivo curricular). Bocadillo = CÓMO (mecánica, estático).
  const enunciado =
    ronda === 0 ? "Completa el cuento con las palabras mágicas." :
    ronda === 1 ? "Avanza por el camino reconociendo cada parte del cuento." :
    "Ordena las frases del cuento del 1 al 5.";

  const bocadillo =
    ronda === 0 ? "Arrastra una palabra de cada caja a su espacio." :
    ronda === 1 ? "Elige la frase que pertenece a cada elemento." :
    "Arrastra cada frase al número que le toca.";

  // Por ronda: dónde está el enunciado y dónde arranca la zona-central.
  // Enunciados de 2 líneas (R1, R2) necesitan más aire abajo; R3 cabe en 1 línea.
  const enunciadoTop =
    ronda === 0 ? 105 :  // R1 receta + 3 frascos
    ronda === 1 ? 105 :  // R2 camino con piedras
    105;                 // R3 cuento + 3 cajas de tono
  const zonaCentralTop =
    ronda === 0 ? 160 :  // R1: enunciado 2 líneas → cartel parte en 160
    ronda === 1 ? 160 :  // R2: enunciado 2 líneas → camino parte en 160
    150;                 // R3: enunciado 1 línea → frases parten en 150

  return (
    <div style={{ position: "absolute", inset: 0, overflow: "hidden" }}>
      <GameHUD elapsed={elapsed} stars={stars} attempted={attempted} solved={solved} total={3} app={app} setApp={setApp} />
      <CharacterCorner char={char} message={bocadillo} />
      <GameEnunciado text={enunciado} top={enunciadoTop} />

      <div data-qa="zona-central" style={{
        position: "absolute", top: zonaCentralTop, left: "50%", transform: "translateX(-50%)",
        width: 440,
        // height auto: el contenido manda su altura, sin huecos forzados
      }}>
        {ronda === 0 && (
          <LaboratorioCuentacuentosCard
            pick={r1Pick}
            placed={r1Placed}
            locked={r1Locked}
            onPlace={(categoria, palabra) => {
              if (r1Locked) return;
              setR1Placed({ ...r1Placed, [categoria]: palabra });
            }}
            onClear={(categoria) => {
              if (r1Locked) return;
              const next = { ...r1Placed };
              delete next[categoria];
              setR1Placed(next);
            }}
          />
        )}
        {ronda === 1 && (
          <CaminoNarradorCard
            pick={r2Pick}
            step={r2Step}
            picks={r2Picks}
            locked={r2Locked}
            char={char}
            onChoose={(idxElegido) => {
              if (r2Locked || r2Step >= r2Pick.pasos.length) return;
              const pasoActual = r2Pick.pasos[r2Step];
              const ok = idxElegido === pasoActual.correctaIdx;
              const nuevaPick = { pasoIdx: r2Step, idxElegido, ok };
              setR2Picks([...r2Picks, nuevaPick]);
              if (ok) setR2Step(r2Step + 1);
            }}
          />
        )}
        {ronda === 2 && (
          <OrdenaCuentoCard
            pick={r3Pick}
            frases={r3FrasesShuffled}
            orden={r3Orden}
            locked={r3Locked}
            onPlace={(slot, fraseId) => {
              if (r3Locked) return;
              const next = { ...r3Orden };
              for (const s of Object.keys(next)) {
                if (next[s] === fraseId) delete next[s];
              }
              next[slot] = fraseId;
              setR3Orden(next);
            }}
            onClear={(slot) => {
              if (r3Locked) return;
              const next = { ...r3Orden };
              delete next[slot];
              setR3Orden(next);
            }}
          />
        )}
      </div>

      <ActionRail
        canVerify={canVerify}
        onVerify={handleVerify}
        showErase={showErase}
        onErase={handleErase}
        onRestart={() => setConfirmingRestart(true)}
        onExit={() => setConfirmingExit(true)}
      />

      <FeedbackOverlay feedback={feedback} feedbackMsg={feedbackMsg} charName={char.name} />
      <RestartModal confirmingExit={confirmingRestart} setConfirmingExit={setConfirmingRestart} attempted={attempted} total={3} onRestart={onRestart} />
      <ExitModal confirmingExit={confirmingExit} setConfirmingExit={setConfirmingExit} attempted={attempted} total={3} onExit={() => go("home")} />
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// N2 · R1 — Laboratorio del cuentacuentos
// 3 frases del cuento con huecos por categoría. 3 frascos abajo con palabras
// agrupadas por tipo (tiempo, sonido, color). El niño arrastra UNA palabra
// de cada frasco a su hueco. Si una palabra ya está colocada, se puede
// arrastrar de vuelta al frasco o reemplazar.
// ─────────────────────────────────────────────────────────────
const CATEGORIAS = {
  tiempo: { icono: "🕰️",  label: "TIEMPO",   color: "#ffb87a", border: "#a3501e", ink: "#3a2608" },
  sonido: { icono: "🔊",  label: "SONIDO",   color: "#b9e3ff", border: "#1466a6", ink: "#0a2540" },
  color:  { icono: "🎨",  label: "COLOR",    color: "#d6c7ff", border: "#532a99", ink: "#1a0a3a" },
};

function LaboratorioCuentacuentosCard({ pick, placed, locked, onPlace, onClear }) {
  const renderHueco = (categoria) => {
    const cfg = CATEGORIAS[categoria];
    const val = placed[categoria];
    const correcta = pick.frases.find((f) => f.categoria === categoria).correcta;
    const isCorrect = locked && val === correcta;
    const isWrong = locked && val && val !== correcta;
    const isEmpty = locked && !val;
    const isFilled = val != null && !locked;
    return (
      <span
        data-dropzone={`hueco:${categoria}`}
        className={isFilled ? "ed-draggable" : ""}
        onClick={!isFilled ? undefined : undefined}
        onPointerDown={isFilled ? makeDragHandler({
          item: val,
          ghostHtml: `<div style="padding:4px 11px;border-radius:8px;background:${cfg.color};color:${cfg.ink};border:2px solid ${cfg.border};font-family:Fredoka,Nunito,sans-serif;font-weight:800;font-size:13px;box-shadow:0 8px 18px rgba(0,0,0,0.45);white-space:nowrap;">${val}</div>`,
          onTap: () => onClear(categoria),
          onDrop: (zoneId) => {
            if (zoneId && zoneId.startsWith("hueco:")) {
              const otraCat = zoneId.slice("hueco:".length);
              if (otraCat === categoria) return;
              onClear(categoria);
              onPlace(otraCat, val);
            }
          },
          disabled: locked,
        }) : undefined}
        style={{
          display: "inline-flex", alignItems: "center", justifyContent: "center",
          minWidth: 92, minHeight: 24,
          padding: "2px 8px", margin: "0 2px",
          borderRadius: 7,
          background: isCorrect ? "rgba(46,204,143,0.55)"
            : isWrong ? "rgba(255,107,107,0.5)"
            : val ? cfg.color
            : "rgba(255,255,255,0.6)",
          color: val ? cfg.ink : "rgba(58,38,8,0.5)",
          border: `2px ${val ? "solid" : "dashed"} ${isCorrect ? "#2ecc8f" : isWrong ? "#ff6b6b" : cfg.border}`,
          fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 12,
          cursor: locked ? "default" : (isFilled ? "grab" : "default"),
          userSelect: "none",
          touchAction: isFilled ? "none" : "auto",
          verticalAlign: "middle",
        }}>
        {val || `${cfg.icono} ___`}
        {isWrong && (
          <sup style={{ fontSize: 8, marginLeft: 3, color: "#1e8a5d", fontWeight: 900 }}>✓{correcta}</sup>
        )}
      </span>
    );
  };

  return (
    <div style={{ position: "relative", width: "100%", display: "flex", flexDirection: "column", alignItems: "center", gap: 14 }}>
      {/* Cartel del cuento con huecos */}
      <div style={{
        width: "100%", maxWidth: 430,
        background: "linear-gradient(180deg, rgba(255,253,245,0.97), rgba(245,238,225,0.92))",
        border: "3px solid #f2c260",
        borderRadius: 14, padding: "10px 14px 12px 14px",
        boxShadow: "0 10px 22px rgba(0,0,0,0.45)",
        color: "#3a2608",
      }}>
        <div style={{
          fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 10.5,
          color: "#7a4a0e", letterSpacing: "0.1em",
          textAlign: "center", marginBottom: 6,
          textTransform: "uppercase",
        }}>
          📜 {pick.titulo}
        </div>
        <div style={{
          fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 12.5, lineHeight: 1.6,
          textAlign: "center",
        }}>
          {pick.frases.map((f, idx) => (
            <div key={idx} style={{ marginBottom: idx < pick.frases.length - 1 ? 6 : 0 }}>
              {f.texto.split("___").map((seg, i, arr) => (
                <React.Fragment key={i}>
                  <span>{seg}</span>
                  {i < arr.length - 1 && renderHueco(f.categoria)}
                </React.Fragment>
              ))}
            </div>
          ))}
        </div>
      </div>

      {/* 3 frascos */}
      <div style={{ display: "flex", gap: 8, width: "100%", justifyContent: "center" }}>
        {Object.keys(CATEGORIAS).map((cat) => {
          const cfg = CATEGORIAS[cat];
          const palabras = pick.frascos[cat];
          const usada = placed[cat];
          return (
            <div key={cat}
              data-dropzone={`hueco:${cat}`}
              style={{
                width: 132, minHeight: 110,
                background: `linear-gradient(180deg, ${cfg.color}cc, ${cfg.color}66)`,
                border: `2.5px solid ${cfg.border}`,
                borderRadius: 12, padding: "6px 8px 8px 8px",
                display: "flex", flexDirection: "column", alignItems: "center", gap: 4,
                position: "relative", boxSizing: "border-box",
              }}>
              <div style={{
                fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 10,
                color: cfg.ink, letterSpacing: "0.08em",
                display: "flex", alignItems: "center", gap: 3,
              }}>
                <span style={{ fontSize: 13 }}>{cfg.icono}</span>{cfg.label}
              </div>
              <div style={{
                width: "100%", display: "flex", flexWrap: "wrap", gap: 4, justifyContent: "center", alignItems: "center",
              }}>
                {palabras.map((p) => {
                  if (p === usada) return null;
                  return (
                    <div key={p}
                      className="ed-draggable ed-float-soft"
                      onPointerDown={locked ? undefined : makeDragHandler({
                        item: p,
                        ghostHtml: `<div style="padding:5px 11px;border-radius:8px;background:${cfg.color};color:${cfg.ink};border:2px solid ${cfg.border};font-family:Fredoka,Nunito,sans-serif;font-weight:800;font-size:12px;box-shadow:0 10px 22px rgba(0,0,0,0.55);white-space:nowrap;">${p}</div>`,
                        onTap: () => { if (!placed[cat]) onPlace(cat, p); },
                        onDrop: (zoneId) => {
                          if (zoneId && zoneId.startsWith("hueco:")) {
                            const destinoCat = zoneId.slice("hueco:".length);
                            onPlace(destinoCat, p);
                          }
                        },
                        disabled: locked,
                      })}
                      style={{
                        padding: "3px 9px", borderRadius: 7,
                        background: "rgba(255,255,255,0.92)",
                        border: `2px solid ${cfg.border}`,
                        color: cfg.ink,
                        fontFamily: "var(--ed-font-display)", fontWeight: 700, fontSize: 11,
                        cursor: locked ? "default" : "grab",
                        boxShadow: "0 2px 4px rgba(0,0,0,0.25)",
                        userSelect: "none", touchAction: "none",
                        animationDelay: `${(palabras.indexOf(p) * 0.2) % 1.4}s`,
                      }}>{p}</div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// N2 · R2 — Camino del cuentacuentos (Personaje avanza)
// 5 piedras en columna: lugar → personajes → conflicto → acciones → final.
// En cada piedra, 3 frases del cuento. El niño elige la correcta.
// Acertar → el personaje salta a la próxima piedra. Fallar → reintenta.
// ─────────────────────────────────────────────────────────────
const ELEMENTOS = {
  lugar:      { icono: "📍", label: "LUGAR",        color: "#7ab8ff", ink: "#08264d" },
  personajes: { icono: "👤", label: "PERSONAJES",   color: "#ffb87a", ink: "#3a2608" },
  conflicto:  { icono: "❗",  label: "CONFLICTO",    color: "#ff8ab4", ink: "#5c1f3a" },
  acciones:   { icono: "🏃", label: "ACCIONES",     color: "#c39cff", ink: "#2a0a4a" },
  resolucion: { icono: "✨", label: "FINAL",        color: "#9ee0a3", ink: "#0a3a18" },
};

function CaminoNarradorCard({ pick, step, picks, locked, char, onChoose }) {
  const totalPasos = pick.pasos.length;
  const pasoActual = step < totalPasos ? pick.pasos[step] : null;
  const meta = step >= totalPasos;
  const pickActual = picks.filter((p) => p.pasoIdx === step);

  return (
    <div style={{ position: "relative", width: "100%", display: "flex", flexDirection: "column", alignItems: "center", gap: 20 }}>
      {/* Título del cuento + camino visual */}
      <div style={{
        fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 11,
        color: "#fce9a8", letterSpacing: "0.1em", textTransform: "uppercase",
        background: "rgba(10,6,35,0.55)", padding: "3px 14px", borderRadius: 999,
        border: "1px solid rgba(242,194,96,0.5)",
      }}>
        📜 {pick.titulo}
      </div>

      {/* Camino con 5 piedras + personaje */}
      <div style={{
        display: "flex", alignItems: "center", justifyContent: "center", gap: 4,
        width: "100%",
      }}>
        {pick.pasos.map((p, i) => {
          const cfg = ELEMENTOS[p.elemento];
          const done = i < step;
          const active = i === step && !meta;
          return (
            <React.Fragment key={i}>
              <div style={{
                width: 50, height: 50, borderRadius: 12,
                background: done ? `linear-gradient(180deg, ${cfg.color}, ${cfg.color}88)` : active ? "linear-gradient(180deg,#fce9a8,#d9a441)" : "rgba(10,6,35,0.5)",
                border: `2.5px solid ${done ? cfg.ink : active ? "#4fd8ff" : "rgba(255,255,255,0.25)"}`,
                color: done ? cfg.ink : active ? "#3a2608" : "rgba(255,255,255,0.4)",
                display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
                fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 9,
                boxShadow: active ? "0 0 16px rgba(79,216,255,0.7)" : done ? "0 3px 7px rgba(0,0,0,0.4)" : "none",
                transform: active ? "translateY(-3px)" : "none",
                transition: "all 0.3s",
                position: "relative",
              }}>
                <span style={{ fontSize: 18, lineHeight: 1 }}>{cfg.icono}</span>
                <span style={{ fontSize: 7, letterSpacing: "0.04em", marginTop: 1 }}>{cfg.label}</span>
                {active && (
                  <div style={{
                    position: "absolute", bottom: -34, left: "50%", transform: "translateX(-50%)",
                    fontSize: 22, lineHeight: 1,
                    filter: "drop-shadow(0 2px 4px rgba(0,0,0,0.4))",
                  }}>🚶</div>
                )}
              </div>
              {i < pick.pasos.length - 1 && (
                <div style={{
                  flex: "0 0 8px", height: 3,
                  background: done ? "linear-gradient(90deg,#fce9a8,#d9a441)" : "rgba(255,255,255,0.18)",
                  borderRadius: 2,
                }} />
              )}
            </React.Fragment>
          );
        })}
      </div>

      {/* Caja de opciones del paso actual */}
      {!meta && (
        <div style={{
          width: "100%", maxWidth: 430, marginTop: 38,
          background: "linear-gradient(180deg, rgba(255,253,245,0.97), rgba(245,238,225,0.92))",
          border: "3px solid #f2c260",
          borderRadius: 14, padding: "12px 14px 14px 14px",
          boxShadow: "0 10px 22px rgba(0,0,0,0.45)",
          color: "#3a2608",
        }}>
          <div style={{
            fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 11,
            color: "#7a4a0e", textAlign: "center", marginBottom: 6,
            letterSpacing: "0.04em",
          }}>
            ¿Qué frase pertenece a <span style={{ background: ELEMENTOS[pasoActual.elemento].color, color: ELEMENTOS[pasoActual.elemento].ink, padding: "1px 6px", borderRadius: 4 }}>
              {ELEMENTOS[pasoActual.elemento].icono} {ELEMENTOS[pasoActual.elemento].label}
            </span>?
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
            {pasoActual.opciones.map((op, idx) => {
              const elegidoFallido = pickActual.find((x) => x.idxElegido === idx && !x.ok);
              return (
                <button key={idx}
                  onClick={() => !locked && onChoose(idx)}
                  disabled={locked || !!elegidoFallido}
                  style={{
                    width: "100%", textAlign: "left",
                    padding: "6px 10px", borderRadius: 9,
                    background: elegidoFallido ? "rgba(255,107,107,0.35)" : "rgba(255,255,255,0.92)",
                    border: `2px solid ${elegidoFallido ? "#ff6b6b" : "#f2c260"}`,
                    color: "#3a2608",
                    fontFamily: "var(--ed-font-display)", fontWeight: 600, fontSize: 11.5, lineHeight: 1.3,
                    cursor: (locked || elegidoFallido) ? "default" : "pointer",
                    opacity: elegidoFallido ? 0.6 : 1,
                    transition: "all 0.18s",
                  }}>
                  {elegidoFallido && "❌ "}{op}
                </button>
              );
            })}
          </div>
        </div>
      )}

      {/* Meta alcanzada */}
      {meta && (
        <div style={{
          marginTop: 16,
          fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 14,
          color: "#3a2608",
          background: "linear-gradient(180deg, #fce9a8, #f2c260)",
          border: "2px solid #d9a441",
          borderRadius: 12, padding: "8px 16px",
          boxShadow: "0 4px 16px rgba(252,233,168,0.45)",
        }}>
          ✨ ¡Llegaste al final! Pulsa ¡VERIFICAR!
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// N2 · R3 — Ordena el cuento
// El niño recibe 5 frases desordenadas y 5 slots numerados (1..5).
// Arrastra cada frase al número que le corresponde para reconstruir
// el cuento en su orden cronológico.
// ─────────────────────────────────────────────────────────────
function OrdenaCuentoCard({ pick, frases, orden, locked, onPlace, onClear }) {
  const SLOTS = [1, 2, 3, 4, 5];
  // Frases que aún no están en ningún slot
  const placedIds = new Set(SLOTS.map((s) => orden[s]).filter(Boolean));
  const bankFrases = frases.filter((f) => !placedIds.has(f.id));

  const renderChip = (f, fromSlot) => {
    return (
      <div key={f.id + (fromSlot ? "-s" + fromSlot : "-b")}
        className={!locked ? "ed-draggable" : ""}
        onPointerDown={locked ? undefined : makeDragHandler({
          item: f.id,
          ghostHtml: `<div style="padding:5px 10px;border-radius:9px;background:rgba(255,255,255,0.96);color:#3a2608;border:2px solid #f2c260;font-family:Fredoka,Nunito,sans-serif;font-weight:600;font-size:11px;max-width:330px;box-shadow:0 10px 22px rgba(0,0,0,0.55);">${f.texto}</div>`,
          onTap: () => { if (fromSlot) onClear(fromSlot); },
          onDrop: (zoneId) => {
            if (zoneId && zoneId.startsWith("slot:")) {
              const destino = parseInt(zoneId.slice("slot:".length), 10);
              onPlace(destino, f.id);
            } else if (zoneId === "bank" && fromSlot) {
              onClear(fromSlot);
            }
          },
          disabled: locked,
        })}
        style={{
          background: "rgba(255,255,255,0.94)",
          color: "#3a2608",
          border: "2px solid #f2c260",
          borderRadius: 9, padding: "4px 8px",
          cursor: locked ? "default" : "grab",
          fontFamily: "var(--ed-font-display)", fontWeight: 600, fontSize: 11, lineHeight: 1.2,
          boxShadow: "0 2px 5px rgba(0,0,0,0.25)",
          userSelect: "none", touchAction: "none",
          flex: "0 0 auto",
        }}>
        {f.texto}
      </div>
    );
  };

  const renderSlot = (s) => {
    const fraseId = orden[s];
    const frase = fraseId ? frases.find((f) => f.id === fraseId) : null;
    const isCorrect = locked && frase && frase.orden === s;
    const isWrong = locked && frase && frase.orden !== s;
    const correctFrase = locked ? frases.find((f) => f.orden === s) : null;

    return (
      <div key={s}
        data-dropzone={`slot:${s}`}
        style={{
          display: "flex", alignItems: "center", gap: 7,
          minHeight: 30,
          background: isCorrect ? "linear-gradient(180deg, rgba(46,204,143,0.30), rgba(255,255,255,0.92))"
            : isWrong ? "linear-gradient(180deg, rgba(255,107,107,0.28), rgba(255,255,255,0.92))"
            : frase ? "rgba(252,233,168,0.55)"
            : "rgba(255,255,255,0.10)",
          border: `2px ${frase ? "solid" : "dashed"} ${isCorrect ? "#2ecc8f" : isWrong ? "#ff6b6b" : frase ? "#f2c260" : "rgba(252,233,168,0.55)"}`,
          borderRadius: 9, padding: "3px 8px 3px 5px",
          boxSizing: "border-box",
        }}>
        <div style={{
          flex: "0 0 auto",
          width: 22, height: 22, borderRadius: "50%",
          background: isCorrect ? "#2ecc8f" : isWrong ? "#ff6b6b" : "#0a0623",
          color: "#fff", border: "2px solid #fce9a8",
          display: "flex", alignItems: "center", justifyContent: "center",
          fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 12,
        }}>{s}</div>
        <div style={{ flex: 1, minWidth: 0 }}>
          {frase ? (
            <div
              className={!locked ? "ed-draggable" : ""}
              onPointerDown={locked ? undefined : makeDragHandler({
                item: frase.id,
                ghostHtml: `<div style="padding:5px 10px;border-radius:9px;background:rgba(255,255,255,0.96);color:#3a2608;border:2px solid #f2c260;font-family:Fredoka,Nunito,sans-serif;font-weight:600;font-size:11px;max-width:330px;box-shadow:0 10px 22px rgba(0,0,0,0.55);">${frase.texto}</div>`,
                onTap: () => onClear(s),
                onDrop: (zoneId) => {
                  if (zoneId && zoneId.startsWith("slot:")) {
                    const destino = parseInt(zoneId.slice("slot:".length), 10);
                    onPlace(destino, frase.id);
                  } else if (zoneId === "bank") {
                    onClear(s);
                  }
                },
                disabled: locked,
              })}
              style={{
                color: "#3a2608",
                fontFamily: "var(--ed-font-display)", fontWeight: 600, fontSize: 11, lineHeight: 1.2,
                cursor: locked ? "default" : "grab",
                userSelect: "none", touchAction: "none",
              }}>
              {frase.texto}
            </div>
          ) : (
            <div style={{
              color: "rgba(252,233,168,0.55)",
              fontFamily: "var(--ed-font-display)", fontWeight: 600, fontSize: 10.5, fontStyle: "italic",
            }}>arrastra una frase aquí…</div>
          )}
        </div>
        {isWrong && correctFrase && (
          <div style={{
            flex: "0 0 auto",
            background: "#2ecc8f", color: "#fff",
            padding: "1px 6px", borderRadius: 999,
            fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 9,
          }}>
            ✓
          </div>
        )}
      </div>
    );
  };

  return (
    <div style={{ position: "relative", width: "100%", display: "flex", flexDirection: "column", alignItems: "center", gap: 8 }}>
      {/* Título del cuento */}
      <div style={{
        fontFamily: "var(--ed-font-display)", fontWeight: 800, fontSize: 11,
        color: "#fce9a8", letterSpacing: "0.1em", textTransform: "uppercase",
        background: "rgba(10,6,35,0.55)", padding: "3px 14px", borderRadius: 999,
        border: "1px solid rgba(242,194,96,0.5)",
      }}>
        📖 {pick.titulo}
      </div>

      {/* 5 slots numerados */}
      <div style={{
        width: "100%", maxWidth: 430,
        display: "flex", flexDirection: "column", gap: 4,
      }}>
        {SLOTS.map((s) => renderSlot(s))}
      </div>

      {/* Banco de frases sin colocar (dropzone para devolver al banco) */}
      {!locked && bankFrases.length > 0 && (
        <div
          data-dropzone="bank"
          style={{
            width: "100%", maxWidth: 430, marginTop: 2,
            background: "rgba(10,6,35,0.35)",
            border: "1.5px dashed rgba(252,233,168,0.45)",
            borderRadius: 10, padding: "5px 7px",
            display: "flex", flexDirection: "column", gap: 4,
          }}>
          {bankFrases.map((f) => renderChip(f, null))}
        </div>
      )}
    </div>
  );
}

}

// app.jsx — Shell de producción EDINUN GAMES.
// Enrutador por estado y device stage adaptativo (desktop / tablet / mobile).
// Móvil portrait: el contenido NUNCA rota; un overlay BLOQUEANTE obliga
// al usuario a girar físicamente el teléfono antes de poder usar la app.

const { useState: useStateA, useEffect: useEffectA, useRef: useRefA } = React;

// ─────────────────────────────────────────────────────────────
// useViewportSize — devuelve el tamaño REAL visible del viewport.
//
// En iOS Safari (y otros mobile browsers), `window.innerHeight` y `100vh`
// reportan la altura de la ventana INCLUYENDO la URL bar, así que el
// contenido escalado a esa altura termina parcialmente fuera de pantalla
// (ej: el numpad del juego queda debajo del fondo visible). La Visual
// Viewport API reporta el área verdaderamente visible y se actualiza
// cuando la URL bar se muestra/oculta.
// ─────────────────────────────────────────────────────────────
// Detección de "resize REAL" vs "zoom del navegador".
//
// Idea: el tamaño FÍSICO de la zona visible en píxeles del display es
// invariante al ctrl+rueda. Cuando subes el zoom de 100 % a 500 %:
//   · innerWidth en CSS-px se divide entre 5
//   · devicePixelRatio se multiplica por 5
//   · innerWidth × devicePixelRatio queda igual ⇒ NO hubo resize real.
//
// Cuando arrastras la esquina de la ventana o rotas el dispositivo:
//   · innerWidth en CSS-px cambia
//   · devicePixelRatio NO cambia
//   · innerWidth × devicePixelRatio cambia ⇒ SÍ hubo resize real.
//
// Por eso comparamos contra `innerWidth × devicePixelRatio` y solo
// actualizamos el state cuando ese producto cambia. Así el lienzo se
// queda con su tamaño CSS previo durante el zoom y el navegador lo
// amplifica visualmente — junto con los glifos, que ya leen `glyphSize`
// del mismo state defendido (ver DeviceStage).
//
// La defensa anterior (tracker de _lastDPR) era frágil: se actualizaba
// en CADA evento, así que si el navegador disparaba dos resize seguidos
// para la misma acción de zoom, el segundo veía el dpr ya guardado y
// recalculaba el tamaño con el viewport pequeño. Esto causaba que los
// glifos quedaran enormes mientras el lienzo se recomprimía.
function physicalSize() {
  if (typeof window === "undefined") return { w: 0, h: 0 };
  const dpr = window.devicePixelRatio || 1;
  return { w: window.innerWidth * dpr, h: window.innerHeight * dpr };
}
let _lastPhysical = physicalSize();

function useViewportSize() {
  const [size, setSize] = useStateA(() => readSize());
  useEffectA(() => {
    function onChange() {
      const phys = physicalSize();
      // Tolerancia de 4 px reales para absorber redondeos del navegador.
      if (Math.abs(phys.w - _lastPhysical.w) < 4 && Math.abs(phys.h - _lastPhysical.h) < 4) {
        // Mismo display, distinto zoom — no actualizamos el state.
        return;
      }
      _lastPhysical = phys;
      setSize(readSize());
    }
    window.addEventListener("resize", onChange);
    window.addEventListener("orientationchange", onChange);
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", onChange);
    }
    return () => {
      window.removeEventListener("resize", onChange);
      window.removeEventListener("orientationchange", onChange);
      if (window.visualViewport) {
        window.visualViewport.removeEventListener("resize", onChange);
      }
    };
  }, []);
  return size;
}
function readSize() {
  if (typeof window === "undefined") return { vw: 0, vh: 0 };
  const vv = window.visualViewport;
  // Cuando el usuario hace pinch-zoom, vv.scale > 1 y vv.width/height
  // reflejan la región visible (más pequeña). Usar esos valores haría
  // que la escala del lienzo se reduzca al hacer zoom — exactamente lo
  // contrario de lo que el usuario quiere. Solo confiamos en vv cuando
  // scale ≈ 1 (sin zoom) — ahí da una lectura más fiel que innerWidth/
  // Height en iOS Safari (descuenta correctamente la URL bar visible).
  if (vv && Math.abs(vv.scale - 1) < 0.05) {
    return { vw: vv.width, vh: vv.height };
  }
  return { vw: window.innerWidth, vh: window.innerHeight };
}

// ─────────────────────────────────────────────────────────────
// DeviceStage — escala el lienzo lógico 900×540 (paisaje) al viewport.
//
// Reglas:
//   · Desktop / tablet: sin marco, sin notch, fondo cósmico edge-to-edge.
//   · Mobile portrait: lienzo letterboxed Y overlay BLOQUEANTE "Gira el
//     teléfono". El contenido del juego no es accesible hasta que rote.
//   · Mobile landscape: lienzo escalado al viewport visible (visualViewport,
//     no innerHeight, para no clippearse debajo de la URL bar de iOS).
// ─────────────────────────────────────────────────────────────
function DeviceStage({ children, variant = "cosmic" }) {
  const W = 900, H = 540;
  const { vw, vh } = useViewportSize();
  const minSide = Math.min(vw, vh);
  const maxSide = Math.max(vw, vh);
  let mode = "desktop";
  if (maxSide < 820) mode = "mobile";
  else if (minSide < 820) mode = "tablet";
  const portrait = vh > vw;
  const baseScale = Math.max(Math.min(vw / W, vh / H), 0.15);

  // Detección de teléfono independiente del modo: cualquier dispositivo con
  // lado menor ≤ 600 CSS-px es un teléfono. Cubre todos los teléfonos
  // actuales (iPhone SE 320 → S25 Ultra/Pro Max ~432) con margen para
  // modelos futuros más anchos. La menor tablet (iPad mini 744) queda
  // bien por encima, así que no se rompe el caso "tablet portrait usable
  // letterboxed". Solo bloqueamos cuando teléfono Y portrait — el lienzo
  // paisaje queda demasiado pequeño para jugar.
  const isPhone = minSide <= 600;
  const lockPortrait = isPhone && portrait;

  // Tamaño de los glifos del fondo: equivalente al `clamp(48px, 7vmin, 110px)`
  // que tenía el CSS, pero calculado a partir del vw/vh DEFENDIDO contra
  // cambios de DPR. Esto evita que con ctrl+rueda del mouse los glifos
  // crezcan más rápido que el lienzo (el lienzo se congela vía la defensa
  // del DPR; si CSS lee el vmin actual, los glifos no se congelan y desync).
  const glyphSize = Math.max(48, Math.min(minSide * 0.07, 110));

  const debug = typeof window !== "undefined" && /(?:^|[#&])debug(?:&|$)/.test(window.location.hash || "");

  // ─── Pinch-zoom y pan custom ─────────────────────────────────
  // Reemplaza el zoom nativo del browser. Razón: con el lienzo letterboxed
  // dentro de un wrapper viewport-sized, el visual viewport del browser
  // puede panear hasta dejar al usuario mirando solo el cosmos vacío de los
  // bordes — el "rebote" reportado en iPhone (ver .planning/ios-zoom.md).
  // Aquí los gestos operan sobre el transform del lienzo, así que el zoom
  // siempre gravita alrededor del contenido y no deriva a un borde
  // decorativo.
  const wrapperRef = useRefA(null);
  const gestureRef = useRefA(null);
  const stateRef = useRefA({ userZoom: 1, pan: { x: 0, y: 0 } });
  const [userZoom, setUserZoom] = useStateA(1);
  const [pan, setPan] = useStateA({ x: 0, y: 0 });
  const [duringGesture, setDuringGesture] = useStateA(false);

  useEffectA(() => {
    stateRef.current = { userZoom, pan };
  }, [userZoom, pan]);

  // Reset al cambiar viewport (rotación, resize). Si no, el pan queda
  // referenciado a un viewport que ya no existe.
  useEffectA(() => {
    setUserZoom(1);
    setPan({ x: 0, y: 0 });
    setDuringGesture(false);
  }, [vw, vh]);

  useEffectA(() => {
    if (lockPortrait) return;
    const el = wrapperRef.current;
    if (!el) return;

    const Z_MIN = 1;
    const Z_MAX = 4;

    const dist = (a, b) => Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
    const mid = (a, b) => ({ x: (a.clientX + b.clientX) / 2, y: (a.clientY + b.clientY) / 2 });

    function clampPan(zoom, px, py) {
      // Pan máximo: la mitad del exceso del lienzo escalado sobre el viewport.
      // En zoom=1 el max es 0 (lienzo cabe en viewport, no hay donde panear).
      // En zoom=N el lienzo mide N veces el lado contain, así que el usuario
      // puede mover ±(sw - vw)/2 antes de que la orilla del lienzo cruce la
      // orilla del viewport. Esto evita perder el contenido fuera de pantalla.
      const sw = baseScale * zoom * W;
      const sh = baseScale * zoom * H;
      const maxX = Math.max(0, (sw - vw) / 2);
      const maxY = Math.max(0, (sh - vh) / 2);
      return {
        x: Math.max(-maxX, Math.min(maxX, px)),
        y: Math.max(-maxY, Math.min(maxY, py)),
      };
    }

    function applyState(z, px, py) {
      stateRef.current = { userZoom: z, pan: { x: px, y: py } };
      setUserZoom(z);
      setPan({ x: px, y: py });
    }

    function onTouchStart(e) {
      const { userZoom: z0, pan: p0 } = stateRef.current;
      if (e.touches.length >= 2) {
        const [t0, t1] = e.touches;
        gestureRef.current = {
          mode: "pinch",
          d0: dist(t0, t1),
          m0: mid(t0, t1),
          z0, p0: { ...p0 },
        };
        setDuringGesture(true);
        e.preventDefault();
      } else if (e.touches.length === 1) {
        const t = e.touches[0];
        gestureRef.current = {
          mode: "pan-armed",
          startX: t.clientX,
          startY: t.clientY,
          z0, p0: { ...p0 },
        };
        // No preventDefault — un tap simple debe seguir generando click.
      }
    }

    function onTouchMove(e) {
      const g = gestureRef.current;
      if (!g) return;

      // Si en medio de un gesto entra un segundo dedo, transición a pinch
      // tomando el estado actual como punto de partida.
      if (e.touches.length >= 2 && g.mode !== "pinch") {
        const [t0, t1] = e.touches;
        const { userZoom: zNow, pan: pNow } = stateRef.current;
        gestureRef.current = {
          mode: "pinch",
          d0: dist(t0, t1),
          m0: mid(t0, t1),
          z0: zNow, p0: { ...pNow },
        };
        setDuringGesture(true);
        e.preventDefault();
        return;
      }

      if (e.touches.length >= 2 && g.mode === "pinch") {
        const [t0, t1] = e.touches;
        const d = dist(t0, t1);
        const m = mid(t0, t1);
        const ratio = d / g.d0;
        // Permitimos pasar transitoriamente bajo Z_MIN para sensación elástica
        // durante el gesto; en touchend hacemos snap-back al rango válido.
        const newZoom = Math.max(Z_MIN * 0.7, Math.min(Z_MAX * 1.05, g.z0 * ratio));
        const r = newZoom / g.z0;
        const ux = g.m0.x - vw / 2;
        const uy = g.m0.y - vh / 2;
        // Fórmula que mantiene el punto medio de la pinza anclado al mismo
        // píxel del lienzo durante todo el gesto. Derivación:
        //   panX_new = (mx0 - vw/2) + (newZoom/z0) * (panX0 - (mx0 - vw/2))
        //              + (mx_now - mx0)   ← desplazamiento del propio gesto
        const newPanX = ux + r * (g.p0.x - ux) + (m.x - g.m0.x);
        const newPanY = uy + r * (g.p0.y - uy) + (m.y - g.m0.y);
        applyState(newZoom, newPanX, newPanY);
        e.preventDefault();
      } else if (e.touches.length === 1 && g.mode === "pan-armed") {
        if (g.z0 <= 1.001) return; // sin zoom no panea — dejamos pasar el tap
        const t = e.touches[0];
        const dx = t.clientX - g.startX;
        const dy = t.clientY - g.startY;
        if (Math.hypot(dx, dy) > 8) {
          gestureRef.current = { ...g, mode: "pan" };
          setDuringGesture(true);
          e.preventDefault();
        }
      } else if (e.touches.length === 1 && g.mode === "pan") {
        const t = e.touches[0];
        const dx = t.clientX - g.startX;
        const dy = t.clientY - g.startY;
        applyState(g.z0, g.p0.x + dx, g.p0.y + dy);
        e.preventDefault();
      }
    }

    function onTouchEnd(e) {
      const g = gestureRef.current;
      if (!g) return;
      if (e.touches.length === 0) {
        const { userZoom: z, pan: p } = stateRef.current;
        const clampedZ = Math.max(Z_MIN, Math.min(Z_MAX, z));
        let cp;
        if (clampedZ <= 1.001) {
          cp = { x: 0, y: 0 };
        } else {
          cp = clampPan(clampedZ, p.x, p.y);
        }
        applyState(clampedZ, cp.x, cp.y);
        setDuringGesture(false);
        gestureRef.current = null;
      }
    }

    el.addEventListener("touchstart", onTouchStart, { passive: false });
    el.addEventListener("touchmove", onTouchMove, { passive: false });
    el.addEventListener("touchend", onTouchEnd, { passive: false });
    el.addEventListener("touchcancel", onTouchEnd, { passive: false });

    return () => {
      el.removeEventListener("touchstart", onTouchStart);
      el.removeEventListener("touchmove", onTouchMove);
      el.removeEventListener("touchend", onTouchEnd);
      el.removeEventListener("touchcancel", onTouchEnd);
    };
  }, [vw, vh, baseScale, lockPortrait]);

  const totalScale = baseScale * userZoom;

  return (
    <div ref={wrapperRef} style={{
      width: "100vw", height: "100dvh",
      minHeight: "-webkit-fill-available",
      overflow: "hidden",
      position: "relative",
      background: variant === "chalkboard" ? "#0b3a2d" : "#050214",
      // `touch-action: none` desactiva todos los gestos que el browser
      // interpretaría por su cuenta (pinch, pan, doble-tap-zoom). Los
      // implementamos en JS sobre el transform del lienzo para que el
      // zoom siempre quede anclado al contenido y nunca derive a los
      // bordes letterbox del wrapper. Los click/tap en botones siguen
      // funcionando — esto solo bloquea gestos del browser, no eventos.
      touchAction: "none",
    }}>
      <CosmosBg variant={variant} glyphSize={glyphSize} />

      {/* Lienzo lógico 900×540 centrado y escalado.
          El transform combina el escalado base (contain del viewport),
          el zoom del usuario y el pan acumulado. El orden CSS es
          right-to-left: scale → translate(pan) → translate(-50%,-50%). */}
      <div style={{
        width: W, height: H,
        position: "absolute",
        left: "50%", top: "50%",
        transform: `translate(-50%, -50%) translate(${pan.x}px, ${pan.y}px) scale(${totalScale})`,
        transformOrigin: "center center",
        overflow: "hidden",
        // Sin transición durante el gesto activo (el lienzo sigue la pinza
        // al instante); con transición elástica al soltar, para que el
        // snap-back de zoom/pan a los límites válidos no sea abrupto.
        transition: duringGesture ? "none" : "transform 0.22s cubic-bezier(0.2, 0.8, 0.2, 1)",
        willChange: "transform",
      }}>
        {children}
      </div>

      {lockPortrait && <RotateLockOverlay />}
      {debug && (
        <div style={{
          position: "fixed", top: 6, left: 6, zIndex: 999999,
          background: "rgba(0,0,0,0.85)", color: "#0f0",
          font: "11px ui-monospace,Menlo,monospace",
          padding: "6px 8px", borderRadius: 6,
          maxWidth: "90vw", whiteSpace: "pre",
          pointerEvents: "none",
        }}>
{`vw=${vw} vh=${vh}
min=${minSide} max=${maxSide}
mode=${mode} portrait=${portrait}
isPhone=${isPhone} LOCK=${lockPortrait}
zoom=${userZoom.toFixed(2)} pan=${pan.x.toFixed(0)},${pan.y.toFixed(0)}
vv=${typeof window!=="undefined" && window.visualViewport ? "yes" : "no"}
ua=${(typeof navigator!=="undefined" ? navigator.userAgent : "?").slice(0,60)}`}
        </div>
      )}
    </div>
  );
}

// Overlay bloqueante de rotación. En mobile portrait cubre toda la pantalla
// con un mensaje claro y un ícono animado. NO se puede descartar — el usuario
// DEBE girar el dispositivo para acceder al juego. Se desmonta solo cuando
// el viewport pasa a landscape.
function RotateLockOverlay() {
  return (
    <div
      role="dialog"
      aria-modal="true"
      aria-label="Gira tu teléfono para jugar"
      style={{
        position: "fixed", inset: 0, zIndex: 99999,
        background: "linear-gradient(180deg,#050214 0%,#0a0628 100%)",
        display: "flex", flexDirection: "column",
        alignItems: "center", justifyContent: "center",
        textAlign: "center", padding: "32px 24px",
        color: "#fce9a8",
        fontFamily: "var(--ed-font-display, system-ui)",
      }}
    >
      <div
        style={{
          width: 132, height: 132, marginBottom: 28,
          display: "flex", alignItems: "center", justifyContent: "center",
          animation: "ed-rotate-lock 2.4s ease-in-out infinite",
        }}
        aria-hidden="true"
      >
        {/* Ícono de teléfono que rota */}
        <svg viewBox="0 0 100 100" width="120" height="120" fill="none">
          <rect x="36" y="14" width="28" height="72" rx="6"
                stroke="#f2c260" strokeWidth="3" fill="rgba(242,194,96,0.08)" />
          <rect x="42" y="22" width="16" height="48" rx="2" fill="rgba(242,194,96,0.18)" />
          <circle cx="50" cy="78" r="2.5" fill="#f2c260" />
        </svg>
      </div>
      <div style={{
        fontWeight: 800,
        fontSize: "clamp(18px, 5.2vw, 26px)",
        lineHeight: 1.15,
        textTransform: "uppercase", letterSpacing: "0.02em",
        marginBottom: 12,
      }}>
        Gira tu teléfono
      </div>
      <div style={{
        fontWeight: 500,
        fontSize: "clamp(13px, 4vw, 16px)",
        lineHeight: 1.4,
        color: "rgba(252,233,168,0.78)",
        maxWidth: "min(320px, 80vw)",
      }}>
        Pon tu teléfono de lado para jugar.
      </div>
      <style>{`
        @keyframes ed-rotate-lock {
          0%   { transform: rotate(0deg); }
          45%  { transform: rotate(0deg); }
          70%  { transform: rotate(-90deg); }
          100% { transform: rotate(-90deg); }
        }
      `}</style>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// App principal
// ─────────────────────────────────────────────────────────────
function App() {
  const [route, setRoute] = useStateA("home");
  const [app, setApp] = useStateA({
    studentName: "",
    character: "escritor",
    level: null,
    stars: 0,
    sessionStart: Date.now(),
    gameSeed: 0,
  });

  function go(r) {
    // Al (re)entrar al juego, regeneramos la seed para que GameScreen se remonte
    // y reinicie ronda, tiempo, racha, etc. También reseteamos las estrellas:
    // cada partida empieza desde 0, no acumula entre rondas.
    if (r === "game") {
      setApp((s) => ({ ...s, gameSeed: (s.gameSeed || 0) + 1, stars: 0 }));
    }
    setRoute(r);
  }

  const screenProps = { app, setApp, go };

  let Screen = window.HomeScreen;
  if (route === "character") Screen = window.CharacterScreen;
  else if (route === "game") Screen = window.GameScreen;
  else if (route === "results") Screen = window.ResultsScreen;

  const variant = route === "game" ? "chalkboard" : "cosmic";

  return (
    <DeviceStage variant={variant}>
      <Screen key={route === "game" ? `game-${app.gameSeed}` : route} {...screenProps} />
    </DeviceStage>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>
</body>
</html>
